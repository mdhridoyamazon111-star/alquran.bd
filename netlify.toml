[build]
  publish = "."

# Open the Quran reader by default when visiting the site root.
[[redirects]]
  from = "/"
  to = "/reader.html"
  status = 302

# Ensure the web app manifest is served with the correct MIME type.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# Allow the service worker to control the whole scope.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"
