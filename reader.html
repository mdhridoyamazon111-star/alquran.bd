<!DOCTYPE html>
<html lang="bn" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>কুরআন পাঠক — সূরা অনুযায়ী</title>
  <meta name="description" content="আল কুরআনের সম্পূর্ণ ১১৪টি সূরা আরবি টেক্সট ও বাংলা অনুবাদসহ। সূরা অনুসারে পাঠ, অফলাইন পড়া এবং পূর্ণ কুরআন শরীফ পড়ার সুবিধা।" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://alquran-bd.pages.dev/" />
  <meta name="google-site-verification" content="YOUR_GOOGLE_VERIFY_CODE" />

  <!-- PWA: installable on mobile / tablet / desktop -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0c2321" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="আল কুরআন" />
  <meta name="google" content="notranslate" />
  <script>if (location.pathname === "/reader.html") history.replaceState(null, "", "/");</script>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Reem+Kufi:wght@400;700&family=Noto+Sans+Bengali:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --ink:       #2a2118;
      --gold-1:    #c9a24b;
      --gold-2:    #8a6d2f;
      --cream:     #fbf4e3;
      --teal:      #1f6f6b;
      --teal-2:    #2f8f8a;
      --bg:        #0c2321;
      --arabic-size: 34px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: auto; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 60px 5px 50px;
      font-family: "Noto Sans Bengali", system-ui, sans-serif;
      background:
        radial-gradient(1000px 700px at 50% -5%, #17403d 0%, var(--bg) 55%, #08181a 100%);
      color: #e9f2ef;
    }
    /* ---------- Top navbar ---------- */
    .top-nav {
      position: fixed;
      top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(12, 35, 33, 0.94);
      border-bottom: 1px solid var(--gold-1);
      backdrop-filter: blur(8px);
      padding: 8px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      direction: ltr;
    }
    .top-nav .btn, .top-nav select, .top-nav input[type="number"] {
      font-family: "Noto Sans Bengali", system-ui, sans-serif;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(201,162,75,.10));
      color: #f2ead2;
      border: 1px solid rgba(201,162,75,.55);
      border-radius: 10px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .2px;
      box-shadow: 0 1px 2px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.08);
      transition: transform .15s ease, background .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .top-nav .btn:hover, .top-nav select:hover {
      background: linear-gradient(180deg, rgba(230,197,110,.35), rgba(201,162,75,.28));
      border-color: var(--gold-2);
      box-shadow: 0 4px 12px rgba(201,162,75,.35), inset 0 1px 0 rgba(255,255,255,.15);
      transform: translateY(-1px);
    }
    .top-nav .btn:active { transform: translateY(0); box-shadow: 0 1px 2px rgba(0,0,0,.3) inset; }
    .top-nav .btn:focus-visible, .top-nav select:focus-visible {
      outline: none;
      border-color: var(--gold-2);
      box-shadow: 0 0 0 3px rgba(201,162,75,.35);
    }
    .top-nav .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
    .top-nav .btn.active {
      background: linear-gradient(180deg, var(--gold-2), var(--gold-1));
      color: #0c2321;
      font-weight: 800;
      border-color: #f0dca0;
      box-shadow: 0 0 12px rgba(201,162,75,.5);
    }
    .top-nav .btn.btn-install {
      background: linear-gradient(180deg, #34d399, #1f9d76);
      color: #04231b;
      font-weight: 800;
      border-color: #7be8c4;
    }
    .top-nav .btn.btn-install:hover {
      background: linear-gradient(180deg, #5be2b6, #23b083);
      box-shadow: 0 4px 12px rgba(52,211,153,.45);
    }
    .top-nav .logo {
      display: none;
      font-family: "Noto Sans Bengali", system-ui, sans-serif;
      color: var(--gold-1);
      font-weight: 800;
      font-size: 15px;
      padding: 8px 14px;
      border: 1px solid rgba(201,162,75,.55);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(201,162,75,.10));
      cursor: pointer;
      white-space: nowrap;
    }
    .top-nav select option { background: #0c2321; color: #e9f2ef; }
    .top-nav input[type="number"] { width: 56px; cursor: text; }
    .top-nav .nav-name {
      color: #0c2321;
      background: linear-gradient(180deg, var(--gold-2), var(--gold-1));
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.3);
    }

    /* ---------- Desktop-only banner below navbar ---------- */
    .desktop-banner {
      display: none;
      width: 100%;
      max-width: 100%;
      height: 300px;
      margin: 10px auto 8px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 12px;
      background: url("images/banner.jpg") center/cover no-repeat;
      box-shadow: 0 8px 32px rgba(0,0,0,.25), inset 0 0 0 1px rgba(255,255,255,.1);
      overflow: hidden;
      position: relative;
    }
    .desktop-banner::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(1px) saturate(105%);
      -webkit-backdrop-filter: blur(1px) saturate(105%);
      pointer-events: none;
      z-index: 0;
    }
    .desktop-banner::after {
      content: "Al Quran.BD";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-18deg);
      font-family: "Reem Kufi", "Noto Sans Bengali", sans-serif;
      font-size: clamp(36px, 6vw, 80px);
      font-weight: 800;
      color: rgba(255,255,255,.18);
      text-shadow: 0 0 14px rgba(255,255,255,.18);
      letter-spacing: 3px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 1;
      filter: blur(3px);
      -webkit-filter: blur(3px);
    }
    @media (min-width: 1024px) {
      .desktop-banner { display: block; }
    }

    /* Collapsible advanced tools (Font, Speed, Screen color) */
    .nav-tools {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      z-index: 99;
      background: rgba(12, 35, 33, 0.98);
      border-bottom: 1px solid var(--gold-1);
      padding: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .nav-tools.open { display: flex; }
    .nav-tools .btn, .nav-tools select {
      padding: 10px 18px;
      font-size: 15px;
    }

    /* ---------- Surah grid (home screen) ---------- */
    .surah-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .grid-heading {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--gold-1);
      font-weight: 700;
      font-size: 18px;
      margin: 4px 0 6px;
    }
    .surah-card {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      gap: 6px;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(201,162,75,.10));
      border: 1px solid rgba(201,162,75,.40);
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      color: #f2ead2;
      text-align: left;
      font-family: "Noto Sans Bengali", sans-serif;
      overflow: hidden;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease;
    }
    .surah-card:hover {
      transform: translateY(-2px);
      border-color: var(--gold-2);
      background: linear-gradient(180deg, rgba(230,197,110,.22), rgba(201,162,75,.16));
      box-shadow: 0 6px 16px rgba(201,162,75,.30);
    }
    .surah-card .no {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--gold-2), var(--gold-1));
      color: #0c2321;
      font-weight: 800;
      font-family: "Scheherazade New", serif;
      font-size: 14px;
    }
    .surah-card .bn {
      flex: 1 1 auto;
      min-width: 0;
      font-weight: 700;
      font-size: 16px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .surah-card .en {
      flex: 0 0 auto;
      font-size: 14px;
      color: #e9d9b0;
      white-space: nowrap;
    }
    .surah-card .ar {
      flex: 0 0 auto;
      font-family: "Scheherazade New", "Amiri", serif;
      color: var(--gold-1);
      font-size: 18px;
      white-space: nowrap;
      margin-left: auto;
    }

    /* ---------- Loading / error ---------- */
    #status {
      text-align: center;
      margin: 20px 0;
      font-size: 15px;
      color: #cfe6e1;
    }

    /* ---------- Main reading area ---------- */
    .page {
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 0;
      border-radius: 0;
    }
    .frame {
      position: relative;
      border: none;
      padding: 0;
    }
    .frame::before { display: none; }
    .inner {
      position: relative;
      border: none;
      border-radius: 4px;
      background: radial-gradient(120% 90% at 50% 0%, #ffffff 0%, var(--cream) 45%, #f4ead0 100%);
      padding: 22px 10px 30px;
      overflow: hidden;
    }

    /* On mobile (<= 767px): full-width, wide-line reading view with one surah button per line */
    @media (max-width: 767px) {
      .page {
        background: none;
        padding: 0;
        border-radius: 0;
        box-shadow: none;
      }
      .frame {
        border: none;
        padding: 0;
      }
      .frame::before { display: none; }
      .inner {
        border: none;
        border-radius: 8px;
        padding: 12px 6px 22px;
      }
      .surah-grid {
        grid-template-columns: 1fr;
      }
      .surah-card {
        width: 100%;
      }
      .top-nav {
        flex-wrap: nowrap;
        gap: 5px;
        padding: 6px 8px;
      }
      .top-nav .btn, .top-nav select, .top-nav input[type="number"] {
        padding: 5px 8px;
        font-size: 12px;
      }
      #surahSelect {
        flex: 1 1 0;
        min-width: 0;
        max-width: 140px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    }

    /* ---------- Surah title & info ---------- */
    .surah-title {
      text-align: center;
      margin: 4px auto 14px;
      max-width: 360px;
      background: linear-gradient(180deg, var(--teal-2), var(--teal));
      color: #fdf6e3;
      border: 2px solid var(--gold-1);
      border-radius: 40px / 30px;
      padding: 8px 10px;
      font-family: "Reem Kufi", "Amiri", serif;
      font-size: 26px;
      letter-spacing: .5px;
      box-shadow: inset 0 0 0 3px rgba(253,246,227,.25);
    }
    .info-banner {
      direction: ltr;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 18px;
      margin: 0 0 18px;
      padding: 10px 14px;
      background: rgba(255,255,255,.14);
      border: 1px solid var(--gold-1);
      border-radius: 10px;
      color: #2a2118;
      font-family: "Noto Sans Bengali", sans-serif;
      font-size: 14px;
    }
    .info-banner span { display: inline-flex; align-items: center; gap: 6px; }
    .info-banner strong { color: var(--teal); font-weight: 700; }

    /* ---------- Bismillah ---------- */
    .bismillah {
      text-align: center;
      font-family: "Scheherazade New", "Amiri", serif;
      font-size: var(--arabic-size);
      color: var(--teal);
      margin: 4px 0 12px;
      line-height: 1.7;
    }

    /* ---------- Ayah blocks ---------- */
    .ayah-block {
      position: relative;
      margin: 10px 0 12px;
      padding: 4px 0 9px;
      border-bottom: 1px dashed var(--gold-1);
    }
    .ayah-block:last-of-type { border-bottom: none; }
    .bm-btn {
      position: absolute;
      top: 2px;
      left: 2px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      opacity: .3;
      filter: grayscale(1);
      transition: opacity .15s ease, transform .15s ease;
    }
    .bm-btn:hover { opacity: .75; transform: scale(1.15); }
    .ayah-block.bookmarked {
      background: rgba(201,162,75,.16);
      border-radius: 10px;
      box-shadow: inset 0 0 0 1px rgba(201,162,75,.5);
    }
    .ayah-block.bookmarked .bm-btn { opacity: 1; filter: none; }

    /* Toast message */
    #toast {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(12,35,33,.96);
      color: #f2ead2;
      border: 1px solid var(--gold-1);
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 14px;
      font-family: "Noto Sans Bengali", sans-serif;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      transition: opacity .25s ease, transform .25s ease;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .ayah-arabic {
      font-family: "Scheherazade New", "Amiri", serif;
      font-size: var(--arabic-size);
      line-height: 2.15;
      text-align: center;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .ayah-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--teal);
      color: #fdf6e3;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      line-height: 1;
      font-family: "Scheherazade New", "Amiri", serif;
      font-size: 16px;
      vertical-align: middle;
      margin: 0 6px;
    }
    .ayah-bn {
      direction: ltr;
      font-family: "Noto Sans Bengali", sans-serif;
      text-align: center;
      font-size: 17px;
      line-height: 2;
      color: #3d3024;
      padding: 8px 8px;
      background: rgba(255,255,255,.48);
      border-radius: 10px;
    }
    .ayah-bn .meaning { display: block; color: #2a2118; }
    .ayah-uc {
      direction: ltr;
      font-family: 'Noto Sans Bengali', sans-serif;
      text-align: center;
      font-size: 16.5px;
      line-height: 1.95;
      color: #3d3024;
      padding: 6px 8px;
      background: rgba(255,255,255,.32);
      border-radius: 10px;
      margin-top: 6px;
      font-style: italic;
    }
    .ayah-marks {
      direction: ltr;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .ayah-mark {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      font-family: "Noto Sans Bengali", sans-serif;
    }
    .ayah-mark.ruku { background: rgba(31,111,107,.12); color: var(--teal); border: 1px solid var(--teal); }
    .ayah-mark.sajda { background: rgba(201,40,40,.10); color: #b22222; border: 1px solid #b22222; }
    .ayah-mark.sajda .sym { font-size: 14px; }

    /* Dark-screen text overrides */
    .inner.dark-screen { color: #f7edd6; }
    .inner.dark-screen .surah-title { color: #fdf6e3; }
    .inner.dark-screen .info-banner { color: #e8dbc0; border-color: rgba(247,237,214,.5); background: rgba(0,0,0,.25); }
    .inner.dark-screen .info-banner strong { color: #93e6d9; }
    .inner.dark-screen .bismillah { color: #93e6d9; }
    .inner.dark-screen .ayah-arabic { color: #f7edd6; }
    .inner.dark-screen .ayah-bn { color: #f0e6d2; background: rgba(0,0,0,.25); }
    .inner.dark-screen .ayah-uc { color: #f0e6d2; background: rgba(0,0,0,.25); }
    .inner.dark-screen .ayah-bn .meaning { color: #f0e6d2; }
    .inner.dark-screen .ayah-mark { color: #f7edd6; }
    .inner.dark-screen .ayah-mark.ruku { color: #93e6d9; }
    .inner.dark-screen .ayah-mark.sajda { color: #ff9f9f; }

    @media (max-width: 520px) {
      .top-nav input[type="number"] { width: 50px; }
      .top-nav .nav-name { font-size: 12px; }
      :root { --arabic-size: 28px; }
      .ayah-arabic { font-size: var(--arabic-size); }
      .surah-title { font-size: 21px; }
    }
    /* Desktop: show advanced tools inline and remove gear icon */
    @media (min-width: 768px) {
      .top-nav {
        flex-wrap: nowrap;
        overflow-x: auto;
      }
      #btnHome, #btnSettings { display: none; }
      .top-nav .logo { display: inline-flex; align-items: center; }
      .top-nav .nav-tools {
        display: flex;
        position: static;
        top: auto;
        left: auto;
        right: auto;
        z-index: auto;
        background: transparent;
        width: auto;
        flex-wrap: nowrap;
        gap: 6px;
        padding: 0;
        margin: 0;
        border: none;
      }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="logo" id="logo" title="Home">Al Quran.BD</div>
    <button class="btn" id="btnHome" title="Sura list">☰ Sura</button>
    <button class="btn" id="prev" title="Previous">&larr;</button>
    <select id="surahSelect" title="Select Surah"></select>
    <button class="btn" id="next" title="Next">&rarr;</button>
    <button class="btn btn-install" id="btnInstall" title="App Install">App Install</button>
    <button class="btn" id="btnSettings" title="সেটিংস">⚙</button>

    <div class="nav-tools" id="navTools">
      <span class="nav-name" id="navName"></span>
      <button class="btn" id="btnFontDown">Font -</button>
      <button class="btn" id="btnFontUp">Font +</button>
      <button class="btn" data-speed="0.7" id="speedLow">Low</button>
      <button class="btn" data-speed="1.6" id="speedMed">Medium</button>
      <button class="btn" data-speed="3.2" id="speedFast">Fast</button>
      <button class="btn" id="btnStop" style="display:none">Stop</button>
      <select id="screenColor" title="Screen color">
        <option value="default" selected>Default</option>
        <option value="#0c2321">Dark Green</option>
        <option value="#000000">Black</option>
        <option value="#1f2937">Dark Gray</option>
        <option value="#ffffff">White</option>
        <option value="#f5e6c8">Sepia</option>
        <option value="#064e3b">Green</option>
        <option value="#1e3a8a">Blue</option>
      </select>
    </div>
  </nav>

  <div class="desktop-banner" id="desktopBanner"></div>

  <p id="status">সূরা লোড হচ্ছে...</p>

  <div class="surah-grid" id="surahGrid" style="display:none"></div>

  <div id="toast"></div>

  <div class="page" id="page" style="display:none">
    <div class="frame">
      <div class="inner">
        <div class="surah-title" id="surahTitle">سُورَة</div>

        <div class="bismillah" id="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>

        <div id="ayahs"></div>
      </div>
    </div>
  </div>

  <script>
    const page = document.getElementById("page");
    const statusEl = document.getElementById("status");
    const surahTitle = document.getElementById("surahTitle");
    const ayahsEl = document.getElementById("ayahs");
    const bismillahEl = document.getElementById("bismillah");
    const surahSelect = document.getElementById("surahSelect");
    const navName = document.getElementById("navName");
    const surahGrid = document.getElementById("surahGrid");
    const desktopBanner = document.getElementById("desktopBanner");

    // Settings (advanced tools) toggle
    document.getElementById("btnSettings").addEventListener("click", () => {
      document.getElementById("navTools").classList.toggle("open");
    });
    // Show the surah list (home) grid
    document.getElementById("btnHome").addEventListener("click", showGrid);
    document.getElementById("logo").addEventListener("click", showGrid);

    // --- Bookmark ("চিহ্ন") system: remember the last marked ayah in localStorage ---
    const BM_KEY = "quran_bookmark";
    function getBookmark() {
      try { return JSON.parse(localStorage.getItem(BM_KEY)); } catch (e) { return null; }
    }
    function setBookmark(surah, ayah) {
      localStorage.setItem(BM_KEY, JSON.stringify({ surah, ayah }));
    }
    function clearBookmark() { localStorage.removeItem(BM_KEY); }

    function applyBookmarkHighlight(n) {
      ayahsEl.querySelectorAll(".ayah-block.bookmarked").forEach(el => el.classList.remove("bookmarked"));
      const bm = getBookmark();
      if (bm && bm.surah === n) {
        const el = ayahsEl.querySelector(`.ayah-block[data-ayah="${bm.ayah}"]`);
        if (el) el.classList.add("bookmarked");
      }
    }

    // Toggle bookmark when a bookmark button is tapped (event delegation)
    ayahsEl.addEventListener("click", (e) => {
      const btn = e.target.closest(".bm-btn");
      if (!btn) return;
      const ayah = parseInt(btn.dataset.ayah, 10);
      const bm = getBookmark();
      if (bm && bm.surah === currentSurah && bm.ayah === ayah) {
        clearBookmark();
        showToast("চিহ্ন মুছে ফেলা হয়েছে");
      } else {
        setBookmark(currentSurah, ayah);
        showToast(`চিহ্নিত: আয়াত ${toArabicNum(ayah)}`);
      }
      applyBookmarkHighlight(currentSurah);
    });

    // Small toast message
    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 1800);
    }

    const toArabicNum = (n) => String(n).replace(/[0-9]/g, (d) => "٠١٢٣٤٥٦٧٨٩"[d]);

    // Diacritic-insensitive Bismillah detection/removal.
    const AR_DIACRITICS = /[\u0610-\u061A\u064B-\u065F\u0670\u06D6-\u06ED\u08D3-\u08FF\uFE70-\uFEFF\u0640]/g;
    function normAr(s) {
      return s.replace(AR_DIACRITICS, "").replace(/[ٱأإآ]/g, "ا").replace(/\s+/g, "");
    }
    const BISM_SKELETON = normAr("بسم الله الرحمن الرحيم");
    function stripLeadingBismillah(text) {
      const clean = text.replace(/^\uFEFF/, "");
      let count = 0, i = 0;
      for (; i < clean.length && count < BISM_SKELETON.length; i++) {
        const ch = normAr(clean[i]);
        if (!ch) continue;
        if (ch !== BISM_SKELETON[count]) return clean;
        count++;
      }
      if (count < BISM_SKELETON.length) return clean;
      return clean.slice(i).replace(/^[\u064B-\u065F\u0670\u06D6-\u06ED\s]+/, "").trim();
    }

        'ওয়া ইযা-ছাআলাকা ‘ইবা-দী ‘আন্নী ফাইন্নী কারীবুন উজীবুদা‘ওয়াতাদ্দা-‘ই ইযা-দা‘আ-নি ফালইয়াছতাজীবূলী ওয়াল ইউ’মিনূ বী লা‘আল্লাহুম ইয়ারশুদূন।',

        'ওয়া কা-তিলূ ফী ছাবীলিল্লা-হিল্লাযীনা ইউকা-তিলূনাকুম ওয়ালা-তা‘তাদূ ইন্নাল্লা-হা লা-ইউহিব্বুল মু‘তাদীন।',

        'ফাইনিন তাহাও ফাইন্নাল্লা-হা গাফূরুর রাহীম।',

        'ইয়াছআলূনাকা ‘আনিল খামরি ওয়াল মাইছিরি কুল ফীহিমা ইছমুন কাবীরুওঁ ওয়া মানাফি‘উ লিন্না-ছি ওয়া ইছমুহুমাআকবারু মিন নাফ‘ইহিমা-ওয়া ইয়াছআলূনাকা মা যা-ইউনফিকূনা কুল্লি ‘আফওয়া কাযা-লিকা ইউবাইয়িনুল্লা-হু লাকুমুল আ-য়াতি লা‘আল্লাকুম তাতাফাক্কারুন।',
        'ফিদ্দুনইয়া-ওয়াল আ-খিরাতি ওয়া ইয়াছআলূনাকা ‘আনিলইয়াতা-মা কুলইসলাহুল্লাহুম খাইরুওঁ ওয়া ইন তুখা-লিতূহুম ফাইখওয়া-নুকুম ওয়াল্লা-হু ইয়া‘লামুল মুফছিদা মিনাল মুসলিহিওয়ালাও শাআল্লা-হু লাআ‘নাতাকুম ইন্নাল্লা-হা ‘আঝীঝুন হাকীম।',
        'ওয়া লা-তানকিহুল মুশরিকা-তি হাত্তা-ইউ’মিন্না ওয়া লাআমাতুম মু’মিনাতুন খাইরুম মিম মুশরিকাতিওঁ ওয়ালাও আ‘জাবাতকুম ওয়ালা-তুনকিহুল মুশরিকীনা হাত্তা-ইউমিনূ ওয়ালা ‘আবদুম মু’মিনুন খাইরুম মিম মুশরিকিওঁ ওয়া লাও আ‘জাবাকুম উলাইকা ইয়াদ‘ঊনা ইলান্না-রি ওয়াল্লা-হু ইয়াদ‘ঊইলাল জান্নাতি ওয়াল মাগফিরাতি বিইযনিহী ওয়া ইউবাইয়িনুআ-য়া-তিহী লিন্না-ছি লা‘আল্লাহুম ইয়াতাযাক্কারুন।',
        'ওয়া ইয়াছআলূনাকা ‘আনিল মাহীদি কুল হুওয়া আযান ফা‘তাঝিলুন্নিছাআ ফিল মাহীদি ওয়ালা-তাকরাবূহুন্না হাত্তা-ইয়াতহুরনা ফাইযা-তাতাহহারনা ফা’তূহুন্না মিন হাইছুআমারাকুমুল্লা-হু ইন্নাল্লাহা ইউহিব্বুত্তাওওয়া-বীনা ওয়াইউহিব্বুল মুতাতাহহিরীন।',
        'নিছাউকুম হারছুল্লাকুম ফা’তূহারছাকুম আন্না-শি’তুম ওয়া কাদ্দিমূ লিআনফুছিকুম ওয়াত্তাকুল্লা-হা ওয়া‘লামূ আন্নাকুম মুলা-কূহু ওয়া বাশশিরিল মু’মিনীন।',
        'ওয়ালা-তাজ‘আলুল্লা-হা ‘উরদাতাল লিআইমা-নিকুম আন তাবাররূওয়াতাত্তাকূওয়াতুসলিহু বাইনান্না-ছি ওয়াল্লা-হু ছামী‘উন ‘আলীম।',
        'লা-ইউআ-খিযু কুমুল্লা-হু বিল্লাগবিফী আইমা-নিকুম ওয়ালা-কিই ইউআ-খিযু কুম বিমাকাছাবাত কুলূবুকুম ওয়াল্লা-হু গাফরুন হালীম।',
        'লিল্লাযীনা ইউ’লূনা মিন্নিছাইহিম তারাব্বুসু আরবা‘আতি আশহুরিন ফাইন ফাউ ফাইন্নাল্লা-হা গাফূরুর রাহীম।',
        'ওয়া ইন ‘আঝামুত্তালা-কা ফাইন্নাল্লা-হা ছামী‘উন ‘আলীম।',
        'ওয়াল মুতাল্লাকা-তুইয়াতারাব্বাসনা বিআনফুছিহিন্না ছালা-ছাতা কুরূইওঁ ওয়ালা-ইয়াহিল্লুলাহুন্না আইয়াকতুম না মা-খালাকাল্লা-হু ফী আরহা-মিহিন্না ইন কুন্না ইউ’মিন্না বিল্লাহি ওয়াল ইয়াওমিল আ-খিরি ওয়া বু‘ঊলাতুহুন্না আহাক্কুবিরাদ্দিহিন্না ফী যা-লিকা ইন আরা-দূ ইসলা-হাওঁ ওয়া লাহুন্না মিছলুল্লাযী ‘আলাইহিন্না বিলমা‘রূফি ওয়া লিররিজা-লি ‘আলাইহিন্না দারাজাতুওঁ ওয়াল্লা-হু ‘আঝীঝুন হাকীম।',
        'আত্তালা-কুমার রাতা-নি ফাইমছা-কুম বিমা‘রূফিন আও তাছরীহুম বিইহছা-নিওঁ ওয়ালা-ইয়াহিল্লুলাকুম আন তা’খুযূমিম্মা আ-তাইতুমূহুন্না শাইআন ইল্লাআইঁ ইয়াখাফা আল্লা-ইউকীমা-হুদূদাল্লা-হি ফাইন খিফতুম আল্লা-ইউকীমা-হুদাল্লা-হি ফালা-জুনা-হা ‘আলাইহিমা-ফীমাফতাদাতবিহী তিলকা হুদূদুল্লা-হি ফালা-তা‘তাদূ হা-ওয়ামাইইয়াতা‘আদ্দা হুদূদাল্লা-হি ফাউলাইকা হুমুজ্জা-লিমূন।',
        'ফাইন তাল্লাকাহা-ফালা-তাহিল্লু লাহূ মিম বা‘দুহাত্তা-তানকিহা ঝাওজান গাইরাহূ ফাইন তাল্লাকাহা-ফালা-জুনা-হা ‘আলাইহিমা-আই ইয়াতারা-জা‘আইন জান্না-আইঁ ইউকীমা-হুদূদাল্লা-হি ওয়া তিলকা হুদূদুল্লা-হি ইউবাইয়িনুহা-লিকাওমিইঁ ইয়া‘লামূন।',
        'ওয়া ইযা-তাল্লাকতুমুন নিছাআ ফাবালাগনা আজালাহুন্না ফাআমছিকূহুন্না বিমা‘রূফিন আও ছাররিহুহুন্না বিমা‘রূফিওঁ ওয়ালা-তুম ছিকূহুন্না দিরা-রাল লিতা‘তাদূ ওয়া মাইঁ ইয়াফ‘আল যা-লিকা ফাকাদ জালামা নাফছাহূ ওয়ালা-তাত্তাখিযূআ-য়া-তিল্লা-হি হুঝুওয়াও ওয়াযকুরূ নি‘মাতাল্লা-হি ‘আলাইকুম ওয়ামা-আনঝালা ‘আলাইকুম মিনাল কিতা-বি ওয়াল হিকমাতি ইয়া‘ইজু কুম বিহী ওয়াত্তাকুল্লা-হা ওয়া‘লামূআন্নাল্লা-হা বিকুল্লি শাইইন ‘আলীম।',
        'ওয়া ইযা-তাল্লাকতুমুন্নিছাআ ফাবালাগনা আজালাহুন্না ফালা-তা‘দুলূহুন্না আইঁ ইয়ানকিহনা আঝওয়া-জাহুন্না ইযা-তারা-দাও বাইনাহুম বিলমা‘রূফি যা-লিকা ইঊ‘আজুবিহী মান কা-না মিনকুম ইয়ুমিনুবিল্লা-হি ওয়াল ইয়াওমিল আখিরি যা-লিকুম আঝকা-লাকুম ওয়াআতহারু ওয়াল্লাহু ইয়া‘লামুওয়া আনতুম লা-তা‘লামুন।',
        'ওয়াল ওয়া-লিদা-তু ইউরদি না আওলা-দাহুন্না হাওলাইনি কা-মিলাইনি লিমান আরা-দা আই ইউতিম্মাররাদা-‘আতাওঁ ওয়া আলাল মাওলূদি লাহু রিঝকুহুন্না ওয়া কিছওয়াতুহুন্না বিলমা‘রূফি লা-তুকাল্লাফুনাফছুন ইল্লা-উছ‘আহা-লা-তুদাররা ওয়া-লিদাতুম বিওয়ালাদিহা-ওয়ালা-মাওলূদুল্লাহু বিওয়ালাদিহি ওয়া ‘আলাল ওয়া-রিছিমিছলুযালিকা ফাইন আরা-দা-ফিসা-লান ‘আন তারা-দিম মিনহুমা-ওয়াতাশা-উরিন ফালাজুনা-হা ‘আলাইহিমা- ওয়া ইন আরাত্তুম আন তাছতারদি‘ঊ আওলা-দাকুম ফালা-জুনাহা ‘আলাইকুম ইযা-ছাল্লামতুম মাআ-তাইতুম বিলমা‘রূফি ওয়াত্তাকুল্লা-হা ওয়া‘লামূআন্নাল্লা-হা বিমা-তা‘মালূনা বাসীর।',
        'ওয়াল্লাযীনা ইউতাওয়াফফাওনা মিনকুমওয়া ইয়াযারূনা আঝওয়া-জাইঁ ইয়াতারাব্বাসনা বিআনফুছিহিন্না আরবা‘আতা আশহুরিওঁ ওয়া‘আশরান ফাইযা-বালাগনা আজালাহুন্না ফালা-জুনা-হা ‘আলাইকুম ফীমা-ফা‘আলনা ফীআনফুছিহিন্না বিলমা‘রূফি ওয়াল্লা-হু বিমা-তা‘মালূনা খাবীর।',
        'ওয়ালা-জুনা-হা ‘আলাইকুম ফীমা-‘আররাদতুম বিহী মিন খিতবাতিন নিছাই আও আকনানতুম ফী-আনফুছিকুম ‘আলিমাল্লা-হু আন্নাকুম ছাতাযকুরূনাহুন্না ওয়ালা-কিল্লাতুওয়া-‘ইদূ হুন্না ছিররান ইল্লাআন তাকূলূ কাওলাম মা‘রূফাওঁ ওয়ালা-তা‘ঝিমূ ‘উকদাতান নিকা-হিহাত্তা-ইয়াবলুগাল কিতা-বুআজালাহূ ওয়া‘লামূআন্নাল্লা-হা ইয়া‘লামুমা-ফী আনফুছিকুম ফাহযারূহু ওয়া‘লামূআন্নাল্লা-হা গাফুরুন হালীম।',
        'লা-জুনা-হা ‘আলাইকুম ইন তাল্লাকতুমুন্নিছাআ মা-লাম তামাছছূহুন্না আও তাফরিদূ লাহুন্না ফারীদাতাওঁ ওয়ামাত্তি‘ঊহুন্না ‘আলাল মূছি‘ই কাদারুহূ ওয়া ‘আলাল মুকতিরি কাদারুহু মাতা-‘আম বিলমা‘রূফি হাক্কান ‘আলাল মুহছিনীন।',
        'ওয়া ইন তাল্লাকতুমূহুন্না মিন কাবলি আন তামাছছূহুন্না ওয়াকাদ ফারাদতুম লাহুন্না ফারীদাতান ফানিসফুমা-ফারাদতুম ইল্লাআই ইয়া‘ফূনা আও ইয়া‘ফুওয়াল্লাযী বিয়াদিহী ‘উকদাতন নিকা-হিওয়া আন তা‘ফূআকরাবুলিত্তাকওয়া-ওয়ালা-তানছাউল ফাদলা বাইনাক ুম ইন্নাল্লা-হা বিমা-তা‘মালূনা বাসীর।',
        'হা-ফিজূ‘আলাসসালাওয়া-তি ওয়াসসালা-তিল উছতা-ওয়াকূমূলিল্লা-হি কানিতীন।',
        'ফাইন খিফতুম ফারিজা-লান আও রুকবা-নান ফাইযা-আমিনতুম ফাযকুরুল্লা-হা কামা‘আল্লামাকুম মা-লাম তাকূনূ তা‘লামূন।',
        'ওয়াল্লাযীনা ইউতাওয়াফফাওনা মিনকুম ওয়া ইয়াযারূনা আঝওয়াজাওঁ ওয়াসিইইয়াতাল লিআঝওয়া-জিহিম মাতা‘আন ইলাল হাওলি গাইরা ইখরা-জিন ফাইন খারাজনা ফালাজুনা-হা ‘আলাইকুম ফী মা-ফা‘আলনা ফীআনফুছিহিন্না মিম্মা‘রূফিওঁ ওয়াল্লা-হু ‘আঝীঝুন হাকীম।',
        'ওয়ালিল মুতাল্লাকা-তি মাতা-‘উম বিলমা‘রূফি হাক্কান ‘আলাল মুত্তাকীন।',
        'কাযা-লিকা ইউবাইয়িনুল্লা-হু লাকুম আ-য়া-তিহী লা‘আল্লাকুম তা‘কিলূন।',
        'আলাম তারা ইলাল্লাযীনা খারাজূ মিন দিয়া-রিহিম ওয়া হুম উলূফুন হাযারাল মাওতি ফাকা-লা লাহুমুল্লা-হু মূতূ ছু ম্মা আহইয়া-হুম; ইন্নাল্লা-হা লাযূ ফাদলিন ‘আলান্নাছি ওয়ালা-কিন্না আকছারান্না-ছি লা-ইয়াশকুরূন।',
        'ওয়াকা-তিলূ ফী ছাবীলিল্লা-হি ওয়া‘লামূ আন্নাল্লা-হা ছামী‘উন ‘আলীম।',
        'মান যাল্লাযী ইউকরিদুল্লা-হা কারদান হাছানান ফাইউদা-‘ইফাহূলাহুআদ‘আ ফান কাছীরাতাওঁ ওয়াল্লা-হু ইয়াকবিদুওয়া ইয়াবছুতুওয়াইলাইহি তুরজা‘ঊন।',
        'আলাম তারা ইলাল মালাই মিমবানী ইছরাঈলা মিম বা‘দি মূছা-। ইযকা-লূ লিনাবিইয়িল্লাহুমুব ‘আছলানা-মালিকান্নুকা-তিল ফী ছাবীলিল্লা-হি কা-লা হাল ‘আছাইতুম ইন কুতিবা ‘আলাইকুমুল কিতা-লুআল্লা-তুকা-তিলূ কা-লূওয়ামা লানাআল্লা-নুকা-তিলা ফী ছাবীলিল্লা-হি ওয়া কাদ উখরিজনা-মিন দিয়া-রিনা-ওয়া আবনাইনা ফালাম্মা কুতিবা ‘আলাইহিমুল কিতা-লুতাওয়াল্লাও ইল্লা-কালীলাম মিনহুম ওয়াল্লাহু ‘আলীমুম বিজ্জা-লিমীন।',
        'ওয়া কা-লা লাহুম নাবিইয়ুহুম ইন্নাল্লা-হা কাদ বা ‘আছা লাকুম তা-লূতা মালিকান কালূআন্না-ইয়াকূনু লাহুল মুলকু‘আলাইনা-ওয়া নাহনুআহাক্কুবিলমুলকি মিনহু ওয়ালাম ইউ’তা ছা‘আতাম মিনাল মা-লি কা-লা ইন্নাল্লা-হাসতাফা-হু ‘আলাইকুম ওয়াঝা-দাহু বাছতাতান ফিল‘ইলমি ওয়াল জিছমি ওয়াল্লা-হু ইউ’তী মুলকাহু মাইঁ ইয়াশাউ ওয়াল্লা-হু ওয়া-ছি‘উন ‘আলীম।',
        'ওয়াকা-লা লাহুম নাবিইয়ুহুম ইন্না আ-য়াতা মুলকিহী আই ইয়া’তিয়াকুমুত্তা-বূতু ফীহি ছাকীনাতুম মির রাব্বিকুম ওয়া বাকিইইয়াতুম মিম্মা-তারাকা আ-লুমূছা-ওয়া আ-লু হা-রূনা তাহমিলুহুমুল মালাইকাতু ইন্না ফী যা-লিকা লাআ-য়াতাল্লাকুম ইন কুনতুম মু’মিনীন।',
        'ফালাম্মা-ফাসালা তা-লূতু বিলজুনূদি কা-লা ইন্নাল্লা-হা মুবতালীকুম বিনাহারিন ফামান শারিবা মিনহু ফালাইছা মিন্নী ওয়া মাল্লাম ইয়াত‘আমহু ফাইন্নাহু মিন্নী-ইল্লা-মানিগতারাফা গুরফাতাম বিয়াদিহী ফাশারিবূ মিনহু ইল্লা-কালীলাম মিনহুম ফালাম্মা-জা-ওয়াঝাহু হুওয়া ওয়াল্লাযীনা আ-মানূ মা‘আহু কা-লূ লা-তা-কাতালানাল ইয়াওমা বিজা-লূতা ওয়া জুনূদিহী কালাল্লাযীনা ইয়াজুন্নূনা আন্নাহুম মুলা-কুল্লা-হি কাম মিন ফিআতিন কালীলাতিন, গালাবাত ফিআতান কাছীরাতাম বিইযনিল্লা-হি ওয়াল্লা-হু মা‘আসসা-বিরীন।',
        'ওয়া লাম্মা-বারাঝূ লিজা-লূতা ওয়াজুনূদিহী কা-লূরাব্বানা-আফরিগ আলাইনা-সাবরাওঁ ওয়া ছাব্বিত আকদা-মানা-ওয়ানসুরনা-‘আলাল কাওমিল কা-ফরীন।',
        'ফাহাঝামূহুম বিইযনিল্লা-হি ওয়াকাতালা দা-ঊদু জা-লূতা ওয়া আ-তা-হুল্লা-হুল মুলকা ওয়াল হিকমাতা ওয়া‘আল্লামাহু মিম্মা-ইয়াশাউ ওয়া লাওলা-দাফ‘উল্লা-হিন্না-ছা বা‘দাহুম ব্বিা‘দিল লাফাছাদাতিল আরদুওয়া লা-কিন্নাল্লা-হা যূফাদলিন ‘আলাল ‘আ-লামীন।',
        'তিলকা আ-য়া-তুল্লা-হি নাতলূহা-‘আলাইকা বিলহাক্কিওয়া ইন্নাকা লামিনাল মুরছালীন।',
        'তিলকার রুছুলুফাদ্দালনা-বা‘দাহুম ‘আলা-বা‘দ। মিনহুম মান কাল্লামাল্লা-হু ওয়া রাফা‘আ বা‘দাহুম দারাজা-তিওঁ ওয়া আ-তাইনা-‘ঈছাবনা মারইয়ামাল বাইয়িনা-তি ওয়া আই ইয়াদনা-হু বিরূহিল কুদুছি ওয়ালাও শাআল্লা-হু মাকতাতালাল্লাযীনা মিম বা‘দিহিম মিম বা‘দি মা-জাআতহুমুল বাইয়িনা-তুওয়ালা-কিনিখ তালাফূ ফামিনহুম মান আমানা ওয়া মিনহুম মান কাফারা ওয়ালাও শাআল্লা-হু মাকতাতালূ ওয়ালা-কিন্নাল্লাহা ইয়াফ‘আলুমা-ইউরীদ।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূ আনফিকূমিম্মা-রাঝাকনা-কুম মিন কাবলি আইঁ ইয়া’তিইয়া ইয়াওমুল্লা-বাই‘উন ফীহি ওয়ালা-খুল্লাতুওঁ ওয়ালা-শাফা-‘আতুওঁ ওয়াল কা-ফিরূনা হুমুজ্জা-লিমূন।',
        'আল্লা-হু লাইলা-হা ইল্লা-হুওয়া আল হাইয়ুল কাইয়ূমু লা-তা’খুযুহূ ছিনাতুওঁ ওয়ালা-নাওমুন লাহূ মা-ফিছ ছামা-ওয়া-তি ওয়ামা-ফিল আরদি মান যাল্লাযী ইয়াশফা‘উ ‘ইনদাহূইল্লা-বিইযনিহী ইয়া‘লামুমা-বাইনা আইদীহিম ওয়ামা-খালফাহুম ওয়ালা-ইউহ ীতূনা বিশাইইম মিন ‘ইলমিহীইল্লা-বিমা-শাআ ওয়াছি‘আ কুরছিইয়ুহুছ ছামা-ওয়া-তি ওয়াল আরদা ওয়ালা-ইয়াঊদুহু হিফজু হুমা-ওয়া হুওয়াল ‘আলিইয়ূল ‘আজীম।',
        'লাইকরা-হা ফিদ্দীনি কাততাবাইইয়ানার রুশদু মিনাল গাইয়ি ফামাইঁ ইয়াকফুর বিত্তা-গূতি ওয়া ইউ’মিমবিল্লা-হি ফাকাদিছ তামছাকা বিল‘উরওয়াতিল উছকা লানফিসা-মা লাহা-ওয়াল্লা-হু ছামী‘উন ‘আলীম।',
        'আল্লা-হু ওয়ালিইয়ূল্লাযীনা আ-মানূ ইউখরিজুহুম মিনাজ্জু লুমা-তি ইলান নূরি ওয়াল্লাযীনা কাফারুআওলিয়াউহুমুত্তা-গুতু ইউখরিজূনাহুম মিনান নূরি ইলাজ্জুলুমা-তি উলাইকা আসহা-বুন্না-রি হুম ফীহা-খা-লিদূ ন।',
        'আলাম তারা ইলাল্লাযী হাজ্জা ইবরা-হীমা ফী রাব্বিহীআন আ-তা-হুল্লা-হুল মুলক । ইযকা-লা ইবরা-হীমু রাব্বিইয়াল্লাযী ইউহয়ী ওয়া ইউমীতু কা-লা আনা উহঈ ওয়াউমীতু কা-লা ইবরা-হীমু ফাইন্নাল্লা-হা ইয়া’তী বিশশামছি মিনাল মাশরিকি ফা’তি বিহা- মিনাল মাগরিবি ফাবুহিতাল্লাযী কাফারা ওয়াল্লা-হু লা ইয়াহদিল কাওমাজ্জা-লিমীন।',
        'আও কাল্লাযী মাররা ‘আলা-কারইয়াতিওঁ ওয়াহিয়া খা-বিয়াতুন ‘আলা-‘উরুশিহা-কা-লা আন্না-ইউহয়ী হা-যিহিল্লা-হু বা‘দা মাওতিহা-ফাআমাতাহুল্লা-হু মিআতা ‘আমিন ছু ম্মা বা‘আছাহু কা-লা কাম লাবিছতা কা-লা লাবিছতুইয়াওমান আও বা‘দা ইয়াওমিন কা-লা ‘বাল্লাবিছতা মিআতা ‘আ-মিন ফানজু র ইলা-তা‘আ-মিকা ওয়াশারা-বিকা লাম ইয়াতাছান্নাহু ওয়ানজু র ইলা-হিমা-রিকা ওয়া লিনাজ‘আলাকা আয়াতাল লিন্না-ছি ওয়ানজু র ইলাল ‘ইজা-মি কাইফা নুনশিঝুহা- ছু ম্মা নাকছূহা-লাহমান ফালাম্মা-তাবাইয়ানা লাহু কালা আ‘লামুআন্নাল্লা-হা ‘আলা-কুল্লি শাইইন কাদীর।',
        'ওয়া ইযকা-লা ইবরা-হীমু রাব্বি আরিনী কাইফা তুহয়িলমাওতা-কা-লা আওয়ালাম তু’মিন কা-লা বালা- ওয়ালা-কিল লিইয়াতমাইন্না কালবী কা-লা ফাখুয আরবা‘আতাম মিনাত্তাইরি ফাসুরহুন্না ইলাইকা ছুম্মাজ‘আল ‘আলা-কুল্লি জাবালিম মিনহুন্না জুঝআন ছুম্মাদ ‘উহুন্না ইয়া তীনাকা ছা‘ইয়াওঁ ওয়া‘লাম আন্নাল্লা-হা ‘আঝীঝূন হাকীম।',
        'মাছালুল্লাযীনা ইউনফিকূনা আমওয়া-লাহুম ফী ছাবীলিল্লা-হি কামাছালি হাব্বাতিন আমবাতাত ছাব‘আ ছানা-বিলা ফী কুল্লি ছুমবুলাতিম মিআতুহাব্বাতিওঁ ওয়াল্লা-হু ইউদা‘ইফু লিামইঁ ইয়াশাূউ ওয়াল্লা-হু ওয়া-ছি‘উন ‘আলীম।',
        'আল্লাযীনা ইউনফিকূনা আমওয়া-লাহুম ফী ছাবীলিল্লা-হি ছুম্মা লা-ইউতবি‘ঊনা মাআনফাকূমান্নাওঁ ওয়ালাআযাল লাহুম আজরুহুম ‘ইনদা রাব্বিহিম ওয়ালা-খাওফুন ‘আলাইহিম ওয়ালা-হুম ইয়াহঝানুন।',

        'লিল্লা-হি মা ফিছ ছামা-ওয়া-তি ওয়ামা-ফিল আরদিওয়া ইন তুবদূমা-ফীআনফুছিকুম আও তুখফূহু ইউহা-ছিবকুম বিহিল্লা-হু ফাইয়াগফিরু লি মাইঁ ইয়াশাউ ওয়া ইউ‘আযযিবু মাইঁ ইয়াশাউ ওয়াল্লা-হু আলা-কুল্লি শাইয়িন কাদীর।',
        'আ-মানাররাছূলু বিমাউনঝিলা ইলাইহি মির রাব্বিহী ওয়াল মু’মিনূনা কুল্লুন আ-মানা বিল্লাহি ওয়া মালাইকাতিহী ওয়া কুতুবিহী ওয়া রুছুলিহী লা-নুফাররিকুবাইনা আহাদিম মির রুছুলিহী ওয়া কা-লূ ছামি‘না ওয়াআতা‘না গুফরা-নাকা রাব্বানা-ওয়া ইলাইকাল মাসীর।',
        'লা-ইউকালিলফুল্লা-হু নাফছান ইল্লা-উছ‘আহা-লাহা-মা কাছাবাত ওয়া ‘আলাইহা-মাকতাছাবাত রাব্বানা-লা-তুআ-খিযনা ইন নাছীনা-আও আখতা’না-রাব্বানা ওয়ালা-তাহমিল ‘আলাইনা-ইসরান কামা-হামালতাহূ আলাল্লাযীনা মিন কাবলিনা-রাব্বানা-ওয়ালা তুহাম্মিলনা-মা-লা-তা-কাতা লানা-বিহী ওয়া‘ফু‘আন্না-ওয়াগফিরলানা-ওয়ারহামনা-আনতা মাওলা-না-ফানসুরনা-‘আলাল কাওমিল কা-ফিরীন।'
      ],
      3: [
        'আলিফ লাম মীম।',
        'আল্লা-হু লাইলাহা ইল্লা-হুওয়াল হাইয়ুল কাইয়ূম।',
        'নাঝঝালা ‘আলাইকাল কিতা-বা বিলহাক্কি মুসাদ্দিকালিলমা-বাইনা ইয়াদাইহি ওয়াআনঝালাত তাওরা-তা ওয়াল ইনজীল।',
        'মিন কাবলু হুদাল লিন্না-ছি ওয়া আনঝালাল ফুরকানা ইন্নাল্লাযীনা কাফারূ বিআ-য়াতিল্লা-হি লাহুম ‘আযা-বুন শাদীদুওঁ ওয়াল্লা-হু ‘আঝীঝুন যুনতিকা-ম।',
        'ইন্নাল্লা-হা লা-ইয়াখফা-‘আলাইহি শাইউন ফিল আরদিওয়ালা-ফিছ ছামাই।',
        'হুওয়াল্লাযী ইউসাওবিরুকুম ফিল আরহা-মি কাইফা ইয়া��াউ লাইলা-হা ইল্লা-হুওয়াল ‘আঝীঝুল হাকীম।',
        'হুওয়াল্লাযীআনঝালা ‘আলাইকাল কিতা-বা মিনহু আ-য়া-তুম মুহকামা-তুন হুন্না উম্মুল কিতা-বি ওয়া উখারু মুতাশা-বিহা-তুন ফাআম্মাল্লাযীনা ফী কুলূবিহিম ঝাইগুন ফাইয়াত্তাবি‘ঊন মা-তাশা-বাহা মিনহুবতিগাআল ফিতনাতি ওয়াবতিগাআ তা’বিলিহী ওয়া মা-ইয়া‘লামুতা’বিলাহু ইল্লাল্লা-হ । ওয়ার রা-ছিখূনা ফিল ‘ইলমি ইয়াকূলূনা আমান্না-বিহী কুল্লুম মিন ‘ইনদি রাব্বিনা-ওয়ামা-ইয়াযযাককারু ইল্লা উলুল আলবা-ব।',
        'রাব্বানা-লা-তুঝিগ কুলূবানা-বা‘দা ইয হাদাইতানা -ওয়াহাবলানা-মিল্লা দুনকা রাহমাতান ইন্নাকা আনতাল ওয়াহহা-ব।',
        'রাব্বানা ইন্নাকা জা-মি‘উন্না-ছি লিইয়াওমিল্লা-রাইবা ফীহি ইন্নাল্লা-হা লা-ইউখলিফুল মী‘আদ।',
        'ইন্নাল্লাযীনা কাফারু লান তুগনিয়া ‘আনহুম আমওয়া-লুহুম ওয়ালা আওলা-দুহুম মিনাল্লা-হি শাইআওঁ ওয়া উলাইকাহুম ওয়াকূদুন্না-র।',
        'কাদা’বি আ-লি ফির‘আওনা ওয়াল্লাযীনা মিন কাবলিহিম কাযযাবূ বিআ-য়া তিনা-ফাআখাযাহুমুল্লা-হু বিযুনূবিহিম ওয়াল্লা-হু শাদীদুল ‘ইকা-ব।',
        'কুল লিল্লাযীনা কাফারু ছাতুগলাবূনা ওয়াতুহশারূনা ইলা-জাহান্নামা ওয়াবি’ছাল মিহা-দ।',
        'কাদ কা-না লাকুম আ-য়াতুন ফী ফিআতাইনিল তাকাতা-ফিআতুন তুকা-তিলুফী ছাবীলিল্লা-হি ওয়া উখরা-কা-ফিরাতুইঁ ইয়ারাওনাহুম মিছলাইহিম রা’ইয়াল ‘আইনি ওয়াল্লা-হু ইউআইয়িদুবিনাসরিহী মাইঁ ইয়াশাউ ইন্না ফী যা-লিকা লা‘ইবরাতাল লিউলিল আবসা-র।',
        'ঝুইয়িনা লিন্না-ছি হুব্বুশশাহাওয়া-তি মিনান নিছাই ওয়াল বানীনা ওয়াল কানা-তীরিল মুকানতারাতি মিনাযযাহাবি ওয়াল ফিদ্দাতি ওয়াল খাইলিল মুছাওওয়ামাতি ওয়াল আন‘আমি ওয়াল হারছিযা-লিকা মাতা-‘উল হায়া-তিদ্দুনইয়া-ওয়াল্লা-হু ‘ইনদাহু হুছনুল মাআ-ব।',
        'কুল আউনাব্বিউকুম বিখাইরিম মিন যা-লিকুম লিল্লাযীনাত্তাকাও ‘ইনদা রাব্বিহিম জান্না-তুন তাজরী মিন তাহতিহাল আনহা-রু খা-লিদীনা ফীহা-ওয়াআঝওয়াজুম মুতাহহারাতুওঁ ওয়ারিদওয়া-নুম মিনাল্লা-হি ওয়াল্লা-হু বাসীরুম বিল‘ইবা-দ।',
        'আল্লাযীনা ইয়াকূ লূনা রাব্বানা ইন্নানা আ-মান্না-ফাগফিরলানা-যুনূবানা-ওয়াকিনা‘আযা-বান্না-র।',
        'আসসা-বিরীনা ওয়াসসা-দিকীনা ওয়াল কা-নিতীনা ওয়াল মুনফিকীনা ওয়াল মুছতাগফিরীনা বিলআছহা-র।',
        'শাহিদাল্লা-হু আন্নাহু লা ইলা-হা ইল্লা-হুওয়া ওয়াল মালাইকাতুওয়া উলুল ‘ইলমি কাইমাম বিলকিছতিলাইল্লা-হা ইল্লা-হুওয়াল আঝীঝুল হাকীম।',
        'ইন্নাদ্দীনা ‘ইনদাল্লা-হিল ইছলা-মু ওয়ামাখতালাফাল্লাযীনা ঊতুল কিতা-বা ইল্লা-মিম বা‘দি মা-জাআহুমুল ‘ইলমুবাগইয়াম বাইনাহুম ওয়ামাইঁ ইয়াকফুর বিআ-য়া-তিল্লা-হি ফাইন্নাল্লা-হা ছারী‘উল হিছা-ব।',
        'ফাইন হাজ্জূকা ফাকুলআছলামতু ওয়াজহিইয়া লিল্লা-হি ওয়ামানিত তাবা‘আনি ওয়াকুল লিল্লাযীনা ঊতুল কিতা-বা ওয়াল উম্মিইয়ীনা আআছলামতুম ফাইন আছলামূ ফাকাদিহতাদাওঁ ওয়া ইন তাওয়াল্লাও ফাইন্নামা-‘আলাইকাল বালা-গু ওয়াল্লা-হু বাসীরুম বিল‘ইবা-দ।',
        'ইন্নাল্লাযীনা ইয়াকফুরূনা বিআ-য়া-তিল্লা-হি ওয়াইয়াকতুলূনান্নাবিইয়ীনা বিগাইরি হাক্কিওঁ ওয়া ইয়াকতুলূনাল্লাযীনা ইয়া’মুরুনা বিলকিছতিমিনান্না-ছি ফাবাশশিরহুম বি‘আযা-বিন আলীম।',
        'উলাইকাল্লাযীনা হাবিতাত আ‘মা-লুহুম ফিদ্দুনইয়া-ওয়াল আ-খিরাতি ওয়ামা-লাহুম মিন্না-সিরীন।',
        'আলাম তারা ইলাল্লাযীনা ঊতূ নাসীবাম মিনাল কিতা-বি ইউদ‘আওনা ইলা-কিতা-বিল্লা-হি লিইয়াহকুমা বাইনাহুম ছুম্মা ইয়াতাওয়াল্লা-ফারীকুম মিনহুম ওয়া হুম মু‘রিদূন।',
        'যা-লিকা বিআন্নাহুম কা-লূ লান তামাছছানান্না-রু ইল্লা-আইয়া-মাম মা‘দূদা-তিওঁ ওয়াগাররাহুম ফী দীনিহিম মা-কা-নূ ইয়াফতারুন।',
        'ফাকাইফা ইযা-জামা‘না-হুম লিইয়াওমিল লা-রাইবা ফীহি ওয়া উফফিয়াত কুল্লু নাফছিম মা-কাছাবাত ওয়াহুম লা-ইউজলামূন।',
        'কুল্লিলা-হুম্মা মা-লিকাল মুলকি তু’তিল মুলকা মান তাশাউ ওয়া তানঝি‘উল মুলকা মিম্মান তাশাউ ওয়াতু‘ইঝঝুমান তাশাউ ওয়া তুযিল্লুমান তাশাউ বিইয়াদিকাল খাইরু; ইন্নাকা ‘আলা-কুল্লি শাইয়িন কাদীর।',
        'তূলিজুল লাল্লাইলা ফিন্নাহা-রি ওয়াতূলিজুন্নাহা-রা ফিল্লাইলি ওয়াতুখরিজুল হাইইয়া মিনাল মাইয়িতি ওয়াতুখরিজুল মাইয়িতা মিনাল হাইয়ি ওয়াতারঝুকুমান তাশাউ বিগাইরি হিছা-ব।',
        'লা-ইয়াত্তাখিযিল মু’মিনূনাল কা-ফিরীনা আওলিয়াআ মিন দূ নিল মু’মিমীনা ওয়া মাইঁ ইয়াফ‘আল যা-লিকা ফালাইছা মিনাল্লা-হি ফী শাইইন ইল্লাআন তাত্তাকূমিনহুম তুকা-তাওঁ ওয়া ইউহাযযিরুকুমুল্লা-হু নাফছাহূ ওয়া ইলাল্লা-হিল মাসীর।',
        'কুল ইন তুখফু মা-ফী সুদূ রিকুম আও তুবদূ হু ইয়া‘লামহুল্লা-হু ওয়া ইয়া‘লামুমা-ফিছছামাওয়া-তি ওয়ামা-ফিল আরদিওয়াল্লা-হু ‘আলা-কুল্লি শাইইন কাদীর।',
        'ইয়াওমা তাজিদু কুল্লু নাফছিম মা-‘আমিলাত মিন খাইরিম মুহদারাও ওয়া-মা‘আমিলাত মিন ছূইন তাওয়াদ্দু লাও আন্না বাইনাহা-ওয়াবাইনাহূআমাদাম বা‘ঈদান ওয়া ইউহাযযিরুকুমুল্লা-হু নাফছাহু ওয়াল্লা-হু রাঊফুম বিল‘ইবা-দ।',
        'কুল ইন কুনতুম তুহিববূনাল্লা-হা ফাত্তাবি‘ঊনী ইউহব্বিকুমুল্লা-হু ওয়াইয়াগফির লাকুম যুনূবাকুম ওয়াল্লা-হু গাফুরূর রাহীম।',

        'ওয়ালা-ইয়াহছাবান্নাল্লাযীনা ইয়াবখালূনা বিমাআ-তা-হুমুল্লা-হু মিন ফাদলিহী হুওয়া খাইরাল্লাহুম বাল হুওয়া শাররুল্লাহুম ছাইউতাওওয়াকূনা মা-বাখিলূবিহী ইয়াওমাল কিয়া-মাতি ওয়ালিল্লা-হি মীরাছুছ ছামা-ওয়া-তি ওয়াল আরদিওয়াল্লাহু বিমা-তা‘মালূনা খাবীর।',
        'লাকাদ ছামি‘আল্লা-হু কাওলাল্লাযীনা কালূইন্নাল্লা-হা ফাকীরুওঁ ওয়ানাহনু আগনিয়াউ । ছানাকতুবুমা-কা-লূওয়া কাতলাহুমুল আম্বিয়াআ বিগাইরি হাক্কিওঁ ওয়া নাকূলুযূকূ‘আযা-বাল হারীক।',
        'যা-লিকা বিমা-কাদ্দামাত আইদীকুম ওয়া আন্নাল্লা-হা লাইছা বিজাল্লা-মিল লিল‘আবীদ।',
        'আল্লাযীনা কা-লূইন্নাল্লা-হা ‘আহিদা ইলাইনাআল্লা-নু’মিনা লিরাছূলিন হাত্তাইয়া’তিইয়ানা-বিকুরবা-নিন তা’কুলুহুন্না-রু কুল কাদ জাআকুম রুছুলুম মিন কাবলী বিলবাইয়িনা-তি ওয়াবিল্লাযী কুলতুম ফালিমা কাতালতুমূহুম ইন কুনতুম সা-দিকীন।',
        'ফাইন কাযযাবূকা ফাকাদ কুযযিবা রুছুলুম মিন কাবলিকা জাঊ বিলবাইয়িনা-তি ওয়াঝঝুবুরি ওয়াল কিতা-বিল মুনীর।',
        'কুল্লুনাফছিন যাইকাতুল মাওতি ওয়া ইন্নামা-তুওয়াফফাওনা উজূরাকুম ইয়াওমাল কিয়া-মাতি ফামান ঝুহঝিহা ‘আনিন্না-রি ওয়া উদখিলাল জান্নাতা ফাকাদ ফা-ঝা ওয়ামাল হায়া-তুদ্দুনইয়া-ইল্লা-মাতা-‘উল গুরুর।',
        'লাতুবলাউন্না ফীআমওয়া-লিকুম ওয়া আনফুছিকুম ওয়ালা তাছমা‘উন্না মিনাল্লাযীনা ঊতুল কিতা-বা মিন কাবলিকুম ওয়া মিনাল্লাযীনা আশরাকূআযান কাছীরাওঁ ওয়া ইন তাসবিরু ওয়া তাত্তাকূফাইন্না যা-লিকা মিন ‘আঝমিল উমূর।',
        'ওয়া ইযআখাযাল্লা-হু মীছাকাল্লাযীনা ঊতুল কিতা-বা লাতুবাইয়িনুন্নাহূ লিন্না-ছি ওয়ালাতাকতুমূনাহূ ফানাবাযূহু ওয়ারাআ জুহূরিহিম ওয়াশতারাও বিহী ছামানান কালীলান ফাবি’ছা মা-ইয়াশতারূন।',
        'লা-তাহছাবান্নাল্লাযীনা ইয়াফরাহূনা বিমাআতাওঁ ওয়া ইউহিববূনা আইঁ ইউহমাদূবিমালাম ইয়াফ‘আলূফালা-তাহছাবান্নাহুম বিমাফা-ঝাতিম মিনাল ‘আযা-বি ওয়া লাহুম ‘আযা-বুন আলীম।',
        'ওয়া লিল্লা-হি মুলকুছ ছামা-ওয়া-তি ওয়াল আরদিওয়াল্লাহু ‘আলা-কুল্লি শাইইন কাদীর।',
        'ইন্না ফী খালকিছ ছামা-ওয়া-তি ওয়াল আরদিওয়াখতিলা-ফিল্লাইলি ওয়ান্নাহা-রি লাআ-য়াতিল লিঊলিল আলবা-ব।',
        'আল্লাযীনা ইয়াযকুরূনাল্লা-হা কিয়া-মাওঁ ওয়াকু‘ঊদাওঁ ওয়া‘আলা-জুনূবিহিম ওয়া ইয়াতাফাক্কারূনা ফী খালকিছছামা-ওয়া-তি ওয়াল আরদিরাব্বানা-মা-খালাকতা হাযা-বা-তিলান ছুবহা-নাকা ফাকিনা-‘আযা-বান্না-র।',
        'রাব্বানাইন্নাকা মান তুদখিলিন্না-রা ফাকাদ আখঝাইতাহূ ওয়ামা-লিজ্জা-লিমীনা মিন আনসা-র।',
        'রাব্বানা-ইন্নানা-ছামি‘না-মুনা-দিআইঁ ইউনা-দী লিল ঈমা-নি আন আ-মিনূবিরাব্বিকুম ফাআমান্না-রাব্বানা-ফাগফিরলানা-যুনূবানা-ওয়াকাফফির‘আন্না-ছাইয়িআ-তিনাওয়াতাওয়াফফানা-মা‘আল আব রা-র।',
        'রাব্বানা-ওয়া আ-তিনা-মা-ওয়া-‘আত্তানা-‘আলা-রুছুলিকা ওয়ালা-তুখঝিনা-ইয়াওমাল কিয়া-মাতি ইন্নাকা লা-তুখলিফুল মী‘আ-দ।',
        'ফাছতাজাবা-লাহুম রাব্বুহুম আন্নী লাউদী‘উ ‘আমালা ‘আমিলিম মিনকুম মিন যাকারিন আও উনছা-বা‘দুকুম মিম বা‘দিন ফাল্লাযীনা হা-জারু ওয়া উখরিজুমিন দিয়া-রিহিম ওয়া ঊযূফী ছাবীলী ওয়া কা-তালূওয়া কুতিলূলাউকাফফিরান্না ‘আনহুম ছাইয়িআ-তিহিম ওয়ালা উদখিলান্নাহুম জান্না-তিন তাজরী মিন তাহতিহাল আনহা-রু ছাওয়া-বাম মিন ‘ইনদিল্লা-হি ওয়াল্লা-হু ‘ইনদাহু হুছনুছছাওয়া-ব।',
        'লা-ইয়াগুররান্নাকা তাকাল্লুবুল্লাযীনা কাফারু ফিল বিলা-দ।',
        'মাতা-‘উন কালীলুন ছু ম্মা মা’ওয়া-হুম জাহান্নামু ওয়া বি’ছাল মিহা-দ।',
        'লা-কিনিল্লাযীনাত তাকাও রাব্বাহুম লাহুম জান্না-তুন তাজরী মিন তাহতিহাল আনহা-রু খা-লিদীনা ফীহা-নুঝুলাম মিন ‘ইনদিল্লা-হি ওয়ামা-‘ইনদাল্লা-হি খাইরুল লিলআবরা-র।',
        'ওয়া ইন্না মিন আহলিল কিতা-বি লামাইঁ ইউ’মিনুবিল্লা-হি ওয়ামাউনঝিলা ইলাইকুম ওয়ামাউনঝিলা ইলাইহিম খা-শি‘ঈনা লিল্লা-হি লা-ইয়াশতারূনা বিআ-য়া-তিল্লা-হি ছামানান কালীলান উলাইকা লাহুম আজরুহুম ‘ইনদা রাব্বিহিম ইন্নাল্লা-হা ছারী‘উল হিছা-ব।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানুসবিরু ওয়া সা-বিরু ওয়া রা-বিতূ ওয়াত্তাকুল্লা-হা লা‘আল্লাকুম তুফলিহুন।'
      ],
      4: [
        'ইয়াআইয়ুহান্না-ছুত্তাকূরাব্বাকুমুল্লাযীখালাকাকুম মিন নাফছিওঁ ওয়া-হিদাতিওঁ ওয়া খালাকা মিনহা-ঝাওজাহা-ওয়াবাছছা মিনহুমা-রিজা-লান কাছীরাওঁ ওয়ানিছাআওঁ ওয়াত্তাকুল্লাহাল্লাযী তাছাআলূনা বিহী ওয়াল আরহা-মা ইন্নাল্লা-হা কা-না ‘আলাইকুম রাকীবা।',
        'ওয়া আ-তুল ইয়াতা-মাআমওয়া-লাহুম ওয়ালা-তাতাবাদ্দালুল খাবীছা বিত্তাইয়িবি ওয়ালা-তা’কুলূআমওয়া-লাহুম ইলাআমওয়া-লিকুম ইন্নাহূকা-না হুবান কাবীরা-।',
        'ওয়া ইন খিফতুম আল্লা-তুকছিতূফিল ইয়াতা-মা-ফানকিহূমা-তা-বা লাকুম মিনান নিছাই মাছনা-ওয়া ছুলা-ছা ওয়া রুবা-‘আ ফাইন খিফতুম আল্লা-তা‘দিলূফাওয়াহিদাতান আও মা-মালাকাত আইমা-নুকুম যা-লিকা আদনাআল্লা-তা‘ঊলূ',
        'ওয়া আ-তুন নিছাআ সাদুকা-তিহিন্না নিহলাতান ফাইন তিবনালাকুম ‘আন শাইইম মিনহু নাফছান ফাকুলূহু হানীআম মারীআ।',
        'ওয়ালা তু’তুছছুফাহাআ আমওয়া-লাকুমুল্লাতী জা‘আলা ল্লা-হুলাকুমকিয়া-মাওঁ ওয়ারঝুকূহুম ফীহা-ওয়াকছূহুম ওয়াকূ লূলাহুম কাওলাম মা‘রূফা-।',
        'ওয়াবতালুল ইয়াতা-মা-হাত্তা ইযা- বালাগুন নিকা-হা ফাইন আ-নাছতুম মিনহুম রুশদান ফাদফা‘ঊ ইলাইহিম আমওয়া-লাহুম ওয়ালা- তা’কুলূহা-ইছরা-ফাওঁ ওয়া বিদারান আইঁ ইয়াকবারূ ওয়ামান কা-না গানিইইয়ান ফালইয়াছতা‘ফিফ ওয়ামান কা-না ফাকীরান ফালইয়া’কুল বিলমা‘রূফি ফাইযা-দাফা‘তুম ইলাইহিম আমওয়া-লাহুম ফাআশহিদূ‘আলাইহিম ওয়া কাফা-বিল্লাহি হাছীবা-।',
        'লিররিজা-লি নাসীবুম মিম্মা-তারাকাল ওয়া-লিদা-নি ওয়াল আকরাবূনা, ওয়া লিননিছাই নাসীবুম মিম্মা-তারাকাল ওয়া-লিদা-নি ওয়াল আকরাবূনা মিম্মা-কাল্লা মিনহু আও কাছুরা নাসীবাম মাফরুদা-।',
        'ওয়া ইযা-হাদরাল কিছমাতা ঊলুল কুরবা- ওয়াল ইয়াতা-মা- ওয়াল মাছা-কীনু ফারঝুকূহুম মিনহু ওয়াকূলূহুম কাওলাম মা‘রূফা-।',
        'ওয়াল ইয়াখশাল্লাযীনা লাও তারাকূমিন খালফিহিম যুররিইইয়াতান দি‘আ-ফান খা-ফূ‘আলাইহিম ফালইয়াত্তাকূল্লা-হা ওয়াল ইয়াকূলূকাওলান ছাদীদা-।',
        'ইন্নাল্লাযীনা ইয়া’কুলূনা আমওয়া-লাল ইয়াতা-মা-জু লমান ইন্নামা-ইয়া’কুলূনা ফী বুতুনিহিম না-রাওঁ ওয়া ছাইয়াসলাওনা ছা‘ঈরা।',
        'ইঊসীকুমুল্লা-হু ফী আওলাদিকুম লিযযাকারি মিছলুহাজ্জিল উনছাইয়াইনি ফাইন কুন্না নিছাআন ফাওকাছনাতাইনি ফালাহুন্না ছুলুছা-মা-তারাকা ওয়া ইন কানাত ওয়া-হিদাতান ফালাহান নিসফু ওয়ালিআবাওয়াইহি লিকুল্লি ওয়া-হিদিম মিনহুমাছ ছু দুছুমিম্মা-তারাকা ইন কা-না লাহু ওয়ালাদুন ফাইল্লাম ইয়াকুল্লাহু ওয়ালাদুওঁ ওয়া ওয়ারিছাহুআবাওয়া-হু ফালিউম্মিহিছছু লুছু ফাইন কা-না লাহুইখওয়াতুন ফালিউম্মিহিছ ছু দুছুমিম বা‘দি ওয়াসি���ইয়াতিইঁ ইউসী বিহা-আও দাইনিন আ-বাউকুম ওয়া আব নাউকুম লা-তাদরূনা আইয়ুহুম আকরাবুলাকুম নাফ‘আন ফারীদতাম মিনাল্লাহি ইন্নাল্লা-হা কা-না ‘আলীমান হাকীমা-।',
        'ওয়ালাকুম নিসফুমা-তারাকা আঝওয়া-জুকুম ইল্লাম ইয়াকুল্লাহুন্না ওয়ালাদুন ফাইন কা-না লাহুন্না ওয়ালাদুন ফালাকুমুর রুবু‘উ মিম্মা-তারাকনা মিম বা‘দি ওয়াসিইইয়াতিইঁ ইঊসীনা বিহাআওদাইনিওঁ ওয়ালাহুন্নার রুবু‘উ মিম্মা-তারাকতুম ইল্লাম ইয়াকুল্লাকুম ওয়ালাদুন ফাইন কা-না লাকুম ওয়ালাদুন ফালাহুন্নাছছু মুনুমিম্মা-তারাকতুম মিম বা‘দি ওয়াসিয়াতিন তূসূনা বিহাআও দাইনিওঁ ওয়া ইন কা-না রাজুলুইঁ ইঊরাছুকালা-লাতান আবিম রাআতুওঁ ওয়ালাহু আখুন আও উখতুন ফালিকুল্লি ওয়া-হিদিম মিনহুমাছ ছু দুছু ফাইন কা-নুআকছারা মিন যা-লিকা ফাহুম শুরাকাউ ফিছছু লুছিমিম বা‘দি ওয়াসিইইয়াতিই ইঊসা-বিহাআওদাইনিন গাইরা মুদাররিওঁ ওয়াসিইইয়াতাম মিনাল্লা-হি ওয়াল্লা-হু ‘আলীমুন হালীম।',
        'তিলকা হুদূদুল্লা-হি ওয়া মাই ইউতি‘ইল্লা-হা ওয়ারাছূলাহু ইউদখিলহু জান্না-তিন তাজরী মিন তাহতিহাল আনহা-রু খা-লিদীনা ফীহা- ওয়া যা-লিকাল ফাওঝুল ‘আজীম।',
        'ওয়ামাইঁ ইয়া‘সিল্লা-হা ওয়ারাছূলাহু ওয়াইয়াতা‘আদ্দা হুদূদাহু ইউদখিলহু না-রান খা-লিদান ফীহা- ওয়ালাহু ‘আযা-বুম মুহীন।',
        'ওয়াল্লা-তী ইয়া’তীনাল ফা-হিশাতা মিন নিছাইকুম ফাছতাশহিদূ‘আলাইহিন্না আরবা‘আতাম মিনকুম; ফাইন শাহিদূফাআমছিকূহুন্না ফিল বুয়ূতি হাত্তা-ইয়াতাওয়াফফা-হুন্নাল মাওতুআও ইয়া জ‘আলাল্লা-হু লাহুন্না ছাবীলা-।',
        'ওয়াল্লাযা-নি ইয়া’তিইয়া-নিহা-মিনকুম ফাআ-যূহুমা- ফাইন তা-বা-ওয়াআসলাহাফাআ‘রিদূ ‘আনহুমা- ইন্নাল্লা-হা কা-না তাওওয়া-বার রাহীমা-।',
        'ইন্নামাত তাওবাতু‘আলাল্লা-হি লিল্লাযীনা ইয়া‘মালূনাছ ছূআ বিজ��হা-লাতিন ছুম্মা ইয়াতূবূনা মিন কারীবিন ফাউলাইকা ইয়াতূবুল্লা-হু ‘আলাইহিম ওয়া কা-নাল্লা-হু ‘আলীমান হাকীমা।',
        'ওয়া লাইছাতিত্তাওবাতুলিল্লাযীনা ইয়া‘মালূনাছ ছাইয়িআ-তি হাত্তাইযা-হাদারা আহাদাহুমুল মাওতুকা-লা ইন্নী তুবতুল আ-না ওয়ালা ল্লাযীনা ইয়ামূতূনা ওয়াহুম কুফফারুন উলাইকা আ‘তাদনা-লাহুম ‘আযা-বান আলীমা।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূলা-ইয়াহিল্লুলাকুম আন তারিছুন নিছাআ কারহাওঁ ওয়ালা-তা‘দুলূহুন্না লিতাযহাবূব্বিা‘দিমাআ-তাইতুমূহুন্না ইল্লাআইঁ ইয়া’তীনা বিফাহিশাতিম মুবাইয়িনাতিওঁ ওয়া‘আ-শিরূহুন্না বিলমা‘রূফি ফাইন কারিহতুমূহুন্না ফা‘আছাআন তাকরাহু শাইআওঁ ওয়াইয়াজ‘আলাল্লা-হু ফীহি খাইরান কাছীরা-।',
        'ওয়া ইন আরাত্তুমুছ তিবদা-লা ঝাওজিম মাকা-না ঝাওজিওঁ ওয়া আ-তাইতুম ইহদা-হুন্না কিনতা-রান ফালা-তা’খুযূমিনহু শাইআন আতা’খুযূনাহু বুহতা-নাওঁ ওয়া ইছমাম মুবীনা।',
        'ওয়া কাইফা তা’খুযূনাহূওয়া কাদ আফদা-বা‘দুকুমইলা-বা‘দিওঁ ওয়া আখাযনা মিনকুম মীছাকান গালীজা।',
        'ওয়ালা-তানকিহুমা-নাকাহা আ-বাউকুম মিনান নিছাই ইল্লা-মা-কাদ সালাফা ইন্নাহু কা-না ফা-হিশাতাওঁ ওয়া মাকতাওঁ ওয়া ছাআ ছাবীলা-।',
        'হুররিমাত ‘আলাইকুম উম্মাহা-তুকুম ওয়া বানা-তুকুম ওয়া আখাওয়া-তুকুম ওয়া ‘আম্মা-তুকুম ওয়া খা-লা-তুকুম ওয়া বানা-তুল আখি ওয়া বানা-তুল উখতি ওয়া উম্মাহা-তুকুমুল্লাতীআরদা‘নাকুম ওয়া আখাওয়া-তুকুম মিনাররাদা-‘আতি ওয়াউম্মাহা-তুনিছাইকুম ওয়া রাবাইবুকুমুল্লা-তী ফী হুজূরিকুম মিন নিছাইকুমুল্লা-তী দাখালতুম বিহিন্না ফাইল্লাম তাকূনূদাখালতুম বিহিন্না ফালা-জুনা-হা ‘আলাইকুম ওয়া হালাইলু আবনাইকুমুল্লাযীনা মিন আসলা-বিকুম ওয়া আন তাজমা‘ঊ বাইনাল উখতাইনি ইল্লামা-কাদ ছালাফা ইন্নাল্লা-হা কা-না গাফূরার রাহীমা-।',
        'ওয়াল মুহসানা-তুমিনান নিছাই ইল্লা-মা- মালাকাত আইমা-নুকুম কিতা-বাল্লা-হি ‘আলাইকুম ওয়া উহিল্লা লাকুম মা-ওয়ারাআ যা-লিকুম আন তাবতাগূবিআমওয়ালিকুম মুহসিনীনা গাইরা মুছা-ফিহীনা ফামাছ তামতা‘তুম বিহী মিনহুন্না ফাআ-তূহুন্না উজূরাহুন্না ফারীদাতাওঁ ওয়ালা-জুনা-হা ‘আলাইকুম ফীমা-তারাদাইতুম বিহী মিম বা‘দিল ফারীদাতি ইন্নাল্লা-হা কা-না ‘আলীমান হাকীমা-।',
        'ওয়ামাল্লাম ইয়াছতাতি‘ই মিনকুম তাওলান আই ইয়ানকিহাল মুহসানা-তিল মু’মিনা-তি ফামিম্মা-মালকাত আইমা-নুকুম মিন ফাতাইয়া-তিকুমুল মু’মিনা-তি ওয়াল্লা-হু আ‘লামু বিঈমা-নিকুম বা‘দুকুম মিম বা‘দিন ফানকিহূহুন্না বিইযনি আহলিহিন্না ওয়া আতূ-হুন্না উজুরাহুন্না বিলমা‘রূফি মুহসানা-তিন গাইরা মুছা-ফিহা-তিওঁ ওয়ালা-মুত্তাখিযা-তি আখদা-নিন ফাইযা-উহসিন্না ফাইন আতাইনা বিফা-হিশাতিন ফা‘আলইহিন্না নিসফুমা‘আলাল মুহসানা-তি মিনাল ‘আযা-বি যা-লিকা লিমান খাশিইয়াল ‘আনাতা মিনকুম ওয়া আন তাসবিরূ খাইরুল্লাকুম ওয়াল্লা-হু গাফুরু রাহীম।',
        'ইউরীদুল্লাহু লিইউবাইয়িনালাকুম ওয়া ইয়াহদিয়াকুম ছুনানাল্লাযীনা মিন কাবলিকুম ওয়া ইয়াতূবা ‘আলাইকুম ওয়াল্লা-হু ‘আলীমুন হাকীম।',
        'ওয়াল্লা-হু ইউরীদুআইঁ ইয়াতূবা ‘আলাইকুম ওয়া ইউরীদুল্লাযীনা ইয়াত্তাবি‘ঊনাশ শাহাওয়া-তি আন তামীলূমাইলান ‘আজীমা।',
        'ইউরীদুল্লা-হু আইঁ ইউখাফফিফা ‘আনকুম ওয়া খুলিকাল ইনছা-নুদা‘ঈফা-।',
        'ইয়াআইয়ূহাল্লাযীনা আ-মানূলা-তা’কুলূ আমওয়া-লুকুম বাইনাকুম বিলবা-তিলি ইল্লাআন তাকূনা তিজা-রাতান ‘আন তারা-দিম মিনকুম ওয়ালা-তাকতুলূআনফুছাকুম ইন্নাল্লা-হা কা-না বিকুম রাহীমা।',
        'ওয়া মাইঁ ইয়াফ‘আল যা-লিকা ‘উদওয়া-নাওঁ ওয়া জুলমান ফাছাওফা নুসলীহি না-রাওঁ ওয়া কা-না যা-লিকা ‘আলাল্লা-হি ইয়াছীরা-।',

        'ওয়ামা-কা-না লিমু’মিনিন আইঁ ইয়াকতুলা মু’মিনান ইলা-খাতাআওঁ ওয়ামান কাতালা মু’মিনান খাতাআন ফাতাহরীরু রাকাবাতিম মু’মিনাতিওঁ ওয়া দিয়াতুম মুছাল্লামাতুন ইলা আহলিহী ইলাআইঁ ইয়াসসাদ্দাকূ ফাইন কা-না মিন কাওমিন ‘আদুওবিল্লাকুম ওয়া হুওয়া মু’মিনুন ফাতাহরীরু রাকাবাতিম মু’মিনাতিওঁ ওয়া ইন কা-না মিন কাওমিম বাইনাকুম ওয়া বাইনাহুম মীছা-কুন ফাদিয়াতুম মুছাল্লামাতুন ইলাআহলিহী ওয়া তাহরীরু রাকাবাতিম মু’মিনাতিন ফামাল্লাম ইয়াজিদ ফাসিয়া-মুশাহরাইনি মুতাতা-বি‘আইনি তাওবাতাম মিনাল্লাহি ওয়া কা-নাল্লা-হু ‘আলীমান হাকীমা।',
        'ওয়া মাইঁ ইয়াকতুলমু’মিনাম মুতা‘আম্মিদান ফাজাঝাউহূজাহান্নামুখা-লিদান ফীহা-ওয়া গাদিবাল্লা-হু ‘আললইহি ওয়া লা‘আনাহু ওয়া আ‘আদ্দাল্লাহু ‘আযা-বান ‘আজীমা।',
        'ইয়াআইয়ূহাল্লাযীনা আ-মানূইযা-দারাবতুম ফীছাবীলিল্লা-হি ফাতাবাইইয়ানূওয়ালাতাকূলূলিমান আলকাইলাইকুমছ ছালা-মা লাছতা মু’মিনান তাবতাগূনা ‘আরাদাল হায়া-তিদ্দুনইয়া- ফা‘ইনদাল্লা-হি মাগা-নিমুকাছীরাতুন কাযা-লিকা কুনতুম মিন কাবলুফামান্নাল্লা-হু ‘আল্লাইকুম ফাতাবাইইয়ানূ ইন্নাল্লা-হা কা-না বিমা-তা‘মালূনা খাবীরা।',
        'লা-ইয়াছতাবিলকা-‘ইদূ না মিনাল মু’মিনীনা গাইরু উলিদ্দারারি ওয়াল মুজা-হিদূ না ফী ছাবীলিল্লা-হি বিআমওয়া-লিহিম ওয়া আনফুছিহিম ফাদ্দালাল্লা-হুল মুজা-হিদীনা বিআমওয়া-লিহিম ওয়া আনফুসিহিম ‘আলাল কা-‘ইদীনা দারাজাতাওঁ ওয়াকুল্লাওঁ ওয়া‘আদাল্লা-হুল হুছনা- ওয়াফাদ্দালাল্লা-হুল মুজা-হিদীনা ‘আলাল কা-‘ইদীনা আজরান ‘আজীমা।',
        'দারাজা-তিম মিনহু মাগফিরাতাওঁ ওয়া রাহমাতাওঁ ওয়াকা-নালা-হু গাফূরার রাহীমা।',
        'ইন্নাল্লাযীনা তাওয়াফফা-হুমুল মালাইকাতু জা-লিমীআনফুছিহিম কা-লূফীমা কুনতুম কা-লূকুন্না-মুছতাদ‘আফীনা ফিল আরদি কা-লূআলাম তাকুন আরদুল্লা-হি ওয়া-ছি‘আতান ফাতুহা-জিরূ ফীহা- ফাউলাইকা মা’ওয়া-হুম জাহান্নামু ওয়াছাআত মাসীরা।',

        'ওয়া মাইঁ ইউহা-জির ফী ছাবীলিল্লা-হি ইয়াজিদ ফিল আরদিমুরা-গমান কাছীরাওঁ ওয়াছা‘আতাওঁ ওয়া মাইঁ ইয়াখরুজ মিম বাইতিহী মুহা-জিরান ইলাল্লা-হি ওয়ারাছূলিহি ছু ম্মা ইউদরিকহুল মাওতুফাকাদ ওয়াকা‘আ আজরুহূ‘আলাল্লা-হি ওয়া কা-নাল্লা-হু গাফূরার রাহীমা।',

        'ফাইযা-কাদাইতুমুসসালা-তা ফাযকুরুল্লা-হা কিয়া-মাওঁ ওয়াকু‘ঊদাওঁ ওয়া‘আলা জুনূবিকুম ফাইযাতমা’নানতুম ফাআকীমুস সালা-তা ইন্নাসসালা-তা কা-নাত ‘আলাল মু’মিনীনা কিতা-বাম মাওকূতা।',

        'ওয়াছতাগফিরিল্লা-হা ইন্নাল্লা-হা কা-না গাফূরার রাহীমা।',

        'ওয়া মাইঁ ইয়াকছিব খাতীআতান আও ইছমান ছু ম্মা ইয়ারমি বিহী বারীআন ফাকাদিহতামালা বুহতা-নাওঁ ওয়া ইছমাম মুবীনা।',

        'লা-খাইরা ফী কাছীরিম মিন নাজওয়া-হুম ইল্লা-মান আমারা বিসাদাকাতিন আও মা‘রূফিন আও ইসলা-হিম বাইনান্না-ছি ওয়া মাইঁ ইয়াফ‘আল যা-লিকাব তিগাআ মারদাতিল্লা-হি ফাছাওফা নু’তীহি আজরান ‘আজীমা।',

        'উলাইকা হুমুল কা-ফিরূনা হাক্কাওঁ ওয়া আ‘তাদনা-লিল কা-ফিরীনা ‘আযা-বাম মুহীনা।',
        'ওয়াল্লাযীনা আ-মানূবিল্লা-হি ওয়া রুছলিহী ওয়া লাম ইউফাররিকূবাইনা আহাদিম মিনহুমউলাইকা ছাওফা ইউ’তীহিম উজূরাহুম ওয়া কা-নাল্লা-হু গাফূরার রাহীমা।',
        'ইয়াছআলুকা আহলুল কিতা-বি আন তুনাঝঝিলা ‘আলাইহিম কিতা-বাম মিনাছছামাই ফাকাদ ছাআলূমূছাআকবারা মিন যা-লিকা ফাকা-লূ আরিনাল্লা-হা জাহরাতান ফাআখাযাতহুমসসা-ইকাতুবিজুলমিহিম ছুম্মাত্তাখাযুল ইজলা মিম বা‘দি মাজাআতহুমুল বাইয়িনা-তুফা‘আফাওনা-‘আন যা-লিকা ওয়া আ-তাইনা-মূছাছুলতা-নাম মুবীনা।',
        'ওয়া রাফা‘না-ফাওকাহুমুততূরা বিমীছা-কিহিম ওয়া কুলনা-লাহুমুদখুলুলবা-বা সুজ্জাদাওঁ ওয়া কুলনা-লাহুম লা-তা‘দূফিছছাবতি ওয়া আখাযনা-মিনহুম মীছা-কান গালীজা।',
        'ফাবিমা-নাকদিহিম মীছা-কাহুম ওয়া কুফরিহিম বিআ-য়াতিল্লা-হিওয়া কাতলিহিমিুল আমবিইয়াআ বিগাইরি হাক্কিওঁ ওয়া কাওলিহিম কুলূবূনা-গুলফুন বাল তাবা‘আল্লাহু‘আলাইহা-বিকুফরিহিম ফালা-ইউ’মিনূনা ইল্লা-কালীলা।',
        'ওয়াবিকুফরিহিম ওয়াকাওলিহিম ‘আলা-মারইয়ামা বুহতা-নান ‘আজীমা।',
        'ওয়াকাওলিহিম ইন্না-কাতালনাল মাছীহা‘ঈছাবনা মারইয়ামা রাছূলাল্লা-হি ওয়ামাকাতালুহু ওয়ামা-সালাবূহু ওয়ালা-কিন শুব্বিহা লাহুম ওয়া ইন্নাল্লাযীনাখতালাফূফীহি লাফী শাক্কিম মিনহু মা-লাহুম বিহী মিন ‘ইলমিন ইল্লাততিবা-‘আজ্জান্নি ওয়ামাকাতালূহু ইয়াকীনা।',
        'বার রাফা‘আহুল্লা-হু ইলাইহি ওয়া কা-নাল্লা-হু ‘আঝীঝান হাকীমা।',
        'ওয়া ইম মিন আহলিল কিতা-বি ইল্লা-লাইউ‘মিনান্না বিহী কাবলা মাওতিহী ওয়া ইয়াওমাল কিয়া-মাতি ইয়াকূনু‘আলাইহিম শাহীদা।',
        'ফাবিজুলমিমমিনাল্লাযীনা হা-দূহাররামনা-‘আলাইহিমতাইয়িবা-তিনউহিল্লা ত লাহুম ওয়া বিসাদ্দিহিম ‘আন ছাবীলিল্লা-হি কাছীরা।',
        'ওয়া আখযিহিমুর রিবা-ওয়া কাদ নুহু ‘আনহু ওয়া আকলিহিম আমওয়া-লান্না-ছি বিল বাতিলি ওয়াআ‘তাদনা-লিল কা-ফিরীনা মিনহুম ‘আযা-বান আলীমা।',
        'লা-কিনির রা-ছিখূনা ফিল ‘ইলমি মিনহুম ওয়াল মু’মিনূনা ইউ’মিনূনা বিমা-উনঝিলা ইলাইকা ওয়ামা-উনঝিলা মিন কাবলিকা ওয়াল মুকীমীনাসসালা-তা ওয়াল মু’তূনাঝঝাকা-তা ওয়াল মু’মিনূনা বিল্লা-হি ওয়াল ইয়াওমিল আ-খিরি উলাইকা ছানু’তীহিম আজরান ‘আজীমা।',
        'ইন্নাআওহাইনাইলাইকা কামাআওহাইনা ইলানূহিওঁ ওয়ান নাবিইঈনা মিম বা‘দিহী ওয়াআওহাইনা ইলাইবরা-হীমা ওয়া ইছমা-‘ঈলা ওয়া ইছহা-কা ওয়া ইয়া‘কূবা ওয়াল আছবা-তিওয়া ‘ঈসা-ওয়া আইয়ূবা ওয়া ইঊনুছা ওয়া হা-রূনা ওয়া ছুলাইমা-না ওয়া আ-তাইনা-দা-ঊদা ঝাবূরা।',
        'ওয়া রুছুলান কাদ কাসাসনাহুম ‘আলাইকা মিন কাবলুওয়া রুছুলাল লাম নাকছুছহুম ‘আলাইকা ওয়া কাল্লামাল্লা-হু মূছা-তাকলীমা।',
        'রুছুলাম মুবাশশিরীনা ওয়া মুনযিরীনা লিআল্লা-ইয়াকূনা লিন্না-ছি ‘আলাল্লা-হি হুজ্জাতুম বা‘দার রুছুলি ওয়া কা-নাল্লা-হু ‘আঝীঝান হাকীমা।',
        'লা-কিনিল্লা-হু ইয়াশহাদুবিমা আনঝালা ইলাইকা আনঝালাহু বি‘ইলমিহী ওয়াল মালাইকাতুইয়াশহাদূ ন ওয়া কাফা-বিল্লা-হি শাহীদা।',
        'ইন্নাল্লাযীনা কাফারু ওযা সাদ্দূ‘আন ছাবীলিল্লা-হি কাদ দাললূদালা-লাম বা‘ঈদা।',
        'ইন্নাল্লাযীনা কাফারূ ওয়া জালামূ লাম ইয়াকুনিল্লা-হু লিইয়াগফিরা লাহুম ওয়ালালিইয়াহদিইয়াহুম তারিকিা।',
        'ইল্লা-তারীকা জাহান্নামা খা-লিদীনা ফীহাআবাদাওঁ ওয়া কা-না যা-লিকা ‘আলাল্লাহি ইয়াছীরা।',
        'ইয়াআইয়ুহান্না-ছুকাদ জাআকমুর রাছূলূবিলহাক্কিমির রাব্বিকুম ফাআ-মিনুখাইরাল লাকুম ওয়া ইন তাকফুরূফাইন্না লিল্লা-হি মা-ফিছছামা-ওয়া-তি ওয়াল আরদি ওয়া কা-নাল্লা-হু ‘আলীমান হাকীমা।',
        'ইয়াআহলাল কিতাবি লা-তাগলূফী দীনিকুম ওয়ালা-তাকূলূ‘আলাল্লা-হি ইল্লাল হাক্কা; ইন্নামাল মাছীহু‘ঈছাবনুমারইয়ামা রাছূলুল্লা-হি ওয়া কালিমাতুহু আলকা-হা ইলামারইয়ামা ওয়া রুহুম মিনহু ফাআ-মিনূবিল্লা-হি ওয়া রুছুলিহী ওয়ালা-তাকূলূছালা-ছাতুন ইনতাহু খাইরাল্লাকুম ইন্নামাল্লা-হু ইলা-হুওঁ ওয়া-হিদুন ছুবহানাহূআইঁ ইয়াকূনা লাহূওয়ালাদুন । লাহূমা-ফিছছামা-ওয়া-তি ওয়ামা-ফিল আরদি ওয়া কাফা-বিল্লা-হি ওয়াকীলা।',
        'লাইঁ ইয়াছতানকিফাল মাছীহুআইঁ ইয়াকূনা ‘আবদাল লিল্লা-হি ওয়ালাল মালাইকাতুল মুকাররাবূনা ওয়া মাইঁ ইয়াছতানকিফ ‘আন ‘ইবা-দাতিহী ওয়া ইয়াছতাকবির ফাছাইয়াহশুরুহুম ইলাইহি জামী‘আ।',
        'ফাআম্মাল লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি ফাইউওয়াফফীহিম উজূরাহুম ওয়া ইয়াঝীদুহুম মিন ফাদলিহী ওয়া আম্মাল লাযীনাছ তানকাফূওয়াছতাকবারূফাইউ‘আযযিবুহুম ‘আযা-বান আলীমাওঁ ওয়ালা-ইয়াজিদূ না লাহুম মিন দূ নিল্লা-হি ওয়ালিইইয়াওঁ ওয়ালা-নাসীরা।',
        'ইয়াআইয়ুহান্না-ছুকাদ জাআকুমবুরহা-নুমমিররাব্বিকুমওয়াআনঝালনা-ইলাইকুম নূরাম মুবীনা।',
        'ফাআম্মাল লাযীনা আ-মানূবিল্লা-হি ওয়া‘তাসামূবিহী ফাছাইউদখিলুহুম ফী রাহমাতিম মিনহু ওয়া ফাদলিওঁ ওয়া ইয়াহদীহিম ইলাইহি সিরা-তাম মুছতাকীমা।',
        'ইয়াছতাফতূনাকা কুল্লিলা-হু ইউফতীকুম ফিল কালা-লাতি ইনিমরুউন হালাকা লাইছা লাহু ওয়ালাদুওঁ ওয়া লাহুউখতুন ফালাহা-নিসফুমা-তারাকা ওয়া হুওয়া ইয়ারিছুহা-ইল্লাম ইয়াকুল্লাহা-ওয়ালাদুন ফাইন কা-নাতাছনাতাইনি ফালাহুমাছছুলুছানি মিম্মা-তারাকা ওয়া ইন কা-নু ইখওয়াতার রিজা-লাওঁ ওয়া নিছাআন ফালিযযাকারি মিছলুহাজ্জিল উনছাইয়াইনি ইউবাইয়িনুল্লা-হু লাকুম আন তাদিললূ ওয়াল্লা-হু বিকুল্লিা শাইয়িন ‘আলীম।'
      ],
      5: [
        'ইয়াআইয়ূহাল্লাযীনা আ-মানূআওফূবিল‘উকূদি উহিল্লাত লাকুম বাহীমাতুল আন‘আ-মি ইল্লা-মা-ইউতলা-‘আলাইকুম গাইরা মুহিলিলসসাইদি ওয়া আনতুম হুরুমুন ইন্নাল্লা-হা ইয়াহকুমুমা-ইউরীদ।',
        'ইয়া আইয়ূহাল্লাযীনা আ-মানূলা-তুহিললূশা‘আইরাল্লা-হি ওলাশশাহরাল হারা-মা ওয়ালাল হাদইয়া ওয়ালাল কালাইদা ওয়ালাআম্মীনাল বাইতাল হারা-মা ইয়াবতাগূনা ফাদলাম মির রাব্বিহিম ওয়া রিদওয়ানাওঁ ওয়া ইযা-হালালতুম ফাসতা-দূ ওয়ালা-ইয়াজরিমান্নাকুম শানাআ-নুকাওমিন আন সাদ্দূকুম ‘আনিল মাছজিদিল হারা-মি আন তা‘তাদূ । ওয়া তা‘আ-ওয়ানূ‘আলাল বিররি ওয়াত্তাকওয়া- ওয়ালা-তা‘আ-ওয়ানূ‘আলাল ইছমি ওয়াল ‘উদওয়া-নি ওয়াত্তাকুল্লা-হা ইন্নাল্লা-হা শাদীদুল ‘ইকা-ব।',
        'হুররিমাত ‘আলাইকুমুল মাইতাতুওয়াদ্দামুওয়া লাহমুল খিনঝীরি ওয়ামা-উহিল্লা লিগাইরিল্লাহি বিহী ওয়াল মুনখানিকাতুওয়াল মাওকূযাতুওয়াল মুতারাদ্দিইয়াতুওয়ান্নাতীহাতু ওয়ামা-আকালাছ ছাবু‘উ ইল্লা-মা যাক্কাইতুম ওয়ামা-যুবিহা ‘আলান নুসুবি ওয়া আন তাছতাকছিমূবিলআঝলা-মি যা-লিকুম ফিছকুন আল ইয়াওমা ইয়াইছাল্লাযীনা কাফারূমিন দীনিকুম ফালা-তাখশাওহুম ওয়াখশাওনি আলইয়াওমা আকমালতুলাকুম দীনাকুম ওয়া আত মামতু‘আলাইকুম নি‘মাতী ওয়া রাদীতুলাকুমুল ইছলা-মা দীনান ফামানিদতুররা ফী মাখমাসাতিন গাইরা মুতাজা-নিফিললিইছমিন ফাইন্নাল্লা-হা গাফূরুর রাহীম।',
        'ইয়াছআলূনাকা মা-যা উহিল্লা লাহু ম কুল উহিল্লা লাকুমুততাইয়িবা-তু ওয়ামা-‘আল্লামতুম মিনাল জাওয়া-রিহিমুকালিলবীনা তু‘আলিল মূনাহুন্না মিম্মা-‘আল্লামাকুমুল্লা-হু ফাকুলূমিম্মাআমছাকনা ‘আলাইকুম ওয়াযকুরুছমাল্লা-হি ‘আলাইহি ওয়াত্তাকুল্লাহা ইন্নাল্লা-হা ছারী‘উল হিছা-ব।',
        'আলইয়াওমা উহিল্লা লাকুমুততাইয়িবা-তু ওয়া তা‘আ-মুল্লাযীনা ঊতুল কিতা-বা হিল্লুল লাকুম ওয়া তা‘আ-মুকুম হিল্লুল লাহুম ওয়াল মুহসানা-তুমিনাল মু’মিনাতি ওয়াল মুহসানা-তুমিনাল্লাযীনা ঊতুল কিতা-বা মিন কাবলিকুম ইযাআ-তাইতুমূহুন্না উজুরাহুন্না মুহসিনীনা গাইরা মুছা-ফিহীনা ওয়ালা-মুত্তাখিযীআখদা-নিওঁ ওয়া মাইঁ ইয়াকফুর বিলঈমা-নি ফাকাদ হাবিতা ‘আমালুহূ ওয়া হুওয়া ফিল আ-খিরাতি মিনাল খা-ছিরীন।',
        'ইয়া আইয়ূহাল্লাযীনা আ-মানূইযা-কুমতুম ইলাসসালা-তি ফাগছিলূউজূহাকুম ওয়া আইদিয়াকুম ইলাল মারা-ফিকিওয়ামছাহূবিরুঊছিকুম ওয়া আরজুলাকুম ইলাল কা‘বাইন ওয়া ইন কুনতুম জুনুবান ফাততাহহারূ ওয়া ইন কুনতুম মারদা-আও ‘আলাছাফারিন আও জাআ আহাদুম মিনকুম মিনাল গাইতিআও লা-মাছতুমুন নিছাআ ফালাম তাজিদূমাআন ফাতাইয়াম্মামূসা‘ঈদান তাইয়িবান ফামছাহূবিউজূহিকুম ওয়া আইদীকুম মিনহু মা-ইউরীদুল্লা-হু লিইয়াজ‘আলা ‘আলাইকুম মিন হারাজিওঁ ওয়ালা-কিইঁ ইউরীদুলিইউতাহহিরাকুম ওয়ালিইউতিম্মা নি‘মাতাহূ‘আলাইকুম লা‘আল্লাকুম তাশকুরূন।',
        'ওয়াযকুরূ নি‘মাতাল্লা-হি ‘আলাইকুম ওয়া মীছা-কাহুল্লাযী ওয়াছাকাকুম বিহী ইযকুলতুম ছামি‘না-ওয়া আতা‘না ওয়াত্তাকুল্লাহা ইন্নাল্লা-হা ‘আলীমুম বিযাতিসসুদূ র।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূ কূনূ কাওওয়া-মীনা লিলল্লা-হি শুহাদাআ বিলকিছতি ওয়ালা-ইয়াজরিমান্নাকুম শানাআ-নুকাওমিন ‘আলাআল্লা-তা‘দিলূ ই‘দিলূ হুওয়া আকরাবুলিত্তাকওয়া- ওয়াত্তাকুল্লা-হা ইন্নাল্লা-হা খাবীরুম বিমা-তা‘মালূন।',

        'ইয়া আইয়ুহাল্লাযীনা আ-মানুযকুরূনি‘মাতাল্লা-হি ‘আলাইকুম ইযহাম্মা কাওমুন আইঁ ইয়াবছুতূদ্মইলাইকুম আইদিইয়াহুম ফাকাফফা আইদিয়াহুম ‘আনকুম ওয়াত্তাকুল্লা-হা ওয়া‘আলাল্লা-হি ফালইয়াতাওয়াক্কালিল মু’মিনূন।',
        'ওয়া লাকাদ আখাযাল্লা-হু মীছা-কা বানী ইসরাঈলা ওয়া বা‘আছনামিনহুমুছনাই ‘আশারা নাকীবাওঁ ওয়া কা-লাল্লা-হু ইন্নী মা‘আকুম লাইন আকামতুমুসসালা-তা ওয়া আ-তাইতুমুঝঝাকা-তা ওয়া আ-মানতুম বিরুছুলী ওয়া আঝঝারতুমূহুম ওয়া আকরাদতুমুল্লা-হা কারদান হাছানাল লাউকাফফিরান্না ‘আনকুম ছাইয়িআ-তিকুম ওয়ালা উদখিলান্নাকুম জান্না-তিন তাজরী মিন তাহতিহাল আনহা-রু ফামান কাফারা বা‘দা যা-লিকা মিনকুম ফাকাদ দাল্লা ছাওয়াআছছাবীল।',
        'ফাবিমা-নাকদিহিম মীছা-কাহুম লা‘আন্না-হুম ওয়াজা‘আলনা-কুলূবাহুম কা-ছিইয়াতান ইউহাররিফূনাল কালিমা ‘আম মাওয়া-দি‘ইহী ওয়া নাছূহাজ্জাম মিম্মা-যুক্কিরূবিহী ওয়ালা-তাঝা-লুতাত্তালি‘উ ‘আলা-খাইনাতিম মিনহুম ইল্লা-কালীলাম মিনহুম ফা‘ফু‘আনহুম ওয়াসফাহ ইন্নাল্লা-হা ইউহিব্বুল মুহছিনীন।',

        'ইয়াআহলাল কিতা-বি কাদ জাআকুম রাছূলুনা-ইউবাইয়িনুলাকুম কাছীরাম মিম্মাকুনতুম তুখফূনা মিনাল কিতা-বি ওয়া ইয়া‘ফূ‘আন কাছীরিন কাদ জাআকুম মিনাল্লাহি নূরুওঁ ওয়া কিতা-বুম মুবীন।',
        'ইয়াহদী বিহিল্লা-হু মানিতত্তাবা‘আ রিদওয়া-নাহু ছুবুলাছছালা-মি ওয়া ইউখরিজুহুম মিনাজজু লুমা-তি ইলান নূরি বিইযনিহী ওয়া ইয়াহদীহিম ইলা-সিরা-তিম মুছতাকীম।',

        'যা-লিকা আদনা-আইঁ ইয়া’তূবিশশাহা-দাতি ‘আলা-ওয়াজহিহাআও ইয়াখা-ফূআন তুরাদ্দা আইমা-নুম বা‘দা আইমা-নিহিম ওয়াত্তাকুল্লা-হা ওয়াছমা‘ঊ ওয়াল্লা-হু লাইয়াহদিল কাওমাল ফা-ছিকীন।',
        'ইয়াওমা ইয়াজমা‘উল্লা-হুর রুছুলা ফাইয়াকূলুমা-যাউজিবতুম কা-লূলা-‘ইলমা লানা- ইন্নাকা আনতা ‘আল্লা-মুল গুয়ূব।',
        'ইযকা-লাল্লা-হু ইয়া-‘ঈছাব না মারইয়ামাযকুর নি‘মাতী ‘আলাইকা ওয়া ‘আলা-ওয়ালিদাতিক । ইযআইঁ ইয়াত্তুকা বিরুহিল কুদুছি তুকালিলমুন না-ছা ফিল মাহদি ওয়া কাহলাওঁ ওয়া ইয‘আল্লামতুকাল কিতা-বা ওয়াল হিকমাতা ওয়াত্তাওরা-তা ওয়াল ইনজীলা ওয়া ইযতাখলুকুমিনাততীনি কাহাইআতিততাইরি বিইযনী ফাতানফুখু ফীহা-ফাতাকূনুতাইরাম বিইযনী ওয়াতুবরিউল আকমাহা ওয়াল আবরাসা বিইযনী ওয়া ইযতুখরিজুল মাওতা-বিইযনী ওয়া ইযকাফাফতুবানীইছরাঈলা ‘আনকা ইযজি’তাহুম বিলবাইয়িনা-তি ফাকা-লাল্লাযীনা কাফারূমিনহুম ইন হা-যা ইল্লাছিহরুম মুবীন।',
        'ওয়া ইযআওহাইতুইলাল হাওয়া-রিইয়ীনা আন আ-মিনূবী ওয়াবিরাছূলী কা-লূআমান্না-ওয়াশহাদ বিআন্নানা-মুছলিমূন।',
        'ইযকা-লাল হাওয়া-রিইয়ূনা ইয়া-‘ঈছাবনা মারইয়ামা হাল ইয়াছতাতী‘উ রাব্বুকা আইঁ ইউনাঝঝিলা ‘আলাইনা-মাইদাতাম মিনাছছামাই কা-লাত তাকুল্লা-হা ইন কুনতুম মু’মিনীন।',
        'কা-লূনুরীদুআন না’কুলা মিনহা-ওয়া তাতমাইন্না কুলূবুনা-ওয়া না‘লামা আন কাদ সাদাকতানা-ওয়া নাকূনা ‘আলাইহা-মিনাশশা-হিদীন।',
        'কা-লা ‘ঈছাবনুমারইয়ামাল্লা-হুম্মা রাব্বানাআনঝিল ‘আলাইনা-মাইদাতাম মিনাছছামাই তাকূনুলানা-‘ঈদাল লিআওওয়ালিনা-ওয়া আ-খিরিনা-ওয়া আ-ইয়াতাম মিনকা ওয়ারঝুকনা-ওয়া আনতা খাইরুর রা-ঝিকীন।',
        'কা-লাল্লা-হু ইন্নী মুনাঝঝিলুহুা-‘আলাইকুম ফামাইঁ ইয়াকফুর বা‘দুমিনকুম ফাইন্নীউ‘আযযিবুহু ‘আযা-বাল লাউ‘আযযিবুহু-আহাদাম মিনাল ‘আ-লামীন।',
        'ওয়া ইযকা-লাল্লা-হু ইয়া-‘ঈছাবনা মারইয়ামা আআনতা কুলতা লিন্না-ছিততাখিযূনী ওয়া উম্মিয়া ইলা-হাইনি মিন দূ নিল্লা-হি কা-লা ছুবহা-নাকা মা-ইয়াকূনুলীআন আকূলা মা-লাইছা লী বিহাক্কিন ইন কুনতুকু লতুহূফাকাদ ‘আলিমতাহূ তা‘লামুমাফী নাফছী ওয়ালাআ‘লামুমা-ফী নাফছিকা ইন্নাকা আনতা ‘আল্লা-মুল গুয়ূব।',
        'মা-কুলতুলাহুম ইল্লা-মাআমারতানী বিহীআনি‘বুদুল্লা-হা রাববী ওয়া রাব্বাকুম ওয়া কুনতু‘আলাইহিম শাহীদাম মা-দুমতুফীহিম ফালাম্মা-তাওয়াফফাইতানী কুনতা আনতার রাকীবা ‘আলাইহিম ওয়া আনতা ‘আলা-কুল্লি শাইয়িন শাহীদ।',
        'ইন তু‘আযযিবহুম ফাইন্নাহুম ‘ইবা-দুকা ওয়া ইন তাগফির লাহুম ফাইন্নাকা আনতাল ‘আঝীঝুল হাকীম।',
        'কা-লাল্লা-হু হা-যা-ইয়াওমুইয়ানফা‘উস সা-দিকীনা সিদকুহুম লাহুম জান্না-তুন তাজরী মিন তাহতিহাল আনহা-রু খা-লিদীনা ফীহাআবাদার রাদিয়াল্লা-হু ‘আনহুম ওয়া রাদূ ‘আনহু যা-লিকাল ফাওঝুল ‘আজীম।',
        'লিল্লা-হি মুলকুছছামা-ওয়া-তি ওয়াল আরদিওয়া মা- ফীহিন্না ওয়া হুওয়া ‘আলা-কুল্লি শাইয়িন কাদীর।'
      ],
      6: [
        'আলহামদুলিল্লা-হিল্লাযী খালকাছছামা-ওয়া-তি ওয়াল আরদা ওয়া জা‘আলাজজু লুমাতি ওয়াননূরা ছু ম্মাল্লাযীনা কাফারূ বিরাব্বিহীম ইয়া‘দিলূন।',
        'হুওয়াল্লাযী খালাকাকুম মিন তীনিন ছুম্মা কাদাআজালাওঁ ওয়া আজালুম মুছাম্মান ‘ইনদাহূছু ম্মা আনতুম তামতারূন।',
        'ওয়া হুওয়াল্লা-হু ফিছছামা-ওয়া-তি ওয়া ফিল আরদি ইয়া‘লামুছিররাকুম ওয়া জাহরাকুম ওয়া ইয়া‘লামুমা-তাকছিবূন।',
        'ওয়ামা-তা’তীহিম মিন আ-য়াতিম মিন আ-ইয়া-তি রাব্বিহিম ইল্লা-কা-নূ‘আনহা-মু‘রিদীন।',
        'ফাকাদ কাযযাবূবিলহাক্কিলাম্মা-জাআহুম ফাছাওফা ইয়া‘তীহিম আমবাউ মা- কা-নূ বিহী ইয়াছতাহঝিঊন।',
        'আলাম ইয়ারাও কাম আহলাকনা-মিন কাবলিহিম মিন কারনিম মাককান্না-হুম ফিল আরদি মা-লাম নুমাককিল লাকুম ওয়া আরছালনাছছামাআ ‘আলাইহিম মিদরা-রাওঁ ওয়া জা‘আলনাল আন হা-রা তাজরী মিন তাহতিহিম ফাআহলাকনা-হুম বিযুনূবিহিম ওয়া আনশা’না-মিম বা‘দিহিম কারনান আ-খারীন।',
        'ওয়ালাও নাঝঝালনা-আলাইকা কিতা-বান ফী কিরতা-ছিন ফালামাছূহু বিআইদীহিম লাকালাল্লাযীনা কাফারূ ইন হা-যা-ইল্লাছিহরুম মুবীন।',
        'ওয়া কা-লূলাওলাউনঝিলা ‘আলাইহি মালাকুওঁ ওয়া লাও আনঝালনা-মালাকাল লাকুদিয়াল আমরু ছুম্মা লা-ইউনজারূন।',
        'ওয়া লাও জা‘আলনা-হু মালাকাল্লাজা‘আলনা-হুরাজুলাওঁ ওয়া লালাবাছনা-‘আলাইহিম মাইয়ালবিছূন।',
        'ওয়া লাকাদিছ তুহঝিআ বিরুছুলিম মিন কাবলিকা ফাহা-কাবিল্লাযীনা ছাখিরূ মিনহুম মাকানূবিহী ইয়াছতাহঝিউ-ন।',
        'কুল ছীরূফিল আরদিছুম্মানজু রূ কাইফা কা-না ‘আ-কিবাতুল মুকাযযিবীন।',
        'কুল লিমাম মা-ফিছ ছামা-ওয়া-তি ওয়াল আরদি কুল লিল্লা-হি কাতাবা ‘আলানাফছিহির রাহমাতা লাইয়াজমা‘আন্নাকুম ইলা-ইয়াওমিল কিয়া-মাতি লা-রাইবা ফীহি আল্লাযীনা খাছিরূআনফুছাহুম ফাহুম লা-ইউ’মিনূন।',
        'ওয়া লাহূমা-ছাকানা ফিল্লাইলি ওয়ান্নাহা-রি ওয়া হুওয়াছ ছামী‘ঊল ‘আলীম।',
        'কুল আগাইরাল্লা-হি আত্তাখিযুওয়ালিইইয়ান ফা-তিরিছছামা-ওয়া-তি ওয়াল আরদিওয়া হুওয়া ইউত‘ইমুওয়ালা-ইউত‘আমু কুল ইন্নীউমিরতুআন আকূনা আওওয়ালা মান আছলামা ওয়ালা-তাকূনান্না মিনাল মুশরিকীন।',
        'কুল ইন্নীআখা-ফুইন ‘আসাইতুরাববী ‘আযা-বা ইয়াওমিন ‘আজীম।',
        'মাইঁ ইউসরাফ ‘আনহু ইয়াওমাইযিন ফাকাদ রাহিমাহূ ওয়া যা-লিকাল ফাওঝুল মুবীন।',
        'ওয়া ইয়ঁইয়ামছাছকাল্লা-হু বিদুররিন ফালা-কা-শিফা লাহূইল্লা-হুওয়া ওয়া ইয়ঁ ইয়ামছাছকা বিখাইরিন ফাহুওয়া ‘আলা-কুল্লি শাইয়িন কাদীর।',
        'ওয়া হুওয়াল কা-হিরু ফাওকা ‘ইবা-দিহী ওয়া হুওয়াল হাকীমুল খাবীর।',
        'কুল আইয়ুশাইয়িন আকবারু শাহা-দাতান কুল্লিলা-হু, শাহীদুম বাইনী ওয়া বাইনাকুম ওয়া ঊহিইয়া ইলাইইয়া হা-যাল কুরআ-নুলিউনযিরাকুম বিহী ওয়া মাম বালাগা আইন্নাকুম লাতাশহাদূ না আন্না মা‘আল্লা-হি আ-লিহাতান উখরা- কুল লাআশহাদু কুল ইন্নামা-হুওয়া ইলা-হুওঁ ওয়াহিদুওঁ ওয়া ইন্নানী বারীউম মিম্মা-তুশরিকূন।',
        'আল্লাযীনা আ-তাইনা-হুমুল কিতা-বা ইয়া‘রিফূনাহু কামা-ইয়া‘রিফূনা আবনাআহুম । আল্লাযীনা খাছিরূআনফুছাহুম ফাহুম লা-ইউ’মিনূন ।',
        'ওয়া মান আজলামুমিম মানিফ তারা-‘আলাল্লা-হি কাযিবান আও কাযযাবা বিআ-য়াতিহী ইন্নাহু লা-ইউফলিহুজ্জা-লিমূন।',
        'ওয়া ইয়াওমা নাহশুরুহুম জামী‘আন ছু ম্মা নাকূলুলিল্লাযীনা আশরাকূ আইনা শুরাকাউকুমুল্লাযীনা কুনতুম তাঝ‘উমূন।',
        'ছু ম্মা লাম তাকুন ফিতনাতুহুম ইল্লাআন কা-লূওয়াল্লা-হি রাব্বিনা-মা-কুন্না-মুশরিকীন।',
        'উনজু র কাইফা কাযাবূ‘আলাআনফুছিহিম ওয়া দাল্লা ‘আনহুম মা-কা-নূইয়াফতারূন।',
        'ওয়া মিনহুম মাইঁ ইয়াছতামি‘উ ইলাইকা ওয়া জা‘আলনা-‘আলা-কুলূবিহিম আকিন্নাতান আইঁ ইয়াফকাহূহুওয়া ফীআ-যা-নিহিম ওয়াকরাওঁ ওয়া ইয়ঁইয়ারাও কুল্লা আয়াতিল লা-ইউ’মিনূবিহা- হাত্তাইযা-জাঊকা ইউজা-দিলূনাকা ইয়াকূলুল্লাযীনা কাফারুইন হা-যাইল্লাআছা-তীরুল আওওয়ালীন।',
        'ওয়া হুম ইয়ানহাওনা ‘আনহু ওয়া ইয়ানআওনা ‘আনহু ওয়া ইয়ঁইউহলিকূনা ইল্লাআনফুছাহুম ওয়া মা-ইয়াশ‘উরুন।',
        'ওয়া লাও তারা ইযউকিফূ‘আলান্না-রি ফাকা-লূইয়া-লাইতানা-নুরাদ্দুওয়ালানুকাযযিবা বিআ-য়া-তি রাব্বিনা-ওয়া নাকূনা মিনাল মু’মিনীন।',
        'বাল বাদা-লাহুম মা-কা-নূইউখফূনা মিন কাবলু ওয়া লাও রুদ্দূলা‘আ-দূলিমা-নুহূ ‘আনহু ওয়া ইন্নাহুম লাকা-যিবূন।',
        'ওয়া কা-লূইন হিয়া ইলা-হায়া-তুনাদদুনইয়া-ওয়া মা-নাহনুবিমাব‘ঊছীন।',

        'কাদ খাছিরাল্লাযীনা কাযযাবূবিলিকাইল্লা-হি হাত্তা-ইযাজাআতহুমুছছা‘আতুবাগতাতান কা-লূইয়া-হাছরাতানা-‘আলা-মা-ফাররাতনা-ফীহা- ওয়া হুম ইয়াহমিলূনা আওঝা-রাহুম ‘আলা-জু হূরিহিম ‘আলা-ছাআ মা-ইয়াঝিরূন।',
        'ওয়া মাল হায়া-তুদ দুনইয়াইল্লা-লা‘ইবুওঁ ওয়া লাহ উরঁ ওয়া লাদ্দা-রুল আ-খিরাতু খাইরুল লিল্লাযীনা ইয়াত্তাকূনা আফালা-তা‘কিলূন।',
        'কাদ না‘লামুইন্নাহূলাইয়াহঝুনুকাল্লাযীইয়াকূলূনা ফাইন্নাহুম লা- ইউকায যি ওয়ালা-কিন্নাজ্জা-লিমীনাবিআ-য়া-তিল্লা-হিইয়াজহাদূন।',

        'ওয়া ইন কা-না কাবুরা ‘আলাইকা ই‘রা-দুহুম ফাইনিছতাতা‘তা আন তাবতাগিয়া নাফাকান ফিল আরদিআও ছুল্লামান ফিছছামাই ফাতা’তিয়াহুম বিআ-ইয়াতিওঁ ওয়া লাও শাআল্লা-হু লাজামা‘আহুম ‘আলাল হুদা-ফালা-তাকূনান্না মিনাল জা-হিলীন।',
        'ইন্নামা-ইয়াছতাজীবুল্লাযীনা ইয়াছমা‘ঊনা ওয়াল মাওতা-ইয়াব‘আছুহুমুল্লা-হু ছুম্মা ইলাইহি ইউরজা‘ঊন।',
        'ওয়া কা-লূলাওলা-নুঝঝিলা ‘আলাইহি আ-য়াতুম মির রাব্বিহী কুল ইন্নাল্লা-হা কাদিরুন ‘আলাআইঁ ইউনাঝঝিলা আ-য়াতাওঁ ওয়ালা-কিন্না আকছারাহুম লা-ইয়া‘লামূন।',

        'ওয়াল্লাযীনা কাযযাবূবিআ- ইয়া-তিনা-সুম্মুওঁ ওয়া বুকমন ফিজজু লুমা-তি মাইঁ ইয়াশাইল্লা-হু ইউদলিলহু ওয়া মাইঁ ইয়াশা’ ইয়াজ‘আলহু ‘আলা-সিরা-তিম মুছতাকীম।',
        'কুল আরা’আইতাকুম ইন আতা-কুম ‘আযা-বুল্লা-হি আও আতাতকুমুছছা-‘আতু আগাইরাল্লা-হি তাদ‘ঊনা ইন কুনতুম সা-দিকীন।',
        'বাল ইয়্যা-হু তাদ‘ঊনা ফাইয়াকশিফুমা-তাদ‘ঊনা ইলাইহি ইন শাআ ওয়া তানছাওনা মাতুশরিকূন।',
        'ওয়া লাকাদ আরছালনাইলাউমামিম মিন কাবলিকা ফাআখাযনা-হুম বিল বা’ছাই ওয়াদ্দাররাই লা‘আল্লাহুম ইয়াতাদাররা‘ঊন।',

        'ফালাম্মা-নাছূমা-যুককিরূ বিহী ফাতাহনা- ‘আলাইহিম আবওয়া-বা কুল্লি শাইয়িন হাত্তাইযা-ফারিহূবিমাঊতূআখাযনা-হুম বাগতাতান ফাইযা-হুম মুবলিছূন।',

        'কুল আরাআইতাকুমইনআতা-কুম‘আযা-বুল্লা-হি বাগতাতান আও জাহরাতান হাল ইউহলাকুইল্লাল কাওমুজ্জা-লিমূন।',
        'ওয়া মা-নুরছিলুল মুরছালীনা ইল্লা-মুবাশশিরীনা ওয়া মুনযিরিনা ফামান আ-মানা ওয়া আসলাহা ফালা-খাওফুন ‘আলাইহিম ওয়ালা-হুম ইয়াহঝানূন।',

        'কুল লাআকূলুলাকুম ‘ইনদী খাঝাইনুল্লা-হি ওয়ালাআ‘লামুল গাইবা ওয়ালাআকূলু লাকুম ইন্নী মালাকুন ইন আত্তাবি‘উ ইল্লা-মা-ইউহাইলাইইয়া কুল হাল ইয়াছতাবিল আ‘মা-ওয়াল বাসীরু আফালা-তাতাফাক্কারূন।',
        'ওয়া আনযিরবিহিল্লাযীনা ইয়াখা-ফূনা আইঁ ইউহশারূইলা-রাব্বিহিম লাইছা লাহুম মিন দূনিহী ওয়ালিইয়ুওঁ ওয়ালা-শাফী‘উল লা‘আল্লাহুম ইয়াত্তাকূন।',
        'ওয়ালা-তাতরুদিল্লাযীনা ইয়াদ‘ঊনা রাব্বাহুম বিলগাদা-তি ওয়াল ‘আশিইয়ি ইউরীদূ না ওয়াজহাহূ মা-‘আলাইকা মিন হিছা-বিহিম মিন শাইয়িওঁ ওয়া মা-মিন হিছা-বিকা ‘আলাইহিম মিন শাইয়িন ফাতাতরুদাহুম ফাতাকূনা মিনাজ্জা-লিমীন।',
        'ওয়া কাযা-লিকা ফাতান্না-বা‘দাহুম ব্বিা‘দিললিইয়াকূলআহাউলাই মান্নাল্লা-হু ‘আলাইহি মিম বাইনিনা- আলাইছাল্লা-হু বিআ‘লামা বিশশা-কিরীন।',
        'ওয়া ইযা-জাআকাল্লাযীনা ইউ’মিনূনা বিআ-য়া-তিনা-ফাকুল ছালা-মুন ‘আলাইকুম কাতাবা রাব্বুকুম আলা-নাফছিহির রাহমাতা আন্নাহূমান ‘আমিলা মিনকুম ছূআম বিজাহা-লাতিন ছুম্মা তা-বা মিম বা‘দিহী ওয়া আসলাহা ফাআন্নাহূগাফূরুর রাহীম।',
        'ওয়া কাযা-লিকা নুফাসসিলুল আ-য়া-তি ওয়ালিতাছতাবীনা ছাবীলুল মুজরিমীন।',
        'কুল ইন্নী নুহীতুআন আ‘বুদাল্লাযীনা তাদ‘ঊনা মিন দূ নিল্লা-হি কুল লাআত্তাবি‘উ আহওয়াআকুম কাদ দালালতুইযাওঁ ওয়ামাআনা-মিনাল মুহতাদীন।',
        'কুল ইন্নী ‘আলা-বাইয়িনাতিম মিররাববী ওয়া কাযযাবতুম বিহী মা-‘ইনদী মাতাছতা‘জিলূনা বিহী ইনিল হুকমুইল্লা- লিল্লা-হি ইয়াকু সসুল হাক্কা-ওয়া হুওয়া খাইরুল ফা-সিলীন।',
        'কুল্লাও আন্না ‘ইনদী মা-তাছতা‘জিলূনা বিহী লাকুদিয়াল আমরু বাইনী ওয়া বাইনাকুম ওয়াল্লা-হু আ‘লামুবিজ্জা-লিমীন।',
        'ওয়া ‘ইনদাহূমাফা-তিহুল গাইবি লা-ইয়া‘লামুহাইল্লা-হুওয়া ওয়া ইয়া‘লামুমা-ফিল বাররি ওয়াল বাহরি ওয়া মা-তাছকুতুমিওঁ ওয়ারাকাতিন ইল্লা-ইয়া‘লামুহা-ওয়ালাহাব্বাতিন ফী জুলুমা-তিল আরদিওয়ালা-রাতবিওঁ ওয়ালা-ইয়া-বিছিন ইল্লা-ফী কিতাবিম মুবীন।',
        'ওয়া হুওয়াল্লাযী ইয়াতাওয়াফফা-কুম বিল্লাইলি ওয়া ইয়া‘লামুমা-জারাহতুম বিন্নাহা-রি ছু ম্মা ইয়াব‘আছুকুম ফীহি লিইউকদাআজালুম মুছাম্মান ছু ম্মা ইলাইহি মারজি‘উকুম ছু ম্মা ইউনাব্বিউকুম বিমা-কুনতুম তা‘মালূন।',

        'ওয়া হা-যা-কিতা-বুন আনঝালনা-হুমুবা-রাকুন ফাত্তাবি‘ঊহু ওয়াত্তাকূ লা‘আল্লাকুম তুরহামূন।',
        'আন তাকূলূইন্নামা-উনঝিলাল কিতা-বু‘আলা-তাইফাতাইনি মিন কাবলিনা- ওয়া ইন কুন্না-‘আন দিরা-ছাতিহিম লাগা-ফিলীন।',
        'আও তাকূলূলাও আন্নাউনঝিলা ‘আলাইনাল কিতা-বুলাকুন্নাআহদা-মিনহুম ফাকাদ-জাআকুম বাইয়িনাতুম মির রাব্বিকুম ওয়া হুদাওঁ ওয়া রাহমাতুন ফামান আজলামু মিম্মান কাযযাবা বিআ-য়া-তিল্লা-হি ওয়া সাদাফা ‘আনহা- ছানাজঝিল্লাযীনা ইয়াসদিফূনা ‘আন আ-য়া-তিনা-ছূআল ‘আযা-বি বিমা-কা-নূইয়াসদিফূন।',
        'হাল ইয়ানজুরূনা ইল্লাআন তা’তিয়াহুমুল মালাইকাতুআও ইয়া’তিয়া রাব্বুকা আও ইয়া’তিয়া বা‘দুআ-য়া-তি রাব্বিকা ইয়াওমা ইয়া’তী বা‘দুআ-য়া-তি রাব্বিকা লা-ইয়ানফা‘উ নাফছান ঈমা-নুহা-লাম তাকুন আ-মানাত মিন কাবলুআও কাছাবাত ফী ঈমা-নিহা-খাইরান কুলিনতাজিরূইন্না-মুনতাজিরূন।',
        'ইন্নালাযীনা ফাররাকূদীনাহুম ওয়া কা-নূশিয়া‘আল্লাছতা মিনহুম ফী শাইয়িন ইন্নামাআমরুহুম ইলাল্লা-হি ছুম্মা ইউনাব্বিউহুম বিমা-কা-নূইয়াফ‘আলূন।',
        'মান জাআ বিল হাছানাতি ফালাহূ‘আশরু আমছা-লিহা- ওয়ামান জাআ বিছছাইয়িআতি ফালা-ইউজঝা ইল্লা-মিছলাহা-ওয়া হুম লা-ইউজলামূন।',
        'কুল ইন্নানী হাদা-নী রাববীইলা-সিরা-তিম মুছতাকীমিন দীনান কিয়ামাম মিল্লাতা ইবরা-হীমা হানীফাওঁ ওয়া মা-কা-না মিনাল মুশরিকীন।',
        'ক্বুল ইন্না ছলা-তী ওনুছুকী ওমাহ্ইয়া-ইয়া ওমামা-তী লিল্লা-হি রব্বিল্\'আ-লামীন্',
        'লা-শারীকা লাহু ওয়া বিযা-লিকা উমিরতুওয়া আনা আওওয়ালুল মুসলিমীন।',
        'কুল আগাইরাল্লা-হি আবগী রাব্বাওঁ ওয়া হুয়া রাব্বুকুল্লি শাইয়িওঁ ওয়া লা-তাকছিবুকুল্লু নাফছিন ইল্লা-‘আলাইহা- ওয়া লা- তাঝিরু ওয়াঝিরাতুওঁবিঝরা উখরা- ছু ম্মা ইলা-রাব্বিকুম মারিজ‘উকুম ফাইউনাব্বিউকুম বিমা-কুনতুম ফীহি তাখতালিফূন।',
        'ওয়া হুওয়াল্লাযী জা‘আলাকুম খালাইফাল আরদিওয়ারাফা‘আ বা‘দাকুম ফাওকা বা‘দিন দারাজা-তিল লিইয়াবলুওয়াকুম ফী মাআ-তাকুম ইন্না রাব্বাকা ছারী‘উল ‘ইকা-বি ওয়া ইন্নাহূলাগাফূরুর রাহীম।'
      ],
      7: [
        'আলিফ লাম মীম সা দ।',
        'কিতা-বুন উনঝিলা ইলাইকা ফালা-ইয়াকুনফীসাদরিকাহারাজুম মিনহু লিতুনযিরা বিহী ওয়া যিকরা-লিলমু’মিনীন।',
        'ইত্তাবি‘ঊ মাউনঝিলা ইলাইকুম মির রাব্বিকুম ওয়ালা-তাত্তাবি‘ঊ মিন দূ নিহীআওলিয়াআ কালীলাম মা-তাযাক্কারূন।',
        'ওয়া কাম মিন কারইয়াতিন আহলাকনা-হা-ফাজাআহা-বা’ছুনা-বাইয়া-তান আও হুম কাইলূন।',
        'ফামা-কা-না দা‘ওয়া-হুম ইযজাআহুম বা’ছুনা-ইল্লাআন কা-লূইন্না-কুন্না-জা-লিমীন।',
        'ফালানাছআলান্নালাযীনা উরছিলা ইলাইহিম ওয়া লানাছআলান্নাল মুরছালীন।',
        'ফালানাকুসসান্না ‘আলাইহিম বি‘ইলমিওঁ ওয়ামা-কুন্না-গাইবীন।',
        'ওয়াল ওয়াঝনুইয়াওমাইযিনিল হাক্কু ফামান ছাকুলাত মাওয়া-ঝীনুহু ফাউলাইকা হুমুল মুফলিহূন।',
        'ওয়া মান খাফফাত মাওআ-ঝীনুহূফাউলাইকাল্লাযীনা খাছিরূআনফুছাহুম বিমা-কা-নূ বিআ-য়া-তিনা-ইয়াজলিমূন।',
        'ওয়া লাকাদ মাক্কান্না-কুম ফিল আরদিওয়া জা‘আলনা-লাকুম ফীহা-মা‘আ-য়িশা কালীলাম মা-তাশকুরূন।',
        'ওয়া লাকাদ খালাকনা-কুম ছুম্মা সাওওয়ারনা-কুম ছুম্মা কুলনা-লিলমালাইকাতিছজু দূ লিআ-দামা ফাছাজাদূ ইল্লা-ইবলীছা লাম ইয়াকুম মিনাছ ছা-জিদীন।',
        'কা-লা মা-মানা‘আকা আল্লা-তাছজু দা ইয আমারতুকা কা-লা আনা খাইরুম মিনহু খালাকতানী মিন না-রিওঁ ওয়া খালাকতাহূমিন তীন।',
        'কা-লা ফাহবিতমিনহা-ফামা-ইয়াকূনুলাকা আন তাতাকাববরা ফীহা- ফাখরুজ ইন্নাকা মিনাসসা-গিরীন।',
        'কা-লা আনজিরনীইলা-ইয়াওমি ইউব‘আছূ ন।',
        'কা-লা ইন্নাকা মিনাল মুনজারীন।',
        'কা-লা ফাবিমাআগওয়াইতানী লাআক‘উদান্না লাহুম সিরা-তাকাল মুছতাকীম।',
        'ছু ম্মা লাআ-তিইয়ান্নাহুম মিম বাইনি আইদীহিম ওয়া মিন খালফিহিম ওয়া ‘আন আইমা-নিহিম ওয়া ‘আন শামাইলিহিম ওয়ালা-তাজিদুআকছারাহুম শা-কিরীন।',
        'কা-লাখরুজ মিনহা-মাযঊমাম মাদহূরাল লামান তাবি‘আকা মিনহুম লাআমলাআন্না জাহান্নামা মিনকুম আজমা‘ঈন।',
        'ওয়া ইয়া-আ-দামছ কুন আনতা ওয়া ঝাওজুকাল জান্নাতা ফাকুলা-মিন হাইছুশি’তুমাওয়ালা তাকরাবা-হা-যিহিশশাজারাতা ফাতাকূনা-মিনাজ্জা-লিমীন।',
        'ফাওয়াছওয়াছা লাহুমাশশাইতা-নু লিইউবদিয়া লাহুমা-মাঊরিয়া ‘আনহুমা-মিন ছাওআতিহিমা-ওয়া কা-লা মা-নাহা-কুমা-রাব্বুকুমা ‘আন হা-যিহিশশাজারাতি ইল্লাআন তাকূনামালাকাইনি আও তাকূনা-মিনাল খা-লিদীন।',
        'ওয়া কা-ছামাহুমা-ইন্নী লাকুমা-লামিনান না-সিহীন।',
        'ফাদাল্লা- হুমা-বিগুরূরিন ফালাম্মা-যা-কাশশাজারাতা বাদাত লাহুমা-ছাওআ-তুহুমাওয়া তাফিকা-ইয়াখসিফা-নি ‘আলাইহিমা-মিওঁ ওয়া রাকিল জান্নাতি ওয়া না-দাহুমা-রাব্বুহুমা-আলাম আনহাকুমা-‘আন তিলকুমাশশাজারাতি ওয়া আকুল্লাকুমা ইন্নাশশাইতা-না লাকুমা-‘আদুওউম মুবীন।',
        'কা-লা রাব্বানা-জালামনাআনফুছানা-ওয়া ইল্লাম তাগফির লানা-ওয়া তারহামনা-লানাকূনান্না মিনাল খা-ছিরীন।',
        'কা-লাহ বিতুবা‘দুকুম লিবা‘দিন ‘আদুওউওঁ ওয়া লাকুম ফিল আরদিমুছতাকাররুওঁ ওয়া মাতা-‘উন ইলা-হীন।',
        'কা-লা ফীহা-তাহইয়াওনা ওয়া ফীহা-তামূতূনা ওয়া মিনহা-তুখরাজূন।',
        'ইয়া-বানীআ-দামা কাদ আনঝালনা-‘আলাইকুম লিবা-ছাইঁ ইউওয়া-রী ছাওআ-তিকুম ওয়া রীশাওঁ ওয়া লিবা-ছুততাকওয়া-যা-লিকা খাইরুন যা-লিকা মিন আ-য়া-তিল্লা-হি লা‘আল্লাহুম ইয়াযযাক্কারূন।',
        'ইয়া-বানীআ-দামা লা-ইয়াফতিনান্নাকুমুশ শাইতা-নুকামাআখরাজা আবাওয়াইকুম মিনাল জান্নাতি ইয়ানঝি‘উ ‘আনহুমা-লিবা-ছাহুমা-লিইউরিয়াহুমা-ছাওআ-তিহিমা- ইন্নাহূ ইয়ারা-কুম হুওয়া ওয়াকাবীলুহূমিন হাইছুলা-তারাওনাহুম ইন্না-জা‘আলনাশ শায়াতীনা আওলিয়াআ লিল্লাযীনা লা-ইউ’মিনূন।',
        'ওয়া ইযা-ফা‘আলূফা-হিশাতান কা-লুওয়াজাদনা-‘আলাইহাআ-বাআনা-ওয়াল্লা-হু আমারানা-বিহা- কুল ইন্নাল্লা-হা লা-ইয়া’মুরু বিল ফাহশাই আতাকূলূনা ‘আলাল্লা-হি মা-লা-তা‘লামূন।',
        'কুল আমারা রাববী বিলকিছতিওয়া আকীমূউজূহাকুম ‘ইনদা কুল্লি মাছজিদিওঁ ওয়াদ‘ঊহু মুখলিসীনা লাহুদদীনা কামা-বাদাআকুম তা‘ঊদূ ন।',
        'ফারীকান হাদা-ওয়া ফারীকান হাক্কা ‘আলাইহিমুদ্দালা-লাতু ইন্নাহুমুততাখাযুশশায়া-তীনা আওলিয়াআ মিন দূ নিল্লা-হি ওয়া ইয়াহছাবূনা আন্নাহুম মুহতাদূ ন।',
        'ইয়া-বানীআ-দামা-খুযূঝীনাতাকুম ‘ইনদা কুল্লি মাছজিদিওঁ ওয়া কুলূওয়াশরাবূওয়ালাতুছরিফূ ইন্নাহূলা-ইউহিব্বুল মুছরিফীন।',
        'কুল মান হাররামা ঝীনাতাল্লা-হিল্লাতীআখরাজা-লি‘ইবা-দিহী ওয়াত্তাইয়িবা-তি মিনার রিঝকি কুল হিয়া লিল্লাযীনা আ-মানূফিল হায়া-তিদদুনইয়া-খা-লিসাতাইঁ ইয়াওমাল কিয়া-মাতি কাযা-লিকা নুফাসসিলুল আ-য়া-তি লিকাওমিইঁ ইয়া‘লামূন।',
        'কুল ইন্নামা- হাররামা রাব্বিয়াল ফাওয়া-হিশা মা-জাহারা মিনহা-ওয়া মা- বাতানা ওয়াল ইছমা ওয়াল বাগইয়া বিগাইরিল হাক্কি ওয়া আন তুশরিকূবিল্লা-হি মা-লাম ইউনাঝঝিল বিহী ছুলতা-নাওঁ ওয়া আন তাকূলূ‘আলাল্লা-হি মা-লা-তা‘লামূন।',

        'ওয়া লাম্মা-ছাকাতা ‘আম মূছাল গাদাবুআখাযাল আলওয়া-হা ওয়া ফী নুছখাতিহাহুদাওঁ ওয়া রাহমাতুললিল্লাযীনা হুম লিরাব্বিহিম ইয়ারহাবূন।',
        'ওয়াখতা-রা মূছা-কাওমাহূছাবা‘ঈনা রাজুলাল লিমীকা-তিনা- ফালাম্মাআখাযাতহুমুর রাজফাতুকা-লা রাব্বি লাও শি’তা আহলাকতাহুম মিন কাবলুওয়াইয়্যা-ইয়া আতুহলিকুনা-বিমা-ফা‘আলাছছুফাহাউ মিন্না- ইন হিয়া ইল্লা-ফিতনাতুকা তুদিল্লু বিহা-মান তাশাউ ওয়া তাহদী মান তাশাউ আনতা ওয়ালিইউনা-ফাগফিরালানাওয়ারহামনা-ওয়া আনতা খাইরুল গা-ফিরীন।',
        'ওয়াকতুব লানা-ফী হা-যিহিদ দুনইয়া-হাছানাতাওঁ ওয়া ফিল আ-খিরাতি ইন্নাহুদনাইলাইকা কা-লা ‘আযা-বী উসীবুবিহী মান আশাউ, ওয়া রাহমাতী ওয়াছি‘আত কুল্লা শাইয়িন ফাছাআকতুবুহা-লিল্লাযীনা ইয়াত্তাকূনা ওয়া ইয়ু’তূনাঝঝাকাতা ওয়াল্লাযীনা হুম বিআ-য়া-তিনা-ইউ’মিনূন।',
        'আল্লাযীনা ইয়াত্তাবি‘ঊনার রাছূলান্নাবিইয়াল উম্মিইয়াল্লাযী ইয়াজিদূ নাহূমাকতূবান ‘ইনদাহুম ফিততাওরা-তি ওয়াল ইনজীলি ইয়া’মরুহুম বিলমা‘রূফি ওয়া ইয়ানহা-হুম ‘আনিল মুনকারি ওয়া ইউহিল্লুলাহুমুততাইয়িবা-তি ওয়া ইউ হাররিমু‘আলাইহিমুল খাবাইছা ওয়া ইয়াদা‘উ ‘আনহুম ইসরাহুম ওয়াল আগলা-লাল্লাতী কা-নাত ‘আলাইহিম ফাল্লাযীনা আমানূবিহী ওয়া ‘আঝঝারুহু ওয়া নাসারুহু ওয়াত্তাবা‘উন নূরাল্লাযী উনঝিলা মা‘আহূ উলাইকা হুমুল মুফলিহূন।',
        'কুল ইয়াআইয়ূহান্না-ছুইন্নী রাছূলুল্লা-হি ইলাইকুম জামী‘আ নিল্লাযী লাহূমুলকুছছামাওয়া-তি ওয়াল আরদি লাইলা-হা ইল্লা-হুওয়া ইউহয়ী ওয়া ইউমীতু ফাআ-মিনূ বিল্লা-হি ওয়া রাছূলিহিন নাবিইয়িল উম্মিইয়িল্লাযী ইউ’মিনুবিল্লা-হি ওয়া কালিমা-তিহী ওয়াত্তাবি‘উহু লা‘আল্লাকুম তাহতাদূ ন।',
        'ওয়া মিন কাওমি মূছাউম্মাতুইঁ ইয়াহদূনা বিলহাক্কিওয়া বিহী ইয়া‘দিলূন।',
        'য়া কাত্তা‘না-হুমুছনাতাই ‘আশরাতা আছবা-তান উমামা- ওয়াআওহাইনাইলামূছা-ইযিছতাছকা-হু কাওমুহূআনিদরিব বি‘আসা-কাল হাজারা ফামবাজাছাত মিনহুছনাতা- ‘আশরাতা ‘আইনান কাদ ‘আলিমা কুল্লুউনা-ছিম মাশরাবহুম ওয়াজাল্লালনা-‘আলাইহিমুল গামা-মা ওয়া আনঝালনা-‘আলাইহিমুল মান্না ওয়াছছালওয়া- কুলূমিন তাইয়িবা-তি মা-রাঝাকনা-কুম ওয়া মা-জালামূনা-ওয়ালা-কিন কা-নূ আনফুছাহুম ইয়াজলিমূন।',
        'ওয়া ইযকীলা লাহুমুছ কুনূহা-যিহিল কারইয়াতা ওয়া কুলূমিনহা-হাইছুশি’তুম ওয়া কূলূহিত্তাতুওঁ ওয়াদখুলুল বা-বা ছুজ্জাদান নাগফিরলাকুম খাতিূআ-তিকুম ছানাঝীদুল মুহছিনীন।',
        'ফাবাদ্দালাল্লাযীনা জালামূমিনহুম কাওলান গাইরাল্লাযীকীলা লাহুম ফাআরছালনা‘আলাইহিম রিজঝাম মিনাছছামাই বিমা-কা-নূইয়াজলিমূন।',
        'ওয়াছআলহুম ‘আনিল কারইয়াতিল্লাতী কা-নাত হা-দিরাতাল বাহর । ইযইয়া‘দূ না ফিছছাবতি ইয তা’তীহিম হীতা-নুহুম ইয়াওমা ছাবতিহিম শুররা‘আওঁ ওয়া ইয়াওমা লাইয়াছবিতূনা লা-তা’তীহিম কাযা-লিকা নাবলূহুম বিমা-কা-নূইয়াফছুকূন।',
        'ওয়া ইযকা-লাত উম্মাতুম মিনহুম লিমা তা‘ইজূনা কাওমানিল্লা-হু মুহলিকুহুম আও মু‘আযযিবুহুম ‘আযা-বান শাদীদান কা-লূমা‘যিরাতান ইলা-রাব্বিকুম ওয়া লা‘আল্লাহুম ইয়াত্তাকূন।',
        'ফালাম্মা- নাছূ মা-যুক্কিরূ বিহীআনজাইনাল্লাযীনা ইয়ানহাওনা ‘আনিছছূইওয়া আখাযনাল্লাযীনা জালামূবি‘আযা-বিম বাঈছিম বিমা-কা-নূইয়াফছুকূন।',

        'ওয়া ইযতাআযযানা রাব্বুকা লাইয়াব‘আছান্না ‘আলাইহিম ইলা-ইয়াওমিল কিয়া-মাতি মাইঁ ইয়াছূমূহুম ছূআল ‘আযা-বি ইন্না রাব্বাকা লাছারী‘উল ইকা-বি ওয়া ইন্নাহূ লাগাফূরুর রাহীম।',
        'ওয়া কাত্তা‘না-হুম ফিল আরদিউমামান মিনহুমুসসা-লিহূনা ওয়া মিনহুম দূ না যালিকা ওয়া বালাওনা-হুম বিলহাছানা-তি ওয়াছছাইয়িআ-তি লা‘আল্লাহুম ইয়ারজি‘ঊন।',
        'ফাখালাফা মিমবা‘দিহিম খালফুওঁ ওয়ারিছুলকিতা-বা ইয়া’খুযূনা ‘আরাদাহা-যাল আদনা-ওয়া ইয়াকূলূনা ছাইউগফারুলানা ওয়া ইয়ঁইয়া’তিহিম ‘আরাদুম মিছলুহূ ইয়া’খুযূহু; আলাম ই’খায‘আলাইহিম মীছা-কুল কিতা-বি আল্লাইয়াকূলূ‘আলাল্লা-হি ইল্লাল হাক্কা ওয়া দারাছূমা-ফীহি ওয়াদ্দা-রুল আ-খিরাতুখাইরুল লিল্লাযীনা ইয়াত্তাকূনা আফালা-তা‘কিলূন।',

        'ওয়া ইযনাতাকনাল জাবালা ফাওকাহুম কাআন্নাহূজু ল্লাতুওঁ ওয়া জান্নূ আন্নাহূওয়াকি‘উম বিহিম খুযূমাআ-তাইনা-কুম বিকুওওয়াতিওঁ ওয়াযকুরূমা-ফিহি লা‘আল্লাকুম তাত্তাকূন।',
        'ওয়া ইয আখাযা রাব্বুকা মিম বানীআ-দামা মিন জুহূরিহিম যুররিইইয়াতাহুম ওয়া আশহাদাহুম ‘আলাআনফুছিহিম আলাছতুবিরাব্বিকুম কা-লূবালা-শাহিদনা আন তাকূলূইয়াওমাল কিয়া-মাতি ইন্না-কুন্না-‘আন হা-যা-গা-ফিলীন।',
        'আও তাকূলূইন্নামা-আশরাকা আ-বাউনা মিন কাবলুওয়া কুন্না যুররিইয়াতাম মিম বা‘দিহিম আফাতুহলিকুনা-বিমা-ফা‘আলাল মুবতিলূন।',
        'ওয়া কাযা-লিকা নুফাসসিলুল আ-য়া-তি ওয়া লা‘আল্লাহুম ইয়ারজি‘ঊন।',
        'ওয়াতলু ‘আলাইহিম নাবাআল্লাযী আ-তাইনা-হুআ-য়া-তিনা-ফানছালাখা মিনহাফাআতবা‘আহুশশাইতা-নুফাকা-না মিনাল গা-বীন।',
        'ওয়া লাও শি’না-লারাফা‘না-হু বিহা-ওয়ালা-কিন্নাহূআখলাদা ইলাল আরদিওয়াত্তাবা‘আ হাওয়া-হু ফামাছালুহূকামাছালিল কালবি ইন তাহমিল ‘আলাইহি ইয়ালহাছআও তাতরুকহু ইয়ালহাছ যা-লিকা মাছালুল কাওমিল্লাযীনা কাযযাবূবিাআ-য়া-তিনা- ফাকসুসিল কাসাসা লা‘আল্লাহুম ইয়াতাফাক্কারূন।',

        'ওয়া লাকাদ যারা’না-লিজাহান্নামা কাছীরাম মিনাল জিন্নি ওয়ালইনছি লাহুম কুলূবুল্লাইয়াফকাহূনা বিহা- ওয়া লাহুম আ‘ইউনুল্লা-ইউবসিরূনা বিহা- ওয়া লাহুম আ-যানুল্লা-ইয়াছমা‘উনা বিহা- উলাইকা কালআন‘আ-মি বাল হুম আদাল্লু উলাইকা হুমুল গা-ফিলূন।',
