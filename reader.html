    let currentSurah = 1;
    let arabicSize = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--arabic-size")) || 34;
    const minSize = 20, maxSize = 60;
    let scrollSpeed = 0;
    let rafId = null;

    // --- Font controls ---
    function updateSize() {
      document.documentElement.style.setProperty("--arabic-size", arabicSize + "px");
    }
    document.getElementById("btnFontUp").addEventListener("click", () => { if (arabicSize < maxSize) { arabicSize += 2; updateSize(); } });
    document.getElementById("btnFontDown").addEventListener("click", () => { if (arabicSize > minSize) { arabicSize -= 2; updateSize(); } });
    document.getElementById("screenColor").addEventListener("change", (e) => {
      const v = e.target.value;
      const inner = document.querySelector(".inner");
      if (!inner) return;
      if (v === "default") {
        inner.style.background = "";
        inner.classList.remove("dark-screen");
        return;
      }
      inner.style.background = v;
      const r = parseInt(v.slice(1, 3), 16);
      const g = parseInt(v.slice(3, 5), 16);
      const b = parseInt(v.slice(5, 7), 16);
      const brightness = (r * 299 + g * 587 + b * 114) / 1000;
      inner.classList.toggle("dark-screen", brightness < 80);
    });

    // --- Auto scroll ---
    function tick() {
      if (scrollSpeed <= 0 || !rafId) { stopScroll(); return; }
      const max = document.documentElement.scrollHeight - window.innerHeight - 2;
      if (window.scrollY >= max) { stopScroll(); return; }
      window.scrollBy(0, scrollSpeed);
      rafId = requestAnimationFrame(tick);
    }
    function startScroll(speed) {
      if (typeof speed === "number") scrollSpeed = speed;
      if (rafId) cancelAnimationFrame(rafId);
      document.getElementById("btnStop").style.display = "inline-block";
      rafId = requestAnimationFrame(tick);
    }
    function stopScroll() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
      scrollSpeed = 0;
      document.getElementById("btnStop").style.display = "none";
      ["speedLow","speedMed","speedFast"].forEach(id => document.getElementById(id).classList.remove("active"));
    }
    function pauseScroll() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
      document.getElementById("btnStop").style.display = "none";
    }
    function resumeScroll() {
      if (!rafId && scrollSpeed > 0) {
        document.getElementById("btnStop").style.display = "inline-block";
        rafId = requestAnimationFrame(tick);
      }
    }
    ["speedLow","speedMed","speedFast"].forEach(id => {
      const btn = document.getElementById(id);
      btn.addEventListener("click", () => {
        if (btn.classList.contains("active")) {
          stopScroll();
          return;
        }
        ["speedLow","speedMed","speedFast"].forEach(i => document.getElementById(i).classList.remove("active"));
        btn.classList.add("active");
        startScroll(parseFloat(btn.dataset.speed));
      });
    });
    document.getElementById("btnStop").addEventListener("click", () => { stopScroll(); });

    // Touch: pause auto-scroll while a finger is on the page, resume on lift
    page.addEventListener("touchstart", () => {
      if (scrollSpeed > 0) pauseScroll();
    }, { passive: true });

      resumeScroll();
    }, { passive: true });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" || e.key === "s" || e.key === "S") {

    async function initSurahList() {
      try {
        const res = await fetch("https://api.alquran.cloud/v1/surah");
        const json = await res.json();
        if (json.code === 200) {
          SURAH_LIST = json.data.map(s => ({ number: s.number, englishName: s.englishName, arName: s.name, bnName: BENGALI_NAMES[s.number - 1] || "" }));
          surahSelect.innerHTML = SURAH_LIST.map(s => `<option value="${s.number}">${s.number}. ${s.englishName}</option>`).join("");
          surahSelect.value = currentSurah;
          buildGrid();
        }
      } catch (e) { console.error(e); }
    }

    // Build the surah list (home) grid of buttons
    function buildGrid() {
      surahGrid.innerHTML =
        `<div class="grid-heading">All Sura</div>` +
        SURAH_LIST.map(s => `
          <button class="surah-card" data-n="${s.number}">
            <span class="no">${toArabicNum(s.number)}</span>
            <span class="en">${s.number}. ${s.englishName}</span>
            <span class="bn">${s.bnName}</span>
            <span class="ar">${s.arName}</span>
          </button>`).join("");
    }
    surahGrid.addEventListener("click", (e) => {
      const card = e.target.closest(".surah-card");
      if (card) loadSurah(parseInt(card.dataset.n, 10), undefined, true);
    });

    // Show the surah grid (home) and hide the reader
    function showGrid() {
      stopScroll();
      page.style.display = "none";
      statusEl.style.display = "none";
      surahGrid.style.display = "grid";
      desktopBanner.style.display = "";
      history.replaceState(null, "", "/");
      window.scrollTo({ top: 0 });
    }

    // Handle the browser back/forward buttons between home and surahs
    window.addEventListener("popstate", (e) => {
      const state = e.state;
      if (state && state.surah >= 1 && state.surah <= 114) {
        loadSurah(state.surah);
      } else {
        showGrid();
      }
    });

    surahSelect.addEventListener("change", () => {
      const n = parseInt(surahSelect.value, 10);
      if (n >= 1 && n <= 114) loadSurah(n, undefined, true);
    });
    document.getElementById("prev").addEventListener("click", () => { if (currentSurah > 1) loadSurah(currentSurah - 1, undefined, true); });
    document.getElementById("next").addEventListener("click", () => { if (currentSurah < 114) loadSurah(currentSurah + 1, undefined, true); });

    function prefetchSurah(n) {
      if (n < 1 || n > 114) return;
      const url = `https://api.alquran.cloud/v1/surah/${n}/editions/quran-uthmani,bn.bengali`;
      fetch(url).catch(() => {});
    }

    function setInputs(n, push = false) {
      currentSurah = n;
      surahSelect.value = n;
      document.getElementById("prev").disabled = n === 1;
      document.getElementById("next").disabled = n === 114;
      // Keep the URL in sync so a page refresh stays on the current surah.
      if (push) {
        history.pushState({ surah: n }, "", "?surah=" + n);
      } else {
        history.replaceState({ surah: n }, "", "?surah=" + n);
      }
      window.scrollTo(0, 0);
    }

    async function loadSurah(n, scrollToAyah, push = false) {
      if (!n || n < 1 || n > 114) {
        statusEl.textContent = "সূরা নম্বর ১ থেকে ১১৪ এর মধ্যে হতে হবে।";
        return;
      }
      stopScroll();
      setInputs(n, push);
      surahGrid.style.display = "none";
      desktopBanner.style.display = "none";
      statusEl.style.display = "block";
      page.style.display = "none";
      statusEl.textContent = "সূরা লোড হচ্ছে...";
      try {
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${n}/editions/quran-uthmani,bn.bengali`);
        const json = await res.json();
        if (json.code !== 200) throw new Error("API error");

        const arabic = json.data[0];
        const bangla = json.data[1];
        const surah = arabic;

        surahTitle.textContent = surah.name;
        navName.textContent = `${surah.number}. ${surah.englishName}`;

        const type = surah.revelationType === "Medinan" ? "মাদানি" : "মাক্কি";

        // Bismillah header: shown above ayah 1 for every surah except Al-Faatiha (1),
        // where Bismillah is itself ayah 1, and At-Tawbah (9), which has no Bismillah.
        bismillahEl.style.display = (n === 1 || n === 9) ? "none" : "block";

        ayahsEl.innerHTML = "";
        const fragment = document.createDocumentFragment();
        let prevRuku = null;
        let rukuCount = 0;
        let sajdaCount = 0;
        for (let i = 0; i < arabic.ayahs.length; i++) {
          const ay = arabic.ayahs[i];
          let a = ay.text.trim();
          // For surahs 2-114 (except 9) the Bismillah is prepended inside ayah 1's
          // Arabic text; remove it since it is shown separately as the header above.
          if (i === 0 && n !== 1 && n !== 9) {
            a = stripLeadingBismillah(a);
          }
          if (!a) continue;
          const t = bangla.ayahs[i].text;
          const num = ay.numberInSurah;
          const uc = (SURAH_UCHARON[n] && i < SURAH_UCHARON[n].length) ? SURAH_UCHARON[n][i] : '';
          const ucHtml = uc ? `<div class='ayah-uc'>${uc}</div>` : '';
          const ruku = ay.ruku;
          const isNewRuku = ruku && (i === 0 || ruku !== prevRuku);
          if (isNewRuku) rukuCount++;
          prevRuku = ruku;

          const key = `${n}:${num}`;
          const isSajda = SAJDAS.has(key);
          if (isSajda) sajdaCount++;

          const marks = [];
          if (isNewRuku) marks.push(`<span class="ayah-mark ruku">রুকু ${rukuCount}</span>`);
          if (isSajda) marks.push(`<span class="ayah-mark sajda"><span class="sym">۩</span> সেজদা (${SAJDA_INFO[key]})</span>`);
          const marksHtml = marks.length ? `<div class="ayah-marks">${marks.join("")}</div>` : "";

          const div = document.createElement("div");
          div.className = "ayah-block";
          div.dataset.ayah = num;
          div.innerHTML = `
            <button class="bm-btn" data-ayah="${num}" title="এই আয়াত চিহ্নিত করে রাখুন" aria-label="Bookmark">&#128278;</button>
            <div class="ayah-arabic">${a} <span class="ayah-num">${toArabicNum(num)}</span></div>
            ${ucHtml}
            ${marksHtml}
            <div class='ayah-bn'><span class='meaning'>${t}</span></div>
          `;
          fragment.appendChild(div);
        }
        ayahsEl.appendChild(fragment);
        applyBookmarkHighlight(n);
        if (scrollToAyah) {
          const target = ayahsEl.querySelector(`.ayah-block[data-ayah="${scrollToAyah}"]`);
          if (target) setTimeout(() => target.scrollIntoView({ behavior: "smooth", block: "center" }), 60);
        }

        page.style.display = 'block';
        requestAnimationFrame(() => { statusEl.style.display = 'none'; });
        prefetchSurah(n - 1);
        prefetchSurah(n + 1);
      } catch (e) {
        console.error(e);
        statusEl.textContent = "সূরা লোড করতে সমস্যা হয়েছে। অনুগ্রহ করে ইন্টারনেট সংযোগ ও API (api.alquran.cloud) চেক করুন।";
        page.style.display = "none";
      }
    }

    // On open:
    //  1) if ?surah=N is present (e.g. after refresh) show that surah;
    //  2) else if a bookmark exists, open that surah and jump to the marked ayah;
    //  3) otherwise show the surah list (home) grid.
    initSurahList().then(() => {
      const params = new URLSearchParams(location.search);
      const s = parseInt(params.get("surah"), 10);
      if (s >= 1 && s <= 114) {
        loadSurah(s);
      } else {
        const bm = getBookmark();
        if (bm && bm.surah >= 1 && bm.surah <= 114) {
          loadSurah(bm.surah, bm.ayah);
        } else {
          showGrid();
        }
      }
    });

    // --- PWA: register service worker for offline + installability ---
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js", { scope: "/", updateViaCache: "none" })
          .then((registration) => {
            // Whenever the device comes back online, check for a new app version
            window.addEventListener("online", () => {
              registration.update().catch(() => {});
            });
          })
          .catch((err) => console.warn("Service worker registration failed:", err));
      });

      // Reload the page only when a new service worker takes over (not on first install)
      let currentController = navigator.serviceWorker.controller;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (currentController && currentController !== navigator.serviceWorker.controller) {
          window.location.reload();
        }
        currentController = navigator.serviceWorker.controller;
      });
    }

    // --- PWA: custom install button ---
    let deferredPrompt = null;
    const btnInstall = document.getElementById("btnInstall");
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      btnInstall.style.display = "inline-flex";
    });
    btnInstall.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      btnInstall.style.display = "none";
    });
    window.addEventListener("appinstalled", () => {
      deferredPrompt = null;
      btnInstall.style.display = "none";
    });
  </script>
