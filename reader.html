        'ওয়া উমলী লাহুম ইন্না কাইদী মাতীন।',
        'আওয়ালাম ইয়াতাফাক্কারূ মা-বিসা-হিবিহিম মিন জিন্নাতিন ইন হুওয়া ইল্লা-নাযীরুম মুবীন।',
        'আওয়া লাম ইয়ানজুরূ ফী মালাকূতিছছামা-ওয়া-তি ওয়াল আরদিওয়ামা-খালাকাল্লা-হু মিন শাইয়িওঁ ওয়া আন ‘আছাআইঁ ইয়াকূনা কাদিকতারাবা আজালুহুম, ফাবিআইয়ি হাদীছিম বা‘দাহূইউ‘মিনূন।',
        'মাইঁ ইউদলিলিল্লা-হু ফালা-হা-দিইয়ালাহূ ওয়া ইয়াযারুহুম ফী তুগইয়া-নিহিম ইয়া‘মাহূন।',
        'ইয়াছআলূনাকা ‘আনিছ ছা-‘আতি আইঁ ইয়া-না মুরছা-হা- কুল ইন্নামা-‘ইলমুহা-‘ইনদা রাববী লা-ইউজাললীহা-লিওয়াকতিহা-ইল্লা-হূ । ছাকুলাত ফিছছামা-ওয়া-তি ওয়াল আরদি লা-তা’তীকুম ইল্লা-বাগতাতান ইয়াছআলূনাকা কাআন্নাকা হাফিইয়ুন ‘আনহা-; কুল ইন্নামা-‘ইলমুহা-‘ইনদাল্লা-হি ওয়ালা-কিন্না আকছারান্নাছি লা-ইয়া‘লামূন।',
        'কুল লাআমলিকুলিনাফছী নাফ‘আওঁ ওয়ালা-দাররান ইল্লা-মা-শাআল্লা-হু ওয়া লাও কুনতুআ‘লামূল গাইবা লাছতাকছারতুমিনাল খাইরি ওয়ামা-মাছছানিয়াছ ছূউ ইন আনা ইল্লা-নাযীরুওঁ ওয়া বাশীরুল লিকাওমিইঁ ইউ’মিনূন।',
        'হুওয়াল্লাযীখালাকাকুম মিন নাফছিওঁ ওয়া-হিদাতিওঁ ওয়া জা‘আলা মিনহা-ঝাওজাহালিইয়াছকুনা ইলাইহা- ফালাম্মা-তাগাশশা-হা-হামালাত হামলান খাফীফান ফামাররাত বিহী, ফালাম্মাআছকালাদ্দা‘আওয়াল্লা-হা রাব্বাহুমা-লাইন আ-তাইতানা-সা-লিহাল লানাকূনান্না মিনাশশা-কিরীন।',
        'ফালাম্মাআ-তা-হুমা-সা-লিহান জা‘আলা-লাহূ, শুরাকাআ ফীমাআ-তা-হুমা- ফাতা‘আ-লাল্লা-হু ‘আম্মা-ইউশরিকূন।',
        'আ ইউশরিকূনা মা-লা-ইয়াখলুকুশাইআওঁ ওয়াহুম ইউখলাকূন।',
        'ওয়ালা-ইয়াছতাতী‘ঊনা লাহুম নাসরাওঁ ওয়ালাআনফুছাহুম ইয়ানসুরূন।',
        'ওয়া ইন তাদ‘উহুম ইলাল হুদা-লা-ইয়াত্তাবি‘উকুম ছাওয়াউন ‘আলাইকুম আদা‘আওতুমূহুম আম আনতুম সা-মিতূন।',
        'ইন্নাল্লাযীনা তাদ‘ঊনা মিন দূনিল্লা-হি ‘ইবা-দুনআমছা-লুকুম ফাদ‘ঊহুম ফালইয়াছতাজীবূ লাকুম ইন কুনতুম সা-দিকীন।',
        'আলাহুম আরজুলুইঁ ইয়ামশূনা বিহা- আম লাহুম আইদিইঁ ইয়াবতিশূনা বিহা- আম লাহুম আ‘ইউনুইঁ ইয়ুবসিরূনা বিহা- আম লাহুম আ-যা-নুইঁ ইয়াছমা‘ঊনা বিহা- কুলিদ‘ঊ শুরাকাআকুম ছুম্মা কীদূ নি ফালা-তুনজিরূন।',
        'ইন্না ওয়ালিইয়িইয়াল্লা-হুল্লাযী নাঝঝালাল কিতা-বা ওয়া হুওয়া ইয়াতাওয়াল্লাসসা-লিহীন।',
        'ওয়াল্লাযীনা তাদ‘ঊনা মিন দূনিহী লা-ইয়াছতাতী‘ঊনা নাসরাকুমওয়ালা-আনফুছাহুম ইয়ানসুরূন।',
        'ওয়া ইন তাদ‘ঊহুম ইলাল হুদা-লা-ইয়াছমা‘ঊ ওয়া তারা-হুম ইয়ানজুরুনা ইলাইকা ওয়া হুম লা-ইউবসিরূন।',
        'খুযিল ‘আফওয়া ওয়া‘মুর বিল ‘উরফি ওয়া আ‘রিদ‘আনিল জা-হিলীন।',
        'ওয়া ইম্মা-ইয়ানঝাগান্নাকা মিনাশশাইতা-নি নাঝগুন ফাছতা‘ইযবিল্লা-হি ইন্নাহূছামী‘উন ‘আলীম।',
        'ইন্নাল্লাযীনাত তাকাও ইযা-মাছছাহুম তাইফুম মিনাশশাইতা-নি তাযাক্কারূফাইযা-হুম মুবসিরূন।',
        'ওয়া ইখওয়া-নুহুম ইয়ামুদ্দূনাহুম ফিল গাইয়ি ছুম্মা লা-ইউকসিরূন।',
        'ওয়া ইযা-লাম তা’তিহিম বিআ-য়াতিন কা-লূলাওলাজ তাবাইতাহা- কুল ইন্নামা আত্তাবি‘উ মা-ইউহা ইলাইইয়া মিররাববী হা-যা-বাসাইরু মিররাব্বিকুম ওয়া হুদাওঁ ওয়া রাহমাতুল লিকাওমিইঁ ইউ’মিনূন।',
        'ওয়া ইযা-কুরিয়াল কুরআ-নুফাছতামি‘ঊ লাহূওয়া আনসিতূলা‘আল্লাকুম তুরহামূন।',
        'ওয়াযকুর রাব্বাকা ফী নাফছিকা তাদাররু‘আওঁ ওয়া খীফাতওঁ ওয়া দূনাল জাহরি মিনাল কাওলি বিলগুদুওবিওয়াল আ-সা-লি ওয়ালা-তাকুম মিনাল গা-ফিলীন।',
        'ইন্নাল্লাযীনা ‘ইন্দা রাব্বিকালা-ইয়াছতাকবিরূনা‘আন ‘ইবা-দাতিহীওয়াইউছাব্বিহূনাহূওয়া লাহূইয়াছজুদূন। (সিজদা-১)'
      ],
      8: [
        'ইয়াছআলূনাকা ‘আনিল আনফা-লি কুল্লি আনফা-লুলিল্লা-হি ওয়াররাছূলি ফাত্তাকুল্লা-হা ওয়া আসলিহূযা-তা বাইনিকুম ওয়া আতী‘উল্লা-হা ওয়া রাছূলাহূইন কুনতুম মু’মিনীন।',
        'ইন্নামাল মু’মিনূনাল্লাযীনা ইযা-যুকিরাল্লা-হুওয়াজিলাতকুলূবুহুম ওয়া ইযা-তুলিয়াত ‘আলাইহিম আ-ইয়া-তুহূঝা-দাতহুম ঈমা-নাওঁ ওয়া ‘আলা-রাব্বিহিম ইয়াতাওয়াক্কালূন।',
        'আল্লাযীনা ইউকীমূনাসসালা-তা ওয়া মিম্মা-রাঝাকনা-হুম ইউনফিকূ ন।',
        'উলাইকা হুমুল মু’মিনূনা হাক্কান লাহুম দারাজা-তুন ‘ইনদা রাব্বিহিম ওয়া মাগফিরাতুওঁ ওয়া রিঝকুন কারীম।',
        'কামাআখরাজাকা রাব্বুকা মিম বাইতিকা বিলহাক্কি ওয়া ইন্না ফারীকাম মিনাল মু’মিনীনা লাকা-রিহূন।',
        'ইউজা-দিলূনাকা ফিল হাক্কি বা‘দা মা-তাবাইইয়ানা কাআন্নামা-ইউছা-কূনা ইলাল মাওতি ওয়া হুম ইয়ানজু রুন।',
        'ওয়া ইয ইয়া‘ইদুকুমুল্লা-হুইহদাততাইফাতাইনি আন্নাহা-লাকুম ওয়া তাওয়াদ্দূনা আন্না গাইরা যা-তিশশাওকাতি তাকূনুলাকুম ওয়া ইউরীদুল্লা-হুআইঁ ইউহিক্কাল হাক্কা বিকালিমাতিহী ওয়া ইয়াকতা‘আ দা-বিরাল কা-ফিরীন।',
        'লিইউহিক্কাল হাক্কা ওয়া ইউবতিলাল বা-তিলা ওয়া লাও কারিহাল মুজরিমূন।',
        'ইয তাছতাগীছূনা রাব্বাকুমফাছতাজা-বা লাকুমআন্নীমুমিদ্দুকুম বিআলফিম মিনাল মালাইকাতি মুরদিফীন।',
        'ওয়ামা-জা‘আলাহুল্লা-হু ইল্লা-বুশরা-ওয়া লিতাতমাইন্না বিহী কুলূবুকুম ওয়া মান নাসরু ইল্লা-মিন ‘ইনদিল্লা-হি ইন্নাল্লা-হা ‘আঝীঝুন হাকীম।',
        'ইয ইউগাশশীকুমুননু‘আ-ছা আমানাতাম মিনহু ওয়া ইউনাঝঝিলু‘আলাইকুম মিনাছছামাই মাআল লিইউতাহহিরাকুম বিহী ওয়া ইউযহিবা ‘আনকুম রিজঝাশশাইতা-নি ওয়া লিইয়ারবিতা ‘আলা-কুলূবিকুম ওয়া ইউছাব্বিতা বিহিল আকাদা-ম।',
        'ইযইঊহী রাব্বুকা ইলাল মালাইকাতি আন্নী মা‘আকুম ফাছাব্বিতুল্লাযীনা আ-মানূ ছাউলকী ফী কুলূবিল্লাযীনা কাফারূররু‘বা ফাদরিবূফাওকাল আ‘না-কিওয়াদরিবূমিনহুম কুল্লা বানা-ন।',
        'যা-লিকা বিআন্নাহুম শাককুল্লা-হা ওয়া রাছূলাহূ ওয়া মাইঁ ইউশাকিকিল্লা-হা ওয়া রাছূলাহূফাইন্নাল্লা-হা শাদীদুল ‘ইকা-ব।',
        'যা-লিকুম ফাযূকূহু ওয়া আন্না লিলকা-ফিরীনা ‘আযা-বান্না-র।',
        'ইয়া আইয়ুহাল্লাযীনা আ-মানূ-ইযা- লাকীতুমুল্লাযীনা কাফারূ ঝাহফান ফালাতুওয়াল্লুহুমুল আদবা-র।',
        'ওয়া মাইঁ ইউওয়ালিলহিম ইয়াওমায়িযিন দুবুরাহূইল্লা-মুতাহাররিফাল লিকিতা-লিন আও মুতাহাইয়িঝান ইলা-ফিআতিন ফাকাদ বাআ বিগাদাবিম মিনাল্লা-হি ওয়া মা’ওয়া-হু জাহান্নামু ওয়াবি’ছাল মাসীর।',
        'ফালাম তাকতুলূহুম ওয়ালা-কিন্নাল্লা-হা কাতালাহুম ওয়ামা-রামাইতা ইযরামাইতা ওয়ালা-কিন্নাল্লা-হা রামা- ওয়ালি ইউবলিয়াল মু’মিনীনা মিনহু বালাআন হাছানান ইন্নাল্লা-হা ছামী‘উন আলীম।',
        'যা-লিকুম ওয়াআন্নাল্লা-হা মূহিনুকাইদিল কা-ফিরীন।',
        'ইন তাছতাফতিহূফাকাদ জাআকুমুল ফাতহু ওয়া ইন তানতাহূফাহুওয়া খাইরুল্লাকুম ওয়া ইন তা‘ঊদূনা‘উদ ওয়া লান তুগনিয়া ‘আনকুম ফিআতুকুম শাইআওঁ ওয়ালাও কাছুরাত ওয়া আন্নাল্লা-হা মা‘আল মু’মিনীন।',

        'ওয়া আ‘ইদ্দূলাহুম মাছতাতা‘তুম মিন কুওওয়াতিওঁ ওয়া মির রিবা-তিল খাইলি তুরহিবূনা বিহী ‘আদুওঁ ওআল্লা-হি ওয়া ‘আদুওঁ ওয়াকুম ওয়া আ-খারীনা মিন দূ নিহিম লাতা‘লামূনাহুম আল্লা-হু ইয়া‘লামুহুম ওয়া মা-তুনফিকূমিন -শাইয়িন ফী ছা��ীলিল্লা-হি ইউওয়াফফা ইলাইকুম ওয়া আনতুম লা-তুজলামূন।',
        'ওয়া ইন জানাহূলিছছালমি ফাজনাহলাহা-ওয়া তাওয়াক্কাল ‘আলাল্লা-হি ইন্নাহূহুওয়াছ ছামী‘উল ‘আলীম।',
        'ওয়া ইয়ঁইউরীদূ আইঁ ইয়াখদা‘ঊকা ফাইন্না হাছবাকাল্লা-হু হুওয়াল্লাযী আইঁ ইয়াদাকা বিনাসরিহী ওয়া বিলমু’মিনীন।',
        'ওয়া আল্লাফা বাইনা কুলূবিহিম লাও আনফাকতা মা-ফিল আরদিজামী‘আম মাআল্লাফতা বাইনা কুলূবিহিম ওয়ালা-কিন্নাল্লা-হা আল্লাফা বাইনাহুম ইন্নাহূ‘আঝীঝুন হাকীম।',
        'ইয়াআইয়ুহান্নাবিইয়ুহাছবুকাল্লা-হু ওয়া মানিত তাবা‘আকা মিনাল মু’মিনীন।',
        'ইয়াআইয়ুহান্নাবিইয়ুহাররিদিল মু’মিনীনা ‘আলাল কিতা-লি ইয়ঁইয়াকুম মিনকুম ‘ইশরূনা সা-বিরূনা ইয়াগলিবূমিআতাইনি ওয়া ইয়ঁইয়াকুম মিনকুম মিআতুইঁ ইয়াগলিবূ আলফাম মিনাল্লাযীনা কাফারূবিআন্নাহুম কাওমুল লা-ইয়াফকাহূন।',
        'আলআ-না খাফফাফাল্লা-হু ‘আনকুম ওয়া ‘আলিমা আন্না ফীকুম দা‘ফান ফাইয়ঁইয়াকুম মিনকুম মিআতুন সা-বিরাতুইঁ ইয়াগলিবূমিআতাইনি ওয়াইঁ ইয়াকুম মিনকুম আলফুইঁ ইয়াগলিবূআলফাইনি বিইযনিল্লা-হি ওয়াল্লা-হু মা‘আসসা-বিরীন।',
        'মা-কা-না লিনাবিইয়িন আইঁ ইয়াকূনা লাহূআছরা-হাত্তা-ইউছখিনা ফিল আরদি তুরীদূ না ‘আরাদাদদুনইয়া- ওয়াল্লা-হু ইউরীদুল আ-খিরাতা ওয়াল্লা-হু ‘আঝীঝুন হাকীম ।',
        'লাও লা-কিতা-বুমমিনাল্লা-হি ছাবাকা লামাছছাকুমফীমাআখাযতুম‘আযা-বুন‘আজীম।',
        'ফাকুলূমিম্মা-গনিমতুম হালা-লান তাইয়িবাওঁ ওয়াত্তাকুল্লা-হা ইন্নাল্লা-হা গাফূরুর রাহীম।',
        'ইয়াআইয়ুহান্নাবিইয়ুকুল লিমান ফীআইদীকুম মিনাল আছরা ইয়ঁইয়া‘লামিল্লা-হু ফী কুলূবিকুম খাইরাইঁ ইউ’তিকুম খাইরাম মিম্মা-উখিযা মিনকুম ��য়া ইয়াগফির লাকুম ওয়াল্লা-হু গাফূরুর রাহীম।',
        'ওয়া ইয়ঁইউরীদূখিয়া-নাতাকা ফাকাদ খা-নুল্লা-হা মিন কাবলুফাআমকানা মিনহুম ওয়াল্লা-হু ‘আলীমুন হাকীম।',
        'ইন্নাল্লাযীনা আ-মানূওয়া হা-জারূ ওয়া জা-হাদূ বিআমওয়া-লিহিম ওয়া আনফুছিহিম ফী ছাবীলিল্লা-হি ওয়াল্লাযীনা আ-ওয়াওঁ ওয়া নাসারূউলাইকা বা‘দুহুম আওলিয়াউ বা‘দিওঁ ওয়াল্লাযীনা আ-মানূওয়া লাম ইউহা-জিরূমা-লাকুম মিওঁ ওয়ালা-ইয়াতিহিম মিন শাইয়িন হাত্তা-ইউহাজিরু ওয়া ইনিছ তানসারূকুম ফিদদীনি ফা‘আলাইকুমুন্নাসরু ইল্লা-‘আলা-কাওমিম বাইনাকুম ওয়াবাইনাহুম মীছা-কুওঁ ওয়াল্লা-হুবিমা-তা‘মালূনা বাসীর।',
        'ওয়াল্লাযীনা কাফারূবা‘দুহুম আওলিয়াউ বা‘দিন ইল্লা-তাফ‘আলূহু তাকুন ফিতনাতুন ফিল আরদিওয়া ফাছা-দুন কাবীর।',
        'ওয়াল্লাযীনা আ-মানূওয়া হা-জারূওয়া জা-হাদূফী ছাবীলিল্লা-হি ওয়াল্লাযীনা আ-ওয়াওঁ ওয়া নাসারুউলাইকা হুমুল মু’মিনূনা হাক্কাল লাহুম মাগফিরাতুওঁ ওয়া রিঝকুন কারীম।',
        'ওয়াল্লাযীনা আ-মানূমিম বা‘দুওয়া হা-জারূওয়া জা-হাদূমা‘আকুম ফাউলাইকা মিনকুম ওয়া ঊলুল আরহা-মি বা‘দুহুম আওলাউ ব্বিা‘দিন ফী কিতা-বিল্লা-হি ইন্নাল্লাহা বিকুল্লি শাইয়িন ‘আলীম।'

      9: [
        'বারাআতুম মিনাল্লা-হি ওয়া রাছূলিহীইলাল্লাযীনা ‘আ-হাত্তুম মিনাল মুশরিকীন।',
        'ফাছীহূফিল আরদিআরবা‘আতা আশহুরিওঁ ওয়া‘লামূআন্নাকুম গাইরু মু‘জিঝিল্লা-হি ওয়া আন্নাল্লা-হা মুখঝিল কা-ফিরীন।',
        'ওয়া আযা-নুম মিনাল্লা-হি ওয়া রাছূলিহীইলান্না-ছি ইয়াওমাল হাজ্জিল আকবারি আন্নাল্লাহা বারী-উম মিনাল মুশরিকীনা ওয়া রাছূলুহূ ফাইন তুবতুম ফাহুওয়া খাইরুল্লাকুম ওয়া ইন তাওয়াল্লাইতুম ফা‘লামূআন্নাকুম গাইরু মু‘জিঝিল্লা-হি ওয়া বাশশিরিল্লাযীনা কাফারূবি‘আযা-বিন আলীম।',
        'ইল্লাযীনা ‘আ-হাত্তুম মিনাল মুশরিকীনা ছুম্মা লাম ইয়ানকুসূকুম শাইআওঁ ওয়া লাম ইউজাহিরূ‘আলাইকুম আহাদান ফাআতিম্মূ ইলাইহিম ‘আহদাহুম ইলা-মুদ্দাতিহিম ইন্নাল্লা-হা ইউহিব্বুল মুত্তাকীন।',
        'ফাইযানছালাখাল আশহুরুল হুরুমুফাকতুলুল মুশরিকীনা হাইছুওয়াজাত্তুমূহুম ওয়া খুযূহুম ওয়াহসুরূহুম ওয়াক‘উদূলাহুম কুল্লা মারসাদিন ফাইন তা-বূওয়া আকা-মুসসলা-তা ওয়া আ-তাউঝঝাকাতা ফাখাললূছাবীলাহুম ইন্নাল্লা-হা গাফুরুর রাহীম।',
        'ওয়া ইন আহাদুম মিনাল মুশরিকীনাছ তাজা-রাকা ফাআজিরহু হাত্তা-ইয়াছমা‘আ কালামাল্লা-হি ছুম্মা আবলিগহু মা’মানাহূ যা-লিকা বিআন্নাহুম কাওমুল লা-ইয়া‘লামূন।',
        'কাইফা ইয়াকূনুলিলমুশরিকীনা ‘আহদুন ‘ইনদাল্লা-হি ওয়া ‘ইনদা রাছূলিহীইল্লাল্লাযীনা ‘আহাত্তুম ‘ইনদাল মাছজিদিল হারা-মি ফামাছতাকা-মূলাকুম ফাছতাকীমূলাহুম ইন্নাল্লা-হা ইউহিব্বুল মুত্তাকীন।',
        'কাইফা ওয়া ইয়ঁইয়াজহারূ‘আলাইকুম লা-ইয়ারকুবূফীকুম ইল্লাওঁ ওয়ালা-যিম্মাতাইঁ ইউরদূ নাকুম বিআফওয়া-হিহিম ওয়া তা’বা-কুলূবুহুম ওয়া আকছারুহুম ফা-ছিকূন।',
        'ইশতারাও বিআ-য়া-তিল্লা-হি ছামানান কালীলান ফাসাদ্দূ‘আন ছাবীলিহী ইন্নাহুম ছাআ মা-কা-নূইয়া‘মালূন।',
        'লা-ইয়ারকুবূনা ফী মু’মিনিন ইল্লাওঁ ওয়ালা-যিম্মাতাওঁ ওয়া উলাইকা হুমুল মু‘তাদুন।',
        'ফাইন তা-বূওয়া আকা-মুস সালা-তা ওয়া আ-তাউঝঝাকা-তা ফাইখওয়া-নুকুম ফিদদীনি ওয়ানুফাসসিলুল আ-য়া-তি লিকাওমিইঁ ইয়া‘লামূন।',
        'ওয়া ইন নাকাছূদ্মআইমা-নাহুম মিম বা‘দি ‘আহদিহিম ওয়া তা‘আনূফী দীনিকুম ফাকাতিলূআইম্মাতাল কুফরি ইন্নাহুম লা-আইমা-না লাহুম লা‘আল্লাহুম ইয়ানতাহূন।',
        'আলা-তুকা-তিলূনা কাওমান্নাকাছুদ্মআইমা-নাহুম ওয়া হাম্মূবিইখরা-জির রাছূলি ওয়া হুম বাদাউকুম আওওয়ালা মাররাতিন আতাখশাওনাহুম ফাল্লা-হু আহাক্কুআনতাখশাওহু ইন কুনতুম মু’মিনীন।',
        'কা-তিলূহুম ইউ‘আযযিবহুমুল্লা-হু বিআইদীকুম ওয়া ইউখঝিহিম ওয়াইয়ানসুরকুম‘আলাইহিম ওয়া ইয়াশফি সুদূরা কাওমিম মু’মিনীন।',
        'ওয়া ইউযহিব গাইজা কুলূবিহিম ওয়া ইয়াতূবুল্লা-হু ‘আলা-মাইঁ ইয়াশাউ ওয়াল্লা-হু ‘আলীমুন হাকীম।',

        'আফামান আছছাছা বুনইয়া-নাহূ‘আলা-তাকওয়া-মিনাল্লা-হি ওয়া রিদাওয়া-নিন খাইরুন আম্মান আছছাআ বুনইয়া-নাহূ‘আলা-শাফা-জুরুফিন হা-রিন ফানহা-রা বিহী ফী না-রি জাহান্নামা ওয়াল্লা-হু লা-ইয়াহদিল কাওমাজ্জা-লিমীন।',
        'লা-ইঝা-লুবুনইয়া-নুহুমুল্লাযী বানাও রীবাতান ফী কুলূবিহিম ইল্লা-আন তাকাত্তা‘আ কুলূবুহুম ওয়াল্লা-হু ‘আলীমুন হাকীম।',
        'ইন্নাল্লা-হাশতারা-মিনাল মু’মিনীনা আনফুছাহুম ওয়া আমওয়া-লাহুম বিআন্না লাহুমুলজান্নাতা ইউকা-তিলূনা ফী ছাবীলিল্লা-হি ফাইয়াকতুলূনা ওয়া ইউকতালূনা ওয়া‘দান আলাইহি হাককান ফিততাওরা-তি ওয়াল ইনজীলি ওয়াল কুরআ-নি ওয়া মান আওফাবি‘আহদিহী মিনাল্লা-হি ফাছতাবশিরূ ব্বিাই‘ইকুমুল্লাযী বা-ইয়া‘তুম বিহী ওয়া যা-লিকা হুওয়াল ফাওঝুল ‘আজীম।',
        'আত্তাইবূনাল ‘আ-বিদূ নাল হা-মিদূ নাছছা-ইহুনার রা-কি‘ঊনাছছা-জিদূ নাল আ-মিরূনা বিলামা‘রূফি ওয়ান্না-হুনা ‘আনিল মুনকারি ওয়াল হা-ফিজূনা লিহুদূ দিল্লা-হি ওয়া বাশশিরিল মু’মিনীন।',
        'মা-কা-না লিন্নাবিইয়ি ওয়াল্লাযীনা আ-মানূআইঁ ইয়াছতাগফিরূ লিলমুশরিকীনা ওয়ালাও কানূউলী কুরবা-মিম বা‘দি মা-তাবাইইয়ানা লাহুম আন্নাহুম আসহা-বুল জাহীম।',
        'ওয়া মা-কানাছতিগফা-রু ইবরা-হীমা লিআবীহি ইল্লা-‘আম মাও ‘ইদাতিওঁ ওয়া‘আদহাইইয়া-হু ফালাম্মা-তাবাইইয়ানা লাহূআন্নাহূ‘আদুওউল লিল্লা-হি তাবাররাআমিনহু ইন্না ইবরা-হীমা লা আওওয়া-হুন হালীম।',
        'ওয়া মা-কা-নাল্লা-হু লিইউদিল্লা কাওমাম বা‘দা ইযহাদা-হুম হাত্তা-ইউবাইয়িনা লাহুম মা-ইয়াত্তাকূন্না ইন্নাল্লা-হা বিকুল্লি শাইয়িন ‘আলীম।',
        'ইন্নাল্লা-হা লাহূমুলকুছছামা-ওয়া-তি ওয়াল আরদি ইউহয়ী ওয়া ইউমীতু ওয়া মা লাকুম মিন দূ নিল্লা-হি মিওঁ ওয়ালিইয়িওঁ ওয়ালা-নাসীর।',
        'লাকাততা-বাল্লা-হু ‘আলান্নাবিইয়ি ওয়াল মুহা-জিরীনা ওয়াল আনসা-রিল্লাযীনাত তাবা‘ঊহু ফী ছা-‘আতিল ‘উছরাতি মিম বা‘দি মা-কা-দা ইয়াঝীগু কুলূবুফারীকিম মিনহুম ছুম্মা তাবা ‘আলাইহিম ইন্নাহূবিহিমি রাঊফুর রাহীম।',
        'ওয়া ‘আলাছছালা-ছাতিল্লাযীনা খুলিলফূ হাত্তা-ইযা-দা-কাত ‘আলাইহিমুল আরদু বিমা-রাহুবাত ওয়াদা-কাত ‘আলাইহিম আনফুছুহুম ওয়া জান্নূআল্লা-মালজাআ মিনাল্লাহি ইল্লাইলাইহি ছু ম্মা তা-বা ‘আলাইহিম লিইয়াতূবূ ইন্নাল্লা-হু হুওয়াততাওওয়া-বুর রাহীম।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানুত্তাকুল্লা-হা ওয়াকূনূমা‘আসসা-দিকীন।',
        'মা-কা-না লিআহলিল মাদীনাতি ওয়া মান হাওলাহুম মিনাল আ‘রা-বি আইঁ ইয়াতাখাল্লাফূ ‘আর রাছূলিল্লা-হি ওয়ালা-ইয়ারগাবূবিআনফুছিহিম ‘আন নাফছিহী যা-লিকা বিআন্নাহুম লা-ইউসীবুহুম জামাঊওঁ ওয়ালা-নাসাবুওঁ ওয়ালা-মাখমাসাতুন ফী ছাবীলিল্লাহি ওয়লা ইয়াতাঊনা মাওতিআইঁ ইয়াগিজুল কুফফারা ওয়ালা ইয়ানালূনা মিন ‘আদুবিন নাইলান ইল্লা কুতিবা লাহুম বিহী ‘আমালুন সা-লিহুন ইন্নাল্লা-হা লা-ইউদী‘উ আজারাল মহছিনীন।',
        'ওয়ালা-ইউনফিকূ না নাফাকাতান সাগীরাতাওঁ ওয়ালা- কাবীরাতাওঁ ওয়ালা- ইয়াকতা‘ঊনা ওয়া-দিয়ান ইল্লা-কুতিবা লাহুম লিইয়াজঝিয়াহুমুল্লা-হু আহছানা মা-কা-নূইয়া‘মালূন।',
        'ওয়ামা-কা-নাল মু’মিনূনা লিইয়ানফিরু কাফফাতান ফালাওলা-নাফারা মিন কুল্লি ফিরকাতিম মিনহুম তাইফাতুল লিইয়াতাফাক্কাহূফিদদীনি ওয়ালিইউনযিরূ কাওমাহুম ইযা-রাজা‘উইলাইহিম লা‘আল্লাহুম ইয়াহযারূন।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূকা-তিলুল্লাযীনা ইয়ালূনাকুম মিনাল কুফফা-রি ওয়াল ইয়াজিদূফীকুম গিলজাতাওঁ ওয়া‘লামূআন্নাল্লা-হা মা‘আল মুত্তাকীন।',
        'ওয়া ইযা-মা উনঝিলাত ছূরাতুন ফামিনহুম মাইঁ ইয়াকূলুআইয়ুকুম ঝা-দাতহু হা-যিহী ঈমানান ফাআম্মাল্লাযীনা আ-মানূফাঝা-দাতহুম ঈমা-নাওঁ ওয়াহুম ইয়াছতাবশিরূন।',
        'ওয়াআম্মাল্লাযীনা ফী কুলূবিহিম মারাদুন ফাঝা-দাতহুম রিজছান ইলা-রিজছিহিম ওয়ামা-তূ ওয়াহুম কা-ফিরূন।',
        'আওয়ালা-ইয়ারাওনা আন্নাহুম ইউফতানূনা ফী কুল্লি ‘আমিম মাররাতান আও মাররাতাইনি ছু ম্মা লা-ইয়াতূবূনা ওয়ালা-হুম ইয়াযযাক্কারূন।',
        'ওয়া ইযা-মাউনঝিলাত ছূরাতুন নাজারা বা‘দুহুম ইলা-বা‘দিন হাল ইয়ারা-কুম মিন আহাদিন ছু ম্মান সারাফূ সারাফাল্লা-হু কুলূবাহুম বিআন্নাহুম কাওমুল লা-ইয়াফকাহূন।',
        'লাকাদ জাআকুমরাছূলুমমিনআনফুছিকুম ‘আঝীঝুন‘আলাইহিমা-‘আনিত্তুম হারীসুন ‘আলাইকুম বিল মু’মিনীন রাঊফুর রাহীম।',
        'ফাইন তাওয়াল্লাও ফাকুল হাছবিয়াল্লা-হু লা-ইলা-হা ইল্লা-হুওয়া ‘আলাইহি তাওয়াক্কালতু ওয়া হুওয়া রাব্বুল ‘আরশিল ‘আজীম।'
      ],
      10: [
        'আলিফ লাম রা- তিলকা আ-য়া-তুল কিতা-বিল হাকীম।',
        'আকা-না লিন্না-ছি ‘আজাবান আন আওহাইনাইলা-রাজুলিম মিনহুম আন আনযিরিন্না-ছা ওয়া বাশশিরিল্লাযীনা আ-মানূআন্না লাহুম কাদামা সিদকিন ‘ইনদা রাব্বিহিম কা-লাল কা-ফিরূনা ইন্না হা-যা-লাছা-হিরুম মুবীন।',
        'ইন্না রাব্বাকুমুল্লা-হুল্লাযী খালাকাছ ছামা-ওয়া-তি ওয়াল আরদা ফী ছিত্তাতি আইয়া-মিন ছু ম্মাছতাওয়া-‘আলাল ‘আরশি ইউদাব্বিরুল আমরা মা-মিন শাফী‘ইন ইল্লা-মিম বা‘দি ইযনিহী যা-লিকুমুল্লা-হু রাব্বুকুম ফা‘বুদূ হু আফালা-তাযাক্কারূন।',
        'ইলাইহি মারজি‘উকুম জামী‘আওঁ ওয়া‘দাল্লা-হি হাক্কান ইন্নাহূইয়াবদাউল খালকা ছুম্মা ইউ‘ঈদুহূলিইয়াজঝিয়াল্লাযীনা আ-মানূওয়া আ‘মিলুসসা-লিহা-তি বিলকিছতি ওয়াল্লাযীনা কাফারূলাহুম শারা-বুম মিন হামীমিওঁ ওয়া ‘আযা-বুন আলীমুম বিমা-কা-নূ ইয়াকফুরূন।',
        'হুওয়াল্লাযী জা‘আলাশশামছা দিয়াআওঁ ওয়ালকামারা নূরাওঁ ওয়াকাদ্দারাহূমানা-ঝিলা লিতা‘লামূ‘আদাদাছ ছিনীনা ওয়ালহিছা-বা মা-খালাকাল্লা-হু যা-লিকা ইল্লাবিলহাক্কি ইউফাসসিলুল আ-য়া-তি লিকাওমিইঁ ইয়া‘লামূন।',
        'ইন্না ফিখতিলা-ফিল্লাইলি ওয়ান্নাহা-রি ওয়ামা-খালাকাল্লা-হু ফিছছামা-ওয়া-তি ওয়াল আরদি লাআ-য়া-তিল লিকাওমিইঁ ইয়াত্তাকূন।',
        'ইন্নাল্লাযীনা লা-ইয়ারজূনা লিকাআনা-ওয়া রাদূবিলহায়া-তিদ দুনইয়া-ওয়াতমাআননূ বিহা-ওয়াল্লাযীনা হুম ‘আন আ-য়া-তিনা-গা-ফিলূন।',
        'উলাইকা মা‘ওয়া-হুমুন্না-রু বিমা-কা-নূইয়াকছিবূন।',
        'ইন্নাল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি ইয়াহদীহিম রাব্বুহুম বিঈমা-নিহিম তাজরী মিন তাহতিহিমুল আনহা-রু ফী জান্না-তিন না‘ঈম।',
        'দা‘ওয়া-হুম ফীহা-ছুবহা-নাকাল্লা-হুম্মা ওয়া তাহিইয়াতুহুম ফীহা-ছালা-মুওঁ ওয়া আখিরু দা‘ওয়া-হুম ‘আনিল হামদুলিল্লা-হি রাব্বিল ‘আ-লামীন।',

        'ফালইয়াওমা নুনাজজীকা ব্বিাদানিকা লিতাকূনা লিমান খালফাকা আ-য়াতাওঁ ওয়া ইন্না কাছীরাম মিনান না-ছি ‘আন আ-য়া-তিনা-লাগা-ফিলূন।',
        'ওয়া লাকাদ বাওওয়া’না-বানীইছরাঈলা মুবাওওয়াআ সিদকিওঁ ওয়া-রাঝাকনা-হুম মিনাততাইয়িবা-তি ফামাখ তালাফূহাত্তা-জাআহুমুল ‘ইলমু ইন্না রাব্বাকা ইয়াকদী বাইনাহুম ইয়াওমাল কিয়া-মাতি ফীমা-কা-নূফীহি ইয়াখতালিফূন।',
        'ফাইন কুনতা ফী শাক্কিম মিম্মা আনঝালনা ইলাইকা ফাছআলিল্লাযীনা ইয়াকরাঊনাল কিতাবা মিন কাবলিকা লাকাদ জাআকাল হাক্কুমির রাব্বিকা ফালা-তাকূনান্না মিনাল মুমতারীন।',

        'ইন্নাল্লাযীনা হাক্কাত ‘আলাইহিম কালিমাতুরাব্বিকা লা-ইউ’মিনূন।',
        'ওয়ালাও জাআতহুম কুল্লুআ-য়াতিন হাত্তা-ইয়ারাউল ‘আযা-বাল আলীম।',
        'ফালাওলা-কা-নাত কারইয়াতুন আ-মানাত ফানাফ‘আহাঈমা-নুহা ইল্লা-কাওমা ইঊনুছা লাম্মা আ-মানূকাশাফনা-‘আনহুম ‘আযা-বাল খিঝয়ি ফিল হায়া-তিদদুনইয়াওয়ামাত্তা‘না-হুম ইলা-হীন।',
        'ওয়ালাও শাআ রাব্বুকা লাআ-মানা মান ফিল আরদিকুল্লুহুম জামী‘আন আফাআনতা তুকরিহুন্না-ছা হাত্তা-ইয়াকূনূমু’মিনীন।',

        'ফাহাল ইয়ানতাজিরূনা ইল্লা-মিছলা আইইয়া-মিল্লাযীনা খালাও মিন কাবলিহিম কুল ফানতাজিরূ ইন্নী মা‘আকুম মিনাল মুনতাজিরীন।',
        'ছুম্মা নুনাজ্জী রুছুলানা-ওয়াল্লাযীনা আ-মানূ কাযা-লিকা হাক্কান ‘আলাইনা-নুনজিল মু’মিনীন।',
        'কুল ইয়া আইয়ুহান্না-ছুইন কুনতুম ফী শাক্কিম মিন দীনী ফালা-আ‘বুদুল্লাযীনা তা‘বুদূ না মিন দূ নিল্লা-হি ওয়ালা-কিন আ‘বুদুল্লা-হা ল্লাযী ইয়াতাওয়াফফা-কুম ওয়া উমিরতুআন আকূনা মিনাল মু’মিনীন।',
        'ওয়া আন আকিম ওয়াজহাকা লিদ্দীনি হানীফাওঁ ওয়ালা-তাকূনান্না মিনাল মুশরিকীন।',
        'ওয়ালা-তাদ‘উ মিন দূ নিল্লা-হি মা-লা-ইয়ানফা‘উকা ওয়ালা-ইয়াদুররুকা ফাইন ফা‘আলতা ফাইন্নাকা ইযাম মিনাজ্জা-লিমীন।',
        'ওয়াইয়ঁইয়ামছাছকাল্লা-হু বিদুররিন ফালা-কা-শিফা লাহূ ইল্লা-হুওয়া ওয়া ইয়ঁ ইউরিদকা বিখাইরিন ফালা-রাদ্দা লিফাদলিহী ইউসীবুবিহী মাইঁ ইয়াশাউ মিন ‘ইবাদিহী ওয়া হুওয়াল গাফূরুর রাহীম।',
        'কুল ইয়াআইয়ুহান্না-ছুকাদ জাআকুমুল হাক্কুমির রাব্বিকুম ফামানিহতাদাফাইন্নামা-ইয়াহতাদী লিনাফছিহী ওয়া মান দাল্লা ফাইন্নামা-ইয়াদিল্লু‘আলাইহা- ওয়ামাআনা-‘আলাইকুম বিওয়াকীল।',
        'ওয়াত্তাবি‘ মা ইঊহাইলাইকা ওয়াসবির হাত্তা-ইয়াহকুমাল্লা-হু ওয়া হুওয়া খাইরুল হা-কিমীন।'

      11: [
        'আলিফ লামরা-,কিতা-বুনউহকিমাত আ-য়া-তুহূছু ম্মা ফুসসিলাত মিল্লাদুনহাকীমিন খাবীর।',

        'ওয়া হুওয়াল্লাযীখালাকাছছামা-ওয়া-তি ওয়াল আরদাফী ছিত্তাতি আইয়া-মিওঁ ওয়া কা-না ‘আরশুহূ‘আলাল মাই লিইয়াবলুওয়াকুম আইয়ুকুম আহছানু‘আমালাওঁ ওয়ালাইন কুলতা ইন্নাকুম মাব‘ঊছূনা মিম বা‘দিল মাওতি লাইয়াকূলান্নাল্লাযীনা কাফারূইন হা-যাইল্লা-ছিহরুম মুবীন।',
        'ওয়া লাইন আখখারনা-‘আনহুমুল ‘আযা-বা ইলাউম্মাতিম মা‘দূদাতিল লাইয়াকূলুন্না মাইয়াহবিছুহূ আলা-ইয়াওমা ইয়া’তীহিম লাইছা মাছরূফান ‘আনহুম ওয়া হা-কা বিহীম মা-কা-নূবিহী ইয়াছতাহঝিঊ-ন।',
        'ওয়ালাইন আযাকনাল ইনছা-না মিন্না-রাহমাতান ছুম্মা নাঝা‘না-হা-মিনহু ইন্নাহূ লাইয়াঊছুন কাফূর।',
        'ওয়ালাই আযাকনা-হু না‘মাআ বা‘দা দাররাআ মাছছাতহু লাইয়াকূলান্না যাহাবাছ ছাইয়িআ-তু‘আন্নী ইন্নাহূলাফারিহুন ফাখূর।',

        'ফালা‘আল্লাকা তা-রিকুম বা‘দা মা-ইঊহাইলাইকা ওয়া দাইকুম বিহী সাদরুকা আইঁ ইয়াকূলূলাওলাউনঝিলা ‘আলাইহি কানঝুন আও জাআ মা‘আহূমালাকুন ইন্নামা আনতা নাযীরুওঁ ওয়াল্লা-হু ‘আলা-কুল্লি শাইইওঁ ওয়াকীল।',

        'ফাইল্লাম ইয়াছতাজীবূলাকুম ফা‘লামূআন্নামাউনঝিলা বি‘ইলমিল্লা-হি ওয়া আল্লাইলা-হা ইল্লা-হুওয়া ফাহাল আনতুম মুছলিমূন।',
        'মান কা-না ইউরীদুলহায়া-তাদদুনইয়া-ওয়াঝীনাতাহা-নুওয়াফফি ইলাইহিম আ‘মা-লাহুম ফীহা-ওয়াহুম ফীহা-লা-ইউবখাছূন।',
        'উলাইকাল্লাযীনা লাইছা লাহুম ফিল আ-খিরাতি ইল্লান্না-রু ওয়া হাবিতা মা-সানা‘ঊ ফীহা-ওয়া বা-তিলুম মা-কা-নূইয়া‘মালূন।',

        'ইন্না ফী যা-লিকা লাআ-য়াতাল লিমান খা-ফা ‘আযা-বাল আ-খিরাতি যা-লিকা ইয়াওমুম মাজমূ‘উল্লাহুন্না-ছুওয়া যা-লিকা ইয়াওমুম মাশহুদ।',
        'ওয়ামা-নুআখখিরুহূ ইল্লা-লিআজালিম মা‘দূদ।',
        'ইয়াওমা ইয়া\'তি লা-তাকাল্লামুনাফছুন ইল্লা-বিইযনিহী ফামিনহুম শাকিইইউঁওয়াছা‘ঈদ।',
        'ফাআম্মাল্লাযীনা শাকূফাফিন্না-রি লাহুম ফীহা-ঝাফীরুওঁ ওয়া শাহীক।',
        'খা-লিদীনা ফীহা-মা-দা-মাতিছছামা-ওয়া-তুওয়াল আরদুইল্লা-মা-শাআ রাব্বুকা ইন্না রাব্বাকা ফা‘‘আ-লুলিলমা-ইউরীদ।',
        'ওয়াআম্মাল্লাযীনা ছু‘ইদূফাফিল জান্নাতি খা-লিদীনা ফীহা-মা-দা-মাতিছছামা-ওয়া-তু ওয়াল আরদুইল্লা-মা-শাআ রাব্বুকা; ‘আতা-আন গাইরা মাজযূয।',
        'ফালা-তাকুফী মিরইয়াতিম মিম্মা-ইয়া‘বুদুহাউলাই মা-ইয়া‘বুদূ না ইল্লা-কামাইয়া‘বুদুআ-বাউহুম মিন কাবলু ওয়া ইন্না-লামুওয়াফফূহুম নাসীবাহুম গাইরা মানকূস।',
        'ওয়া লাকাদ আ-তাইনা-মুছাল কিতা-বা ফাখতুলিফা ফীহি ওয়া লাওলা-কালিমাতুন ছাবাকাত মির রাব্বিকা লাকুদিয়া বাইনাহুম ওয়া ইন্নাহুম লাফী শাক্কিম মিনহু মুরীব।',
        'ওয়া ইন্না কুল্লাল লাম্মা-লাইউওয়াফফিয়ান্নাহুম রাব্বুকা আ‘মা-লাহুম ইন্নাহূবিমাইয়া‘মালূনা খাবীর।',
        'ফাছতাকিম কামাউমিরতা ওয়ামান তা-বা মা‘আকা ওয়ালা-তাতগাও ইন্নাহূবিমাতা‘মালূনা বাসীর।',
        'ওয়ালা-তারকানূইলাল্লাযীনা জালামূফাতামাছছাকুমুন্না-রু ওয়ামা-লাকুমমিনদূনিল্লা-হি মিন আউলিয়াআ ছুম্মা লা-তুনসারূন।',
        'ওয়া আকিমিসসালা-তা তারাফাইন্নাহা-রি ওয়া ঝুলাফাম মিনাল্লাইলি ইন্নাল হাছানা-তি ইউযহিবনাছ ছাইয়িআ-তি যা-লিকা যিকরা-লিযযা-কিরীন।',
        'ওয়াসবির ফাইন্নাল্লা-হা লা-ইউদী‘উ আজরাল মুহছিনীন।',
        'ফালাওলা-কা-না মিনাল কুরূনি মিন কাবলিকুম ঊলূবাকিইইয়াতিইঁ ইয়ানহাওনা ‘আনিল ফাছা-দি ফিল আরদিইল্লা-কালীলাম মিম্মান আনজাইনা-মিনহুম ওয়াত্তাবা‘আল্লাযীনা জালামুমাউতরিফূফীহি ওয়াকা-নূমুজরীমিন।',
        'ওয়ামা-কা-না রাব্বুকা লিইউহলিকাল কুরা- বিজু লমিওঁ ওয়া আহলুহা-মুসলিহুন।',
        'ওয়া লাও শাআ রাব্বুকা লাজা‘আলান্না-ছা উম্মাতাওঁ ওয়া-হিদাতাওঁ ওয়ালা-ইয়াঝা-লূনা মুখতালিফীন।',
        'ইল্লা-মার রাহিমা রাব্বুকা ওয়া লিযা-লিকা খালাকাহুম ওয়া তাম্মাত কালিমাতু রাব্বিকা লাআমলাআন্না জাহান্নামা মিনাল জিন্নাতি ওয়ান্না-ছি আজমা‘ঈন।',
        'ওয়াকুল্লান নাকুসসু‘আলাইকা মিন আমবাইর রুছুলি মা-নুছাব্বিতুবিহী ফুআ-দাকা ওয়া জাআকা ফীহা-যিহিল হাক্কুওয়া মাও‘ইজাতুওঁ ওয়া যিকরা-লিলমু’মিনীন।',
        'ওয়া কুল লিল্লাযীনা লা- ইউ’মিনূনা‘মালূ‘আলা-মাকা-নাতিকুম ইন্না-‘আ-মিলূন।',
        'ওয়ানতাজিরু ইন্না-মুনতাজিরূন।',
        'ওয়ালিল্লা-হি গাইবুছছামা-ওয়া-তি ওয়াল আরদিওয়া ইলাইহি ইউরজা‘উল আমরু কুল্লুহূ ফা‘বুদহু ওয়া তাওয়াক্কাল ‘আলাইহি ওয়ামা-রাব্বুকা বিগা-ফিলিন ‘আম্মা-তা‘মালূন।'

      12: [
        'আলিফ লাম রা- তিলকা আ-য়া-তুল কিতা-বিল মুবীন।',
        'ইন্নাআনঝালনা-হু কুরআ-নান ‘আরাবিইইয়াল লা‘আল্লাকুম তা‘কিলূন।',
        'নাহনুনাকুসসু‘আলাইকা আহছানাল কাসাসি বিমাআওহাইনাইলাইকা হা-যাল কুরআনা ওয়া ইন কুনতা মিন কাবলিহী লামিনাল গা-ফিলীন।',
        'ইয কা-লা ইঊছুফুলিআবীহি ইয়াআবাতি ইন্নী রাআইতু আহাদা ‘আশারা কাওকাবাওঁ ওয়াশশামছা ওয়াল কামারা রাআইতুহুম লী ছা-জিদীন।',
        'কা-লা ইয়া-বুনাইইয়া লা-তাকসুস রু’ইয়া-কা ‘আলা-ইখওয়াতিকা ফাইয়াকীদূলাকা কাইদান ইন্নাশশাইতা-না লিলইনছা-নি ‘আদুওউম মুবীন।',
        'ওয়া কাযা-লিকা ইয়াজতাবীকা রাব্বুকা ওয়া ইউ‘আলিলমুকা মিন তা’বীলিল আহা-দীছিওয়া ইউতিম্মুনি‘মাতাহূ‘আলাইকা ওয়া ‘আলা-আ-লি ইয়া‘কূবা কামাআতাম্মাহা‘আলাআবাওয়াইকা মিন কাবলুইবরা-হীমা ওয়া ইছহা-কা ইন্না রাব্বাকা ‘আলীমুন হাকীম।',
        'লাকাদ কা-না ফী ইঊছুফা ওয়া ইখওয়াতিহীআ-য়া-তুল লিছছাইলীন।',
        'ইযকা-লূলাইঊছুফুওয়া আখূহু আহাব্বুইলাআবীনা-মিন্না-ওয়া নাহনু‘উসবাতুন ইন্না আবা-না-লাফী দালা-লিম মুবীন।',
        'উকতুলূইঊছুফা আবিতরাহূহুআরদাইঁ ইয়াখলুলাকুম ওয়াজহু আবীকুম ওয়াতাকূনূমিম বা‘দিহী কাওমান সা-লিহীন।',
        'কা-লা কাইলুমমিনহুমলা-তাকতুলূইঊছুফা ওয়া আলকুহুফীগায়া-বাতিল জুব্বি ইয়ালতাকিতহু বা‘দুছছাইইয়া-রাতি ইন কুনতুম ফা-‘ইলীন।',
        'কা-লূইয়াআবা-না-মা-লাকা লা-তা‘মান্না-‘আলা-ইঊছুফা ওয়া ইন্না-লাহূলানা-সিহূন।',
        'আরছিলহু মা‘আনা-গাদাইঁ ইয়ারতা‘ ওয়া ইয়াল‘আব ওয়া ইন্না-লাহূলাহাফিজূন।',
        'কা-লা ইন্নী লাইয়াহঝুনুনীআন তাযহাবূবিহী ওয়া আখা-ফূআইঁ ইয়া’কুলাহুযযি‘বুওয়া আনতুম ‘আনহু গা-ফিলূন।',
        'কা-লূলাইন আকালাহুযযি’বুওয়া নাহনু‘উসবাতুন ইন্নাইযাল লাখা-ছিরূন।',
        'ফালাম্মা-যাহাবূবিহী ওয়া আজমা‘উআইঁ ইয়াজ‘আলূহু ফী গায়া-বাতিল জুব্বি ওয়া আওহাইনাইলাইহি লাতুনাব্বিআন্নাহুম বিআমরিহিম হা-যা-ওয়াহুম লা-ইয়াশ‘উরূন।',
        'ওয়া জাঊআবা-হুম ‘ইশাআইঁ ইয়াবকূন।',
        'কা-লূইয়াআবা-নাইন্না-যাহাবনা-নাছতাবিকুওয়া তারাকনা-ইঊছুফা ‘ইনদা মাতা-‘ইনাফাআকালাহুযযি’বু ওয়ামাআনতা বিমু’মিনিল লানা-ওয়ালাও কুন্না-সা-দিকীন।',
        'ওয়া জাঊ ‘আলা-কামীসিহী বিদামিন কাযিবিন কা-লা বাল ছাওওয়ালাত লাকুম আনফুছুকুম আমরান ফাসাবরুন জামীলুওঁ ওয়াল্লা-হুল মুছতা‘আ-নু‘আলা-মাতাসিফূন।',
        'ওয়া জাআত ছাইইয়া-রাতুন ফাআরছালূওয়া-রিদাহুম ফাআদলা-দালওয়াহূ কা-লা ইয়া-বুশরা-হা-যা-গুলা-মুওঁ ওয়া আছাররূহু বিদা-‘আতাওঁ ওয়াল্লা-হু ‘আলীমুম বিমা-ইয়া‘মালূন।',
        'ওয়া শারাওহু বিছামানিম বাখছিন দারা-হিমা মা‘দূদাতিওঁ ওয়া কা-নূফীহি মিনাঝঝাহিদীন।',
        'ওয়া কা-লাল্লাযিশ তারা-হু মিম মিসরা লিমরাআতিহীআকরিমী মাছওয়াহু ‘আছাআইঁ ইয়ানফা‘আনাআও নাত্তাখিযাহূওয়ালাদাওঁ ওয়া কাযা-লিকা মাক্কান্না-লিইঊছুফা ফিল আরদি ওয়া লিনু‘আলিল মাহূমিন তা’বীলিল আহা-দীছি ওয়াল্লা-হু গা-লিবুন ‘আলাআমরিহী ওয়ালা-কিন্না আকছারা-ন্না-ছি লা-ইয়া‘লামূন।',
        'ওয়া লাম্মা-বালাগা আশুদ্দাহূআ-তাইনা-হু হুকমাওঁ ওয়া ‘ইলমাওঁ ওয়া কাযা-লিকা নাজঝিল মুহছিনীন।',
        'ওয়ারা-ওয়াদাত হুল্লাতী হুওয়া ফী বাইতিহা-‘আন নাফছিহী ওয়া গাল্লাকাতিল আবওয়া-বা ওয়াকা-লাত হাইতা লাকা কা-লা মা‘আ-যাল্লা-হি ইন্নাহূরাববী-আহছানা মাছওয়াইয়া; ইন্নাহূলা-ইউফলিহুজ্জা-লিমূন।',

        'ওয়ামা তাছআলুহুম ‘আলাইহি মিন আজরিন ইন হুওয়া ইল্লা-যিকরুল লিল‘আ-লামীন।',
        'ওয়া কাআইয়িম মিন আ-য়াতিন ফিছছামা-ওয়া-তি ওয়াল আরদি ইয়ামুররূনা ‘আলাইহাওয়াহুম ‘আনহা-মু‘রিদূ ন।',
        'ওয়ামা-ইউ’মিনুআকছারুহুম বিল্লা-হি ইল্লা-ওয়াহুম মুশরিকূন।',
        'আফাআমিনূআন তা’তিয়াহুম গা-শিয়াতুমমিন‘আযা-বিল্লা-হি আও তা‘তিয়াহুমুছছা-‘আতু বাগতাতাওঁ ওয়াহুম লা-ইয়াশ‘উরূন।',
        'কুল হা-যিহী ছাবীলীআদ‘ঊইলাল্লা-হি ‘আলা-বাসীরাতিন আনা ওয়া মানিত্তাবা‘আনী ওয়া ছুবহা-নাল্লা-হি ওয়ামাআনা মিনাল মুশরিকীন।',
        'ওয়ামাআরছালনা-মিন কাবলিকা ইল্লা-রিজা-লাননূহীইলাইহিম মিন আহলিল কুরা- আফালাম ইয়াছীরূফিল আরদিফাইয়ানজুরূ কাইফা কা-না ‘আ-কিবাতুল্লাযীনা মিন কাবলিহিম ওয়ালাদা-রুল আ-খিরাতি খাইরুল লিল্লাযী নাত্তাকাও আফালাতা‘কিলূন।',
        'হাত্তা ইযাছতাইআছাররুছুলুওয়া জান্নূআন্নাহুম কাদ কুযিবূজাআহুম নাসরুনা- ফানুজ্জিয়া মান্নাশাউ ওয়ালা-ইউরাদ্দুবা’ছুনা-‘আনিল কাওমিল মুজরিমীন।',
        'লাকাদ কা-না ফী কাসাসিহিম ‘ইবরাতুল লিঊলিল আলবা-বি মা-কা-না হাদীছাইঁ ইউফতারা-ওয়া লা-কিন তাসদাকাল্লাযী বাইনা ইয়াদইহি ওয়া তাফসীলা কুল্লি শাইইওঁ ওয়া হুদাও ওয়া রাহমাতাল লিকাওমিইঁ ইউ’মিনূন।'
      ],
      13: [
        'আলিফ লাম মী-ম রা- তিলকা আ-য়া-তুল কিতা-বি ওয়াল্লাযীউনঝিলা ইলাইকা মির রাব্বিকাল হাক্কুওয়ালা-কিন্না আকছারান্না-ছি লা-ইউ’মিনূন।',
        'আল্লা-হুল্লাযীরাফা‘আছছামা-ওয়া-তি বিগাইরি ‘আমাদিন তারাওনাহা- ছু ম্মাছ তাওয়া ‘আলাল ‘আরশি ওয়া ছাখখারাশশামছা ওয়াল কামারা কুল্লুইঁ ইয়াজরী লিআজালিম মুছাম্মা- ইউদাব্বিরুল আমরা ইউফাসসিলুল আ-য়া-তি লা‘আল্লাকুম বিলিকাই রাব্বিকুম তূকিনূন।',
        'ওয়া হুওয়াল্লাযী মাদ্দাল আরদা ওয়া জা‘আলা ফীহা-রাওয়া-ছিয়া ওয়াআনহা-রাওঁ ওয়া মিন কুল্লিছছামারা-তি জা‘আলা ফীহা- ঝাওজাইনিছনাইনি ইউগশিল লাইলান্নাহা-র ইন্না ফী যা-লিকা লা আ-য়া-তিল লিকাওমিইঁ ইয়াতাফাক্কারূন।',
        'ওয়া ফিল আরদিকিতা‘উম মুতাজা-বিরা-তুওঁ ওয়া জান্না-তুম মিন আ‘না-বিওঁ ওয়া ঝার‘উওঁ ওয়া নাখীলুন সিনওয়া-নুওঁ ওয়া গাইরু সিনওয়া-নিইঁ ইউছকা- বিমাইওঁ ওয়াহিদিওঁ ওয়া নুফাদদিলুবা‘দাহা- ‘আলা-বা‘দিন ফিল উকুলি ইন্না ফী যালিকা লাআ-য়া-তিল লিকাওমিইঁ ইয়া‘কিলূন।',
        'ওয়া ইন তা‘জাব ফা‘আজাবুন কাওলুহুম আইযা-কুন্না-তুরা-বান আইন্না-লাফী খালকিন জাদীদিন উলাইকাল্লাযীনা কাফারু বিরাব্বিহিম ওয়া উলাইকাল আগলা-লু ফীআ‘না-কিহিম ওয়া উলাইকা আসহা-বুন্না-রি হুম ফীহা- খা-লিদূ ন।',
        'ওয়া ইয়াছতা‘জিলূনাকা বিছছাইয়িআতি কাবলাল হাছানাতি ওয়া কাদ খালাত মিন কাবলিহিমুল মাছুলা-তু ওয়া ইন্না রাব্বাকা লাযূমাগফিরাতিললিন্না-ছি ‘আলাজু লমিহিম ওয়া ইন্না রাব্বাকা লাশাদীদুল ‘ইকা-ব।',
        'ওয়া ইয়াকূলুল্লাযীনা কাফারূ লাওলাউনঝিলা ‘আলাইহি আ-য়াতুম মির রাব্বিহী ইন্নামা আনতা মুনযিরুওঁ ওয়া লিকুল্লি কাওমিন হা-দ।',
        'আল্লা-হু ইয়া‘লামুমা-তাহমিলুকুল্লুউনছা-ওয়ামা-তাগীদুল আরহা-মুওয়ামা-তাঝদা-দু ওয়া কুল্লুশাইইন ‘ইনদাহূবিমিকদা-র।',
        '‘আ-লিমুল গাইবি ওয়াশশাহা-দাতিল কাবীরুল মুতা‘আ-ল।',
        'ছাওয়াউম মিনকুম মান আছাররাল কাওলা ওয়া মান জাহারা বিহী ওয়া মান হুওয়া মুছতাখফিম বিল্লাইলি ওয়া ছা-রিবুম বিন্নাহা-র।',
        'লাহূ মু‘আক্কিবা-তুম মিমবাইনি ইয়াদাইহি ওয়া মিনখালফিহী ইয়াহফাজূনাহূ মিন আমরিল্লাহি ইন্নাল্লা-হা লা-ইউগাইয়িরু মা-বিকাওমিন হাত্তা-ইউগাইয়িরূমা-বিআনফুছিহিম ওয়া ইযাআরা-দাল্লা-হু বিকাওমিন ছূআন ফালা-মারাদ্দা লাহূ ওয়ামা- লাহুম মিন দূ নিহী মিওঁ ওয়া-ল।',
        'হুওয়াল্লাযী ইউরীকুমুল বারকাখাওফাওঁ ওয়াতআমাওঁ ওয়া ইউনশিউছছাহা-বাছছিক ল।',
        'ওয়া ইউছাব বিহুর রা‘দুবিহামদিহী ওয়াল মালাইকাতুমিন খীফাতিহী ওয়া ইউরছিলুস সাওয়া-‘ইকা ফাইউসীবুবিহা- মাইঁ ইয়াশাউ ওয়া হুম ইউজা-দিলূনা ফিল্লা-হি ওয়া হুওয়া শাদীদুল মিহা -ল।',
        'লাহূদা‘ওয়াতুল হাক্কি ওয়াল্লাযীনা ইয়াদ‘ঊনা মিন দূ নিহী লা-ইয়াছতাজীবূনা লাহুম বিশাইইন ইল্লা- কাবা-ছিতিকাফ ফাইহি ইলাল মাই লিইয়াবলুগা-ফা-হু ওয়ামা-হুওয়া ব্বিা-লিগিহী ওয়ামা- দু‘আউল কা-ফিরীনা ইল্লা-ফী দালা-ল।',
        'ওয়ালিল্লা-হি ইয়াছজূদুমানফিছ ছামা-ওয়া-তি ওয়ালআরদিতাও‘আওঁ ওয়াকারহাওঁ ওয়া জিলা-লুহুম বিল গুদুওবিওয়াল আ-সা-ল। (সিজদা-২)',
        'কুল মার রাব্বুছ ছামা-ওয়া-তি ওয়াল আরদিকুল্লিলা-হু কুল আফাত্তাখাযতুম মিন দূ নিহীআওলিয়াআ লা-ইয়ামলিকূনা লিআনফুছিহিম নাফ‘আওঁ ওয়ালা-দাররান কুল হাল ইয়াছতাবিল আ‘মা-ওয়াল বাসীরু আম হাল তাছতাবিজজু লুমা-তুওয়াননূরু আম জা‘আলূলিল্লা-হি শুরাকাআ খালাকূকাখাল কিহী ফাতাশা-বাহাল খালকু ‘আলাইুহিম কুল্লিলা-হু খা-লিকুকুল্লি শাইয়িওঁ ওয়া হুওয়াল ওয়া-হিদুল কাহহা-র।',
        'আনঝালা মিনাছছামাই মাআন ফাছা-লাত আওদিয়াতুম বিকাদারিহা-ফাহতামালাছ ছাইলু ঝাবাদার রা-বিয়াওঁ ওয়া মিম্মা-ইউকিদূ না ‘আলাইহি ফিন্না-রিব তিগাআ হিলয়াতিন আও মাতা-‘ইন ঝাবাদুম মিছলুহূ কাযা-লিকা ইয়াদরিবুল্লা-হুল হাক্কা ওয়াল বাতিলা ফাআম্মাঝ ঝাবাদুফাইয়াযহাবুজুফাআওঁ ওয়া আম্মা-মা-ইয়ানফাউন্নাছা ফাইয়ামকুছু ফিল আরদি কাযা-লিকা ইয়াদরিবুল্লা-হুল আমছা-ল।',
        'লিল্লাযীনাছতাজা-বূলিরাব্বিহিমুল হুছনা- ওয়াল্লাযীনা লাম ইয়াছতাজীবূলাহূলাও আন্না লাহুম মা-ফিল আরদিজামী‘আওঁ ওয়া মিছলাহূমা‘আহূলাফতাদাওঁ বিহী উলাইকা লাহুম ছূউল হিছা-ব ওয়ামা’ওয়া-হুম জাহান্নামু ওয়া বি’ছাল মিহা-দ।',
        'আফামাইঁ ইয়া‘লামুআন্নামাউনঝিলা ইলাইকা মির রাব্বিকাল হাক্কুকামান হুওয়া আ‘মা- ইন্নামা-ইয়াতাযাক্কারু ঊলুল আলবা-ব।',
        'আল্লাযীনা ইঊফূনা বি‘আহদিল্লা-হি ওয়���লা-ইয়ানকুদূ নাল মীছা-ক।',
        'ওয়াল্লাযীনা ইয়াসিলূনা মাআমারাল্লা-হুবিহীআইঁ ইউসালা ওয়া ইয়াখশাওনা রাব্বাহুম ওয়া ইয়া খা-ফূনা ছূআল হিছা-ব।',
        'ওয়াল্লাযীনা সাবারুব তিগাআ ওয়াজহি রাব্বিহিম ওয়া আকা-মুসসালা-তা ওয়া আনফাকূ মিম্মা-রাঝাকনা-হুম ছিররাওঁ ওয়া ‘আলা-নিয়াতাওঁ ওয়া ইয়াদরাঊনা বিলহাছানাতিছ ছাইয়িআতা উলাইকা লাহুম ‘উকবাদ্দা-র।',
        'জান্না-তু‘আদনিইঁ ইয়াদখুলূনাহা-ওয়া মান সালাহামিনআ-বাইহিম ওয়াআঝওয়া-জিহিম ওয়াযুররিইইয়া-তিহিম ওয়াল মালাইকাতুইয়াদখুলূনা ‘আলাইহিম মিন কুল্লি বা-ব।',
        'ছালা-মুন ‘আলাইকুম বিমা-সাবারতুম ফানি‘মা ‘উকবাদ্দা-র।',
        'ওয়াল্লাযীনা ইয়ানকুদূ না ‘আহদাল্লা-হি মিম বা‘দি মীছা-কিহী ওয়া ইয়াকাতা‘ঊনা মাআমারাল্লা-হু বিহীআইঁ ইঊসালা ওয়াইউফছিদূ না ফিল আরদি উলাইকা লাহুমুল লা‘নাতুওয়া লাহুম ছূূউদ্দা-র।',
        'আল্লা-হু ইয়াবছুতু র রিঝকালিমাইঁ ইয়াশাউ ওয়া ইয়াকদিরু ওয়া ফারিহূবিলহায়াতিদদুনইয়া-ওয়ামাল হায়া-তুদদুনইয়া- ফিল আ-খিরাতি ইল্লা-মাতা-‘উ।',
        'ওয়া ইয়াকূলুল্লাযীনা কাফারূলাওলাউনঝিলা ‘আলাইহি আ-য়াতুম মির রাব্বিহী কুল ইন্নাল্লা-হা ইউদিল্লুমাইঁ ইয়াশাউ ওয়া ইয়াহদীইলাইহি মান আনা-ব।',
        'আল্লাযীনা আ-মানূওয়া তাতমাইন্নুকুলূবুহুম বিযিকরিল্লা-হি ‘আলা-বিযিকরিল্লা-হি তাতমাইন্নুল কুলূব।',
        'আল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি তূবা-লাহুম ওয়া হুছনুমাআ-ব।',
        'কাযা-লিকা আরছালনা-কা ফীউম্মাতিন কাদ খালাত মিন কাবলিহাউমামুল লিতাতলুওয়া ‘আলাইহিমুল্লাযী আওহাইনাইলাইকা ওয়াহুম ইয়াকফুরূনা বিররাহমা-নি কুল হুওয়া রাববী লাইলা-হা ইল্লা হুওয়া ‘আলাইহি তাওয়াক্কালতুওয়া ইলাইহি মাতা-ব।',
        'ওয়া লাও আন্না কুরআ-নান ছুইয়িরাত বিহিল জিবা-লুআও কুত্তি‘আত বিহিল আরদুআও কুল্লিমা বিহিল মাওতা- বাল লিল্লা-হিল আমরু জামী‘আন আফালাম ইয়াইআছিল্লাযীনা আ-মানূআল্লাওঁইয়াশাউল্লা-হু লাহাদান্না-ছা জামী‘আওঁ ওয়ালা-ইয়াঝা-লুল্লাযীনা কাফারূতুসীবুহুম বিমা-সানা‘ঊ কা-রি‘আতুন আও তাহুল্লুকারীবাম মিন দা-রিহিম হাত্তা-ইয়া’তিয়া ওয়া‘দুল্লা-হি ইন্নাল্লা-হা লা-ইউখলিফুল মী‘আ-দ।',
        'ওয়া লাকাদিছতুহঝিআ বিরুছুলিম মিন কাবলিকা ফাআমলাইতুলিল্লাযীনা কাফারূছু ম্মা আখাযতুহুম ফাকাইফা কা-না ‘ইকা-ব।',
        'আফামান হুওয়া কাইমুন ‘আলা-কুল্লি নাফছিম বিমা কাছাবাত ওয়া জা‘আলূলিল্লা-হি শুরাকাআ কুল ছাম্মূহুম আম তুনাব্বিঊনাহূবিমা-লা-ইয়া‘লামুফিল আরদিআম বিজাহিরিম মিনাল কাওলি বাল ঝুইয়িনা লিল্লাযীনা কাফারূমাকরুহুম ওয়াসুদ্দূ‘আনিছ ছাবীলি ওয়ামাইঁ ইউদলিলিল্লা-হু ফামা-লাহূমিন হা-দ।',
        'লাহুম ‘আযা-বুন ফিল হায়া-তিদদুনইয়া-ওয়ালা ‘আযা-বুল আ-খিরাতি আশাক্কু ওয়ামা-লাহুম মিনাল্লা-হি মিওঁ ওয়া-ক।',
        'মাছালুল জান্নাতিল লাতী উ‘ইদাল মুত্তাকূনা তাজরী মিন তাহতিহাল আনহা-রু উকুলুহা-দাইমুওঁ ওয়াজিল্লুহা- তিলকা ‘উকবাল্লাযী নাত্তাকাওঁ ওয়া ‘উকবাল কাফিরীনান্না-র।',
        'ওয়াল্লাযীনা আ-তাইনা-হুমুল কিতা-বা ইয়াফরাহূনা বিমাউনঝিলা ইলাইকা ওয়া মিনাল আহঝা-বি মাইঁ ইউনকিরু বা‘দাহূ কুল ইন্নামাউমিরতুআন আ‘বুদাল্লা-হা ওয়ালাউশরিকা বিহী ইলাইহি আদ‘ঊ ওয়া ইলাইহি মাআ-ব।',
        'ওয়া কাযা-লিকা আনঝালনা-হু হুকমান ‘আরাবিইইয়াওঁ ওয়ালাইনিততাবা‘তা আহওয়াআহুম বা‘দা মা-জাআকা মিনাল ‘ইল মি মা-লাকা মিনাল্লা-হি মিওঁ ওয়ালিইয়িওঁ ওয়ালা-ওয়া-ক।',
        'ওয়া লাকাদ আরছালনা-রুছুলাম মিন কাবলিকা ওয়া জা‘আলনা-লাহুম আঝওয়া-জাওঁ ওয়া যুররি��ইয়াতাওঁ ওয়ামা-কা-না লিরাছূলিন আইঁ ইয়া’তিয়া বিআ-য়াতিন ইল্লা-বিইযনিল্লা হি লিকুল্লি আজালিন কিতা-ব।',
        'ইয়ামহূল্লা-হু মা-ইয়াশাউ ওয়া ইউছবিতু ওয়া ‘ইনদাহূ উম্মুল কিতা-ব।',
        'ওয়া ইম্মা- নুরিইয়ান্নাকা বা‘দাল্লাযীনা‘ইদুহুম আও নাতাওয়াফফাইয়ান্নাকা ফাইন্নামা‘আলাইকাল বালা-গু ওয়া ‘আলাইনাল হিছা-ব।',
        'আওয়ালাম ইয়ারাও আন্না-না’তিল আরদা নানকুসুহা-মিন আতারা-ফিহা- ওয়াল্লা-হু ইয়াহকুমূলা-মু‘আক্কিবা লিহুকমিহী ওয়া হুওয়া ছারী‘উল হিছা-ব।',
        'ওয়া কাদ মাকারা ল্লাযীনা মিন কাবলিহিম ফালিল্লা-হিল মাকরু জামী‘আইঁ ইয়া‘লামুমাতাকছিবুকুল্লুনাফছিওঁ ওয়া ছাইয়া‘লামুল কুফফা-রু লিমান ‘উকবাদ দা-র।',
        'ওয়া ইয়াকূলুল্লাযীনা কাফারূ লাছতা মুরছালান কুল কাফা-বিল্লা-হি শাহীদাম বাইনী ওয়া বাইনাকুম ওয়া মান ‘ইনদাহূ‘ইল মুল কিতা-ব।'
      ],
      14: [
        'আলিফ লাম রা- কিতা-বুন আনঝালনা-হু ইলাইকা লিতুখরিজান্না-ছা মিনাজজু লুমাতি ইলাননূরি, বিইযনি রাব্বিহিম ইলা -সিরা-তিল ‘আঝীঝিল হামীদ।',
        'আল্লাহিল্লাযী লাহূমা-ফিছছামা-ওয়া-তি ওয়ামা-ফিল আরদি ওয়া ওয়াইলুলিলল কাফিরীনা মিন ‘আযা-বিন শাদীদ।',
        'আল্লাযীনা ইয়াছতাহিববূনাল হায়া-তাদদুনইয়া-‘আলাল আ-খিরাতি ওয়াইয়াসুদ্দূনা ‘আন ছাবীলিল্লা-হি ওয়া ইয়াবগূনাহা-‘ইওয়াজান উলাইকা ফী দালা-লিম বা‘ঈদ।',
        'ওয়ামাআরছালনা-মির রাছূলিন ইল্লা-বিলিছা-নি কাওমিহী লিইউবাইয়িনা লাহুম ফাইউদিল্লুল্লা-হু মাইঁ ইয়াশাউ ওয়া ইয়াহদী মাইঁ ইয়াশাউ ওয়া-হুওয়াল ‘আঝীঝুল হাকীম।',
        'ওয়া লাকাদ আরছালনা-মূছা-বিআ-ইয়া-তিনাআন আখরিজ কাওমাকা মিনাজজু লুমাতি ইলাননূরি ওয়া যাককির হুম বিআইইয়া-মিল্লা-হি ইন্না ফী যা-লিকা লাআ-য়া-তিল লিকুল্লি সাব্বা-রিন শাকূর।',
        'ওয়া ইয কা-লা মূছা-লিকাওমিহিযকুরূনি‘মাতাল্লা-হি ‘আলাইকুম ইযআনজা-কুম মিন আ-লি ফির‘আওনা ইয়াছূমূনাকুম ছুূআল ‘আযা-বি ওয়া ইউযাব্বিহূনা আবনাআকুম ওয়া ইয়াছতাহইউনা নিছাআকুম ; ওয়া ফী যা-লিকুম বালাউম মির রাব্বিকুম ‘আজীম।',
        'ওয়া ইয তাআযযানা রাব্বুকুম লাইন শাকারতুম লাআঝীদান্নাকুম ওয়া লাইন কাফারতুম ইন্না ‘আযা-বী লাশাদীদ।',
        'ওয়া কা-লা মূছাইন তাকফুরূআনতুম ওয়া মান ফিল আরদি জামী‘আন ফাইন্নাল্লা-হা লাগানিইয়ুন হামীদ।',
        'আলাম ইয়া’তিকুম নাবাউল্লাযীনা মিন কাবলিকুম কাওমি নূহিওঁ ওয়া ‘আ-দিওঁ ওয়া ছামূদা ওয়াল্লাযীনা মিম বা‘দিহিম লা-ইয়া‘লামুহুম ইল্লাল্লা-হুজাআতহুম রুছুলূহুম বিলবাইয়িনা-তি ফারাদ্দুআইদিইয়াহুম ফীআফওয়া-হিহিম ওয়াকা-লূইন্না-কাফারনা-বিমাউরছিলতুম বিহী ওয়া ইন্না-লাফী শাক্কিম মিম্মা-তাদ‘ঊনানাইলাইহি মুরীব।',
        'কা-লাত রুছুলুহুম আফিল্লা-হি শাক্কন ফা-তিরিছছামা-ওয়া-তি ওয়াল আরদি ইয়াদ‘ঊকুম লিইয়াগফিরা লাকুম মিন যু নূবিকুম ওয়া ইউআখখিরাকুম ইলা আজালিম মুছাম্মান কা-লূইন আনতুম ইল্লা-বাশারুম মিছলুনা- তুরীদূ না আন তাসুদ্দূনা ‘আম্মা-কানা ইয়া‘বুদুআ-বাউনা-ফা’তূনা বিছুলতা-নিম মুবীন।',
        'কা-লাত লাহুম রুছুলুহুম ইন নাহনুইল্লা-বাশারুম মিছলুকুম ওয়ালা-কিন্নাল্লা-হা ইয়ামুন্নু ‘আলা-মাইঁ ইয়াশাউ মিন ‘ইবা-দিহী ওয়ামা-কা-না লানাআন না’তিয়াকুম বিছুলতা-নিন ইল্লা-বিইযনিল্লা -হি ওয়া ‘আলাল্লা-হি ফালইয়াতাওয়াক্কালিল মু’মিনূন।',
        'ওয়ামা-লানাআল্লা-নাতাওয়াক্কাল ‘আলাল্লা-হি ওয়া কাদ হাদা-না-ছুবুলানা- ওয়া লানাসবিরান্না ‘আলা-মাআ-যাইত��মূনা- ওয়া ‘আলাল্লা-হি ফালইয়াতাওয়াক্কালিল মুতাওয়াক্কিলূন।',
        'ওয়া কা-লাল্লাযীনা কাফারূ লিরুছুলিহিম লানুখরিজান্নাকুম মিন আর দিনাআও লাতা‘ঊদুন্না ফী মিল্লাতিনা- ফাআওহাইলাইহিম রাব্বুহুম লানুহলিকান্নাজ্জা-লিমীন।',
        'ওয়া লানুছকিনান্নাকুমুল আরদা মিম বা‘দিহিম যা-লিকা লিমান খা-ফা মাকা-মী ওয়া খা-ফা ওয়া ‘ঈদ।',
        'ওয়াছতাফতাহূওয়াখা-বা কুল্লুজাব্বা-রিন ‘আনীদ।',
        'মিওঁ ওয়ারাইহী জাহান্নামুওয়া ইউছকা-মিম মাইন সাদীদ।',
        'ইয়াতাজাররা‘উহূওয়ালা-ইয়া-কা-দূইউছীগুহূওয়া ইয়া’তীহিল মাওতুমিন কুল্লি মাকা-নিওঁ ওয়ামা-হুওয়া বিমাইয়িতিওঁ ওয়ামিওঁ ওয়ারাইহী ‘আযা-বুন গালীজ।',
        'মাছালুল্লাযীনা কাফারু বিরাব্বিহিম আ‘মা-লুহুম কারামা-দিনিশতাদ্দাত বিহির রীহুফী ইয়াওমিন ‘আ-সিফিল লা-ইয়াকদিরূনা মিম্মা-কাছাবূ‘আলা-শাইইন যা-লিকা হুওয়াদ্দালা-লুল বা‘ঈদ।',
        'আলাম তারা আন্নাল্লা-হা খালাকাছছামা-ওয়া-তি ওয়াল আরদা বিল হাক্কি ইয়ঁইয়াশা’ ইউযহিবকুম ওয়া ইয়া’তি বিখালকিন জাদীদ।',
        'ওয়ামা-যা-লিকা ‘আলাল্লা-হি বি’আঝীঝ।',
        'ওয়া বারাঝূ লিল্লা-হি জামী‘আন ফাকালাদদু‘আফাউলিল্লাযীনাছ তাকাবারূইন্না-কুন্নালাকুম তাবা‘আন ফাহাল আনতুম মুগনূনা ‘আন্না-মিন ‘আযা-বিল্লা-হি মিন শাইইন কা-লূ লাও হাদা-নাল্লা-হু লাহাদাইনা-কুম ছাওয়াউন ‘আলাইনাআজাঝি‘না আম সাবারনা-মালানা-মিম মাহীস।',
        'ওয়া কা-লাশশাইতা-নুলাম্মা-কুদিয়াল আমরু ইন্নাল্লা-হা ওয়া‘আদাকুমওয়া‘আদাল হাক্কিওয়া ওয়াআততুকুম ফাআখলাফতুকুম ওয়ামা-কা-না লিয়া ‘আলাইকুম মিন ছুলতা-নিন ইল্লা আন দা‘আওতুকুম ফাছতাজাবতুম লী ফালা-তালূমূনী ওয়া লূমূআনফুছাকুম মাআনা-বিমুসরিখিকুম ওয়ামাআনতুম বিমুসরিখিইইয়া ইন্নী কাফারতুবিমা আশরাকতুমূনি মিন কাবলু ইন্নাজ্জা-লিমীনা লাহুম ‘আযা-বুন আলীম।',
        'ওয়া উদখিলাল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি জান্না-তিন তাজরী মিন তাহতিহাল আনহা-রু খা-লিদীনা ফীহা-বিইযনি রাব্বিহিম তাহিইইয়াতুহুম ফীহাছালা-ম।',
        'আলাম তারা কাইফা দারাবাল্লা-হুমাছালান কালিমাতান তাইয়িবাতান কাশাজারাতিন তাইয়িবাতিন আসলুহা-ছা-বিতুওঁ ওয়া ফার‘উহা-ফিছছামাই।',
        'তু’তী উকুলাহা-কুল্লা হীনিম বিইযনি রাব্বিহা - ওয়া ইয়াদরিবুল্লা-হুল আমছা-লা লিন্না-ছি লা‘আল্লাহুম ইয়াতাযাক্কারূন।',
        'ওয়া মাছালুকালিমাতিন খাবীছাতিন কাশাজারাতিন খাবীছাতি নিজতুছছাত মিন ফাওকিল আরদিমা-লাহা-মিন কারা-র।',
        'ইউছাব্বিতুল্লা-হুল্লাযীনা আ-মানূবিলকাওলিছছা-বিতি ফিল হায়া-তিদদুনইয়া-ওয়া ফিল আ-খিরাতি ওয়া ইউদিল্লুল্লা-হুজ জা-লিমীনা ওয়াইয়াফ ‘আলুল্লাহু মাইয়াশাউ।',
        'আলাম তারা ইলাল্লাযীনা বাদ্দালূনি‘মাতাল্লা-হি কুফরাওঁ ওয়া আহাললূকাওমাহুম দা-রাল বাওয়া-র।',
        'জাহান্নামা ইয়াসলাওনাহা- ওয়াবি’ছাল কারা-র।',
        'ওয়া জা‘আলূলিল্লা-হি আনদা-দাল লিইউদিললূ‘আন ছাবীলিহী কুল তামাত্তা‘ঊ ফাইন্না মাসীরাকুম ইলান্না-র।',
        'কুললি‘ইবা-দিয়াল্লাযীনা আ-মানূইউকীমুসসালা-তা ওয়া ইউনফিকূ মিম্মা-রাঝাকনাহুম ছিররাওঁ ওয়া ‘আলা-নিয়াতাম মিন কাবলি আইঁ ইয়া’তিয়া ইয়াওমুল লা-বাই‘ঊন ফীহি ওয়ালা-খিলা-ল।',
        'আল্লা-হুল্লাযী খালাকাছছামা-ওয়া-তি ওয়াল আরদা ওয়া আনঝালা মিনাছছামাই মাআন ফাআখরাজা বিহী মিনাছছামারা-তি রিঝকাল লাকুম ওয়াছাখখারা লাকুমুল ফুলকা লিতাজরিয়া ফিল বাহরি বিআমরিহী ওয়া ছাখখারা লাকুমুল আনহা-র।',
        'ওয়া ছাখখারা লকুমুশশামছা ওয়াল কামারা দাইবাইনি ওয়া ছাখখারা লাকুমুল লাইলা ওয়ান নাহা-র।',
        'ওয়া আ-তা-কুম মিন কুল্লি মা-ছাআলতুমূহু ওয়া ইন তা‘উদ্দূনি‘মাতাল্লা-হি লা-তুহসূহা- ইন্নাল ইনছা-না লাজালূমুন কাফ ফা-র।',
        'ওয়া ইয কা-লা ইবরা-হীমুরাব্বিজ‘আল হা-যাল বালাদা আ-মিনাওঁ ওয়াজনুবনী ওয়া বানিইইয়া আন্না‘বুদাল আসনা-ম।',
        'রাব্বি ইন্নাহুন্না আদলালনা কাছীরাম মিনান্না-ছি ফামান তাবি‘আনী ফাইন্নাহূমিন্নী ওয়ামান ‘আসা-নী ফাইন্নাকা গাফূরুর রাহীম।',
        'রাব্বানা ইন্নী আছকানতুমিন যুররিইইয়াতী বিওয়া-দিন গাইরি যী ঝার ‘ইন ‘ইনদা বাইতিকাল মুহাররামি রাব্বানা-লিইউকীমুসসালা-তা ফাজ‘আল আফইদাতাম মিনান্নাছি তাহবীইলাইহিম ওয়ারঝুকহুম মিনাছছামারা-তি লা‘আল্লাহুম ইয়াশকুরূন।',
        'রাব্বানাইন্নাকা তা‘লামুমা-নুখফী ওয়ামা-নু‘লিনু ওয়ামা-ইয়াখফা-‘আলাল্লা-হি মিন শাইইন ফিল আরদিওয়ালা-ফিছছামাই।',
        'আলহামদুলিল্লা-হিল্লাযী ওয়াহাবালী ‘আলাল কিবারি ইছমা-‘ঈলা ওয়া ইছহা-ক ইন্না রাববী লাছামী‘উদদু‘আই।',
        'রাব্বিজ ‘আলনী মুকীমাসসালা-তি ওয়া মিন যুররিইইয়াতী রাব্বানা-ওয়া তাকাব্বাল দু‘আই।',
        'রাব্বানাগফিরলী ওয়া লিওয়ালিদাইয়া ওয়ালিলমু’মিনীনা ইয়াওমা ইয়াকূমুল হিছা-ব।',
        'ওয়ালা-তাহছাবান্নাল্লা-হা গা-ফিলান ‘আম্মা-ইয়া‘মালুজ্জা-লিমূনা ইন্নামাইউআখখিরুহুম লিইয়াওমিন তাশখাসুফীহিল আবসা-র।',
        'মুহতি‘ঈনা মুকনি‘ঈ রুউছিহিম লা-ইয়ারতাদ্দুইলাইহিম তারফুহুম ওয়া আফইদাতুহুম হাওয়াউ।',
        'ওয়াআনযিরিন্না-ছা ইয়াওমা ইয়া’তীহিমুল ‘আযা-বুফাইয়াকূলুল্লাযীনা জালামূ রাব্বানাআখখিরনাইলাআজালিন কারীবিন নুজিব দা‘ওয়াতাকা ওয়া নাত্তাবি‘ইররুছুলা আওয়ালাম তাকূনূআকছামতুম মিন কাবলুমা-লাকুম মিন ঝাওয়া-ল।',
        'ওয়া ছাকানতুম ফী মাছা-কিনিল্লাযীনা জালামূআনফুছাহুম ওয়া তাবাইইয়ানা লাকুম কাইফা ফা‘আলনা-বিহিম ওয়াদারাবনা-লাকুমুল আমছা-ল।',
        'ওয়া কাদ মাকারূমাকরাহুম ওয়া ‘ইনদাল্লা-হি মাকরুহুম ওয়া ইন কা-না মাকরুহুম লিতাঝূলা মিনহুল জিবা-ল।',
        'ফালা-তাহছাবান্নাল্লা-হা মুখলিফা ওয়া‘দিহী রুছুলাহূ ইন্নাল্লা-হা ‘আঝীঝুন যুনতিকা-ম।',
        'ইয়াওমা তুবাদ্দালুল আরদুগাইরাল আরদি ওয়াছছামা-ওয়া-তুওয়া বারাঝূলিল্লা-হিল ওয়াহিদিল কাহহা-র।',
        'ওয়া তারাল মুজরিমীনা ইয়াওমাইযিম মুকাররানীনা ফিল আসফা-দ।',
        'ছারা-বীলুহুম মিন কাতিরা-নিওঁ ওয়া তাগশা-উজূহাহুমুন্না-র।',
        'লিইয়াজঝিয়াল্লা-হু কুল্লা নাফছিম মা-কাছাবাত ইন্নাল্লা-হা ছারী‘উল হিছা-ব।',
        'হা-যা-বালা-গুল লিন্না-ছি ওয়ালিইউনযারূবিহী ওয়া লিইয়া‘লামূআন্নামা-হুওয়া ইলাহুওঁ ওয়াহিদুওঁ ওয়ালিইয়াযযাক্কারা উলুল আলবা-ব।'
      ],
      15: [
        'আলিফ লাম রা- তিলকা আ-য়া-তুল কিতা-বি ওয়া কুরআ-নিম মুবীন।',
        'রুবামা-ইয়াওয়াদ্দুল্লাযীনা কাফারূলাও কা-নূমুছলিমীন।',
        'যারহুম ইয়া’কুলূওয়া ইয়াতামাত্তা‘ঊ ওয়া ইউলহিহিমুল আমালুফাছাওফা ইয়া‘লামূন।',
        'ওয়ামাআহলাকনা-মিন কারয়াতিন ইল্লা ওয়ালাহা-কিতা-বুম মা‘লূম।',
        'মা-তাছবিকুমিন উম্মাতিন আজালাহা-ওয়ামা-ইয়াছতা’খিরূন।',
        'ওয়া কা-লূইয়াআইয়ুহাল্লাযী নুঝঝিলা ‘আলাইহিযযিকরু ইন্নাকা লামাজনূন।',
        'লাও মা-তা’তীনা-বিলমালাইকাতি ইন কুনতা মিনাসসা-দিকীন।',
        'মা-নুনাঝঝিলুল মালাইকাতা ইল্লা-বিলহাক্কিওয়ামা-কা-নূ ইযাম মুনজারীন।',
        'ইন্না-নাহনুনাঝঝালনাযযি করা ওয়া ইন্না-লাহূলাহা-ফিজূ ন।',
        'ওয়া লাকাদ আরছালনা-মিন কাবলিকা ফী শিয়া‘ইল আওওয়ালীন।',
        'ওয়ামা-ইয়া’তীহিম মির রাছূলিন ইল্লা-কা-নূবিহী ইয়াছতাহঝিঊন।',
        'কাযা-লিকা নাছলুকুহূফী কুলূবিল মুজরিমীন।',

        'ওয়া লাও শাআল্লা-হু লাজা‘আলাকুম উম্মাতাওঁ ওয়া-হিদাতাওঁ ওয়ালা-কিইঁ ইউদিল্লুমাইঁ ইয়াশাউ ওয়া ইয়াহদী মাইঁ ইয়াশাউ ওয়ালা তুছআলুন্না ‘আম্মা-কুনতুম তা‘মালূন।',
        'ওয়ালা-তাত্তাখিযূআইমা-নাকুম দাখালাম বাইনাকুম ফাতাঝিল্লা কাদামুম বা‘দা ছুবূতিহাওয়া তাযূকুছছূআ বিমা-সাদাততুম ‘আন ছাবীলিল্লা-হি ওয়ালাকুম ‘আযা-বুন ‘আজীম।',
        'ওয়ালা-তাশতারূবি‘আহদিল্লা-হি ছামানান কালীলান ইন্নামা-‘ইনদাল্লা-হি হুওয়া খাইরুল্লাকুম ইন কুনতুম তা‘লামূন।',
        'মা-‘ইনদাকুম ইয়ানফাদুওয়ামা-‘ইনদাল্লা-হি বা-কিওঁ ওয়ালা নাজঝিয়ান্নাল্লাযীনা সাবারূআজরাহুম বিআহছানি মা-কা-নূইয়া‘মালূন।',
        'মান ‘আমিলা সা-লিহাম মিন যাকারিন আও উনছা-ওয়া হুওয়া মু’মিনুন ফালা নুহয়িইয়ান্নাহূ হায়া-তান তাইয়িবাতাওঁ ওয়া লানাজঝিয়ান্নাহুম আজরাহুম বিআহছানি মা-কানূ ইয়া‘মালূন।',
        'ফাইযা-কারা’তাল কুরআ-না ফাছতা‘ইযবিল্লা-হিমিনাশশাইতা-নির রাজীম।',
        'ইন্নাহূলাইছা লাহূছুলতা-নুন ‘আলাল্লাযীনা আ-মানূওয়া ‘আলা রাব্বিহীম ইয়াতাওয়াক্কালূন।',
        'ইন্নামা-ছুলতা-নুহূ‘আলাল্লাযীনা ইয়াতাওয়াল্লাওনাহূওয়াল্লাযীনা হুম বিহী মুশরিকূন।',
        'ওয়া ইযা-বাদ্দালনাআ-য়াতাম মাকা-না আ-য়াতিওঁ ওয়াল্লা-হু ‘আলামুবিমাইউনাঝঝিলুকা-লূইন্নামাআনতা মুফতারিম বাল আকছারুহুম লা-ইয়া‘লামূন।',
        'কুল নাঝঝালাহূরূহুলকুদুছি মির রাব্বিকা বিলহাক্কি লিইউছাব্বিতাল্লাযীনা আ-মানূ ওয়া হুদাওঁ ওয়া বুশরা-লিলমুছলিমীন।',
        'ওয়া লাকাদ না‘লামুআন্নাহুম ইয়াকূলূনা ইন্নামা-ইউ‘আলিলমুহূবাশারুল লিছা-নুল্লাযী ইউলহিদূ না ইলাইহি আ‘জামিইয়ুওঁ ওয়া হা-যা-লিছা-নুন ‘আরাবিইয়ুম মুবীন।',
        'ইন্নাল্লাযীনা লা-ইউ’মিনূনা বিআ-য়া-তিল্লা-হি লা-ইয়াহদীহিমুল্লা-হু ওয়া লাহুম ‘আযাবুন আলীম।',
        'ইন্নামা-ইয়াফতারিল কাযিবাল্লাযীনা লা-ইউ’মিনূনা বিআ-য়া-তিল্লা-হি ওয়া উলাইকা হুমুল কা-যিবূন।',
        'মান কাফারা বিল্লা-হি মিম বা‘দি ঈমা-নিহীইল্লা-মান উকরিহা ওয়া কালবুহূমুতমাইননুম বিলঈমা-নি ওয়ালা-কিম মান শারাহা বিলকুফরি সাদরান ফা‘আলাইহিম গাদাবুম মিনাল্লা-হি ওয়ালাহুম ‘আযা-বুন ‘আজীম।',
        'যা-লিকা বিআন্নাহুমুছ তাহাব্বুল হায়া-তাদদুনইয়া-‘আলাল আ-খিরাতি ওয়া আন্নাল্লাহা লা-ইয়াহদিল কাওমাল কা-ফিরীন।',
        'উলাইকাল্লাযীনা তাবা‘আল্লা-হু ‘আলা-কুলূবিহিম ওয়া ছাম‘ইহিম ওয়া আবসা-রিহিম ওয়া উলাইকা হুমুল গা-ফিলূন।',
        'লা-জারামা আন্নাহুম ফিল আ-খিরাতি হুমুল খা-ছিরূন।',
        'ছু ম্মা ইন্না রাব্বাকা লিল্লাযীনা হা-জারূমিম বা‘দি মা-ফুতিনূছু ম্মা জা-হাদূওয়া সাবারূ ইন্না রাব্বাকা মিম বা‘দিহা-লাগাফূরুর রাহীম।',
        'ইয়াওমা তা’তী কুল্লুনাফছিন তুজা-দিলু‘আন নাফছিহা-ওয়া তুওয়াফফা-কুল্লুনাফছিম মা‘আমিলাত ওয়া হুম লা-ইউজলামূন।',
        'ওয়া দারাবাল্লা-হু মাছালান কারইয়াতান কা-নাত আ-মিনাতাম মুতমাইন্নাতাইঁ ইয়া’তীহারিঝকুহা-রাগাদাম মিন কুল্লি মাকা-নিন ফাকাফারাত বিআন‘উমিল্লা-হি ফাআযা-কাহাল্লা-হু লিবা-ছাল জূ‘ই ওয়াল খাওফি বিমা-কা-নূইয়াসনা‘ঊন।',
        'ওয়া লাকাদ জাআহুম রাছূলুম মিনহুম ফাকাযযাবূহু ফাআখাযাহুমুল‘আযা-বুওয়া হুম জা-লিমূন।',
        'ফাকুলূমিম্মা-রাঝাকাকুমুল্লা-হু হালা-লান তাইয়িবাওঁ ওয়াশকুরূনি‘মাতাল্লা-হি ইন কুনতুম ইয়্যা-হু তা‘বুদূ ন।',
        'ইন্নামা-হাররামা ‘আলাইকুমুল মাইতাতা ওয়াদ্দামা ওয়া লাহমাল খিনঝীরি ওয়ামাউহিল্লা লিগাইরিল্লা-হি বিহী ফামানিদতুররা গাইরা বা-গিওঁ ওয়ালা-‘আদিন ফাইন্নাল্লা-হা গাফূরুর রাহীম।',
        'ওয়ালা-তাকূলূলিমা-তাসিফুআলছিনাতুকুমুল কাযিবা হা-যা-হালা-লুওঁ ওয়া হা-যাহারামুল লিতাফতারূ‘আলাল্লা-হিল কাযিবা ইন্নাল্লাযীনা ইয়াফতারূনা ‘আলাল্লা-হিল কাযিবা লা-ইউফলিহূন।',
        'মাতা-‘উন কালীলুওঁ ওয়া লাহুম ‘আযা-বুন আলীম।',
        'ওয়া ‘আলাল্লাযীনা হা-দূহাররামনা-মা-কাসাসনা-‘আলাইকা মিন কাবলু ওয়ামাজালামনা-হুম ওয়ালা-কিন কা-নূআনফুছাহুম ইয়জলিমূন।',
        'ছু ম্মা ইন্না রাব্বাকা লিল্লাযীনা ‘আমিলুছছূআ বিজাহা-লাতিন ছুম্মা তা-বূমিম বা‘দি যালিকা ওয়া আসলাহূ ইন্না রাব্বাকা মিম বা‘দিহা-লাগাফরুর রাহীম।',
        'ইন্না ইবরা-হীমা কা-না উম্মাতান কা-নিতাল লিল্লা-হি হানীফাওঁ ওয়ালাম ইয়াকুমিনাল মুশরিকীন।',
        'শা-কিরাল লিআন‘উমিহী ইজতাবা-হু ওয়াহাদা-হু ইলা-সিরা-তিম মুছতাকীম।',
        'ওয়া আ-তাইনা-হু ফিদদুনইয়া-হাছানাতাওঁ ওয়া ইন্নাহূফিল আ-খিরাতি লামিনাসসালিহীন।',
        'ছু ম্মা আওহাইনাইলাইকা আনিত্তাবি‘ মিল্লাতা ইবরা-হীমা হানীফাওঁ ওয়ামা-কা-না মিনাল মুশরিকীন।',
        'ইন্নামা-জু‘ইলাছছাব তু‘আলাল্লাযীনাখ তালাফূফীহি ওয়া ইন্না রাব্বাকা লাইয়াহকুমু বাইনাহুম ইয়াওমাল কিয়া-মাতি ফীমা-কা-নূফীহি ইয়াখাতালিফূন।',
        'উদ‘উ ইলা-ছাবীলি রাব্বিকা বিলহিকমাতি ওয়াল মাও‘ইজাতিল হাছানাতি ওয়া জা-দিলহুম বিল্লাতী হিয়া আহছানু ইন্না রাব্বাকা হুওয়া আ‘লামুবিমান দাল্লা ‘আন ছাবীলিহী ওয়া হুওয়া আ‘লামুবিলমুহতাদীন।',
        'ওয়া ইন ‘আ-কাবতুম ফা‘আকিবূবিমিছলি মা -‘ঊকিবতুম বিহী ওয়া লাইন সাবারতুম লাহুওয়া খাইরুল লিসসা-বিরীন।',
        'ওয়াসবির ওয়ামা-সাবরুকা ইল্লা-বিল্লা-হি ওয়ালা-তাহঝান ‘আলাইহিম ওয়ালা-তাকুফী দাইকিম মিম্মা-ইয়ামকুরূন।',
        'ইন্নাল্লা-হা মা‘আল্লাযী নাত্তাকাওঁ ওয়াল্লাযীনা হুম মুহছিনূন।'
      ],
      17: [
        'ছুবহা-নাল্লাযীআছরা-বিআ‘বদিহী লাইলাম মিনাল মাছজিদিল হারা-মি ইলাল মাছজিদিল আকসাল্লাযী বা-রাকনা- হাওলাহূলিনুরিয়াহূমিন আ-য়া-তিনা- ইন্নাহূ হুওয়াছছামী‘উল বাসীর।',
        'ওয়া আ-তাইনা-মূছাল কিতা-বা ওয়া জা‘আলনা-হু হুদাল লিবানী ইছরাঈলা আল্লাতাত্তাখিযূমিন দূনী ওয়াকীলা-।',
        'যুররিইইয়াতা মান হামালনা- মা‘আ নূহিন ইন্নাহূকা-না ‘আবদান শাকূরা-।',
        'ওয়া কাদাইনা ইলা-বানী ইছরাঈলা ফিল কিতা-বি লাতুফছিদুন্না ফিল আরদি মাররাতাইনি ওয়া লাতা‘লুন্না ‘উলুওওয়ান কাবীরা-।',

        'যা-লিকা জাঝাউহুম বিআন্নাহুম কাফারূবিআ-য়া-তিনা- ওয়াকা-লূ আইযা- কুন্না‘ইজা-মাওঁ ওয়া রুফা-তান আইন্না-লামাব‘ঊছূনা খালকান জাদীদা-।',
        'আওয়া লাম ইয়ারাও আন্নাল্লা-হাল্লাযী খালাকাছছামা-ওয়া-তি ওয়াল আরদা কা-দিরুন ‘আলাআইঁ ইয়াখলুকা মিছলাহুম ওয়া জা‘আলা লাহুম আজালাল লা-রাইবা ফীহি ফাআবাজ্জা-লিমূনা ইল্লা-কুফূরা-।',
        'কুল্লাও আনতুম তামলিকূনা খাঝাইনা রাহমাতি রাববীইযাল্লাআমছাকতুম খাশইয়াতাল ইনফা-কি ওয়া কা-নাল ইনছা-নুকাতূরা-।',
        'ওয়া লাকাদ আ-তাইনা-মূছা-তিছ‘আ আ-য়া-তিম বাইয়িনা-তিন ফাছআল বানী ইছরাঈলা ইয জাআহুম ফাকা-লা লাহূফির‘আউনুইন্নী লাআজুন্নুকা ইয়া-মূছামাছহূরা-।',
        'কা-লা লাকাদ ‘আলিমতা মাআনঝালা হাউলাই ইল্লা-রাব্বুছছামা-ওয়া-তি ওয়াল আরদিবাসাইরা ওয়া ইন্নী লাআজুন্নুকা ইয়া-ফির‘আওনুমাছবূরা-।',
        'ফাআরা-দা আইঁ ইয়াছতাফিঝঝাহুম মিনাল আরদি ফাআগরাকনা-হু ওয়া মাম মা‘আহূ জামী‘আ-।',
        'ওয়া কুলনা-মিম বা‘দিহী লিবানীইছরাঈলাছকুনুল আরদাফাইযা-জাআ ওয়া‘দুল আ-খিরাতী জি’না-বিকুম লাফীফা-।',
        'ওয়া বিলহাক্কিআনঝালনা-হু ওয়া বিলহাক্কিনাঝালা ওয়ামাআরছালনা-কা ইল্লামুবাশশিরাওঁ ওয়া নাযীরা-।',
        'ওয়া কুরআ-নান ফারাকনা-হুলিতাকরাআহূ ‘আলান্না-ছি ‘আলা- মুকছিওঁ ওয়া নাঝঝালনা-হু তানঝীলা-।',
        'কুল আ-মিনূবিহীআও লা-তু’মিনূ ইন্নাল্লাযীনা ঊতুল ‘ইলমা মিন কাবলিহীইযাইউতলা-‘আলাইহিম ইয়াখিররূনা লিল আযকা-নি ছুজ্জাদা-।',
        'ওয়া ইয়াকূলূনা ছুবহা-না রাব্বিনাইন কা-না ওয়া‘দুরাব্বিনা-লামাফ‘ঊলা-।',
        'ওয়া ইয়াখিররূনা লিলআযকা-নি ইয়াবকূনা ওয়া ইয়াঝীদুহুম খুশূ‘আ-। (সিজদা-৪)',
        'কুলিদ‘উল্লা-হা আবিদ ‘উর রাহমা-না আইঁ ইয়াম্মা-তাদ‘ঊ ফালাহুল আছমাঊল হুছনা-ওয়ালা-তাজহার বিসালা-তিকা ওয়ালা-তুখা-ফিত বিহা-ওয়াবতাগি বাইনা যালিকা ছাবীলা-।',
        'ওয়া কুল্লি হামদুলিল্লা-হিল্লাযী লাম ইয়াত্তাখিযওয়ালাদাওঁ ওয়া লাম ইয়াকুল্লাহূশারীকুন ফিল মুলকি ওয়া লাম ইয়াকুল্লাহূওয়ালিইয়ুম মিনাযযুলিল ওয়া কাব্বিরহু তাকবীরা-।'
      ],
      18: [
        'আলহামদুলিল্লা-হিল্লাযীআনঝালা ‘আলা-‘আবদিহিল কিতা-বা ওয়ালাম ইয়াজ‘আল্লাহূ ‘ইওয়াজা-।',
        'কাইয়িমাল লিইউনযিরা বা’ছান শাদীদাম মিল্লাদুনহু ওয়া ইউবাশশিরাল মু’মিনীনাল্লাযীনা ইয়া‘মালূনাসসা-লিহা-তি আন্না লাহুম আজরান হাছানা-।',
        'মা-কিছীনা ফীহি আবাদা-।',
        'ওয়া ইউনযিরাল্লাযীনা কা-লুত্তাখাযাল্লা-হু ওয়ালাদা-।',
        'মা-লাহুম বিহী মিন ‘ইলমিওঁ ওয়ালা-লিআ-বাইহিম কাবুরাত কালিমাতান তাখরুজু মিন আফওয়া-হিহিম ইয়ঁইয়াকূলূনা ইল্লা-কাযিবা-।',
        'ফালা‘আল্লাকা বা-খি‘উন্নাফছাকা ‘আলা আ-ছা-রিহিম ইল্লাম ইউ’মিনূ বিহা-যাল হাদীছিআছাফা-।',
        'ইন্না-জা‘আলনা-মা-‘আলাল আরদি ঝীনাতাল্লাহা- লিনাবলুওয়াহুম আইয়ুহুম আহছানু ‘আমালা-।',
        'ওয়া ইন্না-লাজা-‘ইলূনা মা-‘আলাইহা-সা‘ঈদান জুরুঝা-।',
        'আম হাছিবতা আন্না আসহা-বাল কাহফি ওয়ার রাকীমি কা-নূমিন আ-য়া-তিনা‘আজাবা-।',
        'ইয আওয়াল ফিতইয়াতুইলাল কাহফি ফাকা-লূরাব্বানাআ-তিনা-মিল্লাদুনকা রাহমাতাওঁ ওয়া হাইয়ি’ লানা-মিন আমরিনা-রাশাদা-।',
        'ফাদারাবনা-‘আলাআ-যা-নিহিম ফিল কাহফি ছিনীনা ‘আদাদা-।',
        'ছু ম্মা বা‘আছনা-হুম লিনা‘লামা আইয়ুল হিঝবাইনি আহসা-লিমা-লাবিছূদ্মআমাদা-',
        'নাহনুনাকুসসু‘আলাইকা নাবাআহুম বিলহাক্কি ইন্নাহুম ফিতইয়াতুন আ-মানূ বিরাব্বিহিম ওয়াঝিদনা-হুম হুদা-।',
        'ওয়া রাবাতনা-‘আলা-কুলূবিহিম ইয কা-মূফাকা-লূরাব্বুনা-রাব্বুছছামা-ওয়া-তি ওয়াল আরদিলান নাদ‘উওয়া মিন দূনিহীইলা-হাল লাকাদ কুলনাইযান শাতাতা-।',
        'হাউলাই কাওমুনাত্তাখাযূমিন দূ নিহীআ-লিহাতাল লাওলা-ইয়া’তূনা ‘আলাইহিম বিছুলতা-নিম বাইয়িনিন ফামান আজলামুমিম্মানিফতারা-‘আলাল্লা-হি কাযিবা-।',
        'ওয়া ইযি‘তাঝালতুমূহুম ওয়ামা-ইয়া‘বুদূনা ইল্লাল্লা-হা ফা’ঊইলাল কাহফি ইয়ানশুরুলাকুম রাব্বুকুম মির রাহমাতিহী ওয়া ইউহাইয়ি’ লাকুম মিন আমরিকুম মিরফাকা-।',
        'ওয়া তারাশশামছা ইযা-তালা‘আততাঝা-ওয়ারু ‘আন কাহফিহিম যা-তাল ইয়ামীনি ওয়া ইযা-গারাবাত তাকরিদুহুম যা-তাশশিমা-লি ওয়া হুম ফী ফাজওয়াতিম মিনহু যালিকা মিন আ-য়া-তিল্লা-হি মাইঁ ইয়াহদিল্লা-হু ফাহুওয়াল মুহতাদি ওয়া মাই ইউদলিল ফালান তাজিদা লাহূত্তয়ালিইইয়াম মুরশিদা-।',
        'ওয়া তাহছাবুহুম আইকা-জাওঁ ওয়া হুম রুকূদুওঁ ওয়া নুকালিলবুহুম যা-তাল ইয়ামীনি ওয়া যা-তাশশিমা-লি ওয়াকালবুহুম বা-ছিতু ন যিরা-‘আইহি বিল ওয়াসীদি লাবিততালা‘তা ‘আলাইহিম লাওয়াল্লাইতা মিনহুম ফিরা-রাওঁ ওয়ালামুলি’তা মিনহুম রু‘বা-।',
        'ওয়া কাযা-লিকা বা‘আছনা-হুম লিইয়াতাছাআলূবাইনাহুম কা-লা কাইলুম মিনহুম কাম লাবিছতুম কা-লূলাবিছনা-ইয়াওমান আও বা‘দা ইয়াওমিন কালূরাব্বুকুম আ‘লামুবিমা-লাবিছতুম ফাব‘আছূআহাদাকুম বিওয়ারিকিকুম হাযিহীইলাল মাদীনাতি ফালইয়ানজু র আইয়ুহাআঝকা-তা‘আ-মান ফালইয়া’তিকুম বিরিঝকিম মিনহু ওয়াল ইয়াতালাততাফ ওয়ালা-ইউশ‘ইরান্না বিকুম আহাদা-।',
        'ইন্নাহুম ইয়ঁ ইয়াজহারূ‘আলাইকুম ইয়ারজুমূকুম আও ইউ‘ঈদূকুম ফী মিল্লাতিহিম ওয়ালান তুফলিহূইযান আবাদা-।',
        'ওয়া কাযা-লিকা আ‘ছারনা-‘আলাইহিম লিইয়া‘লামূআন্না-ওয়া‘দাল্লা-হি হাক্কুওঁ ওয়া আন্নাছছা-‘আতা লা-রাইবা ফীহা- ইয ইয়াতানা -ঝা‘ঊনা বাইনাহুম আমরাহুম ফাকালুবনূ‘আলাইহিম বুনইয়া-নার রাব্বুহুম আ‘লামুবিহিম কা-লাল্লাযীনা গালাবূ ‘আলাআমরিহিম লানাত্তাখিযান্না ‘আলাইহিম মাছজিদা-।',
        'ছাইয়াকূলূনা ছালা-ছাতুর রা-বি‘উহুম কালবুহুম ওয়া ইয়াকূলূনা খামছাতুন ছা-দিছুহুম কালবুহুম রাজমাম বিলগাইবি ওয়া ইয়াকূলূনা ছাব‘আতুওঁ ওয়া ছা-মিনুহুম কালবুহুম কুর রাববীআ‘লামুবি‘ইদ্দাতিহিম মা-ইয়া‘লামুহুম ইল্লা-কালীলুন ফালা-তুমারি ফীহিম ইল্লা-মিরাআন জা-হিরাওঁ ওয়ালা-তাছতাফতি ফীহিম মিনহুম আহাদা-।',
        'ওয়ালা-তাকূলান্না লিশাইয়িন ইন্নী ফা-‘ইলুন যা-লিকা গাদা-।',
        'ইল্লাআইঁ ইয়াশাআল্লা-হু ওয়াযকুর রাব্বাকা ইযা-নাছীতা ওয়াকুল ‘আছাআইঁ ইয়াহদিয়ানি রাববী লিআকরাবা মিন হা-যা-রাশাদা-।',
        'ওয়া লাবিছূফী কাহফিহিম ছালা-ছা মিআতিন ছিনীনা ওয়াঝদা-দূতিছ‘আ-।',

        'কা-লা ফাইনিত তাবা‘তানী ফালা-তাছআলনী ‘আন শাইয়িন হাত্তাউহদিছালাকামিনহু যিকরা-।',
        'ফানতালাকা-হাত্তাইযা-রাকিবা-ফিছছাফীনাতি খারাকাহা- কা-লা আখারাকতাহা-লিতুগরিকা আহলাহা- লাকাদ জি’তা শাইআন ইমরা-।',
        'কা-লা আলাম আকুল ইন্নাকা লান তাছতাতী‘আ মা‘ইয়া সাবরা-।',
        'কা-লা লা-তুআখিযনী বিমা -নাছীতুওয়ালা-তুরহিকনী মিন আমরী ‘উছরা-।',
        'ফানতালাকা-হাত্তাইযা-লাকিয়া-গুলা-মান ফাকাতালাহূকা-লা আকাতালতা নাফছান ঝাকিইইয়াতাম বিগাইরি নাফছিল লাকাদ জি’তা শাইআন নুকরা-।',
        'কা- লা আলাম আকুল্লাকা ইন্নাকা লান তাছতাতী‘আ মা‘ইয়া সাবরা-।',
        'কা-লা ইন ছাআলতুকা ‘আন শাইয়িম বা‘দাহা-ফালা-তুসা-হিবনী কাদ বালাগতা মিল্লাদুন্নী ‘উযরা-।',
        'ফানতালাকা-হাত্তাইযাআতাইয়াআহলা কারইয়াতিনিছতাত‘আমা আহলাহা-ফাআবাওঁআইঁ ইউদাইয়িফূহুমা-ফাওয়াজাদা-ফীহা-জিদা-রাইঁ ইউরীদুআইঁ ইয়ানকাদ্দা ফাআকা-মাহূ কা-লা লাও শি’তা লাত্তাখাযতা ‘আলাইহি আজরা-।',
        'কা-লা হা-যা-ফিরা-কুবাইনী ওয়া বাইনিকা ছাউনাব্বিউকা বিতা’বিলি মালাম তাছতাতি‘ ‘আলাইহি সাব রা-।',
        'আম্মাছ ছাফীনাতুফাকা-নাত লিমাছা-কীনা ইয়া‘মালূনা ফিল বাহরি ফাআরাততুআন আ‘ঈবাহা-ওয়া কা-না ওয়ারাআহুম মালিকুইঁ ইয়া‘খুযুকুল্লা ছাফীনাতিন গাসবা-।',
        'ওয়া আম্মাল গুলা-মুফাকা-না আবাওয়া-হুমু’মিনাইনি ফাখাশীনাআইঁ ইউরহিকাহুমাতুগইয়া-নাওঁ ওয়া কুফরা-।',
        'ফাআরাদনাআইঁ ইউবদিলাহুমা- রাব্বুহুমা- খাইরাম মিনহু ঝাকা-তাওঁ ওয়া আকারাবা রুহমা-।',
        'ওয়া আম্মাল জিদা-রু ফাকা-না লিগুলা-মাইনি ইয়াতীমাইনি ফিল মাদীনাতি ওয়া কা-না তাহতাহূকানঝুল্লাহুমা-ওয়া কা-না আবূহুমা-সা-লিহান ফাআরা-দা রাব্বুকা আইঁ ইয়াবলুগাআশুদ্দা হুমা-ওয়া ইয়াছতাখরিজা-কানঝাহুমা- রাহমাতাম মির রাব্বিকা ওয়ামা-ফা‘আলতুহূ‘আন আমরী যা-লিকা তা’বীলুমা-লাম তাছতি‘ ‘আলাইহি সাবরা-।',
        'ওয়া ইয়াছআলূনাকা আন যিল কারনাইনি কুল ছাআতলূ‘আলাইকুম মিনহু যিকরা-।',
        'ইন্না-মাক্কান্না-লাহূফিল আরদিওয়া আ-তাইনা-হু মিন কুল্লি শাইয়িন ছাবাবা-।',
        'ফাআতবা‘আ ছাবাবা-।',
        'হাত্তাইযা-বালাগা মাগরিবাশ শামছি ওয়া জাদাহা-তাগরুবুফী ‘আইনিন হামিআতিওঁ ওয়া ওয়াজাদা ‘ইনদাহা-কাওমান কুলনা-ইয়া-যাল কারনাইনি ইম্মাআন তু‘আযযিবা ওয়া ইম্মাআন তাত্তাখিযা ফীহিম হুছনা-।',
        'কা-লা আম্মা-মান জালামা ফাছাওফা নু‘আযযি বুহূ ছু ম্মা ইউরাদ্দু ইলা-রাব্বিহী ফাইউ‘আযযি বুহূ‘আযা-বান নুকরা-।',
        'ওয়া আম্মা-মান আ-মানা ওয়া ‘আমিলা সা-লিহান ফালাহূজাঝাআনিল হুছনা-,ওয়া ছানাকূলুলাহূমিন আমরিনা-ইউছরা-।',
        'ছুম্মা আতবা‘আ ছাবাবা-।',
        'হাত্তাইযা-বালাগা মাতলি‘আশশামছি ওয়াজাদাহা-তাতলু‘উ ‘আলা-কাওমিল লাম নাজ‘আল লাহুম মিন দূনিহা-ছিতরা-।',
        'কাযা-লিকা ওয়া কাদ আহাতনা-বিমা-লাদাইহি খুবরা।',
        'ছু ম্মা আতবা‘আ ছাবাবা-।',
        'হাত্তাইযা-বালাগা বাইনাছছাদ্দাইনি ওয়াজাদা মিন দূনিহিমা-কাওমাল লা-ইয়াকা-দূনা ইয়াফকাহূনা কাওলা-।',
        'কা-লূইয়া-যাল কারনাইনি ইন্না ইয়া’জূজা ওয়া মা’জূজা মুফছিদূনা ফিল আরদি ফাহাল নাজ‘আলুলাকা খারজান ‘আলাআন তাজ‘আলা বাইনানা-ওয়া বাইনাহুম ছাদ্দা-।',
        'কা-লা মা-মাকান্নী ফীহি রাববী খাইরুন ফাআ‘ঈনূনী বিকুওওয়াতিন আজ‘আল বাইনাকুম ওয়া বাইনাহুম রাদমা-।',
        'আ-তূনী ঝুবারাল হাদীদি হাত্তাইযা-ছা-ওয়া-বাইনাসসাদাফাইনি কা-লানফুখূ হাত্তাইযা-জা‘আলাহূনা-রান কা-লা আ-তূনীউফরিগ ‘আলাইহি কিতরা-।',

        'ওয়া ‘আরাদনা-জাহান্নামা ইয়াওমাইযিল লিলকা-ফিরীনা ‘আরদা-।',
        'আল্লাযীনা কা-নাত আ‘ইউনুহুম ফী গিতাইন ‘আন যিকরী ওয়া কা-নূলা-ইয়াছতাতী‘ঊনা ছাম‘আ-।',
        'আফাহাছিবাল্লাযীনা কাফারূআইঁ ইয়াত্তাখিযূ‘ইবা-দী মিন দূ নীআওলিয়াআ ইন্না আ‘তাদনা-জাহান্নামা লিলকা-ফিরীনা নুঝুলা-।',
        'কুল হাল নুনাব্বিউকুম বিলআখছারীনা আ‘মা-লা-।',
        'আল্লাযীনা দাল্লা ছা‘ইউহুম ফিল হ��য়া-তিদদুনইয়া- ওয়াহুম ইয়াহছাবূনা আন্নাহুম ইউহছিনূনা সুন‘আ-।',
        'উলাইকাল্লাযীনা কাফারূ বিআ-য়া-তি রাব্বিহিম ওয়ালিকাইহী ফাহাবিতাত আ‘মালুহুম ফালা-নুকীমুলাহুম ইয়াওমাল কিয়া-মাতি ওয়াঝনা-।',
        'যা-লিকা জাঝাউহুম জাহান্নামুবিমা-কাফারূওয়াত্তাখাযূআ-য়া-তী ওয়ারুছুলী হুঝুওয়া-।',
        'ইন্নাল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি কা-নাত লাহুম জান্না-তুল ফিরদাওছি নুঝুলা-।',
        'খা-লিদীনা ফীহা-লা-ইয়াবগূনা ‘আনহা-হিওয়ালা-।',
        'কুল লাও কা-নাল বাহরু মিদা-দাল লিকালিমা-তি রাববী লানাফিদাল বাহরু কাবলা আন তানফাদা কালিমা-তুরাববী ওয়ালাও জি’না-বিমিছলিহী মাদাদা-।',
        'কুল ইন্নামাআনা-বাশারুম মিছলুকুম ইউহাইলাইইয়া আন্নামাইলা-হুকুম ইলা-হুওঁ ওয়া-হিদুন ফামান কা-না ইয়ারজূলিকাআ রাব্বিহী ফালইয়া‘মাল ‘আমালান সালিহাওঁ ওয়ালা-ইউশরিক বি‘ইবা-দাতি রাব্বিহীআহাদা-।'

      19: [

        'ফাওয়াছওয়াছা ইলাইহিশ শাইতা-নুকা-লা ইয়াআ-দামুহাল আদুল্লুকা ‘আলা-শাজারাতিল খুলদি ওয়া মুলকিল লা-ইয়াবলা-।',
        'ফাআকালা-মিনহা-ফাবাদাত লাহুমা-ছাওআ-তুহুমা-ওয়া তাফিকা ইয়াখছিফা-নি ‘আলাইহিমা- মিওঁ ওয়ারাকিল জান্নাতি ওয়া ‘আসাআ-দামুরাব্বাহূফাগাওয়া-।',
        'ছু ম্মাজ তাবা-হু রাব্বুহূফাতা-বা ‘আলাইহি ওয়াহাদা-।',
        'কা-লাহ বিতা-মিনহা-জামী‘আম বা‘দুকুম লিবা‘দিন ‘আদুওউন ফাইম্মাইয়া’তিইয়ান্নাকুম মিন্নী হুদান ফামানিততাবা‘আ হুদা-ইয়া ফালা-ইয়াদিল্লুওয়ালাইয়াশকা-।',
        'ওয়া মান আ‘রাদা‘আনযিকরী ফাইন্না লাহূমা‘ঈশাতান দানকাওঁ ওয়ানাহশুরুহূইয়াওমাল কিয়া-মাতি আ‘মা-।',
        'কা-লা রাব্বি লিমা হাশারতানীআ‘মা-ওয়া কাদ কুনতুবাসীরা-।',
        'কা-লা কাযা-লিকা আতাতকা আ-য়া-তুনা-ফানাছীতাহা- ওয়া কাযা-লিকাল ইয়াওমা তুনছা-।',
        'ওয়া কাযা-লিকা নাজঝী মান আছরাফাওয়া লাম ইউ’মিম বিআ-য়া-তি রাব্বিহী ওয়ালা‘আযা-বুল আ-খিরাতি আশাদ্দুওয়া আবকা-।',
        'আফালাম ইয়াহদি লাহুম কাম আহলাকনা-কাবলাহুম মিনাল কুরূনি ইয়ামশূনা ফী মাছাকিনিহিম ইন্না ফী যা-লিকা লাআ-য়া-তিল লিউলিননুহা-।',
        'ওয়ালাওলা-কালিমাতুন ছাবাকাত মির রাব্বিকা লাকা-না লিঝা-মাওঁ ওয়া আজালুম মুছাম্মা-।',
        'ফাসবির ‘আলা-মা-ইয়াকূলূনা ওয়া ছাব্বিহবিহামদি রাব্বিকা কাবলা তুলূ‘ইশশামছি ওয়া কাবলা গুরূবিহা- ওয়া মিন আ-নাইল্লাইলি ফাছাব্বিহওয়া আতরা-ফান্নাহা-রি লা‘আল্লাকা তারদা-।',
        'ওয়ালা-তামুদ্দান্না ‘আইনাইকা ইলা-মা-মাত্তা‘না-বিহীআঝওয়া-জাম মিনহুম ঝাহরাতাল হা-য়া-তিদ দুনইয়া- লিনাফতিনাহুম ফীহি ওয়া রিঝকুরাব্বিকা খাইরুওঁ ওয়া আবকা-।',
        'ওয়া’মুর আহলাকা বিসসালা-তি ওয়াসতাবির ‘আলাইহা- লা-নাছআলুকা রিঝকান নাহনুনারঝুকুকা ওয়াল ‘আ-কিবাতুলিত্তাকওয়া-।',
        'ওয়া কা-লূলাওলা-ইয়া’তীনা-বিআ-য়াতিম মির রাব্বিহী আওয়ালাম তা’তিহিম বাইয়িনাতুমা-ফিসসুহুফিল ঊলা-।',
        'ওয়া লাও আন্নাআহলাকনা-হুম বি‘আযা-বিম মিন কাবলিহী লাকা-লূরাব্বানা-লাওলা আরছালতা ইলাইনা-রাছূলান ফানাত্তাবি‘আ আ-ইয়া-তিকা মিন কাবলি আন নাযিল্লা ওয়া নাখঝা-।',
        'কুল কুল্লুম মুতারাব্বিসুন ফাতারাব্বাসূ ফাছাতা‘লামূনা মান আসহা-বুসসিরা-তিছ ছাবিইয়ি ওয়া মানিহতাদা-।'
      ],
      21: [
        'ইকতারাবা লিন্না-ছি হিছা-বুহুম ওয়া হুম ফী গাফলাতিম মু‘রিদূন।',
        'মা-ইয়া’তীহিম মিন যিকরিম মির রাব্বিহিম মুহদাছিন ইল্লাছতামা‘উহু ওয়া হুম ইয়াল‘আবূন।',
        'লা-হিয়াতান কুলূবুহুম ওয়া আছার রুন নাজওয়াল্লাযীনা জালামূ হাল হা-যা ইল্লা-বাশারুম মিছলুকুম আফাতা’তূনাছছিহরা ওয়া আনতুম তুবসিরূন।',
        'কা-লা রাববী ইয়া‘লামুল কাওলা ফিছছামাই ওয়াল আরদি ওয়া হুওয়াছছামী‘উল ‘আলীম।',
        'বাল কা-লূআদগা-ছু আহলা-মিম বালিফ তারা-হু বাল হুওয়া শা-‘ইরুন ফালইয়া’তিনা-বিআ-য়াতিন কামাউরছিলাল আওওয়ালূন।',
        'মাআ-মানাত কাবলাহুম মিন কারইয়াতিন আহলাকনা-হা- আফাহুম ইউ’মিনূন।',
        'ওয়ামাআরছালনা-কাবলাকা ইল্লা-রিজা-লাননূহীইলাইহিম ফাছআলূআহলাযযিকরি ইন কুনতুম লা-তা‘লামূন।',
        'ওয়ামা-জা‘আলনা-হুম জাছাদাল্লা-ইয়া‘কুলূনাততা‘আ-মা ওয়ামা-কা-নূখা-লিদীন।',
        'ছু ম্মা সাদাকনা-হুমুল ওয়া‘দা ফাআনজাইনা-হুম ওয়া মান নাশাউ ওয়া আহলাকনাল মুছরিফীন।',
        'লাকাদ আনঝালনাইলাইকুম কিতা-বান ফীহি যিকরুকুম আফালা-তা‘কিলূন।',
        'ওকাম কাসামনা- মিন কারইয়াতিন কা-নাত জা-লিমাতাওঁ ওয়া আনশা’না- বা‘দাহাকাওমান আ-খারীন।',
        'ফালাম্মাআহাছছূবা’ছানাইযা-হুম মিনহা-ইয়ারকুদূন।',
        'লা- তারকুদূ ওয়ারজি‘উ ইলা-মাউতরিফতুম ফীহি ওয়া মাছা-কিনিকুম লা‘আল্লাকুম তুছআলূন।',
        'কা-লূইয়া-ওয়াইলানাইন্না-কুন্না-জা-লিমীন।',
        'ফামা-ঝা-লাত তিলকা দা‘ওয়া-হুম হাত্তা-জা‘আলনা-হুম হাসীদান খা-মিদীন।',
        'ওয়ামা-খালাকনাছছামাআ ওয়াল আরদা ওয়ামা-বাইনাহুমা-লা-‘ইবীন।',
        'লাও আরাদনাআন নাত্তাখিযা লাহওয়াল্লাত্তাখাযনা -হু মিল্লাদুন্না ইন কুন্না-ফা-‘ইলীন।',
        'বাল নাকযিফুবিলহাক্কি‘আলাল বা-তিলি ফাইয়াদমাগুহূফাইযা-হুওয়া ঝা-হিকুও ওয়ালাকুমুল ওয়াইলুমিম্মা-তাসিফূন।',
        'ওয়া লাহূমান ফিছছামা-ওয়া-তি ওয়াল আরদি;ওয়ামান ‘ইন্দাহূলা-ইয়াছতাকবিরূনা ‘আন ‘ইবা-দাতিহী ওয়ালা-ইয়াছতাহছিরূন।',
        'ইউছাব্বিহূ নাল লাইলা ওয়ান নাহা-রা লা-ইয়াফতুরূন।',
        'আমিততাখাযূআ-লিহাতাম মিনাল আরদিহুম ইউনশিরূন।',
        'লাও কা-না ফীহিমাআ-লিহাতুন ইল্লাল্লা-হু লাফাছাদাতা- ফাছুবহা-নাল্লা-হি রাব্বিল ‘আরশি ‘আম্মা-ইয়াসিফূন।',
        'লা-ইউছআলু‘আম্মা-ইয়াফ‘আলুওয়া হুম ইউছআলূন।',
        'আমিত তাখাযূমিন দূ নিহীআ-লিহাতান কুল হা-তূবুরহা-নাকুম হা-যা-যিকরু মাম মা‘ইয়া ওয়া যিকরু মান কাবলী বাল আকছারুহুম লা-ইয়া‘লামূনাল হাক্কা ফাহুম মু‘রিদূ ন।',
        'ওয়ামাআরছালনা-মিন কাবলিকা মির রাছূলিন ইল্লা-নূহীইলাইহি আন্নাহূলাইলা-হা ইল্লাআনা-ফা‘বুদূন।',
        'ওয়া কা-লুততাখাযার রাহমা-নুওয়ালাদান ছুবহা-নাহূ বাল ‘ইবা-দুম মুকরামূ��।',
        'লা-ইয়াছবিকূ নাহূবিলকাওলি ওয়া হুম বিআমরিহী ইয়া‘মালূন।',
        'ইয়া‘লামুমা-বাইনা আইদীহিম ওয়ামা-খালফাহুম ওয়ালা-ইয়াশফা‘ঊনা ইল্লালিমানিরতাদা-ওয়া হুম মিন খাশইয়াতিহী মুশফিকূন।',
        'ওয়া মাইঁ ইয়াকুল মিনহুম ইন্নীইলা-হুম মিন দূ নিহী ফাযা-লিকা নাজঝীহি জাহান্নামা কাযা-লিকা নাজঝিজ্জা-লিমীন।',
        'আওয়ালাম ইয়ারাল্লাযীনা কাফারূআন্নছছামা-ওয়া-তি ওয়াল আরদা কা-নাতা-রাতকান ফাফাতাকনা-হুমা- ওয়া জা‘আলনা-মিনাল মাই কুল্লা শাইয়িন হাইয়ি আফালাইউ’মিনূন।',
        'ওয়া জা‘আলনা-ফিল আরদিরাওয়া-ছিয়া আন তামীদা বিহিম ওয়া জা‘আলনা ফীহাফিজাজান ছুবুলাল লা‘আল্লাহুম ইয়াহতাদূ ন।',
        'ওয়া জা‘আলনাছছামাআ ছাকফাম মাহফূজাওঁ ওয়া হুম ‘আন আ-য়া-তিহা মু‘রিদূ ন।',
        'ওয়াহুয়াল্লাযী খালাকাল লাইলা-ওয়ান্নাহা-রা ওয়াশ শামছা ওয়াল কামারা কুল্লুন ফী ফালাকিইঁ ইয়াছবাহূন।',
        'ওয়ামা-জা‘আলনা-লিবাশারিম মিন কাবলিকাল খুলদা আফাইম মিত্তা ফাহুমুল খা-লিদূ ন।',
        'কুল্লুনাফছিন যাইকাতুল মাওতি ওয়া নাবলূকুম বিশশাররি ওয়াল খাইরি ফিতনাতাও ওয়া ইলাইনা-তুর জা‘ঊন।',
        'ওয়া ইযা-রাআ-কাল্লাযীনা কাফারূইয়ঁইয়াত্তাখিযূনাকা ইল্লা-হুঝুওয়ান আহাযাল্লাযী ইয়াযকুরু আ-লিহাতাকুম ওয়া হুম বিযিকরির রাহমা-নি হুম কা-ফিরূন।',
        'খুলিকাল ইনছা-নুমিন ‘আজালিন ছাঊরীকুম আ-য়া-তী ফালা-তাছতা‘জিলূন।',
        'ওয়া-ইয়াকূ লূনা মাতা-হা-যাল ও‘দুইন কুনতুম সা-দিকীন।',
        'লাও ইয়া‘লামুল্লাযীনা কাফারূহীনা লা-ইয়াকুফফূনা ‘আওঁউজুহিহিমুন্না-রা ওয়ালা-‘আন জু হূরিহিম ওয়ালা-হুম ইউনসারূন।',

        'লা-ইয়াছমা‘ঊনা হাছীছাহা- ওয়া হুম ফী মাশতাহাত আনফুছুহুম খা-লিদূ ন।',
        'লা-ইয়াহঝুনুহুমুল ফাঝা‘উল আকবারু ওয়া তাতালাক্কা-হুমুল মালাইকাতু হা-যাইয়াওমুকুমুল্লাযী কুনতুম তূ‘আদূ ন।',
        'ইয়াওমা নাতবিছছামাআ কাতাইয়িছছিজিলিল লিলকুতুবি কামা-বাদা’নাআওয়ালা খালকিন নু‘ঈদুহূ ওয়া‘দান ‘আলাইনা- ইন্না-কুন্না-ফা-‘ইলীন।',
        'ওয়া লাকাদ কাতাবনা-ফিঝঝাবূরি মিম বা‘দিযযিকরি আন্নাল আরদা ইয়ারিছু হা-ইবা দিয়াসসা-লিহূন।',
        'ইন্না ফী হা-যা-লাবালা-গাল লিকাওমিন ‘আ-বিদীন।',
        'ওয়ামাআরছালনা-কা ইল্লা-রাহমাতাল লিল‘আ-লামীন।',
        'কুল ইন্নামা-ইঊহাইলাইয়া আন্নামাইলা-হুকুম ইলা-হুওঁ ওয়াহিদুন ফাহাল আনতুম মুছলিমূন।',
        'ফাইন তাওয়াল্লাও ফাকুল আ-যানতুকুম ‘আলা-ছাওয়াইও ওয়া ইন আদরীআকারীবুন আম বা‘ঈদুম মা-তূ‘আদূ ন।',
        'ইন্নাহূইয়া‘লামুল জাহরা মিনাল কাওলি ওয়া ইয়া‘লামুমা-তাকতুমূন।',
        'ওয়া ইন আদরী লা‘আল্লাহূফিতনাতুল লাকুম ওয়া মাতা-‘উন ইলা-হীন।',
        'কা-লা রাব্বিহকুম বিলহাক্কি ওয়া রাব্বুনার রাহমা-নুল মুছতা‘আ-নু‘আলা-মাতাসিফূন।'
      ],
      22: [
        'ইয়াআইয়ুহান্না-ছুত্তাকূরাব্বাকুম ইন্না ঝালঝালাতাছছা-‘আতি শাইউন ‘আজীম।',
        'ইয়াওমা তারাওনাহা-তাযহালুকুলল মুরদি‘আতিন ‘আম্মাআরদা‘আত ওয়া তাদা’উ কুলুল যা-তি হামলিন হামলাহা-ওয়া তারান্না-ছা ছুকা-রা-ওয়ামা-হুম বিছুকা-রা-ওয়ালা-কিন্না ‘আযা-বাল্লা-হি শাদীদ।',
        'ওয়া মিনান্না-ছি মাইঁ ইউজা-দিলুফিল্লা-হি বিগাইরি ‘ইলমিওঁ ওয়া ইয়াত্তাবি’উ কুল্লা শাইতা নিম মারীদ।',
        'কুতিবা ‘আলাইহি আন্নাহূমান তাওয়াল্লা-হু ফাআন্নাহূইউদিল্লুহূওয়া ইয়াহদীহি ইলা-‘আযাবিছ ছা‘ঈর।',
        'ইয়াআইয়ুহান্না-ছুইন কুনতুম ফীরাইবিম মিনাল বা‘ছি ফাইন্না-খালাকনা-কুম মিন তুরা-বিন ছু ম্মা মিন নুতফাতিন ছুম্মা মিন ‘আলাকাতিন ছুম্মা মিম মু দগাতিম মুখালিলকাতিওঁ ওয়া গাইরি মুখাল্লাকাতিল লিনুবাইয়িনা লাকুম ওয়া নুকিররু ফিল আরহা-মি মা-নাশাউ ইলাআজালিম মুছাম্মান ছুম্মা নুখরিজুকুম তিফলান ছুম্মা লিতাবলুগূআশুদ্দাকুম ওয়া মিনকুম মাইঁ ইউতাওয়াফফা-ওয়া মিনকুম মাইঁ ইউরাদ্দুইলাআরযালিল ‘উমুরি লিকাইলাইয়া‘লামা মিম বা‘দি ‘ইলমিন শাইআওঁ ওয়া তারাল আরদা হা-মিদাতান ফাইযা আনঝালনা-‘আলাইহাল মাআহতাঝঝাত ওয়া রাবাত ওয়া আমবাতাত মিন কুল্লি ঝাওজিম বাহীজ।',
        'যা-লিকা বিআন্নাল্লা-হা হুওয়াল হাক্কু ওয়া আন্নাহূইউহয়িল মাওতা-ওয়া আন্নাহূ‘আলাকুল্লি শাইয়িন কাদীর।',
        'ওয়া আন্নাছছা-‘আতা আ-তিয়াতুল লা-রাইবা ফীহা- ওয়া আন্নাল্লা-হা ইয়াব‘আছুমান ফিল কুবূর।',
        'ওয়া মিনান্না-ছি মাইঁ ইউজা-দিলুফিল্লা-হি বিগাইরি ‘ইলমিওঁ ওয়ালা-হুদাওঁ ওয়ালা-কিতা-বিম মুনীর।',
        'ছা-নিয়া-‘ইতফিহী লিইউদিল্লা ‘আন ছাবীলিল্লা-হি লাহূফিদ দুনইয়া-খিঝইয়ুওঁ ওয়া নুযীকুহূইয়াওমাল কিয়া-মাতি ‘আযা-বাল হারীক।',
        'যা-লিকা বিমা-কাদ্দামাত ইয়াদা-কা ওয়া আন্নাল্লা-হা লাইছা বিজাল্লা-মিল লিল‘আবীদ।',
        'ওয়া মিনান্না-ছি মাইঁ ইয়া‘বুদুল্লা-হা ‘আলা-হারফিন ফাইন আসা-বাহূখাইরুনিতমাআন্না বিহী ওয়া ইন আসা-বাতহু ফিতনাতুনিনকালাবা ‘আলা-ওয়াজহিহী খাছিরাদ দুনইয়া-ওয়াল আ-খিরাতা যা-লিকা হুওয়াল খুছরা-নুল মুবীন।',
        'ইয়াদ‘ঊ মিন দূ নিল্লা-হি মা-লা-ইয়াদুররুহূওয়ামা- লা- ইয়ানফা‘উহূ যা-লিকা হুওয়াদ দালা-লুল বা‘ঈদ।',
        'ইয়াদ‘ঊ লামান দাররুহূআকরাবুমিন নাফ‘ইহী লাবি’ছাল মাওলা-ওয়ালা-বি’ছাল ‘আশীর।',
        'ইন্নাল্লা-হা ইউদখিলুল্লাযীনা আ-মানূওয়া আমিলুসসা-লিহা-তি জান্না-তিন তাজরী মিন তাহতিহাল আহা-রু ইন্নাল্লা-হা ইয়াফ‘আলুমা-ইউরীদ।',
        'মান কা-না ইয়াজু ন্নুআল্লাইঁ ইয়ানসুরাহুল্লা-হুফিদদুনইয়া-ওয়াল আ-খিরাতি ফালইয়ামদুদ বিছাবাবিন ইলাছ ছামাইছু ম্মাল ইয়াকতা‘ ফালইয়ানজু র হাল ইউযহিবান্না কাইদুহূমাইয়াগীজ।',
        'ওয়া কাযা-লিকা আনঝালনা-হু আ-য়া-তিম বাইয়িনা-তিওঁ ওয়া আন্নাল্লা-হা ইয়াহদী মাইঁ ইউরীদ।',
        'ইন্নাল্লাযীনা আ-মানূওয়াল্লাযীনা হা-দূওয়াসসা-বিঈনা ওয়ান্নাসা-রা-ওয়াল মাজুছা ওয়াল্লাযীনা আশরাকূ ইন্নাল্লা-হা ইয়াফসিলুবাইনাহুম ইয়াওমাল কিয়া-মাতি ইন্নাল্লা-হা ‘আলা-কুল্লি শাইয়িন শাহীদ।',
        'আলাম তারা আন্নাল্লা-হা ইয়াছজুদুলাহূ মান ফিছ ছামা-ওয়া-তি ওয়া মান ফিল আরদি ওয়াশশামছুওয়ালকামারু ওয়ান নুজূমুওয়াল জিবা-লুওয়াশশাজারু ওয়াদ্দাওয়া ব্বুওয়া কাছীরুম মিনান্না-ছি ওয়া কাছীরুন হাক্কা ‘আলাইহিল ‘আযা-বু ওয়া মাইঁ ইউহিনিল্লা-হু ফামা-লাহূ মিম মুকরিমিন ইন্নাল্লা-হা ইয়াফ‘আলুমা-ইয়াশাউ। (সিজদা-৬)',
        'হা-যা-নি খাছমা-নিখ তাছামূফী রাব্বিহিম ফাল্লাযীনা কাফারূকুত্তি‘আত লাহুম ছিয়া-বুম মিন্না-রিইঁ ইউসাব্বুমিন ফাওকিরুঊছিহিমুল হামীম।',
        'ইউসহারু বিহী মা-ফী বুতূনিহিম ওয়াল জুলূদ।',
        'ওয়া লাহুম মাকা-মি‘উ মিন হাদীদ।',
        'কুল্লামাআরা-দূ আইঁ ইয়াখরুজুমিনহা-মিন গাম্বিন উ‘ঈদূফীহা- ওয়া যূকূ‘আযাবাল হারীক।',
        'কুল্লামাআরা-দূ আইঁ ইয়াখরুজুমিনহা-মিন গাম্বিন উ‘ঈদূফীহা- ওয়া যূকূ‘আযাবাল হারীক।',
        'ওয়া হুদূ ইলাততাইয়িবি মিনাল কাওলি ওয়া হুদূ ইলা-সিরা-তিল হামীদ।',
        'ইন্নাল্লাযীনা কাফারূওয়া ইয়াসুদ্দূনা ‘আন ছাবীলিল্লা-হি ওয়াল মাছজিদিল হারা-মিল্লাযী জা‘আলনা-হু লিন্না-ছি ছাওয়া-আনিল ‘আ-কিফুফীহি ওয়াল বা-দি ওয়া মাইঁ ইউরিদ ফীহি বিইলহা-দিম বিজু লমিন নুযিকহু মিন ‘আযা-বিন আলীম।',
        'ওয়া ইয বাওওয়া’না- লিইবরা-হীমা মাকা-নাল বাইতি আল্লা-তুশরিক বী শাইআও ওয়াতাহহির বাইতিয়া লিততাইফীনা ওয়াল কাইমীনা ওয়াররুক্কা‘ইছছুজুদ।',
        'ওয়া আযযিনফিন্না-ছি বিলহাজ্জি ইয়া’তূকা রিজা-লাওঁ ওয়া ‘আলা-কুল্লি দামিরিইঁ ইয়া’তীনা মিন কুল্লি ফাজজিন ‘আমীক।',
        'লিইয়াশহাদূমানা-ফি‘আ লাহুম ওয়া ইয়াযকুরুছমাল্লা-হি ফীআইইয়া-মিম মা‘লূমা-তিন ‘আলা-মা-রাঝাকাহুম মিম বাহীমাতিল আন‘আ-মি ফাকুলূমিনহা-ওয়াআত‘ইমুল বাইছাল ফাকীর।',
        'ছু ম্মাল ইয়াকদূ তাফাছাহুম ওয়ালইউফূনুযূরাহুম ওয়াল ইয়াততাওওয়াফূবিলবাইতিল ‘আতীক।',
        'যা-লিকা ওয়া মাইঁ ইউ‘আজজিম হুরুমা-তিল্লা-হি ফাহুওয়া খাইরুল্লাহূ‘ইনদা রাব্বিহী ওয়া-উহিল্লাত লাকুমুল আন‘আ-মুইল্লা-মা-ইউতলা-‘আলাইকুম ফাজতানিবুর রিজছা মিনাল আওছা-নি ওয়াজতানিবূকাওলাঝঝূর।',
        'হুনাফাআ লিল্লা-হি গাইরা মুশরিকীনা বিহী ওয়া মাইঁ ইউশরিক বিল্লা-হি ফাকাআন্নামাখাররা মিনাছছামাই ফাতাখতাফুহুততাইরু আও তাহওয়ী বিহির রীহুফী মাকা-নিন ছাহীক।',

        'লিইয়াজঝিইয়াহুমুল্লা-হু আহছানা মা-‘আমিলূওয়া ইয়াঝীদাহুম মিন ফাদলিহী ওয়াল্লা-হু ইয়ারঝুকুমাইঁ ইয়াশাউ বিগাইরি হিছা-ব।',
        'ওয়াল্লাযীনা কাফারূআ‘মা-লুহুম কাছারা-বিম বিকী‘আতিইঁ ইয়াহছাবুহুজ্জামআ-নু মাআন হাত্তাইযা-জাআহূলাম ইয়াজিদহু শাইআওঁ ওয়া ওয়াজাদাল্লা-হা ‘ইনদাহূ ফাওয়াফফা-হু হিছা-বাহূ ওয়াল্লা-হু ছারী‘উল হিছা-ব।',
        'আও কাজুলুমা-তিন ফী বাহরিল লুজ্জিইয়িইঁ ইয়াগশা-হু মাওজুম মিন ফাওকিহী মাওজুম মিন ফাওকিহী ছাহা-বুন জু লুমা-তুম বা‘দুহা-ফাওকা বা‘দিন ইযাআখরাজা ইয়াদাহূলাম ইয়াকাদ ইয়ারা-হা- ওয়া মাল লাম ইয়াজ‘আলিল্লা-হু লাহূনূরান ফামালাহূমিননূর।',
        'আলাম তারা আন্নাল্লা-হা ইউছাব্বিহুলাহূমান ফিছ ছামা-ওয়া-তি ওয়াল আরদি ওয়াততাইরু সাফফা-তিন কুল্লুন কাদ ‘আলিমা সালা-তাহূওয়া তাছবীহাহূও ওয়াল্লা-হু ‘আলীমুম বিমা-ইয়াফ‘আলুন।',
        'ওয়ালিল্লা-হি মুলকুছছামা-ওয়া-তি ওয়াল আরদি ওয়া ইলাল্লা-হিল মাসীর।',
        'আলাম তারা আন্নাল্লা-হা ইউঝজী ছাহা-বান ছুম্মা ইউআলিলফুবাইনাহূছু ম্মা ইয়াজ‘আলুহূ রুকা-মান ফাতারাল ওয়াদকা ইয়াখরুজুমিন খিলা-লিহী ওয়া ইউনাঝঝিলুমিনাছছামাই মিন জিবা-লিন ফীহা-মিম বারাদিন ফাইউসীবুবিহী মাইঁ ইয়াশাউ ওয়া ইয়াসরিফুহূ‘আম মাইঁ ইয়াশাউ ইয়াকা-দুছানা-বারকিহী ইয়াযহাবুবিলআবসা-র।',
        'ইউকালিলবুল্লা-হুল লাইলা ওয়ান্নাহা-রা ইন্না ফী যা-লিকা লা‘ইবরাতাল লিঊলিল আবসার।',
        'ওয়াল্লা-হু খালাকাকুল্লা দাব্বাতিম মিম মাইন ফামিনহুম মাইঁ ইয়ামশী ‘আলাবাতনিহী ওয়া মিনহুম মাইঁ ইয়ামশী ‘আলা-রিজলাইনি ওয়া মিনহুম মাইঁ ইয়ামশী ‘আলাআরবা‘ইন ইয়াখলুকুল্লা-হু মা-ইয়াশাউ ইন্নাল্লা-হা ‘আলা-কুল্লি শাইয়িন কাদীর।',
        'লাকাদ আনঝালনাআ-য়া-তিম মুবাইয়িনা-তিওঁ ওয়াল্লা-হু ইয়াহদী মাইঁ ইয়াশাউ ইলা-সিরা-তিম মুছতাকীম।',
        'ওয়া ইয়াকূলূনা আ-মান্না-বিল্লা-হি ওয়া বিররাছূলি ওয়া আতা‘না-ছু ম্মা ইয়াতাওয়াল্লাফারীকুম মিনহুম মিম বা‘দি যা-লিকা ওয়ামাউলাইকা বিলমু’মিনীন।',
        'ওয়া ইযা-দু’ঊইলাল্লা-হি ওয়া রাছূলিহী লিইয়াহকুমা বাইনাহুম ইযা-ফারীকুমমিনহুম মু‘রিদূন।',
        'ওয়াইয়ঁইয়াকুল লাহুমুল হাক্কুইয়া’তূইলাইহি মুয’ইনীন।',
        'আফী কুলূবিহিম মারাদুন আমিরতা-বূআম ইয়াখা-ফূনা আইঁ ইয়াহীফাল্লা-হু ‘আলাইহিম ওয়া রাছূলুহূ বাল উলাইকা হুমুজ্জা-লিমূন।',
        'ইন্নামা-কা-না কাওলাল মু’মিমীনা ইযা-দু‘উইলাল্লা-হি ওয়া রাছূলিহী লিইয়াহকুমা বাইনাহুম আইঁ ইয়াকূলূছামি‘না-ওয়া আতা‘না- ওয়া উলাইকা হুমুল মুফলিহূন।',
        'ওয়া মাইঁ ইউতি‘ইল্লা-হা ওয়া রাছূলাহূওয়া ইয়াখশাল্লা-হা ওয়া ইয়াত্তাকহি ফাউলাইকা হুমুল ফাইঝূন।',
        'ওয়া আকছামূবিল্লা-হি জাহদা আইমা-নিহিম লাইন আমারতাহুম লাইয়াখরুজুন্না কুল লাতুকছিমূ তা-‘আতুম মা‘রূফাতুন ইন্নাল্লা-হা খাবীরুম বিমা-তা‘মালূন।',
        'কুল আতী‘উল্লা-হা ওয়া আতী‘উররাছূলা ফাইন তাওয়াল্লাও ফাইন্নামা -‘আলাইহি মাহুম্মিলা ওয়া ‘আলাইকুম মা-হুম্মিলতুম ওয়া ইন তুতী‘ঊহু তাহতাদূ ওয়ামা‘আলার রাছূলি ইল্লাল বালা-গুল মুবীন।',
        'ওয়া ‘আদাল্লা-হুল লাযীনা আ-মানূ মিনকুম ওয়া আমিলুসসা-লিহা-তি লাইয়াসতাখলিফান্নাহুম ফিল আরদিকামাছ তাখলাফাল্লাযীনা মিন কাবলিহিম ওয়া লাইউমাক্কিনান্না লাহুম দীনাহুমুল্লাযির তাদা-লাহুম ওয়ালা ইউবাদ্দিলান্নাহুম মিম বা‘দি খাওফিহিম আমনা- ইয়া‘বুদূ নানী লা-ইউশরিকূনা বী শাইআওঁ ওয়া মান কাফারা বা‘দা যা-লিকা ফাউলাইকা হুমুল ফা-ছিকূন।',
        'ওয়া আকীমুসসালা-তা ওয়া-আ-তুঝঝাকা-তা ওয়া আতী‘উর রাছূলা লা‘আল্লাকুম তুরহামূন।',
        'লা-তাহছাবান্নাল্লাযীনা কাফারূমু‘জিঝীনা ফিল আর দি ওয়ামা’ওয়া-হুমুন্না-রু ওয়ালাবি’ছাল মাসীর।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূলিইয়াছতা’যিনকুমুল্লাযীনা মালাকাত আইমা-নুকুম ওয়াল লাযীনা লাম ইয়াবলুগুল হুলুমা মিনকুম ছালা-ছা মাররা-তিন মিন কাবলি সালা-তিল ফাজরি ওয়া হীনা তাদা‘ঊনা ছিয়া-বাকুম মিনাজ্জাহীরাতি ওয়া মিম বা‘দি সালা-তিল ‘ইশাই ছালা-ছু‘আওরা-তিল্লাকুম লাইছা ‘আলাইকুম ওয়ালা-‘আলাইহিম জুনা-হুম বা‘দাহুন্না তাওওয়া-ফূনা ‘আলাইকুম বা‘দুকু�� ‘আলা-বা‘দিন কাযালিকা ইউবাইয়িনুল্লা-হু লাকুমুল আ-য়া-তি ওয়াল্লা-হু ‘আলীমুন হাকীম।',
        'ওয়া ইযা-বালাগাল আতফা-লুমিনকুমুল হুলুমা ফালইয়াছতা’যিনূকামাছতা’যানাল্লাযীনা মিন কাবলিহিম কাযা-লিকা ইউবাইয়িনুল্লা-হু লাকুম আ-য়া-তিহী ওয়াল্লা-হু ‘আলীমুন হাকীম।',
        'ওয়াল কাওয়া-‘ইদুমিনাননিছাইল্লা-তী লা-ইয়ারজুনা নিকা-হান ফালাইছা ‘আলাইহিন্না জুনা-হুন আইঁ ইয়াদা‘না ছিয়া-বাহুন্না গাইরা মুতাবাররিজা-তিম বিঝীনাতিও ওয়া আইঁ ইয়াছতা‘ফিফনা খাইরুল লাহুন্না ওয়াল্লা-হু ছামী‘উন ‘আলীম।',
        'লাইছা ‘আলাল আ‘মা-হারাজুইঁওয়ালা-‘আলাল আ‘রাজি হারাজুওঁ ওয়ালা ‘আলাল মারীদি হারাজুওঁ ওয়ালা-‘আলা- আনফুছিকুম আন তা’কুলূমিম বুয়ূতিকুম আও বুয়ূতি আ-বাইকুম আও বুয়ূতি উম্মাহা-তিকুম আও বুয়ূতি ইখওয়া-নিকুম আও বুয়ূতি আখাওয়া-তিকুম আও বুয়ূতি আ‘মা-মিকুম আও বুয়ূতি ‘আম্মা-তিকুম আও বুয়ূতি আখওয়া-লিকুম আও বুয়ূতি খা-লাতিকুম আও মা-মালাকতুম মাফা-তিহাহূআও সাদীকিকুম লাইছা ‘আলাইকুম জুনা-হুন আন তা‘কুলূজামী‘আন আও আশতা-তান ফাইযা-দাখাল তুম বূয়ূতান ফাছালিল-মূ‘আলা আনফুছিকুম তাহিইইয়াতাম মিন ‘ইনদিল্লা-হি মুবা-রাকাতান তাইয়িবাতান কাযা-লিকা ইউবাইয়িনুল্লা-হু লাকুমুল আ-য়া-তি লা‘আল্লাকুম তা’কিলূন।',
        'ইন্নামাল মু’মিনূনাল্লাযীনা আ-মানূ বিল্লা-হি ওয়া রাছূলিহী ওয়া ইযা-কা-নূ মা‘আহূ‘আলা আমরিন জামি‘ইল লাম ইয়াযহাবূহাত্তা-ইয়াছতা’যিনূহু ইন্নাল্লাযীনা ইয়াছতা’যিনূনাকা উলাইকাল্লাযীনা ইউ’মিনূনা বিল্লা-হি ওয়া রাছূলিহী ফাইযাছতা’যানূকা লিবা‘দি শা’নিহিম ফা’যাল লিমান শি’তা মিনহুম ওয়াছতাগফির লাহুমুল্লা-হা ইন্নাল্লা-হা গাফরুর রাহীম।',
        'লা-তাজ‘আলূদু‘আআররাছূলি বাইনাকুম কাদু‘আই বা‘দিকুম বা‘দান কাদ ইয়ালামুল্লা-হুল্লাযীনা ইয়াতাছাল্লালূনা মিনকুম লিওয়া-যান ফালইয়াহযারিল্লাযীনা ইউখালিফূনা ‘আন আমরিহীআন তুসীবাহুম ফিতনাতুন আও ইউসীবাহুম ‘আযা-বুন আলীম।',
        'আলাইন্না লিল্লা-হি মা-ফিছছামা-ওয়া-তি ওয়াল আরদি কাদ ইয়া‘লামুমাআনতুম ‘আলাইহি ওয়া ইয়াওমা ইউরজা‘ঊনা ইলাইহি ফাইউনাব্বিঊহুম বিমা-‘আমিলূ ওয়াল্লা-হু বিকুল্লি শাইয়িন ‘আলীম।'
      ],
      25: [

        'ওয়া ইযা-ওয়াকা‘আল কাওলু‘আলাইহিম আখরাজনা-লাহুম দাব্বাতাম মিনাল আরদি তুকালিলমুহুম আন্নান্না-ছা কা-নূবিআ-য়া-তিনা-লা-ইঊকিনূন।',
        'ওয়া ইয়াওমা নাহশুরু মিন কুল্লি উম্মাতিন ফাওজাম মিম্মাইঁ ইউকাযযিবুবিআ-য়া-তিনা-ফাহুম ইউঝা‘ঊন।',
        'হাত্তাইযা- জাঊকা-লা আকাযযাবতুমবিআ-য়া-তী ওয়া লাম তুহীতূবিহা‘ইলমান আম্মা-যা-কুনতুম তা‘মালূন।',
        'ওয়া-ওয়াকা‘আল কাওলু‘আলাইহিম বিমা-জালামূফাহুম লা-ইয়ানতিকূন।',
        'আলাম ইয়ারাও আন্না-জা‘আলনাল্লাইলা লিইয়াছকুনূফীহি ওয়ান্নাহা-রা মুবসিরান ইন্না ফী যা-লিকা লাআ-য়া-তিল লিকাওমিইঁ ইউ’মিনূন।',
        'ওয়া ইয়াওমা ইউনফাখুফিসসূরি ফাফাঝি‘আ মান ফিছছামা-ওয়া-তি ওয়া মান ফিল আরদি ইল্লা-মান শাআল্লা-হু ওয়া কুললন আতাওহু দা-খিরীন।',
        'ওয়া তারাল জিবা-লা তাহছাবুহা-জা-মিদাতাওঁ ওয়াহিয়া তামুররু মাররাছছাহা-বি সুন‘আল্লা-হিল্লাযী আতকানা কুল্লা শাইয়িন ইন্নাহূখাবীরুম বিমা-তাফ‘আলূন।',
        'মান জাআ বিলহাছানাতি ফালাহূখাইরুম মিনহা- ওয়া হুম মিন ফাঝাইয়ঁইয়াওমাইযিন আ-মিনূন।',
        'ওয়া মান জাআ বিছছাইয়িআতি ফাকুব্বাত উজূহুহুম ফিন্না-রি হাল তুজঝাওনা ইল্লা-মাকনতুম তা‘মালূন।',
        'ইন্নামা উমিরতুআন আ‘বুদা রাব্বা হা-যিহিল বালদাতিল্লাযী হাররামাহা-ওয়ালাহূকুল্লু শাইয়িওঁ ওয়া উমিরতুআন আকূনা মিনাল মুছলিমীন।',
        'ওয়া আন আতলুওয়াল কুরআ-না ফামানিহ তাদা-ফাইন্নামা-ইয়াহতাদী লিনাফছিহী ওয়া মান দাল্লা ফাকুল ইন্নামা আনা মিনাল মুনযিরীন।',
        'ওয়া কুল্লি হামদুলিল্লা-হি ছাইউরীকুম আ-য়া-তিহী ফাতা‘রিফূনাহা- ওয়ামা-রাব্বুকা বিগা-ফিলিন ‘আম্মা-তা‘মালূন।'
      ],
      28: [
        'তা-ছিম মীম।',
        'তিলকা আ-য়া-তুল কিতা-বিল মুবীন।',
        'নাতলূ‘আলাইকা মিন নাবাই মূছা-ওয়াফির‘আওনা বিলহাক্কিলিকাওমিইঁ ইউ’মিনূন।',
        'ইন্না ফির‘আওনা ‘আলা-ফিল আরদিওয়াজা‘আলা আহলাহা-শিইয়া‘আইঁ ইয়াছতাদ‘ইফু তাইফাতাম মিনহুম ইউযাব্বিহুআবনাআহুম ওয়াইয়াছতাহয়ী নিছাআহুম ইন্নাহূ কা-না মিনাল মুফছিদীন।',
        'ওয়ানুরীদুআন্নামুন্না ‘আলাল্লাযীনাছতুদ‘ইফূফিল আরদি ওয়া নাজ‘আলাহুম আয়িম্মাতাওঁ ওয়া নাজ‘আলাহুমুল ওয়া-রিছীন।',
        'ওয়া নুমাক্কিনা লাহুম ফিল আরদি ওয়া নুরিয়া ফির‘আওনা ওয়া হা-মা-না ওয়া জুনূদাহুমামিনহুম মা-কা-নূইয়াহযারূন।',
        'ওয়া আওহাইনাইলাউম্মিা মূছাআন আরদি‘ঈহি ফাইযা-খিফতি ‘আলাইহি ফাআলকীহি ফিল ইয়াম্মি ওয়ালা-তাখা-ফী ওয়ালা-তাহঝানী ইন্না-রাদ্দূহু ইলাইকি ওয়া জা-‘ইলূহু মিনাল মুরছালীন।',
        'ফালতাকাতাহূ আ-লুফির‘আওনা লিয়াকূনা লাহুম ‘আদুওওয়াওঁ ওয়া হাঝানান ইন্না ফির‘আওনা ওয়া হা-মা-না ওয়া জুনূদাহুমা-কা-নূখা-তিঈন।',
        'ওয়া কা-লাতিমরাআতুফির‘আওনা কুররাতু‘আইনিললী ওয়ালাকা লা-তাকতুলূহু ‘আছা আইঁ ইয়ানফা‘আনাআও নাত্তাখিযাহূওয়ালাদাওঁ ওয়া হুম লা-ইয়াশ‘উরূন।',
        'ওয়াআসবাহা ফুআ-দুউম্মি মূছা-ফা-রিগান ইন কা-দাত লাতুবদী বিহী লাওলাআর রাবাতনা-‘আলা-কালবিহা-লিতাকূনা মিনাল মু’মিনীন',
        'ওয়া কা-লাত লিউখতিহী কুসসীহি ফাবাসুরাত বিহী ‘আন জুনুবিওঁ ওয়াহুম লাইয়াশ‘উরূন।',
        'ওয়া হাররামনা- ‘আলাইহিল মারা-দি‘আ মিন কাবলুফাকা-লাত হাল আদুললকুম ‘আলাআহলি বাইতিইঁ ইয়াকফুলূনাহূলাকুম ওয়াহুম লাহূনা-সিহূন।',
        'ফারাদাদনা-হুইলাউম্মিহী কাই তাকাররা ‘আইনুহা- ওয়ালা-তাহঝানা, ওয়ালিতা‘লামা আন্না ওয়া‘দাল্লা-হি হাক্কুওঁ ওয়ালা-কিন্না আকছারাহুম লা-ইয়া‘লামূন।',
        'ওয়ালাম্মা-বালাগা আশুদ্দাহূওয়াছতাওয়াআ-তাইনা-হু হুকমাওঁ ওয়া ‘ইলমাওঁ ওয়া কাযা-লিকা নাজঝিল মুহছিনীন।',
        'ওয়া দাখালাল মাদীনাতা ‘আলা-হীনি গাফলাতিম মিন আহলিহা-ফাওয়াজাদাফীহারাজুলাইনি ইয়াকতাতিলা-নি হা-যা-মিন শী‘আতিহী ওয়া হা-যা-মিন আদুওবিহী ফাছতাগা-ছাহুল্লাযী মিন শী‘আতিহী ‘আলাল্লাযী মিন ‘আদুওবিহী ফাওয়াকাঝাহূ মূছা-ফাকাদা-‘আলাইহি কা-লা হা-যা-মিন ‘আমালিশশাইতা-নি ইন্নাহূ ‘আদুওউম মুদিল্লুম মুবীন।',
        'কা-লা রাব্বি ইন্নী জালামতুনাফছী ফাগফিরলী ফাগাফারা লাহূ ইন্নাহূহুওয়াল গাফূরুর রাহীম।',
        'কা-লা রাব্বি বিমাআন‘আমতা আলাইইয়া ফালান আকূনা জাহীরাল লিলমুজরিমীন।',
        'ফাআসবাহা ফিল মাদীনাতি খাইফাইঁ ইয়াতারাক্কাবুফাইযাল্লাযিছ তানসারাহূবিলআমছি ইয়াছতাসরিখুহু কা-লা লাহূমূছাইন্নাকা লাগাবিইউম মুবীন।',
        'ফালাম্মাআন আরা-দা আইঁ ইয়াবতিশা বিল্লাযী হুওয়া ‘আদুওউল্লাহুমা- কা-লা ইয়া-মূছাআতুরীদুআন তাকতুলানী কামা-কাতালতা নাফছাম বিলআমছি ইন তুরীদু ইল্লাআন তাকূনা জাব্বা-রান ফিল আরদিওয়ামা-তুরীদুআন তাকূনা মিনাল মুসলিহীন।',
        'ওয়া জাআ রাজুলুম মিন আকসাল মাদীনাতি ইয়াছ‘আ- কা-লা ইয়া-মূছাইন্নাল মালায়া ইয়া’তামিরূনা বিকা লিইয়াকতুলূকা ফাখরুজ ইন্নী লাকা মিনান না-সিহীন।',
        'ফাখারাজা মিনহা-খা-ইফাইঁ ইয়াতারাক্কাবু কা-লা রাব্বি নাজ্জিনী মিনাল কাওমিজ্জা-লিমীন।',
        'ওয়া লাম্মা-তাওয়াজ্জাহা তিলকাআ মাদইয়ানা কা-লা ‘আছা-রাববীআই ইয়াহদিয়ানী ছাওয়াআছছাবীল।',
        'ওয়া লাম্মা-ওয়ারাদা মাআ মাদইয়ানা ওয়াজাদা ‘আলাইহি উম্মাতাম মিনান্না-ছি ইয়াছকূনা ওয়া ওয়াজাদা মিন দূনিহিমুমরাআতাইনি তাযূদা-নি কা-লা মা-খাতবুকুমা- কা-লাতা-লা-নাছকী হাত্তা-ইউসদিরার রি‘আউ ওয়া আবূনা-শাইখুন কাবীর।',
        'ফাছাকা-লাহুমা-ছু ম্মা তাওয়াল্লাইলাজজিলিল ফাকা-লা রাব্বি ইন্নী লিমাআনঝালতা ইলাইইয়া মিন খাইরিন ফাকীর।',
        'ফাজাআতহু ইহদা-হুমা-তামশী ‘আলাছ তিহইয়া-ইন, কা-লাত ইন্না আবী ইয়াদ‘ঊকা লিইয়াজঝিয়াকা আজরামা-ছাকাইতা লানা- ফালাম্মা-জাআহূওয়া কাসসা ‘আলাইহিল কাসাসা কা-লা লা-তাখাফ নাজাওতা মিনাল কাওমিজ্জালিমীন।',
        'কা-লাত ইহদা-হুমা-ইয়াআবাতিছ তা’জিরহু ইন্না খাইরা মানিছতা’জারতাল কাবিইয়ুউল আমীন।',
        'কা-লা ইন্নীউরীদুআন উনকিহাকা ইহদাব নাতাইইয়া হা-তাইনি ‘আলাআন তা’জুরানী ছামা-নিয়া হিজাজিন ফাইন আতমামতা ‘আশরান ফামিন ‘ইনদিকা ওয়ামাউরীদু আন আশুক্কা ‘আলাইকা ছাতাজিদুনীইন শাআল্লা-হু মিনাসসা-লিহীন।',
        'কা-লা যা-লিকা বাইনি ওয়া বাইনাকা আইইয়ামাল আজালাইনি কাদাইতুফালা‘উদওয়া-না ‘আলাইইয়া ওয়াল্লা-হু ‘আলা-মা-নাকূলুওয়াকীল।',

        'কুল আরাআইতুম ইন জা‘আলাল্লা-হু ‘আলাইকুমুন নাহা-রা ছার মাদান ইলা-ইয়াওমিল কিয়ামাতি মান ইলা-হুন গাইরুল্লা-হি ইয়া’তীকুম বিলাইলিন তাছকুনূনা ফীহি আফালাতুবসিরূন।',
        'ওয়া মির রাহমাতিহী জা‘আলা লাকুমুল লাইলা ওয়ান নাহা-রা লিতাছকুনূফীহি ওয়ালিতাবতাগূ মিন ফাদলিহী ওয়া লা‘আল্লাকুম তাশকুরূন।',
        'ওয়া ইয়াওমা ইউনা-দীহিম ফাইয়াকূলুআইনা শুরাকাইয়াল্লাযীনা কুনতুম তাঝ‘উমূন।',
        'ওয়ানাঝা‘না-মিন কুল্লি উম্মাতিন শাহীদান ফাকুলনা-হা-তূবুরহা-নাকুম ফা‘আলিমূআন্নাল হাক্কা লিল্লা-হি ওয়া দাল্লা ‘আনহুম মা-কা-নূইয়াফতারূন।',
        'ইন্না কা-রূনা কা-না মিন কাওমি মূছা-ফাবাগা-‘আলাইহিম ওয়া আ-তাইনা-হু মিনাল কুনূঝি মাইন্না মাফা-তিহাহূলাতানূউ বিল‘উসবাতি উলিল কুওওয়াতি ইযকা-লা লাহূকাওমুহূলা-তাফরাহইন্নাল্লা-হা লা-ইউহিব্বুল ফারিহীন।',
        'ওয়াবতাগি ফিমাআ-তা-কাল্লা-হুদ্দা-রাল আ-খিরাতা ওয়ালা-তানছা নাসীবাকা মিনাদদুনইয়া-ওয়া আহছিন কামাআহছানাল্লা-হু ইলাইকা ওয়ালা তাবগিল ফাছা-দা ফিল আরদি ইন্নাল্লা-হা লা-ইউহিব্বুল মুফছিদীন।',
        'কা-লা ইন্নামাঊতীতুহূ‘আলা-‘ইলমিন ‘ইনদী আওয়ালাম ইয়া‘লাম আন্নাল্লা-হা কাদ আহলাকা মিন কাবলিহী মিনাল কুরূনি মান হুওয়া আশাদ্দুমিনহু কুওওয়াতাওঁ ওয়া আক ছারু জাম‘আওঁ ওয়ালা-ইউছআলু‘আন যুনূবিহিমুল মুজরিমূন।',
        'ফাখারাজা ‘আলা-কাওমিহী ফী ঝীনাতিহী কা-লাল্লাযীনা ইউরীদূ নাল হায়া-তাদ দুনইয়া-ইয়া-লাইতা লানা-মিছলা মাঊতিয়া কা-রূনু ইন্নাহূলাযূহাজ্জিন ‘আজীম।',
        'ওয়া কা-লাল্লাযীনা ঊতুল ‘ইল মা ওয়াইলাকুম ছাওয়া-বুল্লা-হি খাইরুল লিমান আ-মানা ওয়া ‘আমিলা সা-লিহাওঁ ওয়ালা-ইউলাক্কা-হাইল্লাসসা-বিরূন।',
        'ফাখাছাফনা-বিহী ওয়া বিদা-রিহিল আরদা ফামা-কা-না লাহূমিন ফিয়াতিইঁ ইয়ানসুরূনাহূমিন দূ নিল্লা-হি ওয়ামা-কা-না মিনাল মুনতাসিরীন।',
        'ওয়া আসবাহাল্লাযীনা তামান্নাও মাকা-নাহূবিলআমছি ইয়াকূলূনা ওয়াইকাআন্নাল্লা-হা ইয়াবছুতুররিঝকা লিমাইঁ ইয়াশাঊ মিন ‘ইবা-দিহী ওয়া ইয়াকদিরু লাওলাআম মান্নাল্লা-হু ‘আলাইনা-লাখাছাফা বিনা- ওয়াইকাআন্নাহূলা-ইউফলিহুল কা-ফিরূন।',
        'তিলকাদ্দা-রুল আ-খিরাতুনাজ‘আলুহা-লিল্লাযীনা লা-ইউরীদূ না ‘উলুওওয়ান ফিল আরদি ওয়ালা-ফাছা-দাওঁ ওয়াল ‘আ-কিবাতুলিলমুত্তাকীন।',
        'মান জাআ বিল হাছানাতি ফালাহূখাইরুম মিনহা- ওয়া মান জাআ বিছছাইয়িআতি ফালা-ইউজঝাল্লাযীনা ‘আমিলুছ ছাইয়িআ-তি ইল্লা-মা-কা-নূইয়া‘মালূন।',
        'ইন্নাল্লাযী ফারাদা ‘আলাইকাল কুরআ-না লারাদ্দুকা ইলা-মা‘আ-দিন কুররাববীআ‘লামুমান জাআ বিলহুদা-ওয়া মান হুওয়া ফী দালা-',
        'ওয়ামা- কুনতা তারাজূআইঁ ইউলকাইলাইকাল কিতা-বুইল্লা-রাহমাতাম মির রাব্বিকা ফালা-তাকূনান্না জাহীরাল লিলকা-ফিরীন।',
        'ওয়ালা-ইয়াসুদ্দুন্নাকা ‘আন আ-য়া-তিল্লা-হি বা‘দা ইয উনঝিলাত ইলাইকা ওয়াদ‘উ ইলা রাব্বিকা ওয়ালা-তাকূনান্না মিনাল মুশরিকীন।',
        'ওয়ালা-তাদ‘উ মা‘আল্লা-হি ইলা-হান আ-খারা । লাইলা-হা ইল্লা-হুওয়া কুল্লু শাইইন হা-লিকুন ইল্লা-ওয়াজহাহূ লাহুল হুকমুওয়া ইলাইহি তুরজা‘ঊন।'
      ],
      29: [
        'আলিফ লাম মীম।',
        'আহাছিবান্না-ছুআইঁ ইউতরাকূআইঁ ইয়াকূলূ আ-মান্না-ওয়া হুম লা-ইউফতানূন।',
        'ওয়ালাকাদ ফাতান্নাল্লাযীনা মিন কাবলিহিম ফালাইয়া‘লামান্নাল্লা-হুল্লাযীনা সাদাকূ ওয়ালাইয়া‘লামান্নাল কা-যিবীন।',
        'আম হাছিবাল্লাযীনা ইয়া‘মালূনাছছাইয়িআ-তি আইঁ ইয়াছবিকূনা- ছাআ মাইয়াহকুমূন।',
