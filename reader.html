        'ওয়া মান জা-হাদা ফাইন্নামা-ইউজা-হিদুলিনাফছিহী ইন্নাল্লা-হা লাগানিইইউন ‘আনিল ‘আ-লামীন।',
        'ওয়াল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি লানুকাফফিরান্না ‘আনহুম ছাইয়িআ-তিহিম ওয়ালানাজঝিয়ান্নাহুম আহছানাল্লাযী কা-নূইয়া‘মালূন।',
        'ওয়া ওয়াসসাইনাল ইনছা-না বিওয়া-লিদাইহি হুূছনাওঁ ওয়া ইন জা-হাদা-কা লিতুশরিকা বী মা-লাইছা লাকা বিহী ‘ইলমুন ফালা-তুতি‘হুমা- ইলাইইয়া মারজি‘উকুম ফাউনাব্বিউকুম বিমা-কুনতুম তা‘মালূন।',
        'ওয়াল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি লানুদখিলান্নাহুম ফিসসা-লিহীন।',
        'ওয়া মিনান্না-ছি মাইঁ ইয়াকূলুআ-মান্না-বিল্লা-হি ফাইযা-ঊযিইয়া ফিল্লা-হি জা‘আলা ফিতনাতান্না-ছি কা‘আযা-বিল্লা-হি ওয়ালাইন জাআ নাসরুম মির রাব্বিকা লাইয়াকূলুন্না ইন্না-কুন্না-মা‘আকুম আওয়া লাইছাল্লা-হু বিআ‘লামা বিমা-ফী সুদূ রিল ‘আলামীন।',
        'ওয়া লাইয়া‘লামান্নাল্লা-হুল্লাযীনা আ-মানূওয়া লাইয়া‘লামান্নাল মুনা-ফিকীন।',
        'ওয়া কা-লাল্লাযীনা কাফারূ লিল্লাযীনা আ-মানততাবি‘ঊ ছাবীলানা-ওয়ালনাহমিল খাতায়া-কুম ওয়ামা-হুম বিহা-মিলীনা মিন খাতা-য়া হুম মিন শাইয়িন ইন্নাহুম লাকাযিবূন।',
        'ওয়া লাইয়াহমিলুন্না আছকা-লাহুম ওয়াআছকা-লাম মা‘আ আছকা-লিহিম ওয়ালাইউছআলুন্না ইয়াওমাল কিয়া-মাতি ‘আম্মা-কা-নূইয়াফতারূন।',
        'ওয়া লাকাদ আরছালনা-নূহান ইলা-কাওমিহী ফালাবিছা ফীহিম আলফা ছানাতিন ইল্লাখামছীনা ‘আ-মান ফাআখাযা হুমুততূফা-নুওয়াহুম জা-লিমূন।',
        'ফাআনজাইনা-হু ওয়া আসহা-বাছছাফীনাতি ওয়া জা‘আলনা-হা-আ-য়াতাল লিল‘আ-লামীন।',
        'ওয়া ইবরা-হীমা ইযকা-লা লিকাওমিহি‘বুদুল্লা-হা ওয়াত্তাকূহু যা-লিকুম খাইরুল্লাকুম ইন কুনতুম তা‘লামূন।',
        'ইন্নামা-তা‘বূদূ না মিন দূ নিল্লা-হি আওছা-নাওঁ ওয়া তাখলুকূনা ইফকান ইন্নাল্লাযীনা তা‘বুদূ না মি��� দূ নিল্লা-হি লা-ইয়ামলিকূনা লাকুম রিঝকান ফাবতাগূ‘ইনদাল্লা-হির রিঝকা ওয়া‘বুদূ হু ওয়াশকুরূলাহূ ইলাইহি তুরজা‘ঊন।',
        'ওয়া ইন তূকাযযিবূফাকাদ কাযযাবা উমামুম মিন কাবলিকুম ওয়ামা-‘আলাররাছূলি ইল্লাল বালা-গুল মুবীন।',
        'আওয়ালাম ইয়ারাও কাইফা ইউবদিউল্লা-হুল খালকা ছুম্মা ইউ‘ঈদুহূ ইন্না যা-লিকা ‘আলাল্লা-হি ইয়াছীর।',
        'কুল ছীরূ ফিল আরদিফানজুরূ কাইফা বাদাআল খালকা ছুম্মাল্লা-হু ইউনশিউন নাশআতাল আ-খিরাতা ইন্নাল্লা-হা ‘আলা-কুল্লিা শাইয়িন কাদীর।',
        'ইউ‘আযযিবূমাইঁ ইয়াশাউ ওয়া ইয়ারহামুমাইঁ ইয়াশাউ ওয়া ইলাইহি তুকলাবূন ।',
        'ওয়ামা-আনতুম বিমু‘জিঝীনা ফিল আরদি ওয়ালা -ফিছছামাই ওয়ামা-লাকুম মিন দূ নিল্লাহি মিওঁ ওয়ালিইয়িওঁ ওয়ালা-নাসীর।',

        'আওয়া লাম ইয়ারাও আন্না-জা‘আলনা-হারামান আ-মিনাওঁ ওয়া ইউতাখাত্তাফুন্না-ছুমিন হাওলিহিম আফাবিলবা-তিলি ইউ’মিনূনা ওয়া বিনি‘মাতিল্লা-হি ইয়াকফুরূন।',
        'ওয়া মান আজলামুমিম্মানিফ তারা-‘আলাল্লা-হি কাযিবান আও কাযযাবা বিলহাক্কি লাম্মা-জাআহূ আলাইছা ফী জাহান্নামা মাছওয়াল লিল কা-ফিরীন।',
        'ওয়াল্লাযীনা জা-হাদূফীনা-লানাহদিয়ান্নাহুম ছুবুলানা- ওয়া ইন্নাল্লা-হা লামা‘আল মুহছিনীন।'

      30: [
        'আলিফ লাম মীম।',

        'ফীআদনাল আরদিওয়াহুম মিম বা‘দি গালাবিহিম ছাইয়াগলিবূন।',
        'ফী বিদ‘ই ছিনীনা লিল্লা-হিল আমরু মিন কাবলুওয়া মিম বা‘দু ওয়া ইয়াওমাইযিইঁ ইয়াফরাহুল মু’মিনূন।',
        'বিনাসরিল্লা-হি ইয়ানসুরু মাইঁ ইয়াশা-উ ওয়া হুওয়াল ‘আঝীঝুর রাহীম।',
        'ওয়া‘দাল্লা-হি লা-ইউখলিফুল্লা-হু ওয়া‘দাহূওয়া লা-কিন্না আকছারান্না-ছি লাইয়া‘লামূন।',
        'ইয়া‘লামূনা জা-হিরাম মিনাল হায়া-তিদ দুনইয়া- ওয়া হুম ‘আনিল আ-খিরাতি হুম গাফিলূন।',
        'আওয়া লাম ইয়াতাফাক্কারূফীআনফুছিহিম মা-খালাকাল্লা-হুছছামা-ওয়া-তি ওয়াল আরদা ওয়ামা-বাইনাহুমাইল্লা-বিলহাক্কিওয়া আজালিম মুছাম্মাওঁ ওয়া ইন্না কাছীরাম মিনান্না-ছি বিলিকাই রাব্বিহিম লাকা-ফিরূন।',
        'আওয়া লাম ইয়াছীরূ ফিলআরদিফাইয়ানজুরূ কাইফা কা-না ‘আ-কিবাতুল্লাযীনা মিন কাবলিহিম কা-নূআশাদ্দা মিনহুম কুওওয়াতাওঁ ওয়া আছা-রুল আরদা ওয়া ‘আমারূহা আকছারা মিম্মা-‘আমারূহা-ওয়া জাআতহুম রুছুলুহুম বিলবাইয়িনা-তি ফামা-কা-নাল্লা-হু লিইয়াজলিমাহুম ওয়া লা-কিন কা-নূআনফুছাহুম ইয়াজলিমূন।',
        'ছু ম্মা কা-না ‘আ-কিবাতাল্লাযীনা আছাউছছূআআন কাযযাবূবিআ-য়া-তিল্লা-হি ওয়া কা-নূবিহা-ইয়াছতাহঝিঊন।',
        'আল্লা-হু ইয়াবদাউল খালকা ছুম্মা ইউ‘ঈদুহূছুম্মা ইলাইহি তুরজা‘ঊন।',
        'ওয়া ইয়াওমা তাকূমুছছা-‘আতুইউবলিছুল মুজরিমূন।',
        'ওয়ালাম ইয়াকুল লাহুম মিন শুরাকাইহিম শুফা‘আউওয়াকা-নূবিশুরাকাইহিম কাফিরীন।',
        'ওয়া ইয়াওমা তাকূমুছছা-‘আতুইয়াওমাইযিইঁ ইয়াতাফাররাকূন।',
        'ফাআম্মাল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি ফাহুম ফী রাওদাতিইঁ ইউহবারূন।',
        'ওয়া আম্মাল্লাযীনা কাফারূওয়া কাযযাবূবিআ-য়া-তিনা-ওয়া লিকাইল আ-খিরাতি ফাউলাইকা ফিল ‘আযা-বি মুহদারূন।',
        'ফাছুবহা-নাল্লা-হি হীনা তুমছূনা ওয়া হীনা তুসবিহূন।',
        'ওয়া লাহুল হামদুফিছছামা-ওয়া-তি ওয়াল আরদিওয়া‘আশিইইয়াওঁ ওয়া হীনা তুজহিরূন।',
        'ইউখরিজুল হাইইয়া মিনাল মাইয়িতি ওয়া ইউখরিজুল মাইয়িতা মিনাল হাইয়ি ওয়া ইউহইল আরদা বা‘দা মাওতিহা- ওয়া কাযা-লিকা তুখরাজূন।',
        'ওয়া মিন আ-য়া-তিহীআন খালাকাকুমমিনতুরা-বিন ছু ম্মা ইযা- আনতুম বাশারুন তানতাশিরূন।',
        'ওয়া মিন আ-য়া-তিহী আন খালাকা লাকুম মিন আনফুছিকুম আঝওয়া-জাল লিতাছকুনূ ইলাইহা ওয়াজা‘আলা বাইনাকুম মাওয়াদ্দাতাওঁ ওয়া রাহমাতান ইন্না ফী যা-লিকা লাআয়া-তিল লিকাওমিইঁ ইয়াতাফাক্কারূন।',
        'ওয়া মিন আ-য়া-তিহী খালকুছছামা-ওয়া-তি ওয়াল আরদিওয়াখতিলা-ফুআলছিনাতিকুম ওয়া আলওয়া-নিকুম ইন্না ফী যা-লিকা লাআ-য়া-তিল লিল‘আ-লিমীন।',
        'ওয়া মিন আ-য়া-তিহী মানা-মুকুম বিল্লাইলি ওয়ান্নাহা-রি ওয়াবতিগাউকুম মিন ফাদলিহী ইন্না ফী যা-লিকা লাআ-য়া-তিল লিকাওমিইঁ ইয়াছমা‘উন।',
        'ওয়া মিন আ-য়া-তিহী ইউরীকুমুল বারকা খাওফাওঁ ওয়া তামা‘আওঁ ওয়া ইউনাঝঝিলু মিনাছছামাই মাআন ফাইউহয়ী বিহিল আরদা বা‘দা মাওতিহা ইন্না ফী যা-লিকা লাআ-য়া-তিল লিকাওমিইঁ ইয়া‘কিলূন।',
        'ওয়া মিন আ-য়া-তিহী আন তাকুমাছছামাউ ওয়াল আরদুবিআমরিহী ছু ম্মা ইযা-দা‘আ-কুম দা‘ওয়াতাম মিনাল আরদি ইযা আনতুম তাখরুজূন।',
        'ওয়া লাহূমান ফিছছামা-ওয়া-তি ওয়াল আরদি কুল্লুল লাহূকা-নিতূন।',
        'ওয়া হুওয়াল্লাযী ইয়াবদাউল খালকা ছুম্মা ইউ‘ঈদুহূওয়া হুওয়া আহওয়ানু‘আলাইহি ওয়া লাহুল মাছালুল আ‘লা-ফিছছামা-ওয়া-তি ওয়াল আরদি ওয়া হুওয়াল ‘আঝীঝুল হাকীম।',
        'দারাবা লাকুম মাছালাম মিন আনফুছিকুম; হাল লাকুম মিম্মা-মালাকাত আইমা-নুকুম মিন শুরাকাআ ফী মা-রাঝাকনা-কুম ফাআনতুম ফীহি ছাওয়াউন তাখা-ফূনাহুম কাখীফাতিকুম আনফুছাকুম কাযা-লিকা নুফাসসিলুল আ-য়া-তি লিকাওমিইঁ ইয়া‘কিলূন।',
        'বালিততাবা‘আল্লাযীনা জালামূআহওয়াআহুম বিগাইরি ‘ইলমিন ফামাইঁ ইয়াহদী মান আদাল্লাল্লা-হু ওয়ামা-লাহুম মিন না-সিরীন।',
        'ফাআকিম ওয়াজহাকা লিদ্দীনি হানীফান ফিতরাতাল্লা-হিল্লাতী ফাতারান্না-ছা ‘আলাইহা- লা-তাবদীলা লিখালকিল্লা-হি যা-লিকাদদীনুল কাইয়িমুওয়া লা-কিন্না আকছারান্না-ছি লা-ইয়া‘লামূন।',
        'মুনীবীনা ইলাইহি ওয়াত্তাকূহু ওয়াআকীমুসসালা-তা ওয়ালা-তাকূনূমিনাল মুশরিকীন।',
        'মিনাল্লাযীনা ফাররাকূদীনাহুম ওয়া কা-নূশিয়া‘আন কুল্লুহিঝবিম বিমা-লাদাইহিম ফারিহুন।',
        'ওয়া ইযা-মাছছান্না-ছা দু ররুন দা‘আও রাব্বাহুম মুনীবীনা ইলাইহি ছু ম্মা ইযাআযা-কাহুম মিনহু রাহামাতান ইযা-ফারীকুম মিনহুম বিরাব্বিহিম ইউশরিকূন।',
        'লিয়াকফুরূ বিমাআ-তাইনা-হুম ফাতামাত্তা‘ঊ ফাছাওফা তা‘লামূন।',
        'আম আনঝালনা-‘আলাইহিম ছুলতা-নান ফাহুওয়া ইয়াতাকাল্লামুবিমা-কা-নূবিহী ইউশরিকূন।',
        'ওয়া ইযা-আযাকনান্না-ছা রাহমাতান ফারিহূবিহা- ওয়া ইন তুসিবহুম ছাইয়িআতুম বিমা-কাদ্দামাত আইদীহিম ইযা-হুম ইয়াকনাতূন।',
        'আওয়া লাম ইয়ারাও আন্নাল্লা-হা ইয়াবছুতুর রিঝকা লিমাইঁ ইয়াশাউ ওয়া ইয়াকদিরু ইন্না ফী যা-লিকা লাআ-য়া-তিল লিকাওমিইঁ ইউ’মিনূন।',
        'ফাআ-তি যাল কুরবা-হাক্কাহূওয়াল মিছকীনা ওয়াবনাছছাবীল যা-লিকা খাইরুল লিল্লাযীনা ইউরীদূ না ওয়াজহাল্লা-হি ওয়া উলাইকা হুমুল মুফলিহূন।',
        'ওয়ামাআ-তাইতুম মির রিবাল লিয়ারবুওয়া ফীআমওয়া-লিন্না-ছি ফালা-ইয়ারবূ‘ইনদাল্লা-হি ওয়ামাআ-তাইতুম মিন ঝাকা-তিন তুরীদূ না ওয়াজহাল্লা-হি ফাউলাইকা হুমুল মু দ‘ইফূন।',
        'আল্লা-হুল্লাযী খালাকাকুম ছুম্মা রাঝাকাকুম ছুম্মা ইউমীতুকুম ছুম্মা ইউহঈকুম হাল মিন শুরাকাইকুম মাইঁ ইয়াফ‘আলুমিন যা-লিকুম মিন শাইয়িন ছুবহা-নাহূওয়া তা‘আলা-‘আম্মা-ইউশরিকূন।',
        'জাহারাল ফাছা-দুফিল বাররি ওয়ালবাহরি বিমা-কাছাবাত আইদিন্না-ছি লিইউযীকাহুম বা‘দাল্লাযী ‘আমিলূলা‘আল্লাহুম ইয়ারজি‘ঊন।',
        'কুল ছীরূফিল আরদিফানজুরূ কাইফা কা-না ‘আ-কিবাতুল্লাযীনা মিন কাবলু কানা আকছারুহুম মুশরিকীন।',
        'ফাআকিম ওয়াজহাকা লিদ্দীনিল কাইয়িমি মিন কাবলি আইঁ ইয়া’তিয়া ইয়াওমুল লা-মারাদ্দা লাহূমিনাল্লা-হি ইয়াওমাইযিইঁ ইয়াসসাদ্দা‘ঊন।',
        'মান কাফারা ফা‘আলাইহি কুফরুহু ওয়া মান ‘আমিলা সা-লিহান ফালিআনফুছিহিম ইয়ামহাদূ ন।',
        'লিয়াজঝিইয়াল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি মিন ফাদলিহী ইন্নাহূলাইউহিব্বুল কা-ফিরীন।',
        'ওয়া মিন আ-য়া-তিহীআইঁ ইউরছিলার রিয়া-হামুবাশশিরা-তিওঁ ওয়া লিইউযীকাকুম মিররাহমাতিহী ওয়া লিতাজরিয়াল ফুলকুবিআমরিহী ওয়া লিতাবতাগূমিন ফাদলিহী ওয়া লা‘আল্লাকুম তাশকুরূন।',
        'ওয়া লাকাদ আরছালনা-মিন কাবলিকা রুছুলান ইলা-কাওমিহিম ফাজাঊহুম বিল বাইয়িনাতি ফানতাকামনা-মিনাল্লাযীনা আজরামূ ওয়া কা-না হাক্কান ‘আলাইনা-নাসরুল মু’মিনীন।',
        'আল্লা-হুল্লাযী ইউরছিলুর রিয়া-হা ফাতুছীরু ছাহা-বান ফাইয়াবছুতু হূফিছ ছামাই কাইফা ইয়াশা-উ ওয়া ইয়াজ‘আলুহূকিছাফান ফাতারাল ওয়াদকা ইয়াখরুজুমিন খিলা-লিহী ফাইযা আসা-বা বিহী মাইঁ ইয়াশা-উ মিন ‘ইবা-দিহী ইযা-হুম ইয়াছতাবশিরূন।',
        'ওয়া ইন কা-নূমিন কাবলি আইঁ ইউনাঝঝালা ‘আলাইহিম মিন কাবলিহী লামুবলিছীন।',
        'ফানজু র ইলা আ-ছা-রি রাহমাতিল্লা-হি কাইফা ইউহয়িল আরদা বা‘দা মাওতিহা- ইন্না যা-লিকা লামুহয়িল মাওতা- ওয়া হুওয়া ‘আলা-কুল্লি শাইয়িন কাদীর।',
        'ওয়া লাইন আরছালনা-রীহান ফারাআওহু মুসফাররাল লাজাললূমিম বা‘দিহী ইয়াকফুরূন।',
        'ফাইন্নাকা লা-তুছমি‘উল মাওতা-ওয়ালা-তুছমি‘উস সুম্মাদ দু‘আআ ইযা-ওয়াল্লাও মুদবিরীন।',
        'ওয়া মাআনতা বিহা-দিল ‘উময়ি ‘আন দালা-লাতিহিম ইন তুছমি‘উ ইল্লা-মাইঁ ইউ’মিনু বিআ-য়া-তিনা-ফাহুম মুছলিমূন।',
        'আল্লা-হুল্লাযী খালাকাকুম মিন দু‘ফিন ছু ম্মা জা‘আলা মিম বা‘দি দু‘ফিন কু ওওয়াতান ছু ম্মা জা‘আলা মিম বা‘দি কুওওয়াতিন দু‘ফাওঁ ওয়া শাইবাতাইঁ ইয়াখলুকুমা-ইয়াশাউ ওয়া হুওয়াল ‘আলীমুল কাদীর।',
        'ওয়া ইয়াওমা তাকূমুছ ছা-‘আতুইউকছিমুল মুজরিমূনা মা-লাবিছূগাইরা ছা‘আতিন কাযা-লিকা কা-নূইউ’ফাকূন',
        'ওয়া কা-লাল্লাযীনা ঊতুল ‘ইলমা ওয়াল ঈমা-না লাকাদ লাবিছতুম ফী কিতা-বিল্লা-হি ইলা-ইয়াওমিল বা‘ছি ফাহা-যা-ইয়াওমুল বা‘ছিওয়ালা-কিন্নাকুম কনতুম লা-তা‘লামূন।',
        'ফাইয়াওমাইযিল লা-ইয়ানফা‘উল্লাযীনা জালামূমা‘যিরাতুহুম ওয়ালা-হুম ইউছতা‘তাবূন।',
        'ওয়া লাকাদ দারাবনা-লিন্না-ছি ফী হা-যাল কুরআ-নি মিন কুল্লি মাছালিওঁ ওয়া লাইন জি’তাহুম বিআ-ইয়াতিল লাইয়াকূলান্নাল্লাযীনা কাফারূইন আনতুম ইল্লা-মুবতিলূন।',
        'কাযা-লিকা ইয়াতবা‘উল্লা-হু ‘আলা-কুলূবিল্লাযীনা লা-ইয়া‘লামূন।',
        'ফাসবির ইন্না ওয়া‘দাল্লা-হি হাক্কুওঁ ওয়ালা-ইয়াছতাখিফফান্নাকাল্লাযীনা লা-ইঊকিনূন।'
      ],
      31: [
        'আলিফ লাম মীম।',
        'তিলকা আ-ইয়া-তুল কিতা-বিল হাকীম।',
        'হুদাওঁ ওয়া রাহমাতাল লিলমুহছিনীন।',
        'আল্লাযীনা ইউকীমূনাসসালা-তা ওয়া ইউ’তূনাঝঝাকা-তা ওয়া হুম বিলআ-খিরাতি হুম ইঊকিনূন।',
        'উলাইকা ‘আলা-হুদাম মিররাব্বিহিম ওয়া উলাইকা হুমুল মুফলিহূন।',
        'ওয়া মিনান্না-ছি মাইঁ ইয়াশতারী লাহওয়াল হাদীছিলিইউদিল্লা ‘আন ছাবীলিল্লা-হি বিগাইরি ‘ইলমিওঁ ওয়া ইয়াত্তাখিযাহা-হুঝুওয়ান উলাইকা লাহুম ‘আযা-বুম মুহীন।',
        'ওয়া ইযা-তুতলা-‘আলাইহি আ-য়া-তুনা-ওয়াল্লা-মুছতাকবিরান কাআল্লাম ইয়াছমা‘হাকাআন্না ফী উযু নাইহি ওয়াকরান ফাবাশশিরহু বি‘আযা-বিন আলীম।',
        'ইন্নাল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি লাহুম জান্না-তুন না‘ঈম।',
        'খা-লিদীনা ফীহা- ওয়া‘দাল্লা-হি হাক্কাওঁ ওয়া হুওয়াল ‘আঝীঝুল হাকীম।',
        'খালাকাছছামা-ওয়া-তি বিগাইরি ‘আমাদিন তারাওনাহা-ওয়া আলাকা-ফিল আরদিরাওয়াছিয়া আন তামীদা বিকুম ওয়া বাছছা ফীহা-মিন কুল্লি দাব্বাতিওঁ ওয়া আনঝালনামিনাছছামাই মাআন ফাআমবাতনা-ফীহা-মিন কুল্লি ঝাওজিন কারীম।',
        'হা-যা-খালকুল্লা-হি ফাআরূনী মা-যা-খালকাল্লাযীনা মিন দূ নিহী বালিজ্জা-লিমূনা ফী দালা-লিম মুবীন।',
        'ওয়া লাকাদ আ-তাইনা-লুকমা-নাল হিকমাতা আনিশকুর লিল্লা-হি ওয়া মাইঁ ইয়াশকুর ফাইন্নামা-ইয়াশকুরু লিনাফছিহী ওয়ামান কাফারা ফাইন্নাল্লা-হা গানিইয়ুন হামীদ।',
        'ওয়া ইযকা-লা লুকমা-নুলিবনিহী ওয়া হুওয়া ইয়া‘ইজুহূইয়া-বুনাইইয়া লা-তুশরিক বিল্লা-হি ইন্নাশশিরকা লাজুলমুন ‘আজীম।',
        'ওয়া ওয়াসসাইনাল ইনছা-না বিওয়া-লিদাইহি হামালাতহু উম্মুহূওয়াহনান ‘আলাওয়াহনিওঁ ওয়া ফিসা-লুহূফী ‘আ-মাইনি আনিশকুর লী ওয়ালি ওয়া-লিদাইকা ইলাইইয়াল মাসীর।',
        'ওয়া ইন জা-হাদা-কা ‘আলাআন তুশরিকা বী মা-লাইছা লাকা বিহী ‘ইলমুন ফালাতুতি‘হুমা-ওয়াসা-হিবহুমা-ফিদদুনইয়া-মা‘রূফাওঁ ওয়াত্তাবি‘ ছাবীলা মান আনা-বা ইলাইইয়া ছু ম্মা ইলাইইয়া মারজি‘উকুম ফাউনাব্বিউকুম বিমা-কুনতুম তা‘মালূন।',
        'ইয়া-বুনাইয়া ইন্নাহাইন তাকুমিছকা-লা হাব্বাতিম্মিন খারদালিন ফাতাকুন ফী সাখরাতিন আও ফিছছামা-ওয়া-তি আও ফিল আরদিইয়া’তি বিহাল্লা-হু ইন্নাল্লা-হা লাতীফুন খাবীর।',
        'ইয়া-বুনাইইয়া আকিমিসসালা-তা ওয়া’মুর বিলমা‘রূফি ওয়ানহা ‘আনিল মুনকারি ওয়াসবির ‘আলা-মাআসা-বাকা ইন্না যা-লিকা মিন ‘আঝমিল উমূর।',
        'ওয়ালা-তুসা‘‘ইর খাদ্দাকা লিন্না-ছি ওয়ালা-তামশি ফিল আরদিমারাহান ইন্নাল্লা-হা লাইউহিব্বুকুল্লা মুখতা-লিন ফাখূর।',
        'ওয়াকসিদ ফী মাশইকা ওয়াগদুদমিন সাওতিকা ইন্না আনকারাল আসওয়া-তি লাসাওতুল হামীর।',
        'আলাম তারাও আন্নাল্লা-হা ছাখখরা লাকুম মা-ফিছছামা-ওয়া-তি ওয়ামা-ফিল আরদিওয়া আছবাগা ‘আলাইকুম নি‘মাহূজা-হিরাতাওঁ ওয়া বা-তিনাতাওঁ ওয়া মিনান্না-ছি মাইঁ ইউজা-দিলুফিল্লা-হি বিগাইরি ‘ইলমিওঁ ওয়ালা-হুদাওঁ ওয়ালা-কিতা-বিম মুনীর।',
        'ওয়া ইযা-কীলা লাহুমুত তাবি‘উ মাআনঝালাল্লা-হু কা-লূবাল নাত্তাবি‘উ মা-ওয়াজাদনা‘আলাইহি আ-বাআনা- আওয়া লাও কা-নাশশাইতা-নুইয়াদ‘উহুম ইলা-‘আযাবিছছা‘ঈর।',
        'ওয়া মাইঁ ইউছলিম ওয়াজহাহূ ইলাল্লা-হি ওয়া হুওয়া মুহছিনুন ফাকাদিছতামছাকা বিল ‘উরওয়াতিল উছকা- ওয়া ইলাল্লা-হি ‘আ-কিবাতুল উমূর।',
        'ওয়া মান কাফারা ফালা-ইয়াহঝুনকা কুফরুহূ ইলাইনা-মারজি‘উহুম ফানুনাব্বিউহুম বিমা‘আমিলূ ইন্নাল্লা-হা ‘আলীমুম বিযা-তিসসুদূ র।',
        'নুমাত্তি‘উহুম কালীলান ছুম্মা নাদতাররুহুম ইলা-‘আযা-বিন গালীজ।',
        'ওয়া লাইন ছাআলতাহুম মান খালাকাছছামা-ওয়া-তি ওয়াল আরদা লাইয়াকূলুন্নাল্লা-হু কুল্লি হামদুলিল্লা-হি; বাল আকছারুহুম লা-ইয়া‘লামূন।',
        'লিল্লা-হি মা-ফিছছামা-ওয়া-তি ওয়াল আরদি ইন্নাল্লা-হা হুওয়াল গানিইয়ুল হামীদ।',
        'ওয়া লাও আন্না মা-ফিল আরদিমিন শাজারাতিন আকলা-মুওঁ ওয়াল বাহরু ইয়ামুদ্দুহূমিম বা‘দিহী ছাব‘আতুআবহুরিম মা-নাফিদাত কালিমা-তুল্লা-হি ইন্নাল্লা-হা ‘আঝীঝুন হাকীম।',
        'মা-খালকুকুম ওয়ালা-বা‘ছুকুম ইল্লা-কানাফছিওঁ ওয়া-হিদাতিন ইন্নাল্লা-হা ছামী‘উম বাসীর।',
        'আলাম তারা আন্নাল্লা-হা ইঊলিজুল লাইলা ফিন্নাহা-রি ওয়া ইঊলিজুন্নাহা-রা ফিল্লাইলি ওয়া ছাখখারাশশামছা ওয়ালা কামারা কুলুলইঁইয়াজরীইলাআজালিম মুছাম্মাওঁ ওয়া আন্নাল্লা-হা বিমা-তা‘মালূনা খাবীর।',
        'যা-লিকা বিআন্নাল্লা-হা হুওয়াল হাক্কুওয়া আন্নামা- ইয়াদ‘ঊনা মিন দূ নিহিল বা-তিলু ওয়া আন্নাল্লা-হা হুওয়াল ‘আলিইয়ুল কাবীর।',
        'আলাম তারা আন্নাল ফুলকা তাজরী ফিল বাহরি বিনি‘মাতিল্লা-হি লিইউরিয়াকুম মিন আ-য়াতিহী ইন্না ফী যা-লিকা লাআ-য়া-তিল লিকুল্লি সাব্বা-রিন শাকূর।',
        'ওয়া ইযা-গাশিয়াহুম মাওজুন কাজ্জুলালি দা‘আউল্লা-হা মুখলিসীনা লাহুদ্দীনা ফালাম্মানাজ্জা-হুম ইলাল বাররি ফামিনহুম মুকতাসিদুওঁ ওয়ামা-ইয়াজহাদুবিআ-য়া-তিনা-ইল্লাকুল্লুখাত্তা-রিন কাফূর।',
        'ইয়া-আইয়ুহান্না-ছুত্তাকূরাব্বাকুম ওয়াখশাও ইয়াওমাল্লা-ইয়াজঝী ওয়া-লিদুন আওঁ ওয়ালাদিহী ওয়ালা-মাওলূদুন হুওয়া জা-ঝিন ‘আওঁ ওয়া-লিদিহী শাইআন ইন্না ওয়া‘দাল্লা-হি হাক্কুন ফালা-তাগুররান্নাকুমুল হায়া-তুদ্দুনইয়া-ওয়ালা-ইয়াগুররান্নাকুম বিল্লা-হিল গারূর।',
        'ইন্নাল্লা-হা ‘ইনদাহূ‘ইলমুছছা-‘আতি ওয়া ইউনাঝঝিলুল গাইছা ওয়া ইয়া‘লামুমাফিল আরহা-মি ওয়ামা-তাদরী নাফছুম মা-যা তাকছিবুগাদাওঁ ওয়ামা-তাদরী নাফছুম বিআইয়ি আরদিন তামূতু ইন্নাল্লা-হা ‘আলীমুন খাবীর।'
      ],
      32: [
        'আলিফ লাম মীম।',
        'তানঝীলুল কিতা-বি লা-রাইবা ফীহি মির রাব্বিল ‘আ-লামীন।',
        'আম ইয়াকূলূনাফতারা-হু বাল হুওয়াল হাক্কুমির রাব্বিকা লিতুনযিরা কাওমাম মাআতা-হুম মিন্নাযীরিম মিন কাবলিকা লা‘আল্লাহুম ইয়াহতাদূ ন।',
        'আল্লা-হুল্লাযী খালাকাছছামা-ওয়া-তি ওয়াল আরদা ওয়ামা-বাইনাহুমা-ফী ছিত্তাতি আইয়ামিন ছু ম্মাছ তাওয়া-‘আলাল ‘আরশি মা-লাকুম মিন দূ নিহী মিওঁ ওয়ালিইয়িওঁ ওয়ালাশাফী‘ইন আফালা-তাতাযাক্কারূন।',
        'ইউদাব্বিরুল আমরা মিনাছছামাইইলালআরদিছু ম্মা ইয়া‘রুজুইলাইহি ফী ইয়াওমিন কানা মিকদা-রুহূআলফা ছানাতিম মিম্মা-তা‘উদ্দূন।',
        'যা-লিকা ‘আ-লিমুল গাইবি ওয়াশশাহা-দাতিল ‘আঝীঝুর রাহীম।',
        'আল্লাযী-আহছানা কুল্লা শাইয়িন খালাকাহূওয়া বাদাআ খালকাল ইনছা-নি মিন তীন।',
        'ছু ম্মা জা‘আলা নাছলাহূমিন ছুলা-লাতিম মিম মাইম মাহীন।',
        'ছু ম্ম ছাওওয়া-হু ওয়া নাফাখা ফীহি মিররূহিহী ওয়া জা‘আলা লাকুমুছ ছাম‘আ ওয়াল আবসারা ওয়াল আফইদাতা কালীলাম মা-তাশকুরূন।',
        'ওয়া কা-লূ ইযা-দালালনা-ফিল আরদিআইন্না-লাফী খালকিন জাদীম বাল হুম বিলিকাই রাব্বিহিম কা-ফিরূন।',
        'কুল ইয়াতাওয়াফফা-কুম মালাকুল মাওতিল্লাযী উক্কিলা বিকুমছু ম্মা ইলা-রাব্বিকুম তুরজা‘ঊন।',
        'ওয়া লাও তারাইযিল মুজরিমূনা না-কিছূরুঊছিহিম ‘ইনদা রাব্বিহিম রাব্বানাআবসারনা-ওয়া ছামি‘না-ফারজি‘না-না‘মাল সা-লিহান ইন্না-মূকিনূন।',
        'ওয়া লাও শি‘না-লাআ-তাইনা-কুল্লা নাফছিন হুদা-হা-ওয়া লা-কিন হাক্কাল কাওলুমিন্নী লাআমলাআন্না জাহান্নামা মিনাল জিন্নাতি ওয়ান্না-ছি আজমা‘ঈন।',
        'ফাযূকূবিমা-নাছীতুম লিকাআ ইয়াওমিকুম হা-যা- ইন্না-নাছীনা-কুম ওয়া যূকু ‘আযা-বাল খুলদি বিমা-কনতুম তা‘মালূন।',
        'ইন্নামা-ইউ’মিনুবিআ-য়া-তিনাল্লাযীনা ইযা-যুক্কিরূ বিহা-খাররূছুজ্জাদাওঁ ওয়াছাব্বাহূ বিহামদি রাব্বিহিম ওয়া হুম লা-ইয়াছতাকবিরূন। (সিজদা-১০)',
        'তাতাজা-ফা-জুনূবুহুম ‘আনিল মাদা-জি‘ই ইয়াদ‘ঊনা রাব্বাহুম খাওফাওঁ ওয়া তামা‘আওঁ ওয়ামিম্মা-রাঝাকনা-হুম ইউনফিকূন।',
        'ফালা-তা‘লামুনাফছুম মাউখফিয়া লাহুম মিন কুররাতি আ‘ইউনিন জাঝাআম বিমা-কানূইয়া‘মালূন।',
        'আফামান কা-না মু’মিনান কামান কা-না ফা-ছিকাল লা-ইয়াছতাউন।',
        'আম্মাল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি ফালাহুম জান্না-তুল মা’ওয়া- নুঝুলাম বিমা-কা-নূইয়া‘মালূন।',
        'ওয়া আম্মাল্লাযীনা ফাছাকূফামা’ওয়া-হুমুন্না-রু কুল্লামাআরা-দূ আইঁ ইয়াখরুজূ মিনহা-উ‘ঈদূফীহা-ওয়াকীলা লাহুম যূকূ‘আযা-বান্না-রিল্লাযী কুনতুম বিহী তুকাযযিবূন।',
        'ওয়ালানুযীকান্নাহুম মিনাল ‘আযা-বিল আদনা-দূনাল ‘আযা-বিল আকবারি লা‘আল্লাহুম ইয়ারজি‘ঊন।',
        'ওয়া মান আজলামুমিম মান যুক্কিরা বিআ-য়া-তি রাব্বিহী ছুম্মা আ‘রাদা ‘আনহা- ইন্না-মিনাল মুজরিমীনা মুনতাকিমূন।',
        'ওয়া লাকাদ আ-তাইনা-মূছাল কিতা-বা ফালা-তাকুন ফী মিরইয়াতিম মিললিকাইহী ওয়া জা‘আলনা-হু হুদাল লিবানীইসরাঈল।',
        'ওয়া জা‘আলনা-মিনহুম আইম্মাতাইঁ ইয়াহদূ না বিআমরিনা-লাম্মা-সাবারূ ওয়া কা-নূ বিআ-য়া-তিনা-ইঊকিনূন।',
        'ইন্না রাব্বাকা হুওয়া ইয়াফসিলু বাইনাহুম ইয়াওমাল কিয়া-মাতি ফীমা-কা-নূ ফীহি ইয়াখতালিফূন।',
        'আওয়া লাম ইয়াহদিলাহুম কাম আহলাকনা-মিন কাবলিহিম মিনাল কুরূনি ইয়ামশূনা ফী মাছাকিনিহিম ইন্না ফী যা-লিকা লাআ-য়া-তিন আফালা-ইয়াছমা‘ঊন।',
        'আওয়া লাম ইয়ারাও আন্না-নাছূকুল মাআ ইলাল আরদিল জুরুঝি ফানুখরিজুবিহী ঝার‘আন তা’কুলুমিনহু আন‘আ-মুহুম ওয়া আনফুছুহুম আফালা-ইউবসিরূন।',
        'ওয়া ইয়াকূলূনা মাতা-হা-যাল ফাতহুইন কনতুম সা-দিকীন।',
        'কুল ইয়াওমাল ফাতহিলা-ইয়ানফা‘উল্লাযীনা কাফারূঈমা-নুহুম ওয়ালা-হুম ইউনজারূন।',
        'ফাআ‘রিদ‘আনহুম ওয়ানতাজির ইন্নাহুম মুনতাজিরূন।'
      ],
      33: [
        'ইয়াআইয়ুহান্নাবিইয়ুত্তাকিল্লা-হা ওয়ালা তুতি‘ইল কা-ফিরীনা ওয়াল মুনা-ফিকীনা ইন্নাল্লা-হা কা-না ‘আলীমান হাকীমা।',
        'ওয়াত্তাবি‘ মা-ইঊহাইলাইকা মির রাব্বিকা ইন্নাল্লা-হা কা-না বিমা-তা‘মালূনা খাবীরা-।',
        'ওয়া তাওয়াক্কাল ‘আলাল্লা-হি ওয়া কাফা-বিল্লা-হি ওয়াকীলা-।',
        'মা-জা‘আলাল্লা-হু লিরাজুলিম মিন কালবাইনি ফী জাওফিহী ওয়ামা-জা‘আলা আঝওয়াজাকুমুল লাঈ তুজা-হিরূনা মিনহুন্না উম্মাহা-তিকুম ওয়ামা-জা‘আলা আদ‘ইয়াআকুম আবনাআকুম যা-লিকুম কাওলুকুম বিআফওয়া-হিকুম ওয়াল্লাহু ইয়াকূলুল হাক্কা ওয়াহুওয়া ইয়াহদিছছাবীল।',
        'উদ‘ঊহুম লিআ-বাইহিম হুওয়া আকছাতু‘ইনদাল্লা-হি ফাইল্লাম তা‘লামূআবাআহুম ফাইখওয়া-নুকুম ফিদ্দীনি ওয়া মাওয়া-লীকুম ওয়া লাইছা ‘আলাইকুম জুনাহুন ফীমাআখতাতুম বিহী ওয়ালা-কিম মা-তা‘আম্মাদাত কুলূবুকুম ওয়া কানাল্লা-হু গাফূরার রাহীমা-।',
        'আন্নাবিইয়ুআওলা-বিলমু’মিনীনা মিন আনফুছিহিম ওয়া আঝওয়া-জুহূ উম্মাহা-তুহুম ওয়া উলুল আরহা-মি বাদুহুম আওলা-ব্বিা‘দিন ফী কিতা-বিল্লা-হি মিনাল মু’মিনীনা ওয়াল মুহা-জিরীনা ইল্লাআন তাফ‘আলূ ইলাআওলিয়াইকুম মা‘রূফান কা-না যা-লিকা ফিল কিতা-বি মাছতূরা-।',

        'কুল ইন্নামাআ‘ইজুকুম বিওয়া-হিদাতিন আন তাকূমূলিল্লা-হি মাছনা-ওয়া ফুরা-দা-ছু ম্মা তাতাফাক্কারূ মা-বিসা-হিবিকুম মিন জিন্নাতিন ইন হুওয়া ইল্লা-নাযীরুল লাকুম বাইনা ইয়াদাই ‘আযা-বিন শাদীদ।',
        'কুল মা-ছাআলতুকুম মিন আজরিন ফাহুওয়া লাকুম ইন আজরিয়া ইল্লা-‘আলাল্লা-হি ওয়া হুওয়া ‘আলা-কুল্লি শাইয়িন শাহীদ।',
        'কুল ইন্না রাববী ইয়াকযিফুবিলহাক্কি‘আল্লা-মুল গুয়ুব।',
        'কুল জাআল হাক্কুওয়ামা-ইউবদিউল বা-তিলুওয়ামা-ইউ‘ঈদ।',
        'কুল ইন দালালতুফাইন্নামাআদিল্লু‘আলা-নাফছী ওয়াইনিহতাদাইতুফাবিমা-ইউহী ইলাইয়া রাববী ইন্নাহূছামী‘উন কারীব।',
        'ওয়া লাও তারাইয ফাঝি‘ঊ ফালা -ফাওতা ওয়া উখিযূমিম মাকা-নিন কারীব।',
        'ওয়া কা-লূআ-মান্না-বিহী ওয়া আন্না-লাহুমুততানা-উশু মিম মাকা-নিম বা‘ঈদ।',
        'ওয়া কাদ কাফারূবিহী মিন কাবলু ওয়া ইয়াকযিফূনা বিলগাইবি মিম মাকা-নিম বা‘ঈদ।',
        'ওয়া হীলা বাইনাহুম ওয়া বাইনা মা-ইয়াশতাহূনা কামা-ফু‘ইলা বিআশইয়া-‘ইহিম মিন কাবলু ইন্নাহুম কা-নূফী শাক্কিম মুরীব।'
      ],
      35: [
        'আল হামদুলিল্লা-হি ফা-তিরিছছামা-ওয়া-তি ওয়াল আরদিজা‘ইলিল মালাইকাতি রুছুলান ঊলীআজনিহাতিম্মাছনা-ওয়া ছুলা-ছা ওয়া রুবা-‘আ ইয়াঝীদুফিল খালকিমা-ইয়াশাউ ইন্নাল্লা-হা আ‘লা-কুল্লি শাইয়িন কাদীর',
        'মা ইয়াফতাহিল্লা-হু লিন্না-ছি মির রাহমাতিন ফালা-মুম ছিকা লাহা- ওয়া মা-ইউমছিক ফালা-মুরছিলা লাহূমিম বা‘দিহী ওয়া হুওয়াল ‘আঝীঝুল হাকীম।',
        'ইয়াআইয়ুহান্না-ছুযকুরূনি‘মাতাল্লা-হি ‘আলাইকুম হাল মিন খা-লিকিন গাইরুল্লা-হি ইয়ারঝুকুকুম মিনাছ ছামাই ওয়াল আরদি লাইলা-হা ইল্লা-হুওয়া ফাআন্নাতু’ফাকূন।',
        'ওয়া ইয়ঁইউকাযযিবূকা ফাকাদ কুযযিবাত রুছুলুম মিন কাবলিকা ওয়া ইলাল্লা-হি তুর জা‘উল উমূর।',
        'ইয়াআইয়ুহান্না-ছুইন্না ওয়া‘দাল্লা-হি হাক্কুন ফালা-তাগুররান্নাকুমুল হায়াতুদ্দনইয়া- ওয়ালা-ইয়াগুররান্নাকুম বিল্লা-হিল গারূর।',
        'ইন্নাশশাইতা-না লাকুম ‘আদুওউন ফাত্তাখিযূহু আ‘দুওওয়ান ইন্নামা-ইয়াদ‘ঊ হিঝবাহূ লিইয়াকূনূমিন আসহা-বিছছা‘ঈর।',
        'আল্লাযীনা কাফারূলাহুম ‘আযা-বুন শাদীদুওঁ ওয়াল্লাযীনা আ-মানূওয়া ‘আমিলুসসালিহা-তি লাহুম মাগফিরাতুওঁ ওয়া আজরুন কাবীর।',
        'আফামান ঝুইয়িনা লাহূছূউ ‘আমালিহী ফারাআ-হু হাছানান ফাইন্নাল্লা-হা ইউদিল্লুমাইঁ ইয়াশাউ ফালা-তাযহাব নাফছুকা ‘আলাইহিম হাছারাতিন ইন্নাল্লা-হা ‘আলীমুম বিমা-ইয়াসনা‘ঊন।',
        'ওয়াল্লা-হুল্লাযীআরছালার রিইয়া-হা ফাতুছীরু ছাহা-বান ফাছুকনা-হু ইলা-বালাদিম মাইয়িতিন ফাআহইয়াইনা-বিহিল আরদা বা‘দা মাওতিহা- কাযা-লিকান নুশূর।',
        'মান কা-না ইউরীদুল ‘ইঝঝাতা ফালিল্লা-হিল ‘ইঝঝাতুজামী‘আন ইলাইহি ইয়াস‘আদুল কালিমুততাইয়িবুওয়াল ‘আমালুসসা-লিহুইয়ারফা‘উহূ ওয়াল্লাযীনা ইয়ামকুরূনাছ ছাইয়িআ-তি লাহুম ‘আযা-বুন শাদীদুওঁ ওয়া মাকরূউলাইকা হুওয়া ইয়াবূর।',
        'ওয়াল্লা-হু খালাকাকুম মিন তুরা-বিন ছু ম্মা জা‘আলাকুম আঝওয়া-জাওঁ ওয়ামাতাহমিলুমিন উনছা-ওয়ালা-তাদা‘উ ইল্লা-বি‘ইলমিহী ওয়ামা-ইউ‘আম্মারু মিম মু‘আম্মারিওঁ ওয়ালা-ইউনকাসুমিন ‘উমুরিহী ইল্লা ফী কিতা-বিন ইন্না যা-লিকা ‘আলাল্লা-হি ইয়াছীর।',
        'ওয়ামা-ইয়াছতাবিলবাহরা-নি হা-যা-‘আযবুন ফুরা-তুন ছাইগুন শারা-বুহূওয়া হা-যা-মিলহুন উজা-জুওঁ ওয়া মিন কুল্লিন তা’কুলূনা লাহমান তারিইইয়াওঁ ওয়া তাছতাখরিজূনা হিলয়াতান তালবাছূনাহা-ওয়া তারাল ফুলকা ফীহি মাওয়া-খিরাঁলিতাবতাগু মিন ফাদলিহী ওয়া লা‘আল্লাকুম তাশকুরূন।',
        'ইঊলিজুল্লাইলা ফিন্নাহা-রি ওয়া ইঊলিজুন্নাহা-রা ফিল্লাইলি ওয়া ছাখখারাশশামছা ওয়াল কামারা কুল্লুইঁ ইয়াজরী লিআজালিম মুছাম্মান যা-লিকুমুল্লা-হু রাব্বাকুম লাহুল মুলকু ওয়াল্লাযীনা তাদ‘ঊনা মিন দূ নিহী মা-ইয়ামলিকূনা মিন কিতমীর।',
        'ইন তাদ‘ঊহুম লা-ইয়াছমা‘ঊ দু‘আআকুম ওয়ালাও ছামি‘ঊ মাছতাজা-বূলাকুম ওয়া ইয়াওমাল কিয়া-মাতি ইয়াকফুরূনা বিশিরকিকুম ওয়া লা-ইউনাব্বিউকা মিছলু খাবীর।',
        'ইয়াআইয়ুহান্না-ছুআনতুমুল ফুকারাউ ইলাল্লা-হি ওয়াল্লা-হু হুওয়াল গানিইয়ুল হামীদ।',
        'ইয়ঁইয়াশা’ ইউযহিবকুম ওয়া ইয়া’তি বিখালকিন জাদ',
        'ওয়ামা-যা-লিকা ‘আলাল্লা-হি বি‘আঝীঝ।',
        'ওয়ালা-তাঝিরু ওয়া-ঝিরাতুওঁবিঝরা উখরা- ওয়া ইন তাদ‘উ মুছকালাতুন ইলাহিম লিহা-লা-ইউহমাল মিনহু শাইয়ুওঁ ওয়ালাও কা-না যা-কুরবা- ইন্নামাতুনযিরুল্লাযীনা ইয়াখশাওনা রাব্বাহুম বিলগাইবি ওয়া আকামুসসালা-তা ওয়া মান তাঝাক্কা-ফাইন্নামা-ইয়াতাঝাক্কা-লিনাফছিহী ওয়া ইলাল্লা-হিল মাসীর।',
        'ওয়ামা-ইয়াছতাবিল আ‘মা-ওয়াল বাসীর।',
        'ওয়ালাজ্জুলুমা-তুওয়ালান্নূর।',
        'ওয়ালাজ্জিল্লুওয়ালাল হারূর।',
        'ওয়ামা-ইয়াছতাবিল আহইয়াউ ওয়ালাল আমওয়া-তু ইন্নাল্লা-হা ইউছমি‘উ মাইঁ ইয়াশাউ ওয়ামাআনতা বিমুছমি‘ইম মান ফিল কুবূর।',
        'ইন আনতা ইল্লা-নাযীর।',
        'ইন্নাআরছালনা-কা বিলহাক্কিবাশীরাওঁ ওয়া নাযীরাওঁ ওয়া ইম মিন উম্মাতিন ইল্লাখালা-ফীহা-নাযীর।',
        'ওয়া ইয়ঁইউকাযযিবূকা ফাকাদ কাযযাবাল্লাযীনা মিন কাবলিহিম জাআতহুম রুছুলহুম বিলবাইয়িনা-তি ওয়া বিঝঝুবুরি ওয়া বিলকিতা-বিল মুনীর।',
        'ছু ম্মা আখাযতুল্লায ীনা কাফারূফাকাইফা কা-না নাকীর।',
        'আলাম তারা-আন্নাল্লাহা আনঝালা মিনাছছামাই মা-আন ফাআখরাজনা-বিহী ছামারাতিম মুখতালিফান আলওয়া-নুহা- ওয়া মিনাল জিবা-লি জুদাদুম বীদুওঁ ওয়া হুম রুম মুখতালিফুন আলওয়া-নুহা-ওয়া গারা-বীবুছূদ।',
        'ওয়া মিনান্না-ছি ওয়াদ্দাওয়াব্বি ওয়াল আন ‘আ-মি মুখতালিফুন আলওয়া-নুহূকাযা-লিকা ইন্নামা-ইয়াখশাল্লা-হা মিন ‘ইবা-দিহিল ‘উলামাউ ইন্নাল্লা-হা ‘আঝীঝুন গাফূর।',
        'ইন্নাল্লাযীনা ইয়াতলূনা কিতা-বাল্লা-হি ওয়াআকা-মুসসালা-তা ওয়াআনফাকূ মিম্মারাঝাকনা-হুম ছিররাওঁ ওয়া‘আলা-নিয়াতাইঁ ইয়ারজূনা তিজা-রাতাল্লান তাবূর।',
        'লিইউওয়াফিফইয়াহুম উজূরাহুম ওয়া ইয়াঝীদাহুম মিন ফাদলিহী ইন্নাহূগাফূরুন শাকূর।',
        'ওয়াল্লাযী আওহাইনাইলাইকা মিনাল কিতা-বি হুওয়াল হাক্কুমুসাদ্দিকাল লিমা-বাইনা ইয়াদাইহি ইন্নাল্লা-হা বি‘ইবা-দিহী লাখাবীরুম বাসীর।',
        'ছু ম্মা আওরাছনাল কিতা-বাল্লাযীনাসতাফাইনা মিন ‘ইবা-দিনা- ফামিনহুম জালিমুললিনাফছিহী ওয়া মিনহুম মুকতাছিদুওঁ ওয়া মিনহুম ছা-বিকুম বিলখাইরা-তি বিইযনিল্লা-হি যা-লিকা হুওয়াল ফাদলুল কাবীর।',
        'জান্না-তু‘আদনিইঁ ইয়াদখুলূনাহা-ইউহাল্লাওনা ফীহা-মিন আছা-বিরা মিন যাহাবিওঁ ওয়ালু’লুওয়া- ওয়া লিবা-ছুহুম ফীহা-হারীর।',
        'ওয়া কা-লুল হামদুলিল্লা-হিল্লাযী আযহাবা ‘আন্নাল হাঝানা ইন্না রাব্বানালাগাফূরুন শাকূর।',

        'কা-লা রাব্বি ফাআনজিরনীইলা-ইয়াওমি ইউব‘আছূন।',
        'কা-লা ফাইন্নাকা মিনাল মুনজারীন।',
        'ইলা-ইয়াওমিল ওয়াকতিল মা‘লূম।',
        'কা-লা ফাবি ‘ইঝঝাতিকা লাউগবিয়ান্নাহুম আজমা‘ঈন।',
        'ইল্লা-‘ইবা-দাকা মিনহুমুল মুখলাসীন।',
        'কা-লা ফালহাক্কু ওয়াল হাক্কা আকূল।',
        'লাআমলাআন্না জাহান্নামা মিনকা ওয়া মিম্মান তাবি‘আকা মিনহুম আজমা‘ঈন।',
        'কুল মাআছআলুকুম ‘আলাইহি মিন আজরিওঁ ওয়ামাআনা মিনাল মুতাকালিলফীন।',
        'ইন হুওয়া ইল্লা-যিকরুলিলল ‘আ-লামীন।',
        'ওয়ালা তা‘লামুন্না নাবাআহূবা‘দা হীন।'
      ],
      39: [
        'তানঝীলুল কিতা-বি মিনাল্লা-হিল ‘আঝীঝিল হাকীম।',
        'ইন্নাআনঝালনাইলাইকাল কিতা-বা বিলহাক্কিফা‘বুদিল্লা-হা মুখলিসাল্লাহুদ্দীন।',
        'আলা-লিল্লা-হিদ্দীনুল খা-লিসু ওয়াল্লাযীনাত্তাখাযূমিন দূ নিহীআওলিয়াআ । মানা‘বুদুহুম ইল্লা-লিইউকাররিবূনাইলাল্লা-হি ঝুলফা- ইন্নাল্লাহা ইয়াহকুমুবাইনাহুম ফী মা-হুম ফীহি ইয়াখতালিফূন ইন্নাল্লা-হা লা-ইয়াহদী মান হুওয়া কা-যিবুন কাফ ফা-র।',
        'লাও আরাদাল্লা-হু আইঁ ইয়াত্তাখিযা ওয়ালাদাল্লাসতাফা-মিম্মা-ইয়াখলুকূমা ইয়াশাউ ছুবহা-নাহূ হুওয়াল্লা-হুল ওয়া-হিদুল কাহহা-র।',
        'খালাকাছছামা-ওয়া-তি ওয়াল আরদা বিল হাক্কি ইউকাওবিরুল্লাইলা ‘আলান্নাহা-রি ওয়া ইউকাওবিরুন্নাহা-রা ‘আলাল্লাইলি ওয়া ছাখ খারাশশামছা ওয়াল কামারা কুল্লুইঁ ইয়াজরী লিআজালিম মুছাম্মান আলা-হুওয়াল ‘আঝীঝুল গাফফা-র।',
        'খালাকাকুম মিন নাফছিওঁ ওয়া-হিদাতিন ছুম্মা জা‘আলা মিনহা-ঝাওজাহা-ওয়া আনঝালা লাকুম মিনাল আন‘আ-মি ছামা-নিয়াতা আঝওয়া-জিন ইয়াখলুকুকুম ফী বুতূনি উম্মাহা-তিকুম খাল কাম মিম বা‘দি খালকিন ফী জুলুমা-তিন ছালা-ছিন যালিকুমুল্লা-হু রাব্বুকুম লাহুল মুলকু লাইলা-হা ইল্লা-হুওয়া ফাআন্না-তুসরাফূন।',
        'ইন তাকফুরূফাইন্নাল্লা-হা গানিইয়ুন‘আনকুম ওয়ালা-ইয়ারদা-লি‘ইবা-দিহিল কুফরা, ওয়া ইনতাশকুরূইয়ারদাহু লাকুম ওয়ালা-তাঝিরু ওয়া-ঝিরাতুওঁবিঝরা উখরা- ছু ম্মা ইলা-রাব্বিকুম মার জি‘উকুম ফাইউনাব্বিউকুম বিমা-কনতুম তা‘মালূনা ইন্নাহূ ‘আলীমুম বিযা-তিসসুদূ র।',
        'ওয়া ইযা-মাছছালইনছা-না দুররুন দা‘আ-রাব্বাহূ মুনীবানইলাইহি ছুম্মা ইযাখাওওয়ালাহূনি‘মাতাম্মিনহু নাছিয়া মা-কা-না ইয়াদ‘ঊইলাইহি মিন কাবলুওয়া জা‘আলা লিল্লা-হি আনদাদালিলইউদিল্লা ‘আন ছাবীলিহী কুল তামাত্তা‘ বিকুফরিকা কালীলান ইন্নাকা মিন আসহা-বিন্না-র।',
        'আম্মান হুওয়া কা-নিতুন আ-নাআল্লাইলি ছা-জিদাওঁ ওয়া কাইমাইঁ ইয়াহযারুল আখিরাতা ওয়া ইয়ারজূরাহমাতা রাব্বিহী কুল হাল ইয়াছতাবিল্লাযীনা ইয়া‘লামূনা ওয়াল্লাযীনা লা-ইয়া‘লামূনা ইন্নামা-ইয়াতাযাক্কারূ উলুল আলবা-ব।',
        'কুল ইয়া-‘ইবা-দিল্লাযীনা আ-মানুত্তাকূরাব্বাকুম লিল্লাযীনা আহছানূফী হাযিহিদ্দুনইয়া-হাছানাতুওঁ ওয়াআরদুল্লা-হি ওয়া-ছি‘আতুন ইন্নামাইউওয়াফফাসসা-বিরূনা আজরাহুম বিগাইরি হিছা-ব।',
        'কুল ইন্নীউমিরতুআন আ‘বুদাল্লা-হা মুখলিসাল্লাহুদ্দীন।',
        'ওয়া উমিরতুলিআন আকূনা আওওয়ালাল মুছলিমীন।',
        'কুল ইন্নীআখা-ফুইন ‘আসাইতুরাববী ‘আযা-বা ইয়াওমিন ‘আজীম।',
        'কুল্লিলা-হা আ‘বুদুমুখলিসাল্লাহূদীনী।',
        'ফা‘বুদূমা-শি’তুম মিন দূ নিহী কুল ইন্নাল খা-ছিরীনাল্লাযীনা খাছিরূআনফুছাহুম ওয়া আহলীহিম ইয়াওমাল কিয়া-মাতি ‘আলা-যা-লিকা হুওয়াল খুছরা-নুল মুবীন।',
        'লাহুম মিন ফাওকিহিম জু লালুম মিনান্না-রি ওয়া মিন তাহতিহিম জু লালুন যা-লিকা ইউখাওবিফুল্লা-হু বিহী ‘ইবা-দাহূ ইয়া-‘ইবাদি ফাত্তাকূন।',
        'ওয়াল্লাযীনাজ তানাবুত্তা-গূতা আইঁ ইয়া‘বুদূ হা-ওয়া আনাবূইল্লাল্লা-হি লাহুমুল বুশরা- ফাবাশশির ‘ইবা-দ।',
        'আল্লাযীনা ইয়াছতামি‘ঊনাল কাওলা ফাইয়াত্তাবি‘ঊনা আহছানাহূ উলাইকাল্লাযীনা হাদা-হুমুল্লা-হু ওয়া উলাইকা হুম ঊলুল আলবা-ব।',
        'আফামান হাক্কা ‘আলাইহি কালিমাতুল ‘আযা-ব আফাআনতা তুনকিযুমান ফিন্না-র।',
        'লা-কিনিল্লাযীনাত্তাকাও রাব্বাহুম লাহুম গুরাফুম মিন ফাওকিহা-গুরাফুম মাবনিইয়াতুন তাজরী মিন তাহতিহাল আনহা-রু ওয়া‘দাল্লা-হি লা-ইউখলিফুল্লা-হুল মী‘আদ।',
        'আলাম তারা আন্নাল্লা-হা আনঝালা মিনাছছামাই মাআন ফাছালাকাহূইয়ানা-বী‘আ ফিল আরদিছুম্মা ইউখরিজূবিহী ঝার‘আম মুখতালিফান আলওয়া-নুহূছু ম্মা ইয়াহীজুফাতারাঁ-হু মুসফাররান ছুম্মা ইয়াজ‘আলুহূহুতা-মা- ইন্না ফী যা-লিকা লাযিকরা-লিঊলিল আলবা-ব।',
        'আফামান শারাহাল্লা-হু সাদরাহূলিলইছলা-মি ফাহুওয়া ‘আলা-নূরিম মিররাব্বিহী ফাওয়াইলুলিললকা-ছিয়াতি কু লূবুহুম মিন যিকরিল্লা-হি উলাইকা ফী দালা-লিম মুবীন।',
        'আল্লা-হু নাঝঝালা আহছানাল হাদীছিকিতা-বাম মুতাশা-বিহাম মাছা-নিয়া তাকশা‘ইররু মিনহু জূলূদুল্লাযীনা ইয়াখশাওনা রাব্বাহুম ছু ম্মা তালীনুজুলূদুহুম ওয়াকু লূবুহুম ইলা-যিকরিল্লা-হি যা-লিকা হুদাল্লা-হি ইয়াহদী বিহী মাইঁ ইয়াশাউ ওয়া মাইঁ ইউদলিলিল্লা-হু ফামা-লাহূমিন হা-দ।',
        'আফামাইঁ ইয়াত্তাকী বিওয়াজহিহী ছূআল ‘আযা-ব ইয়াওমাল কিয়া-মাতি ওয়া কীলা লিজ্জা-লিমীনা যূকূমা-কুনতুম তাকছিবূন।',
        'কাযযাবাল্লাযীনা মিন কাবলিহিম ফাআতা-হুমুল ‘আযা-বুমিন হাইছুলা-ইয়াশ‘ঊরূন।',
        'ফাআযা-কাহুমুল্লা-হুল খিঝইয়া ফিল হায়া-তিদ্দুনইয়া- ওয়ালা ‘আযা-বুল আখিরাতি আকবারু । লাও কা-নূইয়া‘লামূন।',
        'ওয়ালাকাদ্দারাবনা-লিন্না-ছি ফীহা-যাল কুরআ-নি মিন কুল্লি মাছালিল লা‘আল্লাহুম ইয়াতাযাক্কারূন।',
        'কুরআ-নান ‘আরাবিইয়ান গাইরা যী ‘ইওয়াজিল লা‘আল্লাহুম ইয়াত্তাকূন।',
        'দারাবাল্লা-হু মাছালার রাজূলান ফীহি শুরাকাউ মুতাশা-কিছূনা ওয়া রাজূলান ছালামাল লিরাজুলিন হাল ইয়াছতাবিইয়া-নি মাছালান আলহামদুলিল্লা-হি বাল আকছারুহুম লা-ইয়া‘লামূন।',
        'ইন্নাকা মাইয়িতুওঁ ওয়া ইন্নাহুম মাইয়িতূন।',
        'ছু ম্মা ইন্নাকুম ইয়াওমাল কিয়া-মাতি ‘ইনদা রাব্বিকুম তাখতাসিমূন।',
        'ফামান আজলামুমিম্মান কাযাবা ‘আলাল্লা-হি ওয়া কাযযাবা বিসসিদকিইযজাআহূ আলাইছা ফী জাহান্নামা মাছওয়ালিললকা-ফিরীন।',
        'ওয়াল্লাযী জাআ বিসসিদকিওয়া সাদ্দাকা বিহীউলাইকা হুমুল মুত্তাকূন।',
        'লাহুম মা-ইয়াশাঊনা ‘ইনদা রাব্বিহিম যা-লিকা জাঝাউল মুহছিনীন।',
        'লিইউকাফফিরাল্লা-হু ‘আনহুম আছওয়া আল্লাযী ‘আমিলূওয়া ইয়াজঝিয়াহুম আজরাহুম বিআহছানিল্লাযী কা-নূইয়া‘মালূন।',
        'আলাইছাল্লা-হু বিকা-ফিন ‘আবদাহূ; ওয়া ইউখাওবিফূনাকা বিল্লাযীনা মিন দূ নিহী ওয়া মাইঁ ইউদলিলিল্লা-হু ফামা-লাহূমিন হা-দ।',
        'ওয়া মাইঁ ইয়াহদিল্লা-হু ফামা-লাহূমিম মুদিলিলন আলাইছাল্লা-হু বি‘আঝীঝিন যিন তিকাম।',

        'ইন্নাল্লাযীনা ইউজা-দিলূনা ফীআ-য়া-তিল্লা-হি বিগাইরি ছুলতা-নিন আতা-হুম ইন ফী সূদূ রিহিম ইল্লা-কিবরুম মা-হুম ব্বিা-লিগীহি ফাছতা‘ইযবিল্লা-হি ইন্নাহূহুওয়াছ ছামী‘উল বাসীর।',

        'যা-লিকুমুল্লা-হু রাব্বুকুম খা-লিকুকুল্লি শাইয় । লাইলা-হা ইল্লা-হুওয়া ফাআন্নাতু’ফাকূন।',
        'কাযা-লিকা ইউ’ফাকুল্লাযীনা কা-নূবিআ-য়া-তিল্লা-হি ইয়াজহাদূন।',

        'হুওয়াল হাইয়ুলাইলা-হা ইল্লা-হুওয়া ফাদ‘ঊহু মুখলিসীনা লাহুদ্দীনা আলহামদু লিল্লা হি রাব্বিল ‘আ-লামীন।',

        'হুওয়াল্লাযীখালাকাকুম মিন তুরা-বিন ছুম্মা মিন নুতফাতিন ছুম্মা মিন‘আলাকাতিন ছুম্মা ইউখরিজুকুম তিফলান ছুম্মা লিতাবলুগূআশুদ্দাকুম ছু ম্মা লিতাকূনূশুয়ূখাও ওয়া মিনকুম মাইঁ ইউতাওয়াফফা-মিন কাবলুওয়া লিতাবলুগূআজালাম মুছাম্মাওঁ ওয়া লা‘আল্লাকুম তা‘কিলূন।',

        'ওয়া ইযা আন‘আমনা-‘আলাল ইনছা-নি আ‘রাদা ওয়া নাআ-বিজা-নিবিহী ওয়া ইযা-মাছছাহুশ শাররু ফাযূদুআইন ‘আরীদ।',

        'ছানুরীহিম আ-য়া-তিনা-ফিল আ-ফা-কিওয়া ফীআনফুছিহিম হাত্তা-ইয়াতাবাইইয়ানা লাহুম আন্নাহুল হাক্কু আওয়ালাম ইয়াকফি বিরাব্বিকা আন্নাহূ‘আলা-কুল্লি শাইয়িন শাহীদ।',

      42: [
        'হা-মীম।',
        '‘আইূন ছীন কাফ।',
        'কাযা-লিকা ইউহীইলাইকা ওয়া ইলাল্লাযীনা মিন কাবলিকাল্লা-হুল ‘আঝীঝুল হাকীম।',
        'লাহূমা-ফিছছামা-ওয়া-তি ওয়ামা ফিল আরদি ওয়াহুয়াল ‘আলিইয়ুল ‘আজীম।',
        'তাকা-দুছছামা-ওয়া-তুইয়াতাফাত্তারনা মিন ফাওকিহিন্না ওয়াল মালাইকাতুইউছাব্বিহূনা বিহামদি রাব্বিহিম ওয়া ইয়াছতাগফিরূনা লিমান ফিল আরদি আলাইন্নাল্লা-হা হুওয়াল গাফূরুর রাহীম।',
        'ওয়াল্লাযীনাত্তাখাযূমিন দূ নিহীআওলিয়াআল্লা-হু হাফীজুন ‘আলাইহিম ওয়ামা আনতা ‘আলাইহিম বিওয়াকীল।',
        'ওয়া কাযা-লিকা আওহাইনাইলাইকা কুরআ-নান ‘আরাবিইইয়াল লিতুনযিরা উম্মাল কুরা-ওয়া মান হাওলাহা-ওয়া তুনযিরা ইয়াওমাল জাম‘ই লা-রাইবা ফীহি ফারীকুন ফিল জান্নাতি ওয়া ফারীকুন ফিছ ছা‘ঈর।',
        'ওয়ালাও শাআল্লা-হু লাজা‘আলাহুম উম্মাতাওঁ ওয়া-হিদাতাওঁ ওয়ালা-কিইঁ ইউদ খিলুমাইঁ ইয়াশাউ ফী রাহমাতিহী ওয়াজ্জা-লিমূনা মা-লাহুম মিওঁ ওয়ালিইয়িওঁ ওয়ালা-নাসীর।',
        'আমিত্তাখাযূমিন দূ নিহীআওলিয়াআ ফাল্লা-হু হুওয়াল ওয়ালিইয়ুওয়া হুওয়া ইউহয়িল মাওতা- ওয়া হুওয়া ‘আলা-কুল্লি শাইয়িন কাদীর।',
        'ওয়ামাখ তালাফতুম ফীহি মিন শাইয়িন ফাহুকমুহূইলাল্লা-হি যা-লিকুমুল্লা-হু রাববী ‘আলাইহি তাওয়াক্কালতু ওয়া ইলাইহি উনীব।',
        'ফা-তিরুছ ছামা-ওয়া-তি ওয়াল আরদি জা‘আলা লাকুম মিন আনফুছিকুম আঝওয়া-জাওঁ ওয়া মিনাল আন‘আ-মি আঝওয়া-জাইঁ ইয়াযরাঊকুম ফীহি লাইছা কামিছলিহী শাইউওঁ ওয়া হুওয়াছ ছামী‘উল বাসীর',
        'লাহূমাকা-লীদুছ ছামা-ওয়া-তি ওয়াল আরদি ইয়াবছুতু র রিঝকা লিমাইঁ ইয়াশাউ ওয়া ইয়াকদিরু ইন্নাহূবিকুল্লি শাইয়িন ‘আলীম।',
        'শারা‘আ লাকুম মিনাদ্দীনি মা-ওয়াসসা-বিহী নূহাওঁ ওয়াল্লাযীআওহাইনাইলাইকা ওয়ামা-ওয়াসসাইনা-বিহীইবরা-হীমা ওয়া মূছা-ওয়া ‘ঈছাআন আকীমুদ্দীনা ওয়া লাতাতাফাররাকূফীহি কাবুরা ‘আলাল মুশরিকীনা মা-তাদ‘ঊহুম ইলাইহি আল্লা-হু ইয়াজতাবীইলাইহি মাইঁ ইয়াশাউ ওয়া ইয়াহদীইলাইহি মাইঁ ইউনীব।',
        'ওয়ামা-তাফাররাকূইল্লা-মিম বা‘দি মা-জাআহুমুল ‘ইলমুবাগইয়াম বাইনাহুম ওয়া লাওলা-কালিমাতুন ছাবাকাত মির রাব্বিকা ইলাআজালিম মুছাম্মাল লাকুদিয়া বাইনাহুম ওয়া ইন্নাল্লাযীনা ঊরিছুল কিতা-বা মিম বা‘দিহিম লাফী শাক্কিম মিনহু মুরীব।',
        'ফালিযা-লিকা ফাদ‘উ ওয়াছতাকিম কামাউমিরতা ওয়ালা-তাত্তাবি‘ আহওয়াআহুম ওয়া কুল আ-মানতুবিমাআনঝালাল্লা-হু মিন কিতা-বিওঁ ওয়া উমিরতুলিআ‘দিলা বাইনাকুম আল্লা-হু রাব্বুনা-ওয়া রাব্বাকুম লানাআ‘মা-লুনাওয়ালাকুম আ‘মা-লুকুম লা-হুজ্জাতা বাইনানা-ওয়া বাইনাকুম আল্লা-হু ইয়াজমা‘উ বাইনানা- ওয়া ইলাইহিল মাসীর।',
        'ওয়াল্লাযীনা ইঊহাজ্জূনা ফিল্লা-হি মিম বা‘দি মাছতুজীবা লাহূহুজ্জাতুহুম দা-হিদাতুন ‘ইনদা রাব্বিহিম ওয়া ‘আলাইহিম গাদাবুওঁ ওয়া লাহুম ‘আযা-বুন শাদীদ।',
        'আল্লা-হুল্লাযীআনঝালাল কিতা-বা বিলহাক্কিওয়াল মীযা-না ওয়ামা ইউদরীকা লা‘আল্লাছছা-‘আতা কারীব।',
        'ইয়াছতা‘জিলূবিহাল্লাযীনা লা-ইউ’মিনূনা বিহা- ওয়াল্লাযীনা আ-মানূমুশফিকূনা মিনহা- ওয়া ইয়া‘লামূনা আন্নাহাল হাক্কু আলাইন্নাল্লাযীনা ইউমা-রূনা ফিছছা‘আতি লাফী দালা-লিম বা‘ঈদ।',
        'আল্লা-হু লাতীফুম বি‘ইবা-দিহী ইয়ারঝুকুমাইঁ ইয়াশাউ ওয়া হুওয়াল কাবিইয়ুল ‘আঝীঝ।',
        'মান কা-না ইউরীদুহারছাল আ-খিরাতি নাঝিদ লাহূফী হারছিহী ওয়ামান কা-না ইউরীদুহারছাদ্দুনইয়া-নু’তিহী মিনহা-ওয়ামা-লাহূফিল আ-খিরাতি মিন নাসীব।',
        'আম লাহুম শুরাকাউ শারা‘ঊ লাহুম মিনাদ্দীনি মা -লাম ইয়া’যাম বিহিল্লা-হু ওয়া লাওলা-কালিমাতুল ফাসলি লাকুদিয়া বাইনাহুম ওয়া ইন্নাজ্জা-লিমীনা লাহুম ‘আযা-বুন আলীম।',
        'তারাজ্জা-লিমীনা মুশফিকীনা মিম্মা-কাছাবূওয়া হুওয়া ওয়া-কি‘উম বিহিম ওয়াল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি ফী রাওদা-তিল জান্না-তি লাহুম মাইয়াশাঊনা ‘ইনদা রাব্বিহিম যা-লিকা হুওয়াল ফাদলুল কাবীর।',
        'যা-লিকাল্লাযী ইয়ুবাশশিরুল্লা-হু ‘ইবা-দাহুল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি কুল লাআছআলুকুম ‘আলাইহি আজরান ইল্লাল মাওয়াদ্দাতা ফিল কুরবা- ওয়া মাইঁ ইয়াকতারিফ হাছানাতান নাঝিদ লাহূফীহা-হুছনান ইন্নাল্লা-হা গাফূরুন শাকূর।',
        'আম ইয়াকূলূনাফ তারা-‘আলাল্লা-হি কাযিবান ফাইয়ঁইয়াশাইল্লা-হু ইয়াখতিম ‘আলাকালবিকা ওয়া ইয়ামহুল্লা-হুল বা-তিলা ওয়া ইউহিক্কুল হাক্কা বিকালিমা-তিহী ইন্নাহূ‘আলীমুম বিযা-তিসসুদূ র।',
        'ওয়া হুওয়াল্লাযীইয়াকবালুত্তাওবাতা ‘আন ‘ইবা-দিহী ওয়া ইয়া‘ফূ‘আনিছ ছাইয়িআ-তি ওয়া ইয়া‘লামুমা-তাফ‘আলূন।',
        'ওয়া ইয়াছতাজীবুল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি ওয়া ইয়াঝীদুহুম মিন ফাদলিহী ওয়াল কা-ফিরূনা লাহুম ‘আযা-বুন শাদীদ।',
        'ওয়ালাও বাছাতাল্লা-হুর রিঝকালি‘ইবা-দিহী লাবাগাও ফিল আরদিওয়ালা-কিইঁ ইউনাঝঝিলুবিকাদারিম মা-ইয়াশ��উ ইন্নাহূবি‘ইবা-দিহী খাবীরুম বাসীর।',
        'ওয়া হুওয়াল্লাযী ইউনাঝঝিলুল গাইছা মিম বা‘দি মা-কানাতূওয়া ইয়ানশুরু রাহমাতাহূ ওয়া হুওয়াল ওয়ালিইয়ুল হামীদ।',
        'ওয়া মিন আ-য়া-তিহী খালকুছ ছামা-ওয়া-তি ওয়ালআরদিওয়ামা-বাছছা ফীহিমা-মিন দাব্বাতিওঁ ওয়া হুওয়া ‘আলা-জাম‘ইহিম ইযা-ইয়াশাউ কাদীর।',
        'ওয়ামাআসা-বাকুম মিম মুসীবাতিন ফাবিমা-কাছাবাত আইদীকুম ওয়া ইয়া‘ফূ‘আন কাছীর।',
        'ওয়ামাআনতুম বিমু‘জিঝীনা ফিল আরদি ওয়ামা-লাকুম মিন দূ নিল্লা-হি মিওঁ ওয়ালিইয়িওঁ ওয়ালা-নাসীর।',
        'ওয়া মিন আ-য়া-তিহিল জাওয়া-রি ফিল বাহরি কালআ‘লা-ম।',
        'ইয়ঁইয়াশা’ ইউছকিনিররীহা ফাইয়াজলালনা রাওয়া-কিদা ‘আলা-জাহরিহী ইন্না ফী যা-লিকা লাআ-য়া-তিল লিকুল্লি সাব্বা-রিন শাকূর।',
        'আও ইঊবিকহুন্না বিমা-কাছাবূওয়া ইয়া‘ফু‘আন কাছীর।',
        'ওয়া ইয়া‘লামাল্লাযীনা ইউজা-দিলূনা ফীআ-য়া-তিনা- মা-লাহুম মিম মাহীস।',
        'ফামাঊতীতুম মিন শাইয়িন ফমাতা-‘উল হায়া-তিদ্দুনইয়া- ওয়ামা-‘ইনদাল্লা-হি খাইরুওঁ ওয়া আব কা-লিল্লাযীনা আ-মানূওয়া ‘আলা-রাব্বিহিম ইয়াতাওয়াক্কালূন।',
        'ওয়াল্লাযীনা ইয়াজতানিবূনা কাবাইরাল ইছমি ওয়াল ফাওয়া-হিশা ওয়া ইযা- মাগাদিবূহুম ইয়াগফিরূন।',
        'ওয়াল্লাযীনাছ তাজা-বূলিরাব্বিহিম ওয়া আকা-মুসসালা-তা ওয়া আমরুহুম শূরাবাইনাহুম ওয়া মিম্মা-রাঝাকনা-হুম ইউনফিকূন।',
        'ওয়াল্লাযীনা ইযাআসা-বাহুমুল বাগইউহুম ইয়ানতাসিরূন।',
        'ওয়া জাঝাউ ছাইয়িআতিন ছাইয়িআতুম মিছলুহা- ফামান ‘আফা-ওয়া আসলাহা ফাআজরুহূ‘আলাল্লা-হি ইন্নাহূলা-ইউহিবজ জা-লিমীন।',
        'ওয়া লামানিন তাসারা বা‘দা জুলমিহী ফাউলাইকা মা-‘আলাইহিম মিন ছাবীল।',
        'ইন্নামাছ ছাবীলু‘আলাল্লাযীনা ইয়াজলিমূনান্না-ছা ওয়া ইয়াবগূনা ফিল আরদিবিগাইরিল হাক্কি উলাইকা লাহুম ‘আযা-বুন আলীম।',

        'মা-খালাকনাছ ছামা-ওয়া-তি ওয়াল আরদা ওয়ামা-বাইনাহুমাইল্লা-বিলহাক্কি ওয়াআজালিম মুছাম্মাওঁ ওয়াল্লাযীনা কাফারূ‘আম্মাউনযিরূমু‘রিদূন।',
        'কুল আরাআইতুম মা-তাদ‘ঊনা মিন দূ নিল্লা-হি আরূনী মা-যা-খালাকূমিনাল আরদিআম লাহুম শিরকুন ফিছ ছামা-ওয়া-তি ঈতূনী বিকিতা-বিম মিন কাবলি হা-যাআও আছারাতিম মিন ‘ইলমিন ইন কুনতুম সা-দিকীন।',
        'ওয়ামান আদাল্লুমিম্মাইঁ ইয়াদ‘ঊ মিন দূনিল্লা-হি মাল্লা-ইয়াছতাজীবুলাহূইলা-ইয়াওমিল কিয়া-মাতি ওয়াহুম ‘আন দু‘আইহিম গা-ফিলূন।',
        'ওয়া ইযা-হুশিরান্না-ছুকা-নূলাহুম আ‘দাআওঁ ওয়া কা-নূবি‘ইবা-দাতিহিম কা-ফিরীন।',
        'ওয়া ইযা-তুতলা ‘আলাইহিম আ-য়া-তুনা-বাইয়িনা-তিন কা-লাল্লাযীনা কাফারূ লিলহাক্কিলাম্মা-জাআহুম হা-যা-ছিহরুম মুবীন।',
        'আম ইয়াকূলূনাফতারা-হূ কুল ইনিফতারাইতুহূফালা-তামলিকূনা লী মিনাল্লা-হি শাইআন হুওয়া আ‘লামুবিমা-তুফীদূ না ফীহি কাফা-বিহী শাহীদাম বাইনী ওয়া বাইনাকুম ওয়া হুওয়াল গাফূরুর রাহীম।',
        'কুল মা-কুনতুবিদ‘আম মিনার রুছুলি ওয়ামাআদরী মা-ইউফ‘আলুবী ওয়ালা-বিকুম ইন আত্তাবি‘উ ইল্লা-মা-ইউহাইলাইইয়া ওয়ামাআনা ইল্লা-নাযীরুম মুবীন।',
        'কুল আরাআইতুম ইন কা-না মিন ‘ইনদিল্লা-হি ওয়া কাফারতুম বিহী ওয়া শাহিদা শা-হিদুম মিম বানীইছরাঈলা ‘আলা-মিছলিহী ফাআ-মানা ওয়াছতাকবারতুম ইন্নাল্লা-হা লাইয়াহদিল কাওমাজ্জা-লিমীন।',
        'ওয়া কা-লাল্লাযীনা কাফারূলিল্লাযীনা আ-মানূলাও কা-না খাইরাম মা-ছাবাকূনা ইলাইহি ওয়া ইযলাম ইয়াহতাদূবিহী ফাছাইয়াকূলূনা হা-যাইফকুন কাদীম।',
        'ওয়া মিন কাবলিহী কিতা-বুমূছাইমা-মাওঁ ওয়া রাহমাতাওঁ ওয়া হা-যা-কিতাবুম মুসাদ্দিকুল্লিছা-নান ‘আরাবিইইয়াল লিইউনযিরাল্লাযীনা জালামূ ওয়াবুশরালিলমুহছিনীন।',
        'ইন্নাল্লাযীনা কা-লূরাব্বুনাল্লা-হুছু ম্মাছতাকা-মূফালা-খাওফুন ‘আলাইহিম ওয়ালা-হুম ইয়াহঝানূন',
        'উলাইকা আসহা-বুল জান্নাতি খা-লিদীনা ফীহা- জাঝাআম বিমা-কা-নূ ইয়া‘মালূন।',
        'ওয়া ওয়াসসাইনালইনছা-না বিওয়া-লিদাইহি ইহছা-নান হামালাতহু উম্মুহূ কুরহাওঁ ওয়া ওয়াদা‘আতহু কুরহাওঁ ওয়া হামলুহূওয়া ফিসা-লুহূছালা-ছূনা শাহরান হাত্তা ইযা-বালাগা আশুদ্দাহূওয়া বালাগা আরবা‘ঈনা ছানাতান কা-লা রাব্বি আওঝি‘নীআন আশকুরা নি‘মাতাকাল্লাতীআন‘আমতা ‘আলাইইয়া ওয়া ‘আলা-ওয়া-লিদাইইয়া ওয়া আন আ‘মালা সা-লিহান তারদা-হু ওয়া আসলিহলী ফী যুররিইইয়াতী ইন্নী তুবতুইলাইকা ওয়া ইন্নী মিনাল মুছলিমীন।',
        'উলাইকাল্লাযীনা নাতাকাব্বালু‘আনহুম আহছানা মা-‘আমিলূওয়া নাতাজা-ওয়াঝু‘আন ছাইয়িআ-তিহিম ফীআছহা-বিল জান্নাতি ওয়া‘দাসসিদকিল্লাযী কা-নূইঊ‘আদূ ন।',
        'ওয়াল্লাযী কা-লা লিওয়া-লিদাইহি উফফিল্লাকুমাআতা‘ইদা-নিনীআন উখরাজা ওয়াকাদ খালাতিল কুরূনুমিন কাবলী ওয়া হুমা-ইয়াছতাগীছা-নিল্লা-হা ওয়াইলাকা আ-মিন ইন্না ওয়া‘দাল্লা-হি হাক্কুন ফাইয়াকূলুমা-হা-যাইল্লাআছা-তীরুল আওওয়ালীন।',
        'উলাইকাল্লাযীনা হাক্কা ‘আলাইহিমুল কাওলুফীউমামিন কাদ খালাত মিন কাবলিহিম মিনাল জিন্নি ওয়াল ইনছি ইন্নাহুম কা-নূখা-ছিরীন।',
        'ওয়া লিকুল্লিন দারাজা-তুমমিম্মা-‘আমিলূ ওয়া লিইউওয়াফফিয়াহুম আ‘মা-লাহুম ওয়া হুম লা-ইউজলামূন।',
        'ওয়া ইয়াওমা ইউ‘রাদুল্লায ীনা কাফারূ‘আলান্না-রি আযহাবতুম তাইয়িবা-তিকুম ফী হায়া-তিকুমুদ্দুনইয়া-ওয়াছতামতা‘তুম বিহা- ফালইয়াওমা তুজঝাওনা ‘আযা-বাল হূনি বিমা-কুনতুম তাছতাকবিরূনা ফিল আরদিবিগাইরিল হাক্কিওয়া বিমা-কুনতুম তাফ ছুকূন।',
        'ওয়াযকুর আখা-‘আ-দিন ইয আনযারা কাওমাহূবিলআহকা-ফি ওয়াকাদ খালাতিন্নুযূরু মিম বাইনি ইয়াদাইহি ওয়া মিন খালফিহীআল্লা-তা‘বুদূ ইল্লাল্লা-হা ইন্নীআখা-ফু‘আলাইকুম ‘আযা-বা ইয়াওমিন ‘আজীম।',
        'কা-লূআজি’তানা-লিতা’ফিকানা-‘আন আ-লিহাতিনা- ফা’তিনা-বিমা-তা‘ইদুনা ইন কুনতা মিনাসসা-দিকীন।',
        'কা-লা ইন্নামাল ‘ইলমু‘ইনদাল্লা-হি ওয়া উবালিলগুকুম মাউরছিলতুবিহী ওয়ালা-কিন্নী আরা-কুম কাওমান তাজহালূন।',
        'ফালাম্মা-রাআওহু ‘আ-রিদামমুছতাকবিলা আও দিয়াতিহিম কা-লূহা-যা-‘আরিদুমমুম তিরুনা- বাল হুওয়া মাছ তা‘জালতুম বিহী রীহুন ফীহা-‘আযা-বুন আলীম।',
        'তুদাম্মিরু কুল্লা শাইয়িম বিআমরি রাব্বিহা-ফাআসবাহূলা-ইউরাইল্লা-মাছা-কিনুহুম কাযা-লিকা নাজঝিল কাওমাল মুজরিমীন।',
        'ওয়া লাকাদ মাক্কান্না-হুমফীমাইম্মাক্কান্না-কুমফীহি ওয়া জা‘আলনা-লাহুমছাম‘আওঁ ওয়া আবসা-রাওঁ ওয়া আফইদাতান ফামাআগনা-‘আনহুম ছাম‘উহুম ওয়ালাআবসা-রুহুম ওয়ালাআফইদাতুহুম মিন শাইয়িন ইযকা-নূইয়াজহাদূ না বিআ-য়া-তিল্লা-হি ওয়া হাকা বিহিম মা-কা-নূবিহী ইয়াছতাহঝিউন।',
        'ওয়া লাকাদ আহলাকনা- মা-হাওলাকুমমিনাল কুরা- ওয়াসাররাফনাল আ-য়া-তি লা‘আল্লাহুম ইয়ারজি‘ঊন।',
        'ফালাওলা-নাসারাহুমুল্লাযীনাত্তাখাযূমিন দূ নিল্লা-হি কুরবা-নান আ-লিহাতান বাল দাললূ ‘আনহুম ওয়া যা-লিকা ইফকুহুম ওয়ামা-কা-নূইয়াফতারূন।',
        'ওয়া ইযসারাফনাইলাকা নাফারাম মিনাল জিন্নি ইয়াছতামি‘ঊনাল কুরআ-না ফালাম্মাহাদারূহু কা-লূআনছিতূ ফালাম্মা-কুদিয়া ওয়াল্লাও ইলা-কাওমিহিম মুনযিরীন।',
        'কা-লূইয়া-কাওমানাইন্না-ছামি‘না-কিতা-বান উনঝিলা মিম বা‘দি মূছা-মুসাদ্দিকালিলমাবাইনা ইয়াদাইহি ইয়াহদীইলাল হাক্কিওয়া ইলা-তারীকিম মুছতাকীম।',
        'ইয়া-কাওমানাআজীবূদা-‘ইয়াল্লা-হি ওয়াআ-মিনূবিহী ইয়াগফিরলাকুম মিন যুনূবিকুম ওয়া ইউজিরকুম মিন ‘আযা-বিন আলীম।',
        'ওয়া মাল লা-ইউজিব দা-‘ইয়াল্লা-হি ফালাইছা বিমু‘জিঝিন ফিল আরদিওয়া লাইছা লাহূমিন দূ নিহীআওলিূআউ উলাইকা ফী দালা-লিমমুবীন।',
        'আওয়ালাম ইয়ারাও আন্নাল্লা-হাল্লাযী খালাকাছ ছামা-ওয়া-তি ওয়াল আরদা ওয়ালাম ইয়া‘ইয়া বিখালকিহিন্না বিকা-দিরিন ‘আলাআইঁ ইউহইয়াল মাওতা- বালাইন্নাহূ ‘আলা-কুল্লি শাইয়িন কাদীর।',
        'ওয়া ইয়াওমা ইউ‘রাদুল্লাযীনা কাফারূ‘আলান্না-রি আলাইছা হা-যা-বিলহাক্কি কা-লূবালা-ওয়া রাব্বিনা- কা-লা ফাযূকুল ‘আযা-বা বিমা-কুনতুম তাক ফুরূন।',
        'ফাসবির কামা-সাবারা ঊলুল ‘আঝমি মিনাররুছুলি ওয়ালা-তাছতা‘জিল লাহুম কাআন্নাহুম ইয়াওমা ইয়ারাওনা মা-ইঊ‘আদূ না লাম ইয়ালবাছূদ্ম ইল্লা-ছা-‘আতাম মিন নাহা-রিন বালা-গুন ফাহাল ইউহলাকুইল্লাল কাওমুল ফা-ছিকূন।'
      ],
      47: [
        'আল্লাযীনা কাফারূওয়াছাদ্দূ‘আন ছাবীলিল্লা-হি আদাল্লা আ‘মা-লাহুম।',
        'ওয়াল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি ওয়া মা-মানূবিমা-নুঝঝিলা ‘আলামুহাম্মাদিওঁ ওয়াহুওয়াল হাক্কুমির রাব্বিহিম কাফফারা ‘আনহুম ছাইয়িআ-তিহিম ওয়া আসলাহা বা-লাহুম।',
        'যা-লিকা বিআন্নাল্লাযীনা কাফারুত্তাবা‘উল বা-তিলা ওয়া আন্নাল্লাযীনা আ-মানুত্তাবা‘উল হাক্কা মির রাব্বিহিম কাযা-লিকা ইয়াদরিবুল্লা-হু লিন্না-ছি আমছা-লাহুম।',
        'ফাইযা-লাকীতুমুল্লাযীনা কাফারূফাদারবার রিকা-ব হাত্তাইযা আছখানতুমূহুম ফাশুদ্দুল ওয়াছা-কা ফাইম্মা-মান্নাম ব��‘দুওয়াইম্মা-ফিদাআন হাত্তা-তাদা‘আল হারবুআওঝা-রাহা-যা-লিকা ওয়ালাও ইয়াশাউল্লা-হু লানতাসারা মিনহুম ওয়ালা-কিল লিইয়াবলুওয়া বা‘দাকুম ব্বিা‘দিওঁ ওয়াল্লাযীনা কুতিলূফী ছাবীলিল্লা-হি ফালাইঁ ইউদিল্লা আ‘মা-লাহুম।',
        'ছাইয়াহদীহিম ওয়া ইউসলিহুবা-লাহুম।',
        'ওয়াইউদখিলুহুম জান্নাতা ‘আররাফাহা-লাহুম।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূইন তানসরুল্লা-হা ইয়ানসুরকুম ওয়া ইউছাব্বিত আকদামাকুম।',
        'ওয়াল্লাযীনা কাফারূফাতা‘ছাল্লাহুম ওয়া আদাল্লা আ‘মা-লাহুম।',
        'যা-লিকা বিআন্নাহুম কারিহূমাআনঝালল্লা-হু ফাআহবাতা আ‘মা-লাহুম।',
        'আফালাম ইয়াছীরূফিল আরদিফাইয়ানজুরূকাইফা কা-না ‘আ-কিবাতুল্লাযীনা মিন কাবলিহিম দাম্মারাল্লা-হু ‘আলাইহিম ওয়া লিল কা-ফিরীনা আমছা-লুহা-।',
        'যা-লিকা বিআন্নাল্লা-হা মাওলাল্লাযীনা আ-মানূওয়া আন্নাল কা-ফিরীনা লা-মাওলা-লাহুম।',
        'ইন্নাল্লা-হা ইউদখিলুল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি জান্না-তিন তাজরী মিন তাহতিহাল আনহা-রু ওয়াল্লাযীনা কাফারূইয়াতামাত্তা‘ঊনা ওয়া ইয়া’কুলূনা কামাতা’কুলুল আন‘আ-মুওয়ান্না-রু মাছওয়াল্লাহুম।',
        'ওয়া কাআইয়িম মিন কারইয়াতিন হিয়া আশাদ্দুকুওওয়াতাম মিন কারয়াতিকাল্লাতী আখরাজাতকা আহলাকনা-হুম ফালা-না-সিরা লাহুম।',
        'আফামান কা-না ‘আলা-বাইয়িনাতিম মির রাব্বিহী কামান ঝুইয়িনা লাহূছূ উআ‘মালিহী ওয়াত্তাবা‘ঊআহওয়া-আহুম।',
        'মাছালুল জান্নাতিল্লাতী উ‘ইদাল মুত্তাকূনা ফীহাআনহা-রুম মিম্মাইন গাইরি আ-ছিনিও ওয়া আন হা-রুম মিল্লাবানিল লাম ইয়াতাগাইইয়ার তা‘মুহূ ওয়া আন হা-রুম মিন খামরিল লাযযাতিল লিশশা-রিবীনা ওয়া আন হা-রুম মিন ‘আছালিম মুসাফফাওঁ ওয়ালাহুম ফীহা-মিন কুলিছছামারা-তি ওয়া মাগফিরাতুমমির রাব্বিহিম কামান হুওয়া খা-লিদুন ফিন্না-রি ওয়া ছুকূমাআন হামীমান ফাকাত্তা‘আ আম‘আআহুম।',

        'ওয়াল্লাযিনাহতাদাও ঝা-দাহুম হুদাওঁ ওয়া আ-তা-হুম তাকওয়া-হুম।',
        'ফাহাল ইয়ানজু রূনা ইল্লাছছা-‘আতা আন তা’তিয়াহুম বাগতাতান ফাকাদ জাআ আশরাতুহা- ফাআন্না- লাহুম ইযা- জাআতহুম যিকরা-হুম।',
        'ফা‘লাম আন্নাহূলাইলা-হা ইল্লাল্লা-হু ওয়াছতা���ফির লিযামবিকা ওয়ালিলমু’মিনীনা ওয়ালমু’মিনা-তি ওয়াল্লা-হু ইয়া‘লামুমুতাকাল্লাবাকুম ওয়া মাছওয়া-কুম।',
        'ওয়া ইয়াকূলুল্লাযীনা আ-মানূলাওলা-নুঝঝিলাত ছূরাতুন ফাইযাউনঝিলাত ছূরাতুমমুহকামাতুওঁ ওয়া যুকিরা ফীহাল কিতা-লু রাআইতাল্লাযীনা ফী কুলূবিহিম মারাদুইঁ ইয়ানজু রূনা ইলাইকা নাজারাল মাগশিইয়ি ‘আলাইহি মিনাল মাওতি ফাআওলালাহুম।',
        'তা-‘আতুওঁ ওয়া কাওলুম মা‘রূফুন ফাইযা-‘আঝামাল আমরু ফালাও সাদাকুল্লা-হা লাকা-না খাইরাল্লাহুম।',
        'ফাহাল ‘আছাইতুম ইন তাওয়াল্লাইতুম আন তুফছিদূফিল আরদি ওয়া তুকাত্তি‘ঊআরহামাকুম',
        'উলাইকাল্লাযীনা লা‘আনাহুমুল্লা-হু ফাআসাম্মাহুম ওয়া আ‘মাআবসা-রাহুম।',
        'আফালা-ইয়াতাদাব্বারূনাল কুরআ-না আম ‘আলা-কুলূবিন আকফা-লুহা-।',
        'ইন্নাল্লাযীনারতাদ্দূ‘আলাআদবা-রিহিম মিম বা‘দি মা-তাবাইয়ানা লাহুমুল হুদাশশাইতা-নু ছাওওয়ালা লাহুম ওয়াআমলা-লাহুম।',
        'যা-লিকা বিআন্নাহুম কা-লূলিল্লাযীনা কারিহূমা-নাঝঝাল্লা-হু ছানুতী‘উকুম ফী বা‘দিল আমরি ওয়াল্লা-হু ইয়া‘লামুইছরা-রাহুম।',
        'ফাকাইফা ইযা-তাওয়াফফাতহুমুল মালাইকাতুইয়াদরিবূনা উজূহাহুম ওয়াআদবা-রাহুম।',
        'যা-লিকা বিআন্নাহুমুত্তাবা‘ঊ মাআছখাতাল্লা-হা ওয়া কারিহূরিদওয়া-নাহূফাআহবাতা আ‘মা-লাহুম।',
        'আম হাছিবাল্লাযীনা ফী কুলূবিহিম মারাদুন আল্লাইঁ ইউখরিজাল্লা-হু আদগা-নাহুম।',
        'ওয়া লাও নাশাউ লাআরাইনা-কাহুম ফালা‘আরাফতাহুম বিছীমা-হুম ওয়া লাতা‘রিফান্নাহুম ফী লাহনিল কাওলি ওয়াল্লা-হু ইয়া‘লামুআ‘মা-লাকুম।',
        'ওয়া লানাবলুওয়ান্নাকুম হাত্তা-না‘লামাল মুজা-হিদীনা মিনকুম ওয়াসসা-বিরীনা ওয়া নাবলুওয়া আখবা-রাকুম।',
        'ইন্নাল্লাযীনা কাফারূওয়াসাদ্দূ‘আন ছাবীলিল্লা-হি ওয়া শাক্কুর রাছূলা মিম বা‘দি মাতাবাইয়ানা লাহুমুল হুদা- লাইঁ ইয়াদুররুল্লা-হা শাইআওঁ ওয়া ছাইউহবিতুআ‘মালাহুম।',
        'ইয়া আইয়ুহাল্লাযীনা আ-মানূ আতী‘উল্লা-হা ওয়া আতী‘উর রাছূলা ওয়ালাতুবতিলূআ‘মা-লাকুম।',
        'ইন্নাল্লাযীনা কাফারূওয়াসাদ্দূ‘আন ছাবীলিল্লা-হি ছু ম্মা মা-তূওয়াহুম কুফফা-রুন ফালাইঁ ইয়াগফিরাল্লা-হু লাহুম।',
        'ফালা-তাহিনূওয়া তাদ‘ঊইলাছছালমি ওয়া আনতুমুল আ‘লাওনা ওয়াল্লা-হু মা‘আকুম ওয়ালাইঁ ইয়াতিরাকুম আ‘মা-লাকুম।',
        'ইন্নামাল হায়া-তুদ্দুনইয়া-লা‘ইবুওঁ ওয়া লাহ উওঁ ওয়া ইন তু’মিনূওয়া তাত্তাকূইউ’তিকুম উজূরাকুম ওয়ালা-ইয়াছআলকুম আম ওয়া-লাকুম।',
        'ইয়ঁইয়াছআলকুমূহা-ফাইউহফিকুম তাবখালূওয়া ইউখরিজ আদগা-নাকুম।',
        'হাআনতুমহাউলাই তুদ‘আওনা লিতুনফিকূফী ছাবীলিল্লা-হি ফামিনকুম মাইঁ ��য়াব খালু ওয়া মাইঁ ইয়াবখাল ফাইন্নামা-ইয়াব খালু‘আন নাফছিহী ওয়াল্লা-হুল গানিইয়ুওয়া আনতুমুল ফুকারাউ ওয়া ইন তাতাওয়াল্লাও ইয়াছতাবদিল কাওমান গাইরাকুম ছু ম্মা লা-ইয়াকূনূআমছা-লাকুম।'

      48: [

        'ওয়া ইউ‘আযযিবাল মুনা-ফিকীনা ওয়াল মুনা-ফিকা-তি ওয়াল মুশরিকীনা ওয়াল মুশরিকা-তিজ্জান্নীনা বিল্লা-হি জান্নাছছাওই ‘আলাইহিম দাইরাতুছ ছাওই ওয়া গাদিবাল্লা-হু ‘আলাইহিম ওয়া লা‘আনাহুম ওয়া আ‘আদ্দালাহুম জাহান্নামা ওয়া ছাআত মাসীরা-।',
        'ওয়া লিল্লা-হি জুনূদুছ ছা-মা-ওয়াতি ওয়াল আর দি ওয়া কা-নাল্লা-হু ‘আঝীঝান হাকীমা-।',
        'ইন্নাআরছালনা-কা শা-হিদাওঁ ওয়া মুবাশশিরাওঁ ওয়া নাযীরা-।',
        'লিতু’মিনূবিল্লা-হি ওয়া রাছূলিহী ওয়া তু‘আঝাঝিরূহু ওয়া তুওয়াক্কিরূহু ওয়া তুছাববিহূহু বুকরাতাওঁ ওয়া আসীলা-।',
        'ইন্নাল্লাযীনা ইউবা-ই‘ঊনাকা ইন্নামা-ইউবা-ই‘ঊনাল্লা-হা ইয়াদুল্লা-হি ফাওকা আইদীহিম ফামান্নাকাছা ফাইন্নামা-ইয়ানকুছু ‘আলা-নাফছিহী ওয়া মান আওফাবিমা-‘আ-হাদা ‘আলাইহুল্লা-হা ফাছাইউ’তীহি আজরান ‘আজীমা-।',
        'ছাইয়াকূলুলাকাল মুখাল্লাফূনা মিনাল আ‘রা-বি শাগালাতনাআমওয়া-লুনা-ওয়া আহ লূনাফাছতাগফিরলানা- ইয়াকূলূনা বিআলছিনাতিহিম মা-লাইছা ফী কুলূবিহিম কুল ফামাইঁ ইয়ামলিকুলাকুম মিনাল্লা-হি শাইয়ান ইন আরা-দাবিকুম দাররান আও আরা-দাবিকুম নাফ‘আন বাল কা-নাল্লা-হু বিমা-তা‘মালূনা খাবীরা-।',
        'বাল জানানতুম আল্লাইঁ ইয়ানকালিবার রাছূলুওয়ালমু’মিনূনা ইলাআহলীহিম আবাদাওঁ ওয়া ঝুইঁনিয়া যা-লিকা ফী কুলূবিকুম ওয়া জানানতুন জান্নাছছাওই ওয়া কুনতুম কাওমাম বূরা-।',
        'ওয়া মাল্লাম ইউ’মিম বিল্লা-হি ওয়া রাছূলিহী ফাইন্নাআ‘তাদনা-লিলকা-ফিরীনা ছা‘ঈরা-।',
        'ওয়ালিল্লা-হি মুলকুছ ছামা-ওয়া-তি ওয়াল আরদি ইয়াগফিরু লিমাইঁ ইয়াশাউ ওয়াইউ‘আযযিবুমাইঁ ইয়াশাউ ওয়া কা-নাল্লা-হু গাফূরার রাহীমা-।',
        'ছাইয়াকূলুল মুখাল্লাফূনা ইযানতালাকতুমইলা-মাগা-নিমা লিতা’খুযূহা-যারূনানাত্তাবি‘কুম ইউরীদূ না আইঁ ইউবাদ্দিলূকালা-মাল্লা-হি কুল্লান তাত্তাবি‘ঊনা-কাযালিকুম কা-লাল্লা-হু মিন কাবলু ফাছাইয়াকূলূনা বাল তাহছু দূ নানা- বাল কা-না লাইয়াফকাহূনা ইল্লা-কালীলা-।',
        'কুল লিলমুখাল্লাফীনা মিনাল আ‘রা-বি ছাতুদ‘আওনা ইলা-কাওমিন ঊলী বা’ছিন শাদীদিন তুকা-তিলূনাহুম আও ইউছলিমূনা ফাইন তুতী‘ঊ ইউ’তিকুমুল্লা-হু আজরান হাছানাওঁ ওয়া ইন তাতাওয়াল্লাও কামা-তাওয়াল্লাইতুম মিন কাবলুইউ‘আযযি বকুম ‘আযা-বান আলীমা-।',
        'লাইছা ‘আলাল ‘আমা-হারাজূওঁ ওয়ালা-‘আলাল আ‘রাজি হারাজূওঁ ওয়ালা-‘আলাল মারীদিহারাজূও ওয়া মাইঁ ইউতি‘ইল্লা-হা ওয়া রাছূলাহূইউদখিলহু জান্না-তিন তাজরী মিন তাহতিহাল আনহা-রু ওয়া মাইঁ ইয়াতাওয়াল্লা ইউ’আযযিবহু ‘আযা-বান আলীমা-।',
        'লাকাদ রাদিয়াল্লা-হু ‘আনিল মু’মিনীনা ইযইউবা-ই‘ঊনাকা তাহতাশশাজারাতি ফা‘আলিমা মা-ফী কুলূবিহিম ফাআনঝালাছ ছাকীনাতা ‘আলাইহিম ওয়া আছা-বাহুম ফাতহান কারীবা-।',
        'ওয়া মাগা-নিমা কাছীরাতাইঁ ইয়া’খুযূনাহা- ওয়া কা-নাল্লা-হু ‘আঝীঝান হাকীমা-।',
        'ওয়া ‘আদাকুমুল্লা-হুমাগা-নিমা কাছীরাতান তা’খুযূনাহা-ফা‘আজ্জালা লাকুম হা-যিহী ওয়া কাফফা আইদিয়ান্না-ছি ‘আনকুম ওয়া লিতাকূনা আ-ইয়াতালিললমু’মিনীনা ওয়া ইয়াহদিইয়াকুম সিরা-তাম মুছতাকীমা-।',
        'ওয়া উখরা-লাম তাকদিরূ‘আলাইহা-কাদ আহা-তাল্লা-হু বিহা- ওয়াকা-নাল্লা-হু ‘আলা-কুল্লি শাইয়িন কাদীরা-।',
        'ওয়া লাও কা-তালাকুমুল্লাযীনা কাফারূলাওয়াল্লাউল আদবা-রা ছু ম্মা লা-ইয়াজিদূনা ওয়ালিয়াওঁ ওয়ালা-নাসীরা-।',
        'ছুন্নাতাল্লা-হিল্লাতী কাদ খালাত মিন কাবলু ওয়া লান তাজিদা লিছুন্নাতিল্লা-হি তাবদীলা-।',
        'ওয়াহুওয়াল্লাযী কাফফা আইদিয়াহুম ‘আনকুম ওয়াআইদিয়াকুম ‘আনহুম ব্বিাতনি মাক্কাতা মিম বা‘দি আন আজফারাকুম ‘আলাইহিম ওয়া কা-নাল্লা-হু বিমা-তা‘মালূনা বাসীরা-।',
        'হুমুল্লাযীনা কাফারূওয়া সাদ্দূকুম ‘আনিল মাছজিদিল হারা-মি ওয়াল হাদইয়া মা‘কূফান আইঁ ইয়াবলুগা মাহিল্লাহূ ওয়ালাও লা-রিজা-লুম মু’মিনূনা ওয়া নিছাউম মু’মিনা-তুল্লাম তা‘লামূহুম আন তাতাঊহুম ফাতুসীবাকুম মিনহুম মা‘আররাতুম বিগাইরি ‘ইলমিন লিইউদখিলাল্লা-হু ফী রাহমাতিহী মাইঁ ইয়াশাউ লাও তাঝাইয়ালূলা‘আযযাবনাল্লাযীনা কাফারূমিনহুম ‘আযা-বান আলীমা-।',
        'ইযজা‘আলাল্লাযীনা কাফারূফী কুলূবিহিমুল হামিইইয়াতা হামিইয়াতালজা-হিলিইইয়াতি ফাআনঝালাল্লা-হু ছাকীনাতাহূ‘আলা-রাছূলিহী ওয়া আলাল মু’মিনীনা ওয়া আলঝামাহুম কালিমাতাততাকওয়া-ওয়া কা-নূআহাক্কা বিহা-ওয়া আহ লাহা- ওয়া কা-নাল্লা-হু বিকুল্লি শাইয়িন ‘আলীমা-।',
        'লাকাদ সাদাকাল্লা-হু রাছূলাহুর রু’ইয়া-বিলহাক্কি লাতাদখুলুন্নাল মাছজিদাল হারা-মা ইন শাআল্লা-হু আ-মিনীনা মুহালিলকীনা রুঊ’ছাকুম ওয়া মুকাসসিরীনা লা-তাখাফূনা ফা‘আলিমা মা-লাম তা‘লামূফাজা‘আলা মিন দূ নি যা-লিকা ফাতহান কারীবা-।',
        'হুওল্লাযীআরছালা রাছূলাহূবিলহুদা-ওয়া দীনিল হাক্কিলিইউজহিরাহূ‘আলাদ্দীনি কুল্লিহী ওয়া কাফা-বিল্লা-হি শাহীদা-।',
        'মুহাম্মাদুর রাছূলুল্লা-হি ওয়াল্লাযীনা মা‘আহূআশিদ্দাউ ‘আলাল কুফফা-রি রুহামাউ বাইনাহুম তারা-হুম রুক্কা‘আন ছুজ্জাদাইঁ ইয়াবতাগূনা ফাদলাম মিনাল্লা-হি ওয়া রিদওয়ানান ছীমা-হুম ফী উজূহিহিম মিন আছারিছছু জূদ যা-লিকা মাছালুহুম ফিততাওরা-তি ওয়া মাছালুহুম ফিল ইনজিলি কাঝার ‘ইন আখরাজা শাতআহূ ফাআ-ঝারাহূফাছতাগলাজা ফাছতাওয়া-‘আলা-ছূকিহী ইউ’জিবুঝঝুররা-‘আ লিইয়াগীজা বিহিমুল কুফফা-রা ওয়া ‘আদাল্লা-হুল্লাযীনা আ-মানূওয়া ‘আমিলুসসা-লিহা-তি মিনহুম মাগফিরাতাওঁ ওয়া আজরান ‘আজীমা-।'
      ],
      49: [
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূলা-তুকাদ্দিমূবাইনা ইয়াদাইল্লা-হি ওয়া রাছূলিহী ওয়াত্তাকুল্লা-হা ইন্নাল্লা-হা ছামী‘উন ‘আলীম।',
        'ইয়া আইয়ুহাল্লাযীনা আ-মানূলা তারফা‘ঊআসওয়া-তাকুম ফাওকা সাওতিন্নাবিইয়ি ওয়ালা-তাজহারূলাহূবিলকাওলি কাজাহরি বা‘দিকুম লিবা‘দিন আন তাহবাতাআ‘মালুকুম ওয়া আনতুম লা-তাশ‘ঊরূন।',
        'ইন্নাল্লাযীনা ইয়াগুদ্দূনা আসওয়া-তাহুম ‘ইনদা রাছূলিল্লা-হি উলাইকাল্লাযীনাম তাহানাল্লাহু কুলূবাহুম লিত্তাকওয়া- লাহুম মাগফিরাতুওঁ ওয়া আজরুন ‘আজীম।',
        'ইন্নাল্লাযীনা ইউনা-দূনাকা মিওঁ ওরাইল হুজূরা-তি আকছারুহুম লা-ইয়া‘কিলূন।',
        'ওয়ালাও আন্নাহুম সাবারূহাত্তা-তাখরুজা ইলাইহিম লাকা-না খাইরাল্লাহুম ওয়াল্লা-হু গাফূরুর রাহীম।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূইন জাআকুম ফা-ছিকু ম বিনাবাইন ফাতাবাইয়ানূআন তুসীবূকাওমাম বিজাহা-লাতিন ফাতুসবিহূ‘আলা-মা-ফা‘আলতুম না-দিমীন।',
        'ওয়া‘লামূআন্না ফীকুম রাছূলল্লা-হি লাও ইউতী‘উকুম ফী কাছীরিম মিনাল আমরি লা‘আনিত্তুম ওয়ালা-কিন্নাল্লা-হা হাব্বাবা ইলাইকুমুল ঈমা-না ওয়া ঝাইয়ানাহূফী কুলূবিকুম ওয়া কাররাহা ইলাইকুমুল কুফরা ওয়ালফুছূকা ওয়াল ‘ইসইয়া-না উলাইকা হুমুররাশিদূ ন।',
        'ফাদলাম মিনাল্লা-হি ওয়া নি‘মাতাওঁ ওয়াল্লা-হু ‘আলীমুন হাকীম।',

        'ওয়াল্লাযীনা আ-মানূবিল্লা-হি ওয়া রুছুলিহীউলাইকা হুমুসসিদ্দীকূনা ওয়াশশুহাদাউ ‘ইনদা রাব্বিহিম লাহুম আজরুহুম ওয়া নূরুহুম ওয়াল্লাযীনা কাফারূ ওয়াকাযযাবূবিআ-য়া-তিনাউলাইকা আসহা-বুল জাহীম।',
        'ই‘লামূআন্নামাল হায়া-তুদ্দুনইয়া-লা‘ইবুওঁ ওয়ালাহউওঁ ওয়া ঝীনাতুওঁ ওয়া তাফা-খুরুম বাইনাকুম ওয়া তাকা-ছু রুন ফিল আমওয়া-লি ওয়ালআওলা-দা কামাছালি গাইছিন আ‘জাবাল কুফফা-রা নাবাতুহূছু ম্মা ইয়াহীজুফাতারা-হু মুসফাররান ছুম্মা ইয়াকূনুহুতামাও ওয়া ফিল আ-খিরাতি ‘আযা-বুন শাদীদুওঁ ওয়া মাগফিরাতুম মিনাল্লা-হি ওয়া রিদওয়ানুওঁ ওয়ামাল হায়া-তুদ্দুনইয়াইল্লা মাতা-‘উল গুরূর।',
        'ছা-বিকূইলা-মাগফিরাতিম মির রাব্বিকুম ওয়া জান্নাতিন ‘আরদুহা-কা‘আরদিছ ছামাই ওয়াল আরদি উ‘ইদ্দাত লিল্লাযীনা আ-মানূবিল্লা-হি ওয়া রুছুলিহী যা-লিকা ফাদলুল্লা-হি ইউ’তীহি মাইঁ ইয়াশাউ ওয়াল্লা-হু যুল ফাদলিল ‘আজীম।',
        'মাআসা-বা মিমমুসীবাতিন ফিল আরদিওয়ালা-ফীআনফুছিকুম ইল্লা-ফী কিতা-বিম মিন কাবলি আন্নাবরাআহা- ইন্না যা-লিকা ‘আলাল্লা-হি ইয়াছীর।',
        'লিকাইলা-তা’ছাও ‘আলা-মা-ফা-তাকুম ওয়ালা-তাফরাহূবিমাআ-তা-কুম ওয়াল্লা-হু লা-ইউহিব্বুকুল্লা মুখতা-লিন ফাখূর।',
        'আল্লাযীনা ইয়াবখালূনা ওয়া ইয়া’মুরূনান্না-ছা বিলবুখলি ওয়া মাইঁ ইয়াতাওয়াল্লা ফাইন্নাল্লাহা হুওয়াল গানিইয়ূল হামীদ।',
        'লাকাদ আরছালনা-রুছুলানা-বিলবাইয়িনা-তি ওয়া আনঝালনা-মা‘আহুমুল কিতা-বা ওয়াল মীঝা-না লিইয়াকূমান্না-ছুবিলকিছতি ওয়া আনঝালনাল হাদীদা ফীহি বা’ছুন শাদীদুওঁ ওয়া মানা-ফি‘উ লিন্না-ছি ওয়া লিইয়া‘লামাল্লা-হু মাইঁ ইয়ানসুরুহূওয়া রুছুলাহূবিলগাইবি ইন্নাল্লা-হা কাবিইয়ুন ‘আঝীঝ।',
        'ওয়া লাকাদ আরছালনা-নূহাও ওয়া ইবরা-হীমা ওয়া জা‘আলনা-ফী যুররিইইয়াতিহিমান নুবুওয়াতা ওয়াল কিতা-বা ফামিনহুম মুহতাদিও ওয়া কাছীরুম মিনহুম ফা-ছিকূন।',
        'ছু ম্মা কাফফাইনা-‘আলাআ-ছা-রিহিম বিরুছুলিনা-ওয়া কাফফাইনা-বি‘ঈছাবনি মারইয়ামা ওয়া আ-তাইনা-হুল ইনজীলা ওয়া জা‘আলনা-ফী কুলূবিল্লাযীনাত্তাবা‘ঊহু রা’ফাতাওঁ ওয়া রাহমাতাও ওয়া রাহবা-নিইয়াতানিব তাদা‘ঊহা-মা-কাতাবনা-হা‘আলাইহিম ইল্লাবতিগাআ রিদওয়া-নিল্লা-হি ফামা-রা‘আওহা-হাক্কা রি‘আ-ইয়াতিহা- ফাআ-তাইনাল্লাযীনা আ-মানূমিনহুম আজরাহুম ওয়া কাছীরুম মিনহুম ফাছিকূন।',
        'ইয়া আইয়ুহাল্লাযীনা আ-মানুত্তাকুল্লা-হা ওয়া আ-মিনূবিরাছুলিহী ইউ’তিকুম কিফলাইনি মির রাহমাতিহী ওয়া ইয়াজ‘আল্লাকুম নূরান তামশূনা বিহী ওয়া ইয়াগফির লাকুম ওয়াল্লা-হু গাফূরুর রাহীম।',
        'লিয়াল্লা-ইয়া‘লামা আহলুল কিতা-বি আল্লা-ইয়াকদিরূনা ‘আলা-শাইয়িম মিন ফাদলিল্লা-হি ওয়া আন্নাল ফাদলা বিয়াদিল্লা-হি ইউ’তীহি মাইঁ ইয়াশাউ ওয়াল্লা-হু যুল ফাদলিল ‘আজীম।'
      ],
      58: [
        'কাদ ছামি‘আল্লা-হু কাওলাল্লাতী তুজা-দিলুকা ফী ঝাওজিহা-ওয়া তাশতাকীইলাল্লা-হি ওয়াল্লা-হু ইয়াছমা‘উ তাহা-উরাকুমা- ইন্নাল্লা-হা ছামী‘উম বাসীর।',
        'আল্লাযীনা ইউজা-হিরূনা মিনকুম মিনিছাইহিম মা-হুন্না উম্মাহা-তিহিম ইন উম্মাহাতুহুম ইল্লাল লাঈ ওয়ালাদনাহুম ওয়া ইন্নাহুম লাইয়াকূলূনা মুনকারাম মিনাল কাওলি ওয়াঝূরা- ওয়া ইন্নাল্লা-হা লা‘আফুওউন গাফূর।',
        'ওয়াল্লাযীনা ইউজা-হিরূনা মিন্নিছাইহিম ছু ম্মা ইয়া‘ঊদূ না লিমা-কা-লূফাতাহরীরু রাকাবাতিম মিন কাবলি আইঁ ইয়াতামাছছা- যা-লিকুম তূ‘আজূনা বিহী ওয়াল্লাহু বিমা-তা‘মালূনা খাবীর।',
        'ফামাল্লাম ইয়াজিদ ফাসিয়া-মুশাহরাইনি মুতাতা-বি‘আইনি মিন কাবলি আইঁ ইয়াতামাছছা- ফামাল্লাম ইয়াছতাতি‘ ফাইত‘আ-মুছিত্তীনা মিছকীনা- যা-লিকা লিতু’মিনূবিল্লাহি ওয়া রাছূলিহী ওয়া তিলকা হুদূদুল্লা-হি ওয়া লিল কা-ফিরীনা ‘আযা-বুন আলীম।',
        'ইন্নাল্লাযীনা ইউহাদ্দূনাল্লা-হা ওয়া রাছূলাহূকুবিতূকামা-কুবিতাল্লাযীনা মিন কাবলিহিম ওয়া কাদ আনঝালনাআ-য়া-তিম বাইয়িনা-তিওঁ ওয়ালিলকা-ফিরীনা ‘আযা-বুম মুহীন।',
        'ইয়াওমা ইয়াব‘আছুহুমুল্লা-হু জামী‘আন ফাইউনাব্বিউহুম বিমা-‘আমিলূ আহসা-হুল্লা-হু ওয়া নাছূহু ওয়াল্লা-হু ‘আলা-কুল্লি শাইয়িন শাহীদ।',
        'আলাম তারা আন্নাল্লা-হা ইয়া‘লামুমা-ফিছছামা-ওয়া-তি ওয়ামা-ফিল আরদি মাইয়াকূনুমিন নাজওয়া-ছালা-ছাতিন ইল্লা-হুওয়া রা-বি‘উহুম ওয়ালা-খামছাতিন ইল্লাহুওয়া ছা-দিছুহুম ওয়ালাআদনা-মিন যা-লিকা ওয়ালাআকছারা ইল্লা-হুওয়া মা‘আহুম আইনা মা-কা-নূ ছু ম্মা ইউনাব্বিউহুম বিমা-‘আমিলূইয়াওমাল কিয়া-মাতি ইন্নাল্লা-হা বিকুল্লি শাইয়িন ‘আলীম।',
        'আলাম তারা ইলাল্লাযীনা নুহূ‘আনিন্নাজওয়া-ছু ম্মা ইয়া‘ঊদূ না লিমা-নুহূ ‘আনহু ওয়া ইয়াতানা-জাওনা বিলইছমি ওয়াল ‘উদওয়া-নি ওয়া মা‘সিয়াতিররাছূলি ওয়া ইযাজাঊকা হাইইয়াওকা বিমা-লাম ইউহায়িকা বিহিল্লা-হু ওয়া ইয়াকূলূনা ফী আনফুছিহিম লাওলা-ইউ‘আযযি বুনাল্লা-হু বিমা-নাকূলু হাছবুহুম জাহান্নামু ইয়াসলাওনাহা- ফাবি’ছাল মাসীর।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূইযা-তানা-জাইতুম ফালা-তাতানা-জাও বিল ইছমি ওয়াল ‘উদওয়া-নি ওয়ামা‘সিয়াতির রাছূলি ওয়া তানা-জাও বিলবিররি ওয়াত্তাকওয়া- ওয়াত্তাকুল্লা-হাল্লাযীইলাইহি তুহশারূন।',
        'ইন্নামান্নাজওয়া-মিনাশশাইতা-নি লিয়াহঝুনাল্লাযীনা আ-মানূওয়া লাইছা বিদারিহিম শাইআন ইল্লা-বিইযনিল্লা -হি ওয়া ‘আলাল্লা-হি ফালইয়াতাওয়াক্কালিল মু’মিনূন।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূইযা-কীলা লাকুম তাফাছ ছাহূফিল মাজা-লিছি ফাফছাহূ ইয়াফছাহিল্লা-হু লাকুম ওয়া ইযা-কীলানশুঝূফানশুঝূইয়ারফা‘ইল্লা-হুল্লাযীনা আমানূমিনকুম ওয়াল্লাযীনা ঊতুল ‘ইলমা দারাজা-তিও ওয়াল্লা-হু বিমা- তা‘মালূনা খাবীর।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূইযা-না-জাইতুমুর রাছূলা ফাকাদ্দিমূবাইনা ইয়াদাই নাজওয়া-কুম সাদাকাতান যা-লিকা খাইরুল্লাকুম ওয়া আতহারু ফাইল্লাম তাজিদূ ফাইন্নাল্লা-হা গাফূরুর রাহীম।',
        'আ আশফাকতুম আন তুকাদ্দিমূবাইনা ইয়াদাই নাজওয়া-কুম সাদাকা-তিন ফাইযলাম তাফ‘আলূওয়া তা-বাল্লা-হু ‘আলাইকুম ফাআকীমুসসালা-তা ওয়া আ-তুঝঝাকা-তা ওয়া আতী‘উল্লা-হা ওয়া রাছূলাহূ ওয়াল্লা-হু খাবীরুম বিমা-তা‘মালূন।',
        'আলাম তারা ইলাল্লাযীনা তাওয়াল্লাও কাওমান গাদিবাল্লা-হু ‘আলাইহিম মা-হুম মিনকুম ওয়ালা-মিনহুম ওয়া ইয়াহলিফূনা ‘আলাল কাযিবি ওয়া হুম ইয়া‘লামূন।',
        'আ‘আদ্দাল্লা-হু লাহুম ‘আযা-বান শাদীদান ইন্নাহুম ছাআ মা-কা-নূইয়া‘মালূন।',
        'ইত্তাখাযূআইমা-নাহুম জূন্নাতান ফাসাদ্দূ‘আন ছাবীলিল্লা-হি ফালাহুম ‘আযা-বুম মুহীন।',
        'লান তুগনিয়া ‘আনহুম আমওয়া-লুহুম ওয়ালাআওলা-দুহুম মিনাল্লা-হি শাইআন উলাইকা আসহা-বুন্না-রি হুম ফীহা-খা-লিদূ ন।',
        'ইয়াওমা ইয়াব‘আছুহুমুল্লা-হু জামী‘আন ফাইয়াহলিফূনা লাহূকামা-ইয়াহলিফূনা লাকুম ওয়া ইয়াহছাবূনা আন্নাহুম ‘আলা-শাইয়িন আলাইন্নাহুম হুমুল কা-যিবূন।',
        'ইছতাহওয়াযা ‘আলাইহিমুশশাইতা-নুফাআনছা-হুম যিকরাল্লা-হি উলাইকা হিঝবুশশাইতা-নি আলাইন্না হিঝবাশশাইতা-নি হুমুল খা-ছিরূন।',
        'ইন্নাল্লাযীনা ইউহাদ্দূনাল্লা-হা ওয়া রাছূলাহূউলাইকা ফিল আযাল্লীন।',
        'কাতাবাল্লা-হু লাআগলিবান্না আনা ওয়া রুছুলী ইন্নাল্লা-হা কাবিইয়ুন ‘আঝীঝ।',
        'লা-তাজিদুকাওমাইঁ ইউ’মিনূনা বিল্লা-হি ওয়াল ইয়াওমিল আ-খিরি ইউওয়াদ্দূনা মান হাদ্দাল্লা-হা ওয়া রাছূলাহূওয়া লাও কা-নূআ-বাআহুম আও আবনাআহুম আও ইখওয়া-নাহুম আও ‘আশীরাতাহুম উলাইকা কাতাবা ফী কুলূবিহিমুল ঈমা-না ওয়া আইয়াদাহুম বিরূহিম মিন হু ওয়া ইউদখিলুহুম জান্না-তিন তাজরী মিন তাহতিহাল আনহারু খা-লিদীনা ফীহা- রাদিআল্লা-হু ‘আনহুম ওয়ারাদূ‘আনহু উলাইকা হিঝবুল্লাহি আলাইন্না হিঝবাল্লা-হি হুমুল মুফলিহূন।'
      ],
      59: [
        'ছাব্বাহা লিল্লা-হি মা-ফিছ ছামা-ওয়া-তি ওয়ামা-ফিল আরদি ওয়া হুয়াওয়াল ‘আঝীঝুল হাকীম।',
        'হুয়াল্লাযীআখরাজাল্লাযীনা কাফারূ মিন আহলিল কিতা-বি মিন দিয়া-রিহিম লিআওওয়ালিল হাশরি মা-জানানতম আইঁ ইয়াখরুজুওয়া জান্নুআন্নাহুম মানি‘আতুহুম হুসূনুহুম মিনাল্লা-হি ফাআতা-হুমুল্লা-হু মিন হাইছুলাম ইয়াহতাছিবূ ওয়া কাযাফা ফী কুলূবিহিমুররু‘বা ইউখরিবূনা বুয়ূতাহুম বিআইদীহিম ওয়া আইদিল মু’মিনীনা ফা‘তাবিরূ ইয়াউলিল আবসা-র।',
        'ওয়া লাওলাআন কাতাবাল্লা-হু ‘আলাইহিমুল জালাআলাআযযাবাহুম ফিদ্দুনইয়া- ওয়া লাহুম আ-খিরাতি আযা-বুন্না-র।',
        'যা-লিকা বিআন্নাহুম শাক্কুল্লা-হা ওয়া রাছূলাহু ওয়ামাই ইউশাক্কিল্লা-হা ফাইন্নাল্লাহা শাদীনুল ‘ইকা-ব।',
        'মা-কাতা‘তুম মিল লিনাতিন আও তারাকতুমূহা- কাইমাতান ‘আলা উসূলিহাফাবিইযনিল্লা-হি ওয়া লিইউখঝিয়াল ফা-ছিকীন।',
        'ওয়ামাআআল্লা-হু ‘আলা-রাছূলিহী মিনহুম ফামাআওজাফ তুম আলাইহি মিন খাইলিওঁ ওয়ালা-রিকা-বিওঁ ওয়ালা-কিন্নাল্লা-হা ইউছালিলতুরুছুলাহু আলা-মাইঁ ইয়াশাউ ওয়াল্লাহু ‘আলা-কুল্লি শাইয়িন কাদীর।',
        'মাআফাআল্লা-হু ‘আলা-রাছূলিহী মিন আহলিল কুরা-ফালিল্লা-হি ওয়া লিররাছূলি ওয়া লিযিল কুরবা-ওয়াল ইয়াতা-মা-ওয়াল মাছা-কীনি ওয়াবনিছ��াবীলি কাইলা -ইয়াকূনা দূ লাতাম বাইনাল আগনিইয়াই মিনকুম ওয়ামাআ-তা-কুমুররাছূলুফাখুযূহু ওয়ামা-নাহা-কুম ‘আনহু ফানতাহূ ওয়াত্তাকুল্লা-হা শাদীদুল ‘ইকা-ব।',
        'লিল ফুকারাইল মুহা-জিরীনাল্লাযীনা উখরিজূমিন দিয়া-রিহিম ওয়া আমওয়া-লিহিম ইয়াবতাগূনা ফাদলাম মিনাল্লা-হি ওয়া রিদওয়া-নাওঁ ওয়া ইয়ানসুরূনাল্লা-হা ওয়া রাছূলাহূ উলাইকা হুমুসসা-দিকূন।',
        'ওয়াল্লাযীনা তাবাওওয়াউদ্দা-রা ওয়াল ঈমা-না মিন কাবলিহিম ইউহিববূনা মান হা-জারা ইলাইহিম ওয়ালা-ইয়াজিদূ না ফী সুদূ রিহিম হা-জাতাম মিম্মাউতূওয়া ইউ’ছিরূনা ‘আলা আনফুছিহিম ওয়ালাও কা-না বিহিম খাসা-সাতুও ওয়া মাইঁ ইঊকা শুহহা নাফছিহী ফাউলাইকা হুমুল মুফলিহূন।',
        'ওয়াল্লাযীনা জাঊ মিম বা‘দিহিম ইয়াকূ লূনা রাব্বানাগফিরলানা-ওয়া লিইখওয়া-নিনাল্লাযীনা ছাবকূনা-বিল ঈমা-নি ওয়ালা-তাজ‘আল ফী কুলূবিনা-গিল্লাল লিল্লাযীনা আ-মানূ রাব্বানাইন্নাকা রাঊফুর রাহ ীম।',
        'আলাম তারা ইলাল্লাযীনা না-ফাকূইয়াকূলূনা লিইখওয়া-নিহিমুল্লাযীনা কাফারূ মিন আহলিল কিতা-বি লাইন উখরিজতুম লানাখরুজান্না মা‘আকুম ওয়ালা-নুতী‘উ ফীকুম আহাদান আবাদওঁ ওয়া ইন কুতিলতুম লানানসুরান্নাকুম ওয়াল্লা-হু ইয়াশহাদুইন্নাহুম লাকা-যিবুন।',
        'লাইন উখরিজূলা ইয়াখরুজূনা মা‘আহুম ওয়া লাইন কূতিলূলা-ইয়ানসুরূনাহুম ওয়ালাইন নাসারূহুম লাইঊওয়াল্লুন্নাল আদবা-রা ছু ম্মা লা-ইউনসারূন।',
        'লাআনতুম আশাদ্দুরাহবাতান ফী সুদূ রিহিম মিনাল্লা-হি যা-লিকা বিআন্নাহুম কাওমুল লাইয়াফকাহুন।',
        'লা-ইউকা-তিলূনাকুম জামী‘আন ইল্লা ফী কুরামমুহাসসনাতিন আও মিওঁ ওয়ারাই জুদুরিন বা’ছুহুম বাইনাহুম শাদীদুন তাহছাবুহুম জামি‘আওঁ ওয়া কুলূবুহুম শাত্তা- যালিকা বিআন্নাহুম কাওমুল লা-ইয়া‘কিলূন।',
        'কামাছালিল্লাযীনা মিন কাবলিহিম কারীবান যা-কূওয়া বা-লা আমরিহিম ওয়া লাহুম ‘আযা-বুন আলীম।',
        'কামাছালিশশাইতা-নি ইযকা-লা লিল ইনছা-নিকফুর ফালাম্মা-কাফারা কালা ইন্নী বারীউম মিনকা ইন্নীআখা-ফুল্লা-হা রাব্বাল ‘আ-লামীন।',
        'ফাকা-না ‘আ-কিবাতাহুমাআন্নাহুমা-ফিন্না-রি খা-লিদাইনি ফীহা- ওয়া যা-লিকা জাঝাউজ্জা-লিমীন।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানুত্তাকুল্লা-হা ওয়ালতানজুর নাফছুম মা-কাদ্দামাত লিগাদিও ওয়াত্তাকুল্লা-হা ইন্নাল্লা-হা খাবীরুম বিমা-তা‘মালূন।',
        'ওয়ালা-তাকূনূকাল্লাযীনা নাছুল্লা-হা ফাআনছা-হুম আনফুছাহুম উলাইকা হুমুল ফাছিকূন।',
        'লা-ইয়াছতাবীআসহা-বুন্না-রি ওয়া আসহা-বুল জান্নাতি আসহা-বুল জান্নাতি হুমুল ফাইঝুন।',
        'লাও আনঝালনা-হা-যাল কুরআ-না ‘আলা-জাবালিল লারাআইতাহু খা-শি‘আম মুতাসাদ্দি‘ আম মিন খাশয়াতিল্লা-হি ওয়া তিলকাল আমছা-লুনাদরিবুহা-লিন্নাছি লা‘আল্লাহম ইয়াতাফাক্কারূন।',
        'হুওয়াল্লা-হুল্লাযী লাইলা-হা ইল্লা-হুওয়া ‘আ-লিমুল গাইবি ওয়াশশাহা-দাতি হুওয়াররাহমা-নুর রাহীম।',
        'হুওয়াল্লা-হুল্লাযী লাইলা-হা ইল্লা-হুওয়া আলমালিকুল কুদ্দূছুছ ছালা-মুল ম’মিনুল মুহাইমিনুল ‘আঝীঝুল জাব্বা-রুল মুতাকাব্বিরু ছুবহা-নাল্লা-হি ‘আম্মা-ইউশরিকূন।',
        'হুওয়াল্লা-হুল খা-লিকুল বা-রিউল মুছাওবিরু লাহুল আছমাউল হুছনা-; ইউছাব্বিহুলাহূ মা-ফিছ ছামা-ওয়া-তি ওয়াল আরদি ওয়াহুওয়াল ‘ আঝীঝুল হাকীম।'
      ],
      60: [
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূলা-তাত্তাখিযূ‘আদুওবী ওয়া ‘আদুওওয়াকুম আওলিয়াআ তুলকূনা ইলাইহিম বিলমাওয়াদ্দাতি ওয়া কাদ কাফারূবিমা-জাআকুম মিনাল হাক্কি ইউখরিজুনার রাছূলা ওয়া ইয়্যা-কুম আন তু’মিনূবিল্লা-হি রাব্বিকুম ইন কুনতুম খারাজতুম জিহা-দান ফী ছাবীলী ওয়াব তিগাআ মারদা-তী তুছিররূনা ইলাইহিম বিলমাওয়াদ্দাতি ওয়া আনা আ‘লামুবিমাআখফাইতুম ওয়ামাআ‘লানতুম ওয়া মাইঁ ইয়াফ‘আলহু মিনকুম ফাকাদ দাল্লা ছাওয়াআছ ছাবীল।',
        'ইয়ঁইয়াছকাফূকুমইয়াকূনূলাকুমআ‘দাআওঁ ওয়া ইয়াবছুতূ ইলাইকুম আইদিয়াহুম ওয়া আলছিনাতাহুম বিছছূই ওয়া ওয়াদ্দূলাও তাকফুরূন।',
        'লান তানফা‘আকুম আরহা-মুকুম ওয়ালাআওলা-দুকুম ইয়াওমাল কিয়া-মাতি ইয়াফসিলুবাইনাকুম ওয়াল্লা-হু বিমা-তা‘মালূনা বাসীর।',
        'কাদ কা-নাত লাকুম উছওয়াতুন হাছানাতুন ফীইবরা-হীমা ওয়াল্লাযীনা মা‘আহূ ইয কা-লূলিকাওমিহিম ইন্না-বুরাআউ মিনকুম ওয়া মিম্মা-তা‘বুদূ না মিন দূ নিল্লা-হি কাফারনাবিকুম ওয়া বাদা-বাইনানা-ওয়া বাইনাকুমুল ‘আদা-ওয়াতুওয়ালা বাগদা উ আবাদান হাত্তা-তু’মিনূবিল্লা-হি ওয়াহদাহূইল্লা-কাওলা ইবরা-হীমা লিআবীহি লাআছতাগফিরান্না লাকা ওয়ামাআমলিকুলাকা মিনাল্লা-হি মিন শাইয়িন রাব্বানা-‘আলাইকা তাওয়াক্কালনাওয়া ইলাইকা আনাবনা-ওয়া ইলাইকাল মাসীর।',
        'রাব্বানা-লা-তাজ‘আলনা-ফিতনাতালিলল্লাযীনা কাফারূওয়াগফিরলানা-রাব্বানা- ইন্নাকা আনতাল ‘আঝীঝুল হাকীম।',
        'লাকাদ কা-না লাকুম ফীহিম উছওয়াতুন হাছানাতুল লিমান কা-না ইয়ারজুল্লা-হা ওয়াল ইয়াওমাল আ-খিরা ওয়া মাইঁ ইয়াতাওয়াল্লা ফাইন্নাল্লা-হা হুওয়াল গানিইয়ুল হামীদ।',
        '‘আছাল্লা-হু আইঁ ইয়াজ‘আলা বাইনাকুম ওয়া বাইনাল্লাযীনা ‘আ-দাইতুম মিনহুম মাওয়াদ্দাতাও ওয়াল্লা-হু কাদীরুও ওয়াল্লা-হু গাফূরুর রাহীম।',
        'লা-ইয়ানহা-কুমুল্লা-হু ‘আনিল্লাযীনা লাম ইউকা-তিলূকুম ফিদ্দীনি ওয়ালাম ইউখরিজুকুম মিন দিয়া-রিকুম আন তাবাররূহুম ওয়া তুকছিতূইলাইহিম ইন্নাল্লা-হা ইউহিব্বুল মুকছিতীন।',
        'ইন্নামা-ইয়ানহা-কুমুল্লা-হু ‘আনিল্লাযীনা কা-তালূকুম ফিদদীনি ওয়া আখরাজুকুম মিন দিয়ারিকুম ওয়া জা-হারূ‘আলাইখরা-জিকুম আন তাওয়াল্লাওহুম ওয়া মাইঁ ইয়াতাওয়াল্লাহুম ফাউলাইকা হুমুজ্জা-লিমূন।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূইযা-জাআকুমুল মু’মিনা-তুমুহা-জিরা-তিন ফামতাহিনূহুন্না আল্লা-হু আ‘লামুবিঈমা-নিহিন্না ফাইন ‘আলিমতুমূহুন্না মু’মিনা-তিন ফালা-তারাজি‘ঊহুন্না ইলাল কুফফা-রি লা-হুন্না হিল্লুল্লাহুম ওয়ালা-হুম ইয়াহিললূনা লাহুন্না ওয়া আ-তূহুম মাআনফাকূ ওয়ালা-জুনা-হা ‘আলাইকুম আন তানকিহূহুন্না ইযা আ-তাইতুমূহুন্না উজূরাহুন্না ওয়ালা-তুমছ��কূবি‘ইসামিল কাওয়া-ফিরি ওয়াছআলূমা আনফাকতুম ওয়ালয়াছআলূমাআনাকূ যা-লিকুম হুকমুল্লা-হি ইয়াহকুমু বাইনাকুম ওয়াল্লা-হু ‘আলীমুন হাকীম।',
        'ওয়া ইন ফা-তাকুম শাইউম মিন আঝওয়া-জিকুম ইলাল কুফফা-রি ফা‘আ-কাবতুম ফাআতুল্লাযীনা যাহাবাতা আঝওয়া-জুহুম মিছলা মাআনফাকূ ওয়াত্তাকুল্লা-হাল্লাযী আনতুম বিহী মু’মিনূন।',
        'ইয়াআইয়ুহান্নাবিয়ুইযা-জাআকাল মু’মিনা-তুইউবা-ই‘নাকা ‘আলাআল্লা-ইউশরিকনা বিল্লা-হি শাইআওঁ ওয়ালা-ইয়াছরিকনা ওয়ালা-ইয়াঝনীনা ওয়ালা-ইয়াকতুলনা আওলা-দাহুন্না ওয়ালা-ইয়া’তীনা ব্বিুহতা-নিইঁ ইয়াফতারীনাহূবাইনা আইদীহিন্না ওয়া আরজুলিহিন্না ওয়ালা-ইয়া‘সীনাকা ফী মা‘রূফিন ফাবা-ই‘হুন্না ওয়াছতাগফির লাহুন্নাল্লা-হা ইন্নাল্লা-হা গাফুরুর রাহীম।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূলা-তাতওয়াল্লাও কাওমান গাদিবাল্লা-হু‘আলাইহিমকাদ ইয়াইছূমিনাল আ-খিরাতি কামা-ইয়াইছাল কুফফা-রু মিন আসহা-বিল কুবূর।'
      ],
      61: [
        'ছাব্বাহা লিল্লা-হি মা-ফিছছামা-ওয়া-তি ওয়ামা-ফিল আরদি ওয়া হুওয়াল ‘আঝীঝুল হাকীম।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূলিমা তাকূলূনা মা-লা-তাফ‘আলূন।',
        'কাবুরা মাকতান ‘ইনদাল্লা-হি আন তাকূলূমা-লা-তাফ‘আলূন।',
        'ইন্নাল্লা-হা ইউহিব্বুল্লাযীনা ইউকা-তিলূনা ফী ছাবীলিহী সাফফান কাআন্নাহুম বুনয়া-নুম মারসূস।',
        'ওয়া ইযকা-লা মূছা-লিকাওমিহী ইয়া-কাওমি লিমা তু’যূনানী ওয়া কাততা‘লামূনা আন্নী রাছূলুল্লা-হি ইলাইকুম ফালাম্মা-ঝা-গূআঝা-গাল্লা-হু কুলূবাহুম ওয়াল্লা-হু লাইয়াহদিল কাওমাল ফা-ছিকীন।',
        'ওয়া ইযকা-লা ‘ঈছাবুন মারইয়ামা ইয়া-বানীইছরাঈলা ইন্নী রাছূলুল্লা-হি ইলাকুম মুসাদ্দিকাল লিমা বাইনা ইয়াদাইইয়া মিনাত্তাওরা-তি ওয়া মুবাশশিরাম বিরাছূলিইঁ ইয়া’তী মিম বা‘দিছমূহূআহমাদু ফালাম্মা-জাআহুম বিলবাইয়িনা-তি কা-লূহা-যা-ছিহরুম মুবীন।',
        'ওয়া মান আজলামুমিম্মানিফ তারা-‘আলাল্লা-হিল কাযিবা ওয়া হুওয়া ইউদ‘আইলাল ইছলা-মি ওয়াল্লা-হু লা-ইয়াহদিল কাওমাজ্জা-লিমীন।',
        'ইউরীদূনা লিইউতফিউ নূরাল্লা-হি বিআফওয়া-হিহিম ওয়াল্লা-হুমুতিম্মুনূরিহী ওয়ালাও কারিহাল কা-ফিরূন।',
        'হুওয়াল্লাযীআরছালা রাছূলাহূবিলহুদা-ওয়া দীনিল হাক্কি লিইউজহিরাহূ‘আলাদ্দীনি কুল্লিহী ওয়া লাও কারিহাল মুশরিকূন।',
        'ইয়া-আইয়ুহাল্লাযীনা আ-মানূহাল আদুল্লুকুমআলা-তিজা-রাতিন তুনজীকুমমিন‘আযা-বিন আলীম।',
        'তু’মিনূনা বিল্লা-হি ওয়া রাছূলিহী ওয়া তুজা-হিদূ না ফী ছাবীলিল্লা-হি বিআমওয়া-লিকুম ওয়া আনফুছিকুম যা-লিকুম খাইরুল্লাকুম ইন কুনতুম তা‘লামূন।',
        'ইয়াগফিরলাকুম যুনূবাকুম ওয়া ইউদখিলকুম জান্না-তিন তাজরী মিন তাহতিহাল আনহা-রু ওয়া মাছা-কিনা তাইয়িবাতান ফী জান্না-তি ‘আদনিন যা-লিকাল ফাওঝুল ‘আজীম।',
        'উখরা-তুহিববূনাহা- নাসরুম মিনাল্লা-হি ওয়া ফাতহুন কারীব ওয়া বাশশিরিল মু’মিনীন।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূকূনূআনসা-রাল্লা-হি কামা-কা-লা ‘ঈছাবনুমারইয়ামা লিলহাওয়া-বিইয়ীনা মান আনসা-রী-ইলাল্লা-হি কা-লাল হাওয়া-রিইয়ূনা নাহনুআনসারুল্লা-হি ফাআ-মানাত্তাইফাতুমমিম বানীইছরাঈলা ওয়া কাফারাততাইফাতুন ফাআইঁয়াদনাল্লাযীনা আ-মানূ‘আলা-‘আদুওবিহিম ফাআসবাহূ জা-হিরীন।'
      ],
      62: [
        'ইউছাব্বিহু লিল্লা-হি মা-ফিছছামা-ওয়া-তি ওয়ামা-ফিল আরদিলমালিকিলকুদ্দূছিল ‘আঝঝিল হাকীম।',
        'হুওয়াল্লাযী বা‘আছা ফিল উম্মিইয়ীনা রাছূলাম মিনহুম ইয়াতলূ‘আলাইহিম আ-য়া-তিহী ওয়া ইউঝাক্কীহিম ওয়া ইউ‘আলিলমুহুমুল কিতা-বা ওয়াল হিকমাতা ওয়া ইন কা-নূমিন কাবলু লাফী দালা-লিম্মুবীন।',
        'ওয়া আ-খারীনা মিনহুম লাম্মা-ইয়ালহাকূবিহিম ওয়া হুওয়াল ‘আঝীঝুল হাকীম।',
        'যা-লিকা ফাদলুল্লা-হি ইউ’তীহি মাইঁ ইয়াশূউ ওয়াল্লা-হু যুল ফাদলিল ‘আজীম।',
        'মাছালুল্লাযীনা হুম্মিলুত্তাওরা-তা ছুম্মা লাম ইয়াহমিলূহা-কামাছালিল হিমা-রি ইয়াহমিলুআছফা-রান বি’ছা মাছালুল কাওমিল্লাযীনা কাযযাবূবিআ-য়া-তিল্লা-হি ওয়াল্লা-হু লা-ইয়াহদিল কাওমাজ্জা-লিমীন।',
        'কুল ইয়াআইয়ুহাল্লাযীনা হা-দূ ইন ঝা‘আমতুম আন্নাকুম আওলিয়াউ লিল্লা-হি মিন দূনিন্না-ছি ফাতামান্নাউল মাওতা ইন কুনতুম সা-দিকীন।',
        'ওয়ালা-ইয়াতামান্নাওনাহূ আবাদাম বিমা-কাদ্দামাত আইদীহিম ওয়াল্লা-হু ‘আলীমুম বিজ্জা-লিমীন।',
        'কুল ইন্নাল মাওতাল্লাযী তাফিররূনা মিনহু ফাইন্নাহূমুলা-কীকুম ছু ম্মা তুরাদ্দূনা ইলা-‘আলিমিল গাইবি ওয়াশ শাহা-দাতি ফাইউনাব্বিউকুম বিমা-কুনতুম তা‘মালূন।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূইযা-নূদিয়া লিসসালা-তি মিইঁ ইয়াওমিল জুমু‘আতি ফাছ‘আও ইলা-যিকরিল্লা-হি ওয়া যারুল বাই‘আ যা-লিকুম খাইরুল্লাকুম ইন কুনতুম তা‘লামূন।',
        'ফাইযা- কুদিয়াতিসসালা-তুফানতাশিরূ ফিল আরদি ওয়াবতাগূমিন ফাদলিল্লা -হি ওয়াযকুরুল্লা-হা কাছীরাল লা‘আল্লাকুম তুফলিহূন।',
        'ওয়া ইযা-রাআও তিজা-রাতান আও লাহওয়ানিনফাদ্দূ ইলাইহা-ওয়া তারাকূকাকাইমা- কুল মা-‘ইনদাল্লা-হি খাইরুম মিনাল্লাহবিওয়া মিনাত্তিজা-রাতি ওয়াল্লা-হু খাইরুর রা-ঝিকীন।'
      ],
      63: [
        'ইযা-জাআকাল মুনা-ফিকূনা কা-লূনাশহাদুইন্নাকা লারাছূলুল্লা-হ । ওয়াল্লা-হু ইয়া‘লামুইন্নাকা লারাছূলুহূ ওয়াল্লা-হু ইয়াশহাদুইন্নাল মুনা-ফিকীনা লাকা-যিবূন।',
        'ইত্তাখাযূ আইমা-নাহুম জুন্নাতান ফাসাদ্দূ‘আন ছাবীলিল্লা-হি ইন্নাহুম ছাআ মা-কা-নূ ইয়া‘মালূন।',
        'যা-লিকা বিআন্নাহুম আ-মানূছুম্মা কাফারূফাতুবি‘আ ‘আলা- কুলূবিহিম ফাহুম লাইয়াফকাহূন।',
        'ওয়া ইযা-রাআইতাহুম তু‘জিবুকা আজছা-মুহুম ওয়াইঁয় ইয়াকূলূতাছমা‘ লিকাওলিহিম কাআন্নাহুম খুশুবুমমুছান্নাদাতুইঁ ইয়াহছাবূনা কুল্লা সাইহাতিন ‘আলাইহিম হুমুল ‘আদুওউ ফাহ যারহুম কা-তালাহুমুল্লা-হু আন্না-ইউ’ফাকূন।',
        'ওয়াইযা-কীলালাহুম তা‘আ-লাও ইয়াছতাগফিরলাকুমরাছূলুল্লা-হি লাওওয়াও রুঊছাহুম ওয়া রাআইতাহুম ইয়াসুদ্দূনা ওয়া হুম মুছতাকবিরূন।',
        'ছাওয়াউন ‘আলাইহিম আছতাগফারতা লাহুম আম লাম তাছতাগফিরলাহুম লাই ইয়াগফিরাল্লা-হু লাহুম ইন্নাল্লা-হা লা-ইয়াহদিল কাওমাল ফা-ছিকীন।',
        'হুমুল্লাযীনা ইয়াকূলূনা লা-তুনফিকূ‘আলা-মান ‘ইনদা রাছূলিল্লা-হি হাত্তা-ইয়ানফাদ্দূ ওয়া লিল্লা-হি খাঝাইনুছ ছামা-ওয়া-তি ওয়াল আরদিওয়ালা-কিন্নাল মুনা-ফিকীনা লাইয়াফকাহূন।',
        'ইয়াকূলূনা লাইর রাজা‘নাইলাল মাদীনাতি লাইউখরিজান্নাল আ‘আঝঝুমিনহাল আযাল্লা ওয়া লিল্লা-হিল ‘ইঝঝাতুওয়া লিরাছূলিহী ওয়া লিলমু’মিনীনা ওয়ালা-কিন্নাল মুনা-ফিকীনা লা-ইয়া‘লামূন।',
        'ইয়া আইয়ুহাল্লাযীনা আ-মানূলা-তুলহিকুম আমওয়া-লুকুম ওয়ালাআওলা-দুকুম ‘আন যিকরিল্লা-হি ওয়া মাইঁ ইয়াফ‘আল যা-লিকা ফাউলাইকা হুমুল খা-ছিরূন।',
        'ওয়া আনফিকূমিম্মা-রাঝাকনা-কুম মিন কাবলি আইঁ ইয়া’তিয়া আহাদাকুমুল মাওতু ফাইয়াকূলা রাব্বি লাওলা আখখারতানী ইলা আজালিন কারীবিন ফাআসসাদ্দাকা ওয়া আকুম মিনাসসা-লিহীন।',
        'ওয়া লাইঁ ইউআখখিরাল্লা-হু নাফছান ইযা-জাআ আজালুহা- ওয়াল্লা-হু খাবীরুম বিমা-তা‘মালূন।'
      ],
      64: [
        'ইউছাব্বিহু লিল্লা-হি মা-ফিছ ছামা-ওয়া-তি ওয়ামা-ফিল আরদি লাহুল মুলকুওয়া লাহুল হামদু ওয়া হুওয়া ‘আলা-কুল্লি শাইয়িন কাদীর।',
        'হুওয়াল্লাযী খালাকাকুম ফামিনকুম কা-ফিরুওঁ ওয়া মিনকুম মু’মিনুন ওয়াল্লা-হু বিমাতা‘মালূনা বাসীর।',
        'খালাকাছছামা-ওয়া-তি ওয়াল আরদা বিলহাক্কিওয়া সাওওয়ারাকুম ফাআহছানা সুওয়ারাকুম ওয়া ইলাইহিল মাসীর।',
        'ইয়া‘লামুমা-ফিছ ছামা-ওয়া-তি ওয়াল আরদিওয়া ইয়া‘লামুমা-তুছিররূনা ওয়ামাতু‘লিনূনা ওয়াল্লা-হু ‘আলীমুম বিযা-তিসসুদূ র।',
        'আলাম ইয়া’তিকুম নাবাউল্লাযীনা কাফারূমিন কাবলু ফাযা-কূওয়া বা-লা আমরিহিম ওয়ালাহুম ‘আযা-বুন আলীম।',
        'যা-লিকা বিআন্নাহূকা-নাত তা’তীহিম রুছুলুহুম বিলবাইয়িনা-তি ফাকা-লূ আবাশারুইঁ ইয়াহদূ নানা- ফাকাফারূ ওয়াতাওল্লাও ওয়াছতাগনাল্লাহু ওয়াল্লাহু গানিইয়ুন হামিদ।',
        'ঝা‘আমাল্লাযীনা কাফারূ আল্লাইঁ ইউব‘আছূ কুল বালা-ওয়া রাববী লাতুব‘আছুন্না ছু ম্মা লাতুনাব্বাউন্না বিমা-‘আমিলতুম ওয়া যা-লিকা ‘আলাল্লা-হি ইয়াছীর।',
        'ফাআ-মিনূবিল্লা-হি ওয়া রাছূলিহী ওয়ান্নূরিল্লাযীআনঝালনা- ওয়াল্লা-হু বিমাতা‘মালূনা খাবীর।',
        'ইয়াওমা ইয়াজমা‘উকুম লিইয়াওমিল জাম‘ই যা-লিকা ইয়াওমুত্তাগা-বুন ওয়া মাইঁ ইউ’মিম বিল্লা-হি ওয়া ইয়া‘মাল সা-লিহাইঁ ইউকাফফির ‘আনহু ছাইয়িআ-তিহী ওয়া ইউদখিলহু জান্না-তিন তাজরী মিন তাহতিহাল আনহা-রু খা-লিদীনা ফীহা-আবাদা- যা-লিকাল ফাওঝুল ‘আজীম।',
        'ওয়াল্লাযীনা কাফারূওয়া কাযযাবূবিআ-য়া-তিনা উলাইকা আসহা-বুন্না-রি খা-লিদীনা ফীহা- ওয়া বি’ছাল মাসীর।',
        'মাআসা-বা মিমমুসীবাতিন ইল্লা-বিইযনিল্লা -হি ওয়া মাইঁ ইউ’মিম বিল্লা-হি ইয়াহদি কালবাহূ ওয়াল্লা-হু বিকুল্লি শাইয়িন ‘আলীম।',
        'ওয়া আতী‘উল্লা-হা ওয়া আতী‘উর রাছূলা ফাইন তাওয়াল্লাইতুম ফাইন্নামা-‘আলারাছূলিনাল বালা-গুল মুবীন।',
        'আল্লা-হু লা ইলা-হা ইল্লা-হুওয়া ওয়া ‘আলাল্লা-হি ফালইয়াতাওয়াক্কালিল মু’মিনূন।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূ ইন্না মিন আঝওয়া-জিকুম ওয়া আওলা-দিকুম ‘আদুওওয়াল লাকুম ফাহযারূহুম ওয়া ইন তা‘ফূওয়া তাসফাহূওয়া তাগফিরূফাইন্নাল্লা-হা গাফূরুর রাহীম।',
        'ইন্নামা আমওয়া-লুকুম ওয়া আওলা-দুকুম ফিতনাতুওঁ ওয়াল্লা-হু ‘ইনদাহূ আজরুন ‘আজীম।',
        'ফাত্তাকুল্লা-হা মাছতাতা‘তুম ওয়াছমা‘উ ওয়া আতী‘ঊ ওয়া আনফিকূখাইরাল লিআনফুছিকুম ওয়া মাইঁ ইঊকা শুহহা নাফছিহী ফাউলাইকা হুমুল মুফলিহূন।',
        'ইন তুকরিদুল্লা-হা কারদান হাছানাইঁ ইউদা-‘ইফহু লাকুম ওয়া ইয়াগফিরলাকুম ওয়াল্লা-হু শাকূরুন হালীম।',
        '‘আ-লিমুল গাইবি ওয়াশশাহা-দাতিল ‘আঝীঝুল হাকীম।'
      ],
      65: [
        'ইয়াআইয়ুহান্নাবিইয়ুইযা-তাল্লাকতুমুন্নিছাআ ফাতালিলকূহুন্না লি‘ইদ্দাতিহিন্না ওয়া আহসুল ‘ইদ্দাতা ওয়াত্তাকুল্লা-হা রাব্বাকুম লা-তুখরিজুহুন্না মিম বুয়ূতিহিন্না ওয়ালাইয়াখরুজনা ইল্লাআইঁ ইয়া’তীনা বিফা-হিশাতিম মুবাইয়িনাতিওঁ ওয়া তিলকা হুদূদুল্লাহি ওয়া মাইঁ ইয়াতা‘আদ্দা হুদূদাল্লা-হি ফাকাদ জালামা নাফছাহূ লা-তাদরী লা‘আল্লাল্লা-হা ইউহদিছু বা‘দা যা-লিকা আমরা-।',
        'ফাইযা-বালাগনা আজালাহুন্না ফাআমছিকূহুন্না বিমা‘রূফিন আও ফা-রিকূহুন্না বিমা‘রূফিওঁ ওয়া আশহিদূযাওয়াই ‘আদলিম মিনকুম ওয়া আকীমুশশাহা-দাতা লিল্লা-হি যা-লিকুম ইঊ‘আজুবিহী মান কা-না ইউ’মিনুবিল্লা-হি ওয়াল ইয়াওমিল আ-খিরি ওয়া মাইঁ ইয়াত্তাকিল্লা-হা ইয়াজ‘আল্লাহূমাখরাজা-।',
        'ওয়া ইয়ারঝুকহু মিন হাইছুলা-ইয়াহতাছিবু ওয়া মাইঁ ইয়াতাওয়াক্কাল ‘আলাল্লা-হি ফাহুওয়া হাছবুহূ ইন্নাল্লা-হা বা-লিগু আমরিহী কাদ জা‘আলাল্লা-হু লিকুল্লি শাইয়িন কাদরা-।',
        'ওয়াল্লাঈইয়াইছনা মিনাল মাহীদিমিন্নিছাইকুম ইনিরতাবতুম ফা‘ইদ্দাতুহুন্না ছালাছাতুআশহুরিওঁ ওয়াল্লায়ী লাম ইয়াহিদনা ওয়া উলা-তুল আহমা-লি আজালুহুন্না আইঁ ইয়াদা‘না হামলাহুন্না ওয়া মাইঁ ইয়াত্তাকিল্লা-হা ইয়াজ‘আল লাহূমিন আমরিহী ইউছরা-।',
        'যা-লিকা আমরুল্লা-হি আনঝালাহূইলাইকুম ওয়া মাইঁ ইয়াত্তাকিল্লা-হা ইউকাফফির ‘আনহু ছাইয়িআ-তিহী ওয়া ইউ‘জিম লাহূআজরা-।',
        'আছকিনূহুন্না মিন হাইছুছাকানতুম মিওঁউজদিকুম ওয়ালা-তুদাররূহুন্না লিতুদাইয়িকূ ‘আলাইহিন্না ওয়া ইন কুন্না ঊলা-তি হামলিন ফাআনফিকূ‘আলাইহিন্না হাত্তা-ইয়াদা‘না হামলাহুন্না ফাইন আরদা‘না লাকুম ফাআ-তূহুন্না উজূরাহুন্না ওয়া’তামিরূবাইনাকুম বিমা‘রূফিও ওয়া ইন তা‘আ-ছারতুম ফাছাতুরদি‘উ লাহূউখরা-।',
        'লিইয়ুনফিকযূছা‘আতিম মিন ছা‘আতিহী ওয়া মান কুদিরা ‘আলাইহি রিঝকুহূ ফালইউনফিকমিম্মাআ-তা-হুল্লা-হু লা-ইউকালিলফুল্লা-হু নাফছান ইল্লা-মাআ-তাহা- ছাইয়াজ‘আলুল্লা-হু বা‘দা ‘উছরিইঁ ইউছরা-।',
        'ওয়া কাআইয়িম মিন কারয়াতিন ‘আতাত ‘আন আমরি রাব্বিহা-ওয়া রুছুলিহী ফাহা-ছাব নাহা-হিছা-বান শাদীদাওঁ ওয়া ‘আযযাবনা-হা-‘আযা-বান নুকরা-।',
        'ফাযা-কাত ওয়া বা-লা আমরিহা-ওয়া কা-না ‘আ-কিবাতুআমরিহা-খুছরা-।',
        'আ‘আদ্দাল্লা-হু লাহুম ‘আযা-বান শাদীদান ফাত্তাকুল্লা-হা ইয়াউলিল আলবা-বিল্লাযীনা আ-মানূ কাদ আনঝালাল্লা-হু ইলাইকুম যিকরা-।',
        'রাছূলাইঁ ইয়াতলূ‘আলাইকুম আ-য়া-তিল্লা-হি মুবাইয়িনা-তিল লিইউখরিজাল্লাযী না আ-মানূ ওয়া ‘আমিলুসসা-লিহা-তি মিনাজ্জুলুমা-তি ইলান্নূরি ওয়া মাইঁ ইউ’মিম বিল্লা-হি ওয়া ইয়া‘মাল সা-লিহাইঁ ইউদখিলহু জান্না-তিন তাজরী মিন তাহতিহাল আনহা-রু খা-লিদীনা ফীহাআবাদা- কাদ আহছানাল্লা-হু লাহূরিঝকা-।',
        'আল্লা-হুল্লাযী খালাকা ছাব‘আ ছামা-ওয়া-তিওঁ ওয়া মিনাল আরদিমিছলাহুন্না ইয়াতানাঝঝালুল আমরু বাইনাহুন্না লিতা‘লামূআন্নাল্লা-হা ‘আলা-কুল্লি শাইয়িন কাদীরুওঁ ওয়া আন্নাল্লা-হা কাদ আহা-তা বিকুল্লি শাইয়িন ‘ইল মা-।'
      ],
      66: [
        'ইয়াআইয়ুহান্নাবিইয়ুলিমা তুহাররিমুমাআহাল্লাল্লা-হু লাকা তাবতাগী মারদা-তা আঝওয়া-জিকা ওয়াল্লা-হু গাফূরুর রাহীম।',
        'কাদ ফারাদাল্লা-হু লাকুম তাহিল্লাতা আইমা-নিকুম ওয়াল্লা-হু মাওলা-কুম ওয়া হুওয়াল ‘আলীমুল হাকীম',
        'ওয়া ইযআছাররান্নাবিইয়ুইলা-বা‘দিআঝওয়া-জিহী হাদীছান ফালাম্মা-নাব্বাআত বিহী ওয়া আজহারাহুল্লা-হু আলাইহি ‘আররাফা বা‘দাহূওয়াআ‘রাদা ‘আম বা‘দিন ফালাম্মা-নাব্বাআহা-বিহী কা-লাত মান আম্বাআকা হা-যা- কা-লা নাব্বাআনিয়াল ‘আলীমুল খাবীর।',
        'ইন তাতূবাইলাল্লা-হি ফাকাদ সাগাত কুলূবুকুমা- ওয়া ইন তাজা-হারা-‘আলাইহি ফাইন্নাল্লা-হা হুওয়া মাওলা-হু ওয়া জিবরীলুওয়া সা-লিহুল মু’মিনীনা ওয়াল মালাইকাতুবা‘দা যা-লিকা জাহীর।',
        '‘আছা-রাব্বুহইন তাল্লাকাকুন্না আইঁ ইউবদিলাহূ আঝওয়া-জান খাইরাম মিনকুন্না মুছলিমাতিম মু’মিনা-তিন কা-নিতা-তিন তাইবা-তিন ‘আ-বিদা-তিন ছাইহা-তিন ছাইয়িবাতিওঁ ওয়া আবকা-রা-।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূকূআনফুছাকুমওয়াআহলীকুমনা-রাওঁ ওয়াকূ দুহান্না-ছু ওয়াল হিজা-রাতু‘আলাইহা-মালাইকাতুনগিলা-জু নশিদা-দুল লা-ইয়া‘সূনাল্লা-হা মা আমারাহুম ওয়া ইয়াফ‘আলূনা মা-ইউ’মারূন।',
        'ইয়াআইয়ুহাল্লাযীনা কাফারূলা-তা‘তাযিরুল ইয়াওমা ইন্নামা-তুজঝাওনা মা-কুনতুম তা‘মালূন।',
        'ইয়াআইয়ুহাল্লাযীনা আ-মানূতূবূইলাল্লা-হি তাওবাতান নাসূহা ‘আছা-রাব্বুকুম আইঁ ইউকাফফিরা ‘আনকুম ছাইয়িআ-তিকুম ওয়া ইউদখিলাকুম জান্না-তিন তাজরী মিন তাহতিহাল আনহা-রু ইয়াওমা লা-ইউখঝিল্লা-হুন নাবিইইয়া ওয়াল্লাযীনা আ-মানূ মা‘আহূ নূরুহুম ইয়াছ‘আ-বাইনা আইদীহিম ওয়া ব��আইমা-নিহিম ইয়াকূলূনা রাব্বানা আতমিম লানা-নূরানা-ওয়াগফিরলানা- ইন্নাকা ‘আলা-কুল্লি শাইয়িন কাদীর।',
        'ইয়াআইয়ুহান্নাবিইয়ুজা-হিদিল কুফফা-রা ওয়াল মুনা-ফিকীনা ওয়াগলুজ‘আলাইহিম ওয়া মা’ওয়া-হুম জাহান্নামু ওয়া বি’ছাল মাসীর।',
        'দারাবাল্লা-হু মাছালালিলল্লাযীনা কাফারুমরাআতা নূহিওঁ ওয়ামরাআতা লূতিন কানাতা-তাহতা ‘আবদাইনি মিন ‘ইবা-দিনা-ছা-লিহাইনি ফাখা-নাতা-হুমা-ফালাম ইউগনিয়া-‘আনহুমা-মিনাল্লা-হি শাইআওঁ ওয়া কীলাদ খুলান্না-রা মা‘আদ্দা-খিলীন।',
        'ওয়া দারাবাল্লা-হু মাছালালিলল্লাযীনা আ-মানুমরাআতা ফির‘আওনা । ইযকা-লাত রাব্ব্বিনি লী ‘ইনদাকা বাইতান ফিল জান্নাতি ওয়া নাজ্জিনী মিন ফির‘আওনা ওয়া ‘আমালিহী ওয়া নাজ্জিনী মিনাল কাওমিজ্জা-লিমীন।',
        'ওয়া মারইয়ামাবনাতা ‘ইমরা-নাল্লাতীআহসানাত ফারজাহা-ফানাফাখনা-ফীহি মিররূহিনাওয়া সাদ্দাকাত বিকালিমা-তি রাব্বিহা-ওয়া কুতুবিহী ওয়া কা-নাত মিনাল কা-নিতীন।'
      ],
      67: [
        'তাবা-রাকাল্লাযী বিয়াদিহিল মুলকু ওয়া হুওয়া ‘আলা- কুল্লি শাইয়িন কাদীর।',
        'আল্লাযী খালাকাল মাওতা ওয়াল হায়া-তা লিইয়াবলুওয়াকুম আইয়ুকুম আহছানু‘আমালাওঁ ওয়া হুওয়াল ‘আঝীঝুল গাফূর।',
        'আল্লাযী খালাকা ছাব‘আ ছামা-ওয়া-তিন তিবা-কান মা- তারা- ফী খালকির রাহমা-নি মিন তাফা-উত ফারজি‘ইল বাসারা হাল তারা- মিন ফুতূর।',
        'ছু ম্মার জি‘ইলবাসারা কাররাতাইনি ইয়ানকালিব ইলাইকাল বাসারু খা-ছিআওঁ ওয়া হুওয়া হাছীর।',
        'ওয়া লাকাদ ঝাইয়ান্নাছ ছামাআদ্দুনইয়া- বিমাসা-বীহা ওয়াজা‘আলনা- হা- রুজূমাল লিশশায়া-তীনি ওয়া আ‘তাদনা- লাহুম ‘আযা- বাছছা‘ঈর।',
        'ওয়া লিল্লাযীনা কাফারূবিরাব্বিহিম ‘আযা- বুজাহান্নামা ওয়াবি’ছাল মাসীর।',
        'ইযাউলকূফীহা- ছামি‘উ লাহা- শাহীকাওঁ ওয়াহিয়া তাফূর।',
        'তাকা- দুতামাইয়াঝুমিনাল গাইজি কুল্লামাউলকিয়া ফীহা- ফাওজুন ছাআলাহুম খাঝানাতুহাআলাম ইয়া’তিকুম নাযীর।g',
        'কা- লূবালা- কাদ জাআনা- নাযীরুন ফাকাযযাবনা- ওয়া কুলনা- মানাঝঝালাল্লা- হু মিন শাইয়িন ইন আনতুম ইল্লা- ফী দালা- লিন কাবীর।',
        'ওয়া কা-লূলাও কুন্না- নাছমা‘উ আও না‘কিলুমা- কুন্না-ফীআসহা-বিছছা‘ঈর।',
        'ফা‘তারাফূবিযামবিহিম ফাছুহক্বললিআসহা-বিছ ছা‘ঈর।',
        'ইন্নাল্লাযীনা ইয়াখশাওনা রাব্বাহুম বিলগাইবি লাহুম মাগফিরাতুওঁ ওয়া আজরুন কাবীর।',
        'ওয়া আছিররূকাওলাকুম আবিজহারূবিহী ইন্নাহূ‘আলীমুম বিযা- তিসসুদূ র।',
        'আলা- ইয়া‘লামুমান খালাকা ওয়া হুওয়াল্লাতীফুল খাবীর।',
        'হুওয়াল্লাযী জা‘আলা লাকুমুল আরদা যালূলান ফামশূফী মানা-কিবিহা- ওয়া কুলূমির রিঝকিহী ওয়া ইলাইহিন নুশূর।',
